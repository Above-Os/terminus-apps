olaresManifest.version: '0.10.0'
metadata:
  name: koboldcpp
  description: Run GGUF models easily with a KoboldAI UI. One File. Zero Install.
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: koboldcpp
  version: '1.0.0'
  title: KoboldCpp
  categories:
  - Productivity_v112
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: 'latest'
  fullDescription: |
    KoboldCpp is an easy-to-use AI text-generation software for GGML and GGUF models, inspired by the original KoboldAI.
      - Runs on CPU or GPU, supports full or partial offloaded.
      - Supports all GGML and GGUF models with backwards compatibility.
      - Bundled KoboldAI Lite UI with editing tools, save formats, memory, world info and more.
      - Provides compatible API endpoints for KoboldAI, OpenAI, Ollama and more.
      - Image Generation, Speech-To-Text, Text-To-Speech, Image Recognition and more.
  developer: LostRuins
  website: https://github.com/LostRuins/koboldcpp
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 4Gi
  limitedMemory: 8Gi
  requiredDisk: 5Gi
  limitedDisk: 50Gi
  requiredCpu: 2.1
  limitedCpu: 4.1
  requiredGpu: 4Gi
  limitedGpu: 24Gi
  doc: https://github.com/LostRuins/koboldcpp/wiki
  supportArch:
  - amd64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
sharedEntrances:
  - name: koboldcpp
    host: sharedentrances-koboldcpp
    port: 0
    title: KoboldCpp
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    invisible: true
    authLevel: internal
entrances:
  - authLevel: internal
    host: koboldcppingress
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    name: koboldcpp
    openMethod: window
    port: 8080
    title: KoboldCpp
olaresManifest.type: app
