metadata:
  title: KoboldCpp
  description: 轻松运行GGUF模型，配备KoboldAI界面。单文件，零安装。
spec:
  fullDescription: |
    KoboldCpp是一款简单易用的AI文本生成软件，支持GGML和GGUF模型，灵感来自原版KoboldAI。
      - 支持CPU或GPU运行，支持全部或部分卸载到GPU。
      - 支持所有GGML和GGUF模型，向后兼容所有历史模型。
      - 内置KoboldAI Lite UI，提供编辑工具、保存格式、记忆、世界信息等功能。
      - 提供兼容KoboldAI、OpenAI、Ollama等多种API端点。
      - 支持图像生成、语音转文字、文字转语音、图像识别等功能。
