olaresManifest.version: "0.12.0"
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: sglangllmbasev3
  icon: https://app.cdn.olares.com/appstore/sglang/icon.png
  description: "Generic SGLang + llm-init base. Pick any HF model at install via env."
  appid: sglangllmbasev3
  title: SGLang LLM Base (llm-init)
  version: '1.0.0'
  categories:
    - AI
sharedEntrances:
  - name: sglangllmbasev3
    host: sharedentrances-api
    port: 0
    title: SGLang LLM API
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/sglang/icon.png
entrances:
  - name: sglangclient
    port: 8090
    host: download-svc
    title: SGLang LLM
    icon: https://app.cdn.olares.com/appstore/sglang/icon.png
    openMethod: window
    authLevel: internal
workloadReplicas:
  sglang: 1
  sglangllmbasev3: 1
spec:
  versionName: '0.5.12.post1'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app and a generic *base*: it is NOT tied to any specific
    model. The model to serve is chosen entirely at install time through
    environment variables, so the same Helm chart can serve any Hugging Face
    model that SGLang supports.

    **HOW IT WORKS**
    The llm-init sidecar downloads the configured HF model, writes a readiness
    sentinel + model path, and exposes an OpenAI-compatible `/v1/*` surface plus
    a unified `/api/progress` + `/healthz` dashboard. The SGLang container waits
    for the sentinel, then serves the model. llm-init and SGLang run in separate
    Deployments and share the HF cache + run-state via hostPath.

    **Stack**
    - **SGLang** (`lmsysorg/sglang`, port 30000): GPU inference, OpenAI server.
    - **llm-init** (`beclab/llm-init`, port 8090): HF download, OpenAI `/v1/*`,
      progress UI; proxies the engine at `http://sglang:30000`.

    **Model storage (App Common)**
    HF models go to the shared App Common store `appCommon/huggingface`, mounted
    at `/cache/hf/hub`. All HF-based apps share it; llm-init writes, SGLang reads.

    **Install-time parameters (set per model)**
    - `MODEL_SOURCE` — `hf://<repo>` (optionally `--include <file>` / `--revision <sha>`).
    - `MODEL_NAME` — OpenAI client alias + SGLang `--served-model-name`.
    - `MODEL_MODE` — `chat` or `embedding`.
    - `MODEL_SUPPORTS` — CSV of `supports_*` capability keys (empty if none).
    - `ENGINE_ARGS` — SGLang CLI flags, e.g. `--context-length 8192 --mem-fraction-static 0.8 --tp 1`.
    - `LOG_LEVEL` — `debug | info | warn | error`.
    - `SGLANG_CPU_REQUEST` / `SGLANG_MEMORY_REQUEST` — SGLang pod scheduling floor.
    - `SGLANG_CPU_LIMIT` / `SGLANG_MEMORY_LIMIT` — SGLang pod ceiling (set per model).

    **NOTE ON RESOURCES**
    - SGLang requires a GPU. GPU memory is governed by `gpu-inject` + manifest
      `*GPUMemory` fields and SGLang's `--mem-fraction-static`.
    - Container CPU/RAM requests & limits are install-time env (`SGLANG_CPU_*` /
      `SGLANG_MEMORY_*`). Olares validates sums across llm-init + sglang containers.

  upgradeDescription: |
    Generic SGLang + llm-init base (llm-init v1.2.1, lmsysorg/sglang:v0.5.12.post1-cu130).
    Loads any HF model; model identity, source and tuning are install-time env.
    Models live in the shared App Common store appCommon/huggingface.
    Sentinel/model_path are per-instance under appCache/llm-init-run/<release>.

  developer: beclab
  website: https://github.com/beclab/llm-init
  sourceCode: https://github.com/sgl-project/sglang
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
      url: https://github.com/beclab/llm-init

  accelerator:
  - mode: nvidia
    requiredCpu: 1200m
    limitedCpu: 16000m
    requiredMemory: 3Gi
    limitedMemory: 64Gi
    requiredDisk: 50Mi
    limitedDisk: 500Gi
    requiredGPUMemory: 1Gi
    limitedGPUMemory: 80Gi

  supportArch:
    - amd64
permission:
  appData: true
  appCache: true   # sentinel/model_path live under appCache/llm-init-run/<release>
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  allowMultipleInstall: true
  templateOnly: true
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  - envName: MODEL_SOURCE        # example: hf://Qwen/Qwen3-0.6B
    required: true
    type: string
    editable: true
    applyOnChange: true
  - envName: MODEL_NAME          # example: qwen3-0.6b
    required: true
    type: string
    editable: true
    applyOnChange: true
  - envName: MODEL_MODE
    required: true
    type: string
    editable: true
    applyOnChange: true
    options:
    - title: Chat
      value: chat
    - title: Embedding
      value: embedding
  - envName: MODEL_SUPPORTS
    required: true
    default: ""
    type: string
    editable: true
    applyOnChange: true
  - envName: ENGINE_ARGS         # example: --context-length 8192 --mem-fraction-static 0.8 --max-running-requests 32
    required: true
    default: ""
    type: string
    editable: true
    applyOnChange: true
  - envName: LOG_LEVEL
    required: true
    type: string
    editable: true
    applyOnChange: true
    options:
    - title: Debug
      value: debug
    - title: Info
      value: info
    - title: Warn
      value: warn
    - title: Error
      value: error
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: SGLANG_CPU_REQUEST    # example: 200m
    required: true
    type: string
    editable: true
    applyOnChange: true
  - envName: SGLANG_MEMORY_REQUEST # example: 2Gi
    required: true
    type: string
    editable: true
    applyOnChange: true
  - envName: SGLANG_CPU_LIMIT      # example: 6
    required: true
    type: string
    editable: true
    applyOnChange: true
  - envName: SGLANG_MEMORY_LIMIT   # example: 32Gi
    required: true
    type: string
    editable: true
    applyOnChange: true
