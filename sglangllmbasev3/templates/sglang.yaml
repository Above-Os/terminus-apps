{{- $oe := .Values.olaresEnv | default dict -}}
{{- $modelName := $oe.MODEL_NAME | default "" -}}
{{- $engineArgs := $oe.ENGINE_ARGS | default "" -}}
{{- $hfEndpoint := $oe.HF_ENDPOINT | default "" -}}
{{- $hfToken := $oe.HF_TOKEN | default "" -}}
{{- $cpuRequest := trim ($oe.SGLANG_CPU_REQUEST | default "200m") -}}
{{- $memRequest := trim ($oe.SGLANG_MEMORY_REQUEST | default "2Gi") -}}
{{- $cpuLimit := trim ($oe.SGLANG_CPU_LIMIT | default "6") -}}
{{- $memLimit := trim ($oe.SGLANG_MEMORY_LIMIT | default "32Gi") -}}
{{- $runStateHostPath := printf "%s/llm-init-run/%s" .Values.userspace.appCache .Release.Name -}}
---
# SGLang engine Deployment (GPU). wrappers/sglang.sh blocks on the sentinel
# llm-init writes, then execs launch_server with --model-path "$MODEL_NAME" on
# :30000. Engine env pins HF_HUB_CACHE/HF_HOME and HF_HUB_OFFLINE so repo id
# resolves llm-init's read-only shared cache without Hub metadata writes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: sglang
  annotations:
    applications.app.bytetrade.io/gpu-inject: "sglang"
spec:
  replicas: {{ .Values.workloads.sglang.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: sglang
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: sglang
    spec:
      restartPolicy: Always
      volumes:
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.appCommon }}/huggingface"
            type: DirectoryOrCreate
        - name: run-state
          hostPath:
            path: "{{ $runStateHostPath }}"
            type: DirectoryOrCreate
        - name: wrappers
          configMap:
            name: llm-init-wrappers
            defaultMode: 0555
      containers:
        - name: sglang
          image: docker.io/lmsysorg/sglang:v0.5.12.post1-cu130
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/llm-init/wrappers/sglang.sh"]
          env:
            - name: ENGINE_KIND
              value: sglang
            - name: MODEL_NAME
              value: "{{ $modelName }}"
            - name: SGLANG_PORT
              value: "30000"
            - name: WAIT_TIMEOUT
              value: "3600"
            - name: ENGINE_ARGS
              value: "{{ $engineArgs }}"
            - name: HF_HUB_CACHE
              value: /cache/hf/hub
            - name: HF_HOME
              value: /cache/hf
            - name: HF_HUB_OFFLINE
              value: "1"
{{- if $hfEndpoint }}
            - name: HF_ENDPOINT
              value: "{{ $hfEndpoint }}"
{{- end }}
{{- if $hfToken }}
            - name: HF_TOKEN
              value: "{{ $hfToken }}"
{{- end }}
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
          ports:
            - name: sglang
              containerPort: 30000
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
              readOnly: true
            - name: run-state
              mountPath: /run/llm-init
              readOnly: true
            - name: wrappers
              mountPath: /llm-init/wrappers
              readOnly: true
          resources:
            requests:
              cpu: "{{ $cpuRequest }}"
              memory: "{{ $memRequest }}"
            limits:
              cpu: "{{ $cpuLimit }}"
              memory: "{{ $memLimit }}"
---
apiVersion: v1
kind: Service
metadata:
  name: sglang
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: sglang
spec:
  selector:
    io.kompose.service: sglang
  ports:
    - name: sglang
      port: 30000
      targetPort: 30000
  type: ClusterIP
