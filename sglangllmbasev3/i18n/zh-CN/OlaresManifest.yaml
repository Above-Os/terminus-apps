metadata:
  title: SGLang LLM 基座 (llm-init)
  description: "通用 SGLang + llm-init 基座；安装时通过环境变量指定任意 HF 模型"

spec:
  fullDescription: |
    **重要说明**
    这是一个集群共享应用，也是一个**通用基座**：它不绑定任何具体模型。要服务哪个
    模型完全由安装时的环境变量决定，因此同一套 Helm chart 可服务 SGLang 支持的任意
    Hugging Face 模型。

    **技术栈**
    - **SGLang**（`lmsysorg/sglang`，30000）：GPU 推理、OpenAI 服务。
    - **llm-init**（`beclab/llm-init`，8090）：HF 下载、OpenAI `/v1/*`、进度面板；
      代理引擎 `http://sglang:30000`。

    **安装时参数**
    - `MODEL_SOURCE` —— `hf://<repo>`（`--include` / `--revision` 可选）。
    - `MODEL_NAME` —— HF `owner/repo`，用于 `--model-path` 与 `--served-model-name`。
    - `ENGINE_ARGS` —— SGLang 参数，如 `--context-length 8192 --mem-fraction-static 0.8`。
    - `SGLANG_CPU_*` / `SGLANG_MEMORY_*` —— 引擎 Pod 资源。
