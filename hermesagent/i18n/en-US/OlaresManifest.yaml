metadata:
  title: Hermes Agent
  description: The self-improving AI agent by Nous Research
spec:
  fullDescription: |
    # Overview
    Hermes is the self-improving AI agent built by Nous Research. The only
    agent with a built-in learning loop: it creates skills from experience,
    improves them during use, searches its own past conversations, and
    builds a deepening model of you across sessions.

    # Key Features
    Real Terminal UI
    - Multiline editing, slash-command autocomplete, conversation history,
      interrupt-and-redirect, and streaming tool output.

    Multi-channel Gateway
    - Telegram, Discord, Slack, WhatsApp, Signal and Email from a single
      process, with voice memo transcription.

    Closed Learning Loop
    - Agent-curated memory, autonomous skill creation, FTS5 session search,
      Honcho dialectic user modeling. agentskills.io compatible.

    Scheduled Automations
    - Built-in cron scheduler with delivery to any platform.

    Delegates and Parallelizes
    - Spawn isolated subagents for parallel workstreams; call tools via RPC.

    Any Model
    - Nous Portal, OpenRouter (200+ models), NVIDIA NIM, MiMo, GLM,
      Moonshot, MiniMax, Hugging Face, OpenAI, Anthropic, or your own.
  upgradeDescription: |
    Initial release of Hermes Agent on Olares (upstream v2026.4.16).
