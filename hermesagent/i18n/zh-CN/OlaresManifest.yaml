metadata:
  title: Hermes Agent
  description: Nous Research 打造的自我进化型 AI Agent
spec:
  fullDescription: |
    # 简介
    Hermes 是 Nous Research 打造的自我进化型 AI Agent，内置学习闭环：
    从经验中生成技能、在使用中自我改进、可检索自己过往的对话，
    并在多次会话中不断加深对你的理解。

    # 核心功能
    真正的终端 UI
    - 多行编辑、斜杠命令补全、会话历史、中断改向、工具输出流式展示。

    多通道消息网关
    - 一个进程同时接入 Telegram / Discord / Slack / WhatsApp / Signal / Email，
      内置语音备忘录转写。

    学习闭环
    - Agent 自治记忆与技能生成、FTS5 会话搜索、Honcho 辩证式用户建模，
      兼容 agentskills.io 开放标准。

    定时任务
    - 内置 cron 调度器，结果可下发到任意消息平台。

    子 Agent 与并行
    - 派生隔离子 Agent 并行工作；通过 RPC 调用工具。

    任意模型
    - Nous Portal、OpenRouter（200+ 模型）、NVIDIA NIM、MiMo、GLM、Moonshot、
      MiniMax、Hugging Face、OpenAI、Anthropic，或你自己的推理端点，随意切换。
  upgradeDescription: |
    Hermes Agent 在 Olares 上的首个版本（上游 v2026.4.16）。
