olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: hermesagent
  icon: https://app.cdn.olares.com/appstore/hermesagent/icon.png
  description: The self-improving AI agent by Nous Research
  appid: hermesagent
  title: Hermes Agent
  version: 0.1.0
  categories:
  - Productivity_v112
  - Developer Tools
  - Utilities
sharedEntrances:
- name: hermesgateway
  host: sharedentrances-hermesgateway
  port: 0
  title: Hermes Gateway API
  icon: https://app.cdn.olares.com/appstore/hermesagent/icon.png
  invisible: true
  authLevel: internal
entrances:
- name: dashboard
  host: hermesdashboard
  port: 9119
  title: Hermes Dashboard
  icon: https://app.cdn.olares.com/appstore/hermesagent/icon.png
  openMethod: window
- name: terminal
  host: terminal
  port: 80
  title: Hermes CLI
  icon: https://app.cdn.olares.com/appstore/hermesagent/icon.png
  openMethod: window
  authLevel: internal
spec:
  versionName: '2026.4.16'
  fullDescription: |
    ### Overview
    Hermes is the self-improving AI agent built by Nous Research. It is the only
    agent with a built-in learning loop: it creates skills from experience,
    improves them during use, searches its own past conversations, and builds a
    deepening model of you across sessions.

    ### Key Features
    - Real Terminal UI with multiline editing, slash-command autocomplete,
      conversation history, interrupt-and-redirect, and streaming tool output.
    - Multi-channel Gateway: Telegram, Discord, Slack, WhatsApp, Signal and Email
      through one process; voice memo transcription included.
    - Closed learning loop: agent-curated memory, autonomous skill creation,
      FTS5 session search, Honcho dialectic user modeling. Compatible with the
      agentskills.io open standard.
    - Scheduled automations via a built-in cron scheduler.
    - Delegates and parallelizes work with isolated subagents.
    - Any model: Nous Portal, OpenRouter (200+ models), NVIDIA NIM, MiMo, GLM,
      Moonshot, MiniMax, Hugging Face, OpenAI, Anthropic, or your own endpoint.

    ### First-time Setup
    Open the `Hermes CLI` entrance and run `hermes setup` to launch the
    interactive wizard. It writes API keys, model providers, and channel
    tokens into `/opt/data`, which is persisted across pod restarts and
    upgrades.
  upgradeDescription: |
    Initial release of Hermes Agent on Olares (upstream v2026.4.16).
  developer: Nous Research
  website: https://hermes-agent.nousresearch.com
  sourceCode: https://github.com/NousResearch/hermes-agent
  submitter: harveyff & Olares
  locale:
  - en-US
  - zh-CN
  doc: https://hermes-agent.nousresearch.com/docs
  license:
  - text: MIT
    url: https://github.com/NousResearch/hermes-agent/blob/main/LICENSE
  requiredMemory: 2Gi
  limitedMemory: 10Gi
  requiredDisk: 500Mi
  limitedDisk: 20Gi
  requiredCpu: 1
  limitedCpu: 4
  supportArch:
  - amd64
  - arm64
permission:
  appData: true
  appCache: true
  userData:
    - Home
options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.5-0'
envs:
  - envName: ALLOW_HOME_DIR_ACCESS
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Allow Hermes to access Home directory on Olares"
  - envName: ALLOW_EXTERNAL_DIR_ACCESS
    type: bool
    required: false
    applyOnChange: true
    editable: true
    default: "false"
    description: "Allow Hermes to access External directory on Olares"
