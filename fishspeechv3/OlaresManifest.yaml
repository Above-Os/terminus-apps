olaresManifest.version: "0.12.0"
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: fishspeechv3
  icon: https://app.cdn.olares.com/appstore/fishspeech/icon.png
  description: SOTA Open Source TTS
  appid: fishspeechv3
  title: Fish Speech V3 for test
  version: '1.1.1'
  categories:
    - AI

sharedEntrances:
  - name: fishspeechv3
    title: Fish Speech
    host: sharedentrances-api
    icon: https://app.cdn.olares.com/appstore/fishspeech/icon.png
    port: 0
    invisible: true
    authLevel: internal

entrances:
  - authLevel: internal
    host: fishspeechclient
    icon: https://app.cdn.olares.com/appstore/fishspeech/icon.png
    name: fishspeechclient
    openMethod: window
    port: 8080
    title: Fish Speech

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   fishspeechv3     — Fish Speech WebUI engine Deployment (name: {{ .Release.Name }} == appid)
#   fishspeechclient — nginx entrance Deployment
# The download Job carries no replica count.
workloadReplicas:
  fishspeechv3: 1
  fishspeechclient: 1

permission:
  appData: true
  appCache: true
  userData:
    - Home

spec:
  versionName: 'webui-cuda-cu129-20260422'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **OVERVIEW**
    True human-like Text-to-Speech and Voice Cloning

    Bundled checkpoint: [fishaudio/s2-pro](https://huggingface.co/fishaudio/s2-pro) — Fish Audio's latest pro-tier release of the expressive TTS / voice-cloning family.

    FishAudio-S2 Pro is an expressive text-to-speech (TTS) and voice cloning model developed by Fish Audio, designed to generate speech that sounds natural, realistic, and emotionally rich — not robotic, not flat, and not constrained to studio-style narration.

    FishAudio-S2 Pro focuses on how humans actually speak: with emotion, variation, pauses, and intent.

    Features
    - Zero-shot & Few-shot TTS: Input a 10 to 30-second vocal sample to generate high-quality TTS output.

    - Multilingual & Cross-lingual Support: Simply copy and paste multilingual text into the input box—no need to worry about the language. Currently supports English, Japanese, Korean, Chinese, French, German, Arabic, and Spanish.

    - No Phoneme Dependency: The model has strong generalization capabilities and does not rely on phonemes for TTS. It can handle text in any language script.

    - Highly Accurate: Achieves a low CER (Character Error Rate) of around 0.4% and WER (Word Error Rate) of around 0.8% for Seed-TTS Eval.

    - Fast: Accelerated by torch compile, the real-time factor is approximately 1:7 on an Nvidia RTX 4090 GPU.

    - WebUI Inference: Features an easy-to-use, Gradio-based web UI compatible with Chrome, Firefox, Edge, and other browsers.

    - GUI Inference: Offers a PyQt6 graphical interface that works seamlessly with the API server. Supports Linux, Windows, and macOS.

  upgradeDescription: |
    Migrated Fish Speech to apiVersion v3 shared app pattern (fishspeechv2 → fishspeechv3).

    **What's Changed**

    - **Accelerator**: moved the GPU requirement into the accelerator modes list and added nvidia-gb10 (GB10/Spark) support.

    - **Architecture**: flattened the fishspeechv2/fishspeechv2server sub-charts
      into a single chart; the WebUI engine Deployment is now named after the
      release (`{{ .Release.Name }}` == appid) for v3 workload verification, and
      the nginx entrance Deployment is `fishspeechclient`. Backend references now
      resolve within the release namespace instead of the old `*-shared` cross-namespace names.
    - **Scaling**: `workloadReplicas` declares replica counts for the
      `fishspeechv3` WebUI engine and `fishspeechclient` nginx entrance workloads.
      The model-download Job carries no replicas.
    - **Runtime**: image `beclab/harveyff-fishaudio-fish-speech:webui-cuda-cu129-20260422`,
      bundled checkpoint fishaudio/s2-pro, CUDA 12.9 (cu129) for Blackwell (sm_120) support.

  developer: Fish Audio
  website: https://speech.fish.audio/
  sourceCode: https://github.com/fishaudio/fish-speech
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://speech.fish.audio/
  license:
    - text: Apache-2.0
      url: https://github.com/fishaudio/fish-speech/blob/main/LICENSE

  accelerator:
  # nvidia      — discrete GPU; GPU memory via nvidia.com/gpumem.
  # nvidia-gb10 — GB10/Spark (arm64) unified memory; GPU memory comes from pod RAM,
  #               so the GPU-memory fields are dropped.
  - mode: nvidia
    requiredCpu: "1"
    limitedCpu: "6"
    requiredMemory: 16Gi
    limitedMemory: 40Gi
    requiredDisk: 50Mi
    limitedDisk: 50Gi
    requiredGPUMemory: 4Gi
    limitedGPUMemory: 22Gi
  - mode: nvidia-gb10
    requiredCpu: "1"
    limitedCpu: "6"
    requiredMemory: 16Gi
    limitedMemory: 40Gi
    requiredDisk: 50Mi
    limitedDisk: 50Gi

  supportArch:
    - amd64
    - arm64
  onlyAdmin: true

envs:
  - envName: HF_TOKEN
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: HF_ENDPOINT
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE

options:
  allowMultipleInstall: true
  apiTimeout: 0
  conflicts:
    - name: fishspeechv2
      type: application
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
