    # Forced alignment (audio+text -> word/char timestamps) via Qwen3-ForcedAligner, reusing the vLLM cu129 image (capability end-to-end in the model, read from shared HF cache offline); exposes /health /healthz /readyz /v1/models POST /v1/audio/align.
    import os, tempfile, threading, logging, asyncio
    from fastapi import FastAPI, UploadFile, File, Form, HTTPException
    import uvicorn

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "info").lower()
    logging.basicConfig(level=getattr(logging, LOG_LEVEL.upper(), logging.INFO))
    log = logging.getLogger("audio-align")

    MODEL_NAME = os.environ.get("MODEL_NAME", "Qwen/Qwen3-ForcedAligner-0.6B")
    _src = os.environ.get("MODEL_SOURCE", "")
    MODEL_REPO = _src[5:] if _src.startswith("hf://") else (_src or MODEL_NAME)
    PORT = int(os.environ.get("WRAPPER_PORT", "8000"))
    HF_TOKEN = os.environ.get("HF_TOKEN") or None

    app = FastAPI(title="audio-align (Qwen3-ForcedAligner)")
    try:
        from _gpumetrics import mount_metrics
        mount_metrics(app)  # GET /metrics -> uniform audio_gpu_* gauges
    except Exception as _e:
        log.warning("gpu /metrics unavailable: %s", _e)
    _state = {"ready": False, "error": None, "model": None, "device": "cpu"}
    # Serialise .align() across connections AND run it off the event loop (asyncio.to_thread): its blocking vLLM inference (30~110s under vGPU) otherwise froze uvicorn and got concurrent requests RST at ~47s; the lock keeps GPU use one-at-a-time.
    _align_lock = asyncio.Lock()

    def _load():
        try:
            # qwen-asr ships the Qwen3-ForcedAligner modeling code + .align(); engine cmd installs it on first load, fall back to a pip here just in case.
            try:
                from qwen_asr import Qwen3ForcedAligner  # noqa: F401
            except Exception:
                import subprocess, sys
                log.info("qwen-asr missing; pip-installing for forced aligner...")
                # qwen-asr pulls flask->blinker but the image has a distutils blinker 1.4 pip won't uninstall; reinstall blinker as pip-managed first so the install doesn't abort.
                subprocess.run([sys.executable, "-m", "pip", "install", "-q",
                                "--ignore-installed", "blinker"], check=False)
                subprocess.run([sys.executable, "-m", "pip", "install", "-q", "qwen-asr"], check=False)
                from qwen_asr import Qwen3ForcedAligner  # noqa: F401
            import torch
            from qwen_asr import Qwen3ForcedAligner
            dev = "cuda" if torch.cuda.is_available() else "cpu"
            dtype = torch.bfloat16 if dev == "cuda" else torch.float32
            kw = dict(dtype=dtype, device_map=(dev if dev == "cpu" else "cuda:0"))
            if HF_TOKEN:
                kw["token"] = HF_TOKEN
            try:
                model = Qwen3ForcedAligner.from_pretrained(MODEL_REPO, **kw)
            except TypeError:
                kw.pop("token", None)
                model = Qwen3ForcedAligner.from_pretrained(MODEL_REPO, **kw)
            _state.update(model=model, device=dev, ready=True)
            log.info("Qwen3-ForcedAligner %s loaded on %s", MODEL_REPO, dev)
        except Exception as e:
            _state["error"] = str(e)
            log.exception("forced-aligner load failed: %s", e)

    @app.on_event("startup")
    def _startup():
        threading.Thread(target=_load, daemon=True).start()

    @app.get("/health")
    def health():
        if _state["ready"]:
            return {"status": "ok", "device": _state["device"]}
        raise HTTPException(status_code=503, detail=_state["error"] or "loading model")

    @app.get("/healthz")
    def healthz():
        return health()

    @app.get("/readyz")
    def readyz():
        return health()

    @app.get("/v1/models")
    def models():
        return {"object": "list", "data": [{"id": MODEL_NAME, "object": "model", "mode": "align"}]}

    def _field(u, *names):
        for n in names:
            try:
                if isinstance(u, dict):
                    if n in u:
                        return u[n]
                elif hasattr(u, n):
                    return getattr(u, n)
            except Exception:
                pass
        return None

    # Gateway routes multipart audio-in capabilities under /v1/audio/<op>, so /v1/audio/align is the path the LLM Gateway hits.
    @app.post("/v1/audio/align")
    async def align(file: UploadFile = File(...), text: str = Form(default=None),
                    language: str = Form(default=None), segments: str = Form(default=None)):
        if not _state["ready"]:
            raise HTTPException(status_code=503, detail=_state["error"] or "model not ready")
        data = await file.read()
        # BATCH mode (opt-in): `segments` JSON [{start,end,text,[language]}] - decode the whole clip once, align each slice against its own text (slice-relative times), per-item try/except; no `segments` => original single-clip path byte-for-byte.
        if segments:
            import json as _json, io as _io, soundfile as _sf
            try:
                _segs = _json.loads(segments)
            except Exception as e:
                raise HTTPException(status_code=400, detail="invalid `segments` json: %s" % e)
            if not isinstance(_segs, list):
                raise HTTPException(status_code=400, detail="`segments` must be a JSON array")
            try:
                _arr, _sr = _sf.read(_io.BytesIO(data), dtype="float32", always_2d=True)
                _arr = _arr.mean(axis=1)  # -> mono
            except Exception as e:
                raise HTTPException(status_code=400, detail="could not decode audio: %s" % e)
            _out = []
            for _seg in _segs:
                try:
                    _st = (str(_seg.get("text") or "")).strip()
                    if not _st:
                        _out.append({"units": [], "language": None}); continue
                    _a = float(_seg.get("start") or 0); _b = float(_seg.get("end") or 0)
                    _lo = max(0, int(_a * _sr)); _hi = min(len(_arr), int(_b * _sr))
                    if _hi <= _lo:
                        _out.append({"error": "empty segment"}); continue
                    with tempfile.NamedTemporaryFile(suffix=".wav", delete=False) as _f:
                        _sf.write(_f.name, _arr[_lo:_hi], _sr, format="WAV", subtype="PCM_16")
                        _sp = _f.name
                    _lg = (str(_seg.get("language") or language or "")).strip() or None
                    _kw = {"language": _lg} if _lg else {}
                    def _do_seg(_p=_sp, _t=_st, _k=_kw):
                        try:
                            return _state["model"].align(audio=_p, text=_t, **_k)
                        except TypeError:
                            return _state["model"].align(_p, _t)
                    async with _align_lock:
                        _res = await asyncio.to_thread(_do_seg)
                    try:
                        os.unlink(_sp)
                    except Exception:
                        pass
                    _ur = _res[0] if _res else []
                    _out.append({"language": _lg, "units": [
                        {"text": _field(u, "text", "word", "token"),
                         "start": _field(u, "start_time", "start"),
                         "end": _field(u, "end_time", "end")} for u in _ur]})
                except Exception as e:
                    _out.append({"error": "align failed: %s" % e})
            return {"model": MODEL_NAME, "mode": "align", "batch": True, "results": _out}
        # ---- SINGLE mode (unchanged) ----
        if not (text or "").strip():
            raise HTTPException(status_code=400, detail="`text` is required for forced alignment")
        suffix = os.path.splitext(file.filename or "a.wav")[1] or ".wav"
        with tempfile.NamedTemporaryFile(suffix=suffix, delete=False) as f:
            f.write(data)
            path = f.name
        try:
            lang = (language or "").strip() or None
            kw = {"language": lang} if lang else {}
            def _do_align():
                try:
                    return _state["model"].align(audio=path, text=text, **kw)
                except TypeError:
                    return _state["model"].align(path, text)
            # Off the event loop + serialised: keeps uvicorn responsive to concurrent requests (no 47s RST) while GPU aligns run one at a time.
            async with _align_lock:
                results = await asyncio.to_thread(_do_align)
            # results is a batch list; results[0] is the unit list for our single input.
            units_raw = results[0] if results else []
            units = []
            for u in units_raw:
                units.append({
                    "text": _field(u, "text", "word", "token"),
                    "start": _field(u, "start_time", "start"),
