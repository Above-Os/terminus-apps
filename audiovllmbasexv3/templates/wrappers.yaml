    # Speaker diarization via pyannote (image's torch/pyannote.audio, model from shared HF cache); exposes /healthz /readyz /v1/models POST /v1/audio/diarization.
    import os, tempfile, threading, logging
    from fastapi import FastAPI, UploadFile, File, Form, HTTPException
    import uvicorn

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "info").lower()
    logging.basicConfig(level=getattr(logging, LOG_LEVEL.upper(), logging.INFO))
    log = logging.getLogger("audio-diar")

    MODEL_NAME = os.environ.get("MODEL_NAME", "pyannote-community-1")
    _src = os.environ.get("MODEL_SOURCE", "")
    MODEL_REPO = _src[5:] if _src.startswith("hf://") else (_src or MODEL_NAME)
    PORT = int(os.environ.get("WRAPPER_PORT", "8000"))
    HF_TOKEN = os.environ.get("HF_TOKEN") or None

    app = FastAPI(title="audio-diarization (pyannote)")
    try:
        from _gpumetrics import mount_metrics
        mount_metrics(app)  # GET /metrics -> uniform audio_gpu_* gauges
    except Exception as _e:
        log.warning("gpu /metrics unavailable: %s", _e)
    _state = {"ready": False, "error": None, "pipeline": None, "device": "cpu"}

    def _decode(path):
        # Decode to (channels,time) float32 tensor + sample_rate so we feed pyannote an in-memory waveform, bypassing its broken torchcodec AudioDecoder.
        import torch
        try:
            import soundfile as sf
            data, sr = sf.read(path, dtype="float32", always_2d=True)  # (time, channels)
            return torch.from_numpy(data.T.copy()), int(sr)
        except Exception:
            pass
        try:
            import torchaudio
            wav, sr = torchaudio.load(path)  # (channels, time)
            return wav.float(), int(sr)
        except Exception:
            pass
        import wave, numpy as np
        with wave.open(path, "rb") as wf:
            sr, ch, sw = wf.getframerate(), wf.getnchannels(), wf.getsampwidth()
            raw = wf.readframes(wf.getnframes())
        dt = {1: np.uint8, 2: np.int16, 4: np.int32}[sw]
        a = np.frombuffer(raw, dtype=dt).astype(np.float32)
        if sw == 2:
            a /= 32768.0
        elif sw == 4:
            a /= 2147483648.0
        else:
            a = (a - 128.0) / 128.0
        a = a.reshape(-1, ch).T
        return torch.from_numpy(a.copy()), int(sr)

    def _load():
        try:
            import torch
            from pyannote.audio import Pipeline
            # pyannote.audio 4 uses token=; older used use_auth_token=.
            try:
                pipe = Pipeline.from_pretrained(MODEL_REPO, token=HF_TOKEN)
            except TypeError:
                pipe = Pipeline.from_pretrained(MODEL_REPO, use_auth_token=HF_TOKEN)
            dev = "cuda" if torch.cuda.is_available() else "cpu"
            pipe.to(torch.device(dev))
            _state["pipeline"], _state["device"], _state["ready"] = pipe, dev, True
            log.info("pyannote pipeline %s loaded on %s", MODEL_REPO, dev)
        except Exception as e:
            _state["error"] = str(e)
            log.exception("pipeline load failed: %s", e)

    @app.on_event("startup")
    def _startup():
        threading.Thread(target=_load, daemon=True).start()

    @app.get("/healthz")
    def healthz():
        if _state["ready"]:
            return {"status": "ok", "device": _state["device"]}
        raise HTTPException(status_code=503, detail=_state["error"] or "loading pipeline")

    @app.get("/readyz")
    def readyz():
        return healthz()

    @app.get("/v1/models")
    def models():
        return {"object": "list", "data": [{"id": MODEL_NAME, "object": "model", "mode": "diar"}]}

    @app.post("/v1/audio/diarization")
    async def diarize(file: UploadFile = File(...), num_speakers: str = Form(default=None),
                      min_speakers: str = Form(default=None), max_speakers: str = Form(default=None)):
        if not _state["ready"]:
            raise HTTPException(status_code=503, detail=_state["error"] or "pipeline not ready")
        data = await file.read()
        suffix = os.path.splitext(file.filename or "a.wav")[1] or ".wav"
        with tempfile.NamedTemporaryFile(suffix=suffix, delete=False) as f:
            f.write(data)
            path = f.name
        try:
            kw = {}
            if num_speakers:
                kw["num_speakers"] = int(num_speakers)
            if min_speakers:
                kw["min_speakers"] = int(min_speakers)
            if max_speakers:
                kw["max_speakers"] = int(max_speakers)
            waveform, sr = _decode(path)
            out = _state["pipeline"]({"waveform": waveform, "sample_rate": sr}, **kw)
        except Exception as e:
            raise HTTPException(status_code=500, detail="diarization failed: %s" % e)
        finally:
            try:
                os.unlink(path)
            except Exception:
                pass
        # pyannote 4 wraps the Annotation in .speaker_diarization (v3 returned it directly); unwrap to a common itertracks() form.
        ann = getattr(out, "speaker_diarization", out)
        segs = [{"start": round(float(t.start), 3), "end": round(float(t.end), 3), "speaker": str(spk)}
                for t, _, spk in ann.itertracks(yield_label=True)]
        speakers = sorted({s["speaker"] for s in segs})
        return {"model": MODEL_NAME, "mode": "diar", "device": _state["device"],
                "num_speakers": len(speakers), "speakers": speakers,
                "num_segments": len(segs), "segments": segs}

    if __name__ == "__main__":
        uvicorn.run(app, host="0.0.0.0", port=PORT, log_level=LOG_LEVEL)
  translate.py: |
    # Text->text translation on the shared pyannote/torch image, SELF-ADAPTIVE by MODEL_NAME (CPU ctranslate2, deps pip-installed on first load); external API fixed to FLORES-200 with per-adapter mapping. Adapters: m2m100 (transformers+sentencepiece, ISO codes, MIT default) and nllb (tokenizers, codes already FLORES, CC-BY-NC opt-in). Exposes /healthz /readyz /v1/models POST /v1/translate.
    import os, re, sys, subprocess, threading, logging
    from typing import Optional
    from fastapi import FastAPI, HTTPException
    from pydantic import BaseModel
    import uvicorn

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "info").lower()
    logging.basicConfig(level=getattr(logging, LOG_LEVEL.upper(), logging.INFO))
    log = logging.getLogger("audio-translate")

    MODEL_NAME = os.environ.get("MODEL_NAME", "nllb-200-distilled-600M")
    _src = os.environ.get("MODEL_SOURCE", "")
    MODEL_REPO = _src[5:] if _src.startswith("hf://") else (_src or MODEL_NAME)
    PORT = int(os.environ.get("WRAPPER_PORT", "8000"))
    DEVICE = os.environ.get("CT2_DEVICE", "cpu")
    DEFAULT_SRC = os.environ.get("DEFAULT_SOURCE_LANG", "eng_Latn")
    # Advanced override only (not a clone field): force an adapter when name-detection guesses wrong; empty => auto-detect from MODEL_NAME/MODEL_REPO.
    FORCE_ADAPTER = (os.environ.get("TRANSLATE_ADAPTER", "") or "").strip().lower()

    def _pip(*pkgs):
        subprocess.run([sys.executable, "-m", "pip", "install", "-q", *pkgs], check=False)

    def _locate():
        # Resolve the CT2 model dir from the shared HF cache populated by llm-init.
        from huggingface_hub import snapshot_download
        return snapshot_download(MODEL_REPO, local_files_only=True,
                                 cache_dir=os.environ.get("HF_HUB_CACHE"))

    # adapters: one per model family; external codes always FLORES-200, each owns its tokenization + ctranslate2 call + FLORES<->native mapping.

    class _Adapter:
        name = "base"
        @staticmethod
        def matches(repo, mdir):
            return False
        def load(self, mdir):
            raise NotImplementedError
        def translate(self, sents, src_flores, tgt_flores, beam_size):
            raise NotImplementedError

    class NLLBAdapter(_Adapter):
        # NLLB CT2 repo ships tokenizer.json (tokenizers, no sentencepiece); its codes ARE FLORES-200 so no mapping - byte-identical to the pre-multi-model wrapper.
        name = "nllb"
        @staticmethod
        def matches(repo, mdir):
            if "nllb" in repo:
                return True
            return (os.path.exists(os.path.join(mdir, "tokenizer.json"))
                    and not os.path.exists(os.path.join(mdir, "sentencepiece.bpe.model")))
        def load(self, mdir):
            try:
                import ctranslate2
                from tokenizers import Tokenizer
            except Exception:
                _pip("ctranslate2", "tokenizers")
                import ctranslate2
                from tokenizers import Tokenizer
            self.tok = Tokenizer.from_file(os.path.join(mdir, "tokenizer.json"))
            self.tr = ctranslate2.Translator(mdir, device=DEVICE)
        def _decode_hyp(self, hyp, tgt):
            out = [t for t in hyp if t not in (tgt, "</s>", "<pad>", "<s>")]
            ids = [self.tok.token_to_id(t) for t in out]
            ids = [i for i in ids if i is not None]
            return self.tok.decode(ids).strip()
        def translate(self, sents, src, tgt, beam_size):
            # NLLB encoder input per sentence = [src_lang] + subwords + </s>; decoder prefix = [tgt].
            sources = [[src] + self.tok.encode(s, add_special_tokens=False).tokens + ["</s>"] for s in sents]
            res = self.tr.translate_batch(sources, target_prefix=[[tgt]] * len(sources),
                                          beam_size=beam_size, max_input_length=1024,
                                          max_decoding_length=1024)
            return [self._decode_hyp(r.hypotheses[0], tgt) for r in res]

    class M2M100Adapter(_Adapter):
        # m2m100 CT2 repo bundles M2M100Tokenizer (sentencepiece), ISO 639-1 codes; map FLORES->ISO by the 3-letter prefix and follow the CTranslate2 m2m100 recipe (target_prefix tag, hypotheses[0][1:] drops the forced tag).
        name = "m2m100"
        FLORES2M2M = {
            "eng": "en", "zho": "zh", "jpn": "ja", "kor": "ko", "fra": "fr", "deu": "de",
            "spa": "es", "rus": "ru", "ita": "it", "por": "pt", "arb": "ar", "hin": "hi",
            "vie": "vi", "tha": "th", "ind": "id", "nld": "nl", "pol": "pl", "tur": "tr",
            "ukr": "uk", "ces": "cs", "ell": "el", "heb": "he", "swe": "sv", "ron": "ro",
            "hun": "hu", "fin": "fi", "dan": "da", "nob": "no", "nno": "no", "afr": "af",
            "amh": "am", "ast": "ast", "azj": "az", "azb": "az", "bak": "ba", "bel": "be",
            "bul": "bg", "ben": "bn", "bos": "bs", "cat": "ca", "ceb": "ceb", "cym": "cy",
            "pes": "fa", "prs": "fa", "gle": "ga", "gla": "gd", "glg": "gl", "guj": "gu",
            "hau": "ha", "hrv": "hr", "hat": "ht", "hye": "hy", "ibo": "ig", "ilo": "ilo",
            "isl": "is", "jav": "jv", "kat": "ka", "kaz": "kk", "khm": "km", "kan": "kn",
            "ltz": "lb", "lug": "lg", "lin": "ln", "lao": "lo", "lit": "lt", "lvs": "lv",
            "plt": "mg", "mkd": "mk", "mal": "ml", "khk": "mn", "mar": "mr", "zsm": "ms",
            "mya": "my", "npi": "ne", "nso": "ns", "oci": "oc", "ory": "or", "pan": "pa",
            "pbt": "ps", "snd": "sd", "sin": "si", "slk": "sk", "slv": "sl", "som": "so",
            "als": "sq", "srp": "sr", "ssw": "ss", "sun": "su", "swh": "sw", "tam": "ta",
            "tgl": "tl", "tsn": "tn", "urd": "ur", "uzn": "uz", "wol": "wo", "xho": "xh",
            "ydd": "yi", "yor": "yo", "zul": "zu", "est": "et", "fuv": "ff", "bre": "br",
            "fry": "fy",
        }
        @staticmethod
        def matches(repo, mdir):
            return any(k in repo for k in ("m2m100", "m2m_100", "m2m-100"))
        def load(self, mdir):
            try:
                import ctranslate2, transformers
                import sentencepiece  # noqa: F401
            except Exception:
                _pip("ctranslate2", "transformers", "sentencepiece")
                import ctranslate2, transformers
            self.tok = transformers.AutoTokenizer.from_pretrained(mdir, clean_up_tokenization_spaces=True)
            self.tr = ctranslate2.Translator(mdir, device=DEVICE)
        def _iso(self, flores):
            code = self.FLORES2M2M.get(flores) or self.FLORES2M2M.get(flores.split("_")[0])
            if not code and flores in self.tok.lang_code_to_token:
                code = flores  # allow a raw ISO code passed straight through
            if not code or code not in self.tok.lang_code_to_token:
                raise HTTPException(status_code=400,
                                    detail="m2m100 does not support language '%s'" % flores)
            return code
        def translate(self, sents, src, tgt, beam_size):
            src_iso, tgt_iso = self._iso(src), self._iso(tgt)
            self.tok.src_lang = src_iso
            sources = [self.tok.convert_ids_to_tokens(self.tok.encode(s)) for s in sents]
            prefix = [self.tok.lang_code_to_token[tgt_iso]]
            res = self.tr.translate_batch(sources, target_prefix=[prefix] * len(sources),
                                          beam_size=beam_size, max_input_length=1024,
                                          max_decoding_length=1024)
            out = []
            for r in res:
                ids = self.tok.convert_tokens_to_ids(r.hypotheses[0][1:])
                out.append(self.tok.decode(ids, skip_special_tokens=True).strip())
            return out

    ADAPTERS = [M2M100Adapter, NLLBAdapter]

    def _pick_adapter(mdir):
        repo = MODEL_REPO.lower()
        if FORCE_ADAPTER:
            for A in ADAPTERS:
                if A.name == FORCE_ADAPTER:
                    return A()
        for A in ADAPTERS:
            if A.matches(repo, mdir):
                return A()
        return NLLBAdapter()  # safe default preserves legacy behaviour

    app = FastAPI(title="audio-translate (multi-model via ctranslate2)")
    try:
        from _gpumetrics import mount_metrics
        mount_metrics(app)  # GET /metrics -> uniform audio_gpu_* gauges
    except Exception as _e:
        log.warning("gpu /metrics unavailable: %s", _e)
    _state = {"ready": False, "error": None, "adapter": None, "device": DEVICE}

    def _load():
        try:
            d = _locate()
            ad = _pick_adapter(d)
            ad.load(d)
            _state.update(adapter=ad, ready=True)
            log.info("translate ready: adapter=%s model=%s on %s", ad.name, MODEL_REPO, DEVICE)
        except Exception as e:
            _state["error"] = str(e)
            log.exception("load failed: %s", e)

    @app.on_event("startup")
    def _startup():
        threading.Thread(target=_load, daemon=True).start()

    @app.get("/healthz")
    def healthz():
        if _state["ready"]:
            return {"status": "ok", "device": _state["device"],
                    "adapter": _state["adapter"].name if _state["adapter"] else None}
        raise HTTPException(status_code=503, detail=_state["error"] or "loading model")

    @app.get("/readyz")
    def readyz():
        return healthz()

    @app.get("/v1/models")
    def models():
        return {"object": "list", "data": [{"id": MODEL_NAME, "object": "model", "mode": "translate"}]}

    class Req(BaseModel):
        text: str
        target: str                 # FLORES-200 code, e.g. zho_Hans
        source: Optional[str] = None  # FLORES-200 code; default DEFAULT_SOURCE_LANG

    # Models are SENTENCE-level, so split input with a punctuation-only (non-AI) splitter, translate as one ctranslate2 batch, then join (empty joiner for space-less languages); adapter-agnostic, keyed on the FLORES target.
