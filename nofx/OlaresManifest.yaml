---
olaresManifest.version: "0.10.0"
olaresManifest.type: app
apiVersion: 'v1'
metadata:
  name: nofx
  icon: https://app.cdn.olares.com/appstore/dify/icon-new.png
  description: Open-source AI trading assistant — web UI with Go API; data persisted under app data.
  appid: nofx
  title: NOFX
  version: "1.0.0"
  categories:
    - Utilities

entrances:
  - name: nofx
    port: 8080
    host: nofx
    title: NOFX
    icon: https://app.cdn.olares.com/appstore/dify/icon-new.png
    authLevel: private
    openMethod: window

spec:
  versionName: "1.0.0"
  fullDescription: |
    NOFX is an open-source AI trading assistant. This Olares package runs the same official
    container images as upstream: `ghcr.io/nofxaios/nofx/nofx-backend` and
    `ghcr.io/nofxaios/nofx/nofx-frontend`.

    Open this app for the web UI. The API is available under the same origin at `/api/`.
    SQLite and logs live under `/app/data` (persisted in this app’s Olares app data directory). On first install,
    JWT and data-encryption keys are in a Kubernetes Secret; the RSA private key is written to
    app data `.env` by an init container (same pattern as upstream env + data directory).

    Upstream install (Docker): `curl -fsSL https://raw.githubusercontent.com/NoFxAiOS/nofx/main/install.sh | bash`
  upgradeDescription: |
    Switch to official NoFxAiOS images; frontend + backend with generated first-run secrets.
  developer: NoFxAiOS
  website: https://vergex.trade/
  sourceCode: https://github.com/NoFxAiOS/nofx
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 768Mi
  limitedMemory: 3Gi
  requiredDisk: 512Mi
  limitedDisk: 5Gi
  requiredCpu: 500m
  limitedCpu: "2"
  supportArch:
    - amd64
    - arm64

permission:
  appData: true

options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.2-0"
