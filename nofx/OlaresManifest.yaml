---
olaresManifest.version: "0.10.0"
olaresManifest.type: app
apiVersion: "v2"
metadata:
  name: nofx
  icon: https://raw.githubusercontent.com/leolianger/nofx/main/web/public/icons/nofx.svg
  description: Personal AI trading assistant — Web UI on port 8080, SQLite under app data.
  appid: nofx
  title: NOFX
  version: "1.0.0"
  categories:
    - Utilities

entrances:
  - name: nofx
    port: 8080
    host: nofx
    title: NOFX
    icon: https://raw.githubusercontent.com/leolianger/nofx/main/web/public/icons/nofx.svg
    authLevel: private
    openMethod: window

spec:
  versionName: "1.0.0"
  fullDescription: |
    NOFX is an open-source AI trading assistant with a React dashboard and Go backend
    (all-in-one image for Olares). Open this app to use the Web UI.

    Database file: /app/data/data.db (persisted via app data). Build and push the image
    from your fork using scripts/docker-build-push-goai007.sh; set values.yaml image
    tag to match the tag you pushed.
  upgradeDescription: |
    Initial Olares package.
  developer: leolianger
  sourceCode: https://github.com/leolianger/nofx
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 512Mi
  limitedMemory: 2Gi
  requiredDisk: 512Mi
  limitedDisk: 5Gi
  requiredCpu: 500m
  limitedCpu: "2"
  supportArch:
    - amd64
    - arm64

permission:
  appData: true

options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.2-0"
