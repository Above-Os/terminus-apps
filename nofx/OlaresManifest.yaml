---
olaresManifest.version: "0.10.0"
olaresManifest.type: app
apiVersion: "v2"
metadata:
  name: nofx
  icon: https://raw.githubusercontent.com/simple-icons/simple-icons/develop/icons/chartdotjs.svg
  description: AI-powered cryptocurrency trading platform with web dashboard and API.
  appid: nofx
  title: NOFX
  version: "1.0.0"
  categories:
    - Utilities

entrances:
  - name: nofx
    port: 8080
    host: nofx
    title: NOFX
    icon: https://raw.githubusercontent.com/simple-icons/simple-icons/develop/icons/chartdotjs.svg
    authLevel: private
    openMethod: window

spec:
  versionName: "1.0.0"
  fullDescription: |
    NOFX is an AI-assisted crypto trading platform. The web UI and API are served on one port
    (nginx + backend). Configure exchange keys and strategies in the app; SQLite data is stored
    under app data when DB_PATH points to /app/data.
  upgradeDescription: |
    Initial Olares package.
  developer: NoFxAiOS
  sourceCode: https://github.com/NoFxAiOS/nofx
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 512Mi
  limitedMemory: 2Gi
  requiredDisk: 512Mi
  limitedDisk: 5Gi
  requiredCpu: 500m
  limitedCpu: "2"
  supportArch:
    - amd64
    - arm64

permission:
  appData: true

options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.2-0"
