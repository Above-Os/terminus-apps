metadata:
  title: NOFX
  description: Open-source AI trading assistant using official images; data stored in app data.

spec:
  fullDescription: |
    NOFX is an open-source AI crypto trading assistant. This Olares package uses the same official
    prebuilt images as upstream: `ghcr.io/nofxaios/nofx/nofx-backend` and
    `ghcr.io/nofxaios/nofx/nofx-frontend`

    Open the app for the web UI.