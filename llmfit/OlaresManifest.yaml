olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: llmfit
  description: Right-sizes LLM models to your system hardware via REST API.
  icon: https://app.cdn.olares.com/appstore/llmfit/icon.svg
  appid: llmfit
  version: '1.0.0'
  title: LLMFit
  categories:
  - AI
  - Developer Tools
  - Utilities
permission:
  appData: true
  appCache: true
sharedEntrances:
- name: llmfit
  host: sharedentrances-llmfit
  port: 0
  title: LLMFit
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  invisible: true
  authLevel: internal
entrances:
- name: llmfitclient
  port: 8080
  host: llmfitclient
  title: LLMFit
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  authLevel: private
  invisible: true
spec:
  versionName: '0.7.2'
  fullDescription: |
    LLMFit is a tool that right-sizes LLM models to your system's RAM, CPU, and GPU. It detects your hardware, scores each model across quality, speed, fit, and context dimensions, and tells you which ones will actually run well on your machine.

    Deployed as a REST API server in Olares, it provides hardware-aware model recommendations accessible from any client.

    # Features
    * Detects system RAM, CPU cores, and GPU (NVIDIA, AMD, Intel Arc, Apple Silicon, Ascend)
    * Multi-GPU support with aggregated VRAM
    * Scores models across 4 dimensions: Quality, Speed, Fit, Context
    * Dynamic quantization selection (Q8_0 through Q2_K)
    * MoE (Mixture-of-Experts) architecture aware
    * Speed estimation based on actual GPU memory bandwidth
    * REST API with filtering, sorting, and top-model selection
    * Supports Ollama, llama.cpp, MLX runtime provider detection
    * 200+ models from HuggingFace in database
    * Use-case filtering: General, Coding, Reasoning, Chat, Multimodal, Embedding
  upgradeDescription: |
    Upgrade to v0.7.2

    Full release notes at: https://github.com/AlexsJones/llmfit/releases/tag/v0.7.2
  developer: Alex Jones
  website: https://llmfit.axjns.dev/
  sourceCode: https://github.com/AlexsJones/llmfit
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/AlexsJones/llmfit#readme
  license:
  - text: MIT
    url: https://github.com/AlexsJones/llmfit/blob/main/LICENSE
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  requiredMemory: 64Mi
  limitedMemory: 256Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 0.1
  limitedCpu: 0.5
  {{- else }}
  requiredMemory: 64Mi
  limitedMemory: 256Mi
  requiredDisk: 1Mi
  limitedDisk: 100Mi
  requiredCpu: 10m
  limitedCpu: 100m
  {{- end }}
  supportArch:
  - amd64
  - arm64
  subCharts:
  - name: llmfitserver
    shared: true
  - name: llmfit
options:
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- else }}
  - name: llmfit
    type: application
    version: '>=1.0.0'
    mandatory: true
{{- end }}
  appScope:
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
    - llmfit
{{- else }}
    clusterScoped: false
{{- end }}
