olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: llmfit
  description: Web Dashboard to browse hardware-aware LLM fit scores; same data exposed via REST API.
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: llmfit
  version: '1.0.2'
  title: LLMFit
  categories:
  - AI
  - Developer Tools
  - Utilities
permission:
  appData: true
  appCache: true
sharedEntrances:
- name: llmfit
  host: sharedentrances-llmfit
  port: 0
  title: LLMFit
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  invisible: true
  authLevel: internal
entrances:
- name: llmfitclient
  port: 8080
  host: llmfitclient
  title: LLMFit Web Dashboard
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  authLevel: private
  invisible: false
  openMethod: window
spec:
  versionName: '0.8.0'
  fullDescription: |
    **Primary use in Olares: open the Web Dashboard** — browse models in the browser with the same fit/scoring as the upstream CLI/TUI (hardware summary, scores, quantization, tok/s estimates, filters). The backend runs `llmfit serve` on port 8787; the client entrance proxies it for a normal web experience.

    LLMFit right-sizes LLM models to your system's RAM, CPU, and GPU where visible to the workload (note: inside containers, GPU/RAM may reflect the pod limits, not the full node, unless you pass devices or overrides).

    # Features
    * Detects system RAM, CPU cores, and GPU (NVIDIA, AMD, Intel Arc, Apple Silicon, Ascend)
    * Multi-GPU support with aggregated VRAM
    * Scores models across 4 dimensions: Quality, Speed, Fit, Context
    * Dynamic quantization selection (Q8_0 through Q2_K)
    * MoE (Mixture-of-Experts) architecture aware
    * Speed estimation based on actual GPU memory bandwidth
    * Web Dashboard + REST API with filtering, sorting, and top-model selection
    * Supports Ollama, llama.cpp, MLX runtime provider detection
    * 200+ models from HuggingFace in database
    * Use-case filtering: General, Coding, Reasoning, Chat, Multimodal, Embedding
  upgradeDescription: |
    Oriented for Web Dashboard: visible app entrance, `openMethod: window`, dashboard-oriented copy. Server image aligned with v0.8.x line where applicable.

    Upstream release notes: https://github.com/AlexsJones/llmfit/releases
  developer: Alex Jones
  website: https://llmfit.axjns.dev/
  sourceCode: https://github.com/AlexsJones/llmfit
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/AlexsJones/llmfit#readme
  license:
  - text: MIT
    url: https://github.com/AlexsJones/llmfit/blob/main/LICENSE
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  requiredMemory: 128Mi
  limitedMemory: 512Mi
  requiredDisk: 50Mi
  limitedDisk: 200Mi
  requiredCpu: 0.1
  limitedCpu: 0.4
  {{- else }}
  requiredMemory: 128Mi
  limitedMemory: 512Mi
  requiredDisk: 1Mi
  limitedDisk: 100Mi
  requiredCpu: 10m
  limitedCpu: 100m
  {{- end }}
  supportArch:
  - amd64
  - arm64
  subCharts:
  - name: llmfitserver
    shared: true
  - name: llmfit
options:
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- else }}
  - name: llmfit
    type: application
    version: '>=1.0.0'
    mandatory: true
{{- end }}
  appScope:
{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
    - llmfit
{{- else }}
    clusterScoped: false
{{- end }}
