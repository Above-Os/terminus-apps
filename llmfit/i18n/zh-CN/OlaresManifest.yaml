metadata:
  title: LLMFit
  description: 通过 REST API 为你的硬件推荐最合适的 LLM 模型。
spec:
  fullDescription: |
    LLMFit 是一个根据系统的 RAM、CPU 和 GPU 来为 LLM 模型选型的工具。它检测你的硬件，从质量、速度、适配度和上下文四个维度对每个模型进行评分，告诉你哪些模型能在你的机器上良好运行。

    在 Olares 中部署为 REST API 服务器，提供硬件感知的模型推荐，可从任何客户端访问。

    # 功能
    * 检测系统 RAM、CPU 核心数和 GPU（NVIDIA、AMD、Intel Arc、Apple Silicon、Ascend）
    * 多 GPU 支持，聚合 VRAM
    * 从 4 个维度评分模型：质量、速度、适配度、上下文
    * 动态量化选择（Q8_0 到 Q2_K）
    * MoE（混合专家）架构感知
    * 基于实际 GPU 内存带宽的速度估算
    * REST API 支持过滤、排序和最优模型选择
    * 支持 Ollama、llama.cpp、MLX 运行时检测
    * 数据库包含 200+ 个 HuggingFace 模型
    * 用途过滤：通用、编码、推理、聊天、多模态、嵌入
  upgradeDescription: |
    升级到 v0.7.2

    完整发布说明参见: https://github.com/AlexsJones/llmfit/releases/tag/v0.7.2
