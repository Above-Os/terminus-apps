metadata:
  title: LLMFit
  description: 网页控制台浏览硬件适配与模型评分；同时提供 REST API。
spec:
  fullDescription: |
    **在 Olares 中的主要用法：打开 Web 网页控制台** —— 在浏览器中查看与上游 CLI/TUI 相同的适配分析（硬件摘要、评分、量化建议、tok/s 估算、筛选等）。后端运行 `llmfit serve`（8787）；应用入口通过反向代理提供完整网页体验。

    LLMFit 根据系统 RAM、CPU、GPU（以当前工作负载可见资源为准；容器内可能是 Pod 限额而非整台节点，除非挂载设备或使用显存覆盖参数）为模型选型。

    # 功能
    * 检测系统 RAM、CPU 核心数和 GPU（NVIDIA、AMD、Intel Arc、Apple Silicon、Ascend）
    * 多 GPU 支持，聚合 VRAM
    * 从 4 个维度评分模型：质量、速度、适配度、上下文
    * 动态量化选择（Q8_0 到 Q2_K）
    * MoE（混合专家）架构感知
    * 基于实际 GPU 内存带宽的速度估算
    * Web 控制台 + REST API 支持过滤、排序和最优模型选择
    * 支持 Ollama、llama.cpp、MLX 运行时检测
    * 数据库包含 200+ 个 HuggingFace 模型
    * 用途过滤：通用、编码、推理、聊天、多模态、嵌入
  upgradeDescription: |
    面向 Web 控制台：入口可见、浏览器窗口打开、文案更新。上游发布说明: https://github.com/AlexsJones/llmfit/releases
