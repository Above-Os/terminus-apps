olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  mempalace: 1
  mempalaceingress: 1
  terminal: 1
metadata:
  name: mempalace
  icon: https://app.cdn.olares.com/appstore/mempalace/icon.png
  description: Local-first AI memory with semantic search and an MCP server
  appid: mempalace
  title: MemPalace
  version: '0.0.2'
  categories:
  - Utilities_v112
  - Developer Tools
  - AI
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '3.3.6'
  fullDescription: |
    MemPalace stores your conversation history as verbatim text and retrieves it
    with semantic search — no summarization, no API calls, nothing leaves the
    machine. The index is structured into wings (people/projects), rooms (topics)
    and drawers (verbatim chunks), plus a temporal knowledge graph backed by
    local SQLite. This app runs the MemPalace MCP server (exposed over SSE as an
    internal entrance for agents/MCP clients) and gives you a web terminal to
    drive the `mempalace` CLI (mine, search, wake-up).
  developer: MemPalace
  website: https://mempalaceofficial.com
  sourceCode: https://github.com/MemPalace/mempalace
  submitter: aboveos
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/MemPalace/mempalace
  license:
  - text: Apache-2.0
    url: https://github.com/MemPalace/mempalace/blob/main/LICENSE
  requiredMemory: 1Gi
  limitedMemory: 3Gi
  requiredDisk: 50Mi
  limitedDisk: 5Gi
  requiredCpu: 500m
  limitedCpu: '2'
  supportArch:
  - amd64
  - arm64
options:
  apiTimeout: 0
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: terminal
  host: mempalaceingress
  port: 8080
  title: MemPalace Terminal
  icon: https://app.cdn.olares.com/appstore/mempalace/icon.png
  openMethod: window
  authLevel: internal
- name: mempalacemcp
  host: mempalaceingress
  port: 8081
  title: MemPalace MCP
  icon: https://app.cdn.olares.com/appstore/mempalace/icon.png
  openMethod: default
  authLevel: internal
  invisible: true
