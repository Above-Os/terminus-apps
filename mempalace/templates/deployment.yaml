apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}"
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: mempalace
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: mempalace
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: mempalace
        bytetrade.io/terminal: mempalace
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-chmod
          image: docker.io/beclab/aboveos-busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /home/app/.mempalace /home/app/.cache
              chown -R 1000:1000 /home/app/.mempalace /home/app/.cache || true
              chmod -R u+rwX,g+rwX /home/app/.mempalace /home/app/.cache || true
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: palace-data
              mountPath: /home/app/.mempalace
            - name: model-cache
              mountPath: /home/app/.cache
      containers:
        - name: mempalace
          image: docker.io/aboveos/mempalace:3.3.6
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: palace-data
              mountPath: /home/app/.mempalace
            - name: model-cache
              mountPath: /home/app/.cache
            - name: olares-home-dir
              mountPath: /home/app/userdata/Home
              readOnly: true
      volumes:
        - name: palace-data
          hostPath:
            path: '{{ .Values.userspace.appData }}/mempalace'
            type: DirectoryOrCreate
        - name: model-cache
          hostPath:
            path: '{{ .Values.userspace.appCache }}/mempalace'
            type: DirectoryOrCreate
        - name: olares-home-dir
          hostPath:
            path: '{{ .Values.userspace.userData }}'
            type: DirectoryOrCreate
      restartPolicy: Always
