metadata:
  title: MemPalace
  description: Local-first AI memory with semantic search and an MCP server
spec:
  fullDescription: |
    MemPalace stores your conversation history as verbatim text and retrieves it
    with semantic search — no summarization, no API calls, nothing leaves the
    machine. The index is structured into wings (people/projects), rooms (topics)
    and drawers (verbatim chunks), plus a temporal knowledge graph backed by
    local SQLite. This app runs the MemPalace MCP server (exposed over SSE as an
    internal entrance for agents/MCP clients) and gives you a web terminal to
    drive the `mempalace` CLI (mine, search, wake-up).
