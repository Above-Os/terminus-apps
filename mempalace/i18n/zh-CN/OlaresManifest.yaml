metadata:
  title: MemPalace
  description: 本地优先的 AI 记忆库，支持语义检索与 MCP 服务
spec:
  fullDescription: |
    MemPalace 将对话历史以原文形式保存，并通过语义检索召回——不做摘要、不调用外部 API，数据始终留在本机。
    索引结构分为 wings（人物/项目）、rooms（主题）与 drawers（原文片段），并辅以基于本地 SQLite 的时序知识图谱。
    本应用运行 MemPalace MCP 服务（通过 SSE 对内暴露，供 Agent/MCP 客户端使用），并提供 Web 终端以使用 `mempalace` CLI（mine、search、wake-up 等）。
