metadata:
  title: LibreSpeed
  description: No Flash, No Java, No Websocket, No Bullshit. Self-hosted HTML5 speed test.
spec:
  fullDescription: |
    LibreSpeed is a very lightweight self-hosted speed test implemented in JavaScript,
    using XMLHttpRequest and Web Workers. No Flash, No Java, No Websocket, No Bullshit.

    Features:
    - Download / Upload / Ping / Jitter measurement
    - IP / ISP / distance lookup (offline GeoIP DB)
    - Telemetry persisted in PostgreSQL; results can be shared as a permalink/image
    - Dual mode: this Olares acts as the local test point AND lets you add more
      remote test points via an editable, persistent servers.json
    - Mobile friendly, works in all modern browsers (Chrome, Firefox, Safari, Edge, IE11)

    This Olares port runs LibreSpeed in `dual` mode on port 8080 with telemetry,
    ID obfuscation and offline ISP lookup enabled. The `speedtest_users` table is
    created automatically on first install via an init container.

    Editable / persistent configuration:
    - servers.json: on first install, a default file with the local server and two
      verified public remote test points is copied to `appData/librespeed/servers.json`.
      Edit it in the Files app or via SSH to add or remove test points; the file
      survives pod restarts and helm upgrades.
