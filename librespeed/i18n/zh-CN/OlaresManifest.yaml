metadata:
  title: LibreSpeed
  description: 无 Flash、无 Java、无 WebSocket、无废话的自托管 HTML5 网络测速工具。
spec:
  fullDescription: |
    LibreSpeed 是一款极其轻量的自托管网络测速工具，基于 JavaScript 实现，
    使用 XMLHttpRequest 和 Web Workers 完成测试。无 Flash、无 Java、无 WebSocket、无废话。

    主要特性：
    - 下载 / 上传 / Ping / 抖动（Jitter）测量
    - 自动识别 IP / ISP（内置离线 GeoIP 库）
    - 测速结果写入 PostgreSQL，可生成可分享的图片 / 永久链接
    - dual 模式：本机既是默认测速点，也可在 servers.json 里加远程测速点供下拉选择，
      该配置文件可由用户在 Files 中编辑且会持久化
    - 移动端友好，适配所有现代浏览器（Chrome、Firefox、Safari、Edge、IE11）

    本 Olares 移植版本以 dual 模式运行在 8080 端口，默认开启遥测、ID 混淆、离线 ISP 识别。
    首次安装时会通过 init 容器自动在 PostgreSQL 中创建 `speedtest_users` 表。

    可编辑 / 持久化配置：
    - servers.json：首次安装时会把含「本机 + 两条可用的公共远程测速点」的默认文件拷贝到
      `appData/librespeed/servers.json`。在 Files 中（或通过 SSH）编辑该文件即可
      增删测速点；该文件会在 Pod 重启和 helm 升级时被保留。
