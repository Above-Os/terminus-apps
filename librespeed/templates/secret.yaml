apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: librespeed
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  PGPASSWORD: {{ .Values.postgres.password | quote }}
  PASSWORD: {{ .Values.olaresEnv.PASSWORD | default "" | quote }}
  IPINFO_APIKEY: {{ .Values.olaresEnv.IPINFO_APIKEY | default "" | quote }}
