olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: chromium
  description: The open-source projects behind the Google Chrome browser
  icon: https://app.cdn.olares.com/appstore/chromium/icon.png
  appid: chromium
  version: '1.0.8'
  title: Chromium
  categories:
  - Utilities_v112
  - Utilities
permission:
  appData: true
  appCache: true
spec:
  versionName: '1e736296-ls34'
  fullDescription: |
    **About**
    Chromium is an open-source browser project that aims to build a safer, faster, and more stable way for all users to experience the web.

  upgradeDescription: |
    - On Olares One: switch to LSIO Selkies-based Chromium (1e736296-ls34) with Intel iGPU (VAAPI) hardware video encoding for smooth desktop streaming
    - On other devices (ARM / Selfhosted / NVIDIA): keep the KasmVNC-based image for stable software-rendered streaming across architectures
    - Bundle CJK fonts so Chinese/Japanese/Korean web pages render correctly (Olares One variant)
    - Raise memory limit to 6Gi to better handle multiple browser tabs and video playback

  developer: Google
  website: https://www.chromium.org/chromium-projects/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1Gi
  limitedMemory: 6Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: "500m"
  limitedCpu: "2"
  doc: https://chromium.googlesource.com/chromium/src/+/main/docs/README.md
  license:
  - text: BSD,
    url: https://chromium.googlesource.com/chromium/src/+/HEAD/LICENSE
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.10.1-0'
entrances:
- name: chromium
  port: 3000
  host: chromium
  title: Chromium
  icon: https://app.cdn.olares.com/appstore/chromium/icon.png
