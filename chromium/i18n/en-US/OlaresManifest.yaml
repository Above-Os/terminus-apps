metadata:
  title: Chromium
  description: The open-source projects behind the Google Chrome browser
spec:
  fullDescription: |
    **About**
    Chromium is an open-source browser project that aims to build a safer, faster, and more stable way for all users to experience the web.

  upgradeDescription: |
    - On Olares One: switch to LSIO Selkies-based Chromium (1e736296-ls34) with Intel iGPU (VAAPI) hardware video encoding for smooth desktop streaming
    - On other devices (ARM / Selfhosted / NVIDIA): keep the KasmVNC-based image for stable software-rendered streaming across architectures
    - Bundle CJK fonts so Chinese/Japanese/Korean web pages render correctly (Olares One variant)
    - Raise memory limit to 6Gi to better handle multiple browser tabs and video playback
