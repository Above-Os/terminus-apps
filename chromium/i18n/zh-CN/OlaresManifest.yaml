metadata:
  description: Google Chrome 浏览器背后的开源项目
  title: Chromium
spec:
  fullDescription: |
    **简介**
    Chromium 是一个开源浏览器项目，旨在为所有用户构建一种更安全、更快速、更稳定的网络体验方式。

  upgradeDescription: |
    - Olares One 设备：升级为 LSIO Selkies 版 Chromium（1e736296-ls34），启用 Intel 集显 VAAPI 硬件视频编码，桌面串流流畅
    - 其他设备（ARM / Selfhosted / NVIDIA 等）：沿用 KasmVNC 版镜像，纯软件渲染，跨架构稳定运行
    - 内置 CJK 字体（Olares One 版本），中文/日文/韩文网页可正常显示
    - 内存上限提升至 6Gi，更适合多标签页和视频播放场景