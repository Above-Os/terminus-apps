apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.28.0 (c4137012e)
  creationTimestamp: null
  labels:
    io.kompose.service: chromium
  name: chromium
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: chromium
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.28.0 (c4137012e)
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: chromium
    spec:
      containers:
        - env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: DeviceName
              value: {{ .Values.deviceName }}
        {{- if and .Values.deviceName (eq .Values.deviceName "Olares One") }}
            # Olares One (amd64 + Intel iGPU): Selkies variant with VAAPI hardware encoding.
            - name: CHROME_CLI
              value: '--ignore-gpu-blocklist --enable-gpu-rasterization --enable-zero-copy --use-gl=egl --enable-features=UseOzonePlatform,VaapiVideoDecoder,VaapiVideoEncoder,CanvasOopRasterization,ReduceAcceptLanguageHeader'
            - name: DRINODE
              value: /dev/dri/renderD128
            - name: DRI_NODE
              value: /dev/dri/renderD128
            - name: LIBVA_DRIVER_NAME
              value: iHD
        {{- else }}
            # Heterogeneous manifest resolves to Selkies on amd64 and KasmVNC on arm64.
            # The envs below are the safe intersection that works on both:
            #   - CHROME_CLI as URL: KasmVNC treats it as homepage, Selkies as positional startup tab.
            #   - WLR_RENDERER=pixman / LIBGL_ALWAYS_SOFTWARE: force software path so the Selkies
            #     amd64 variant on a non-iGPU host won't crash on KMS/GBM; KasmVNC (Xorg) ignores them.
            - name: CHROME_CLI
              value: https://www.linuxserver.io/
            - name: CHROME_FLAGS
              value: '--enable-features=ReduceAcceptLanguageHeader'
            - name: WLR_RENDERER
              value: pixman
            - name: WLR_NO_HARDWARE_CURSORS
              value: "1"
            - name: LIBGL_ALWAYS_SOFTWARE
              value: "1"
        {{- end }}
          image: "docker.io/harveyff/chromium:20260526"
          name: chromium
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 6Gi
          ports:
            - containerPort: 3000
            - containerPort: 3001
            - containerPort: 8082
          volumeMounts:
            - mountPath: /config
              name: config
        {{- if and .Values.deviceName (eq .Values.deviceName "Olares One") }}
            - mountPath: /dev/dri
              name: dev-dri
        {{- end }}
      restartPolicy: Always
      volumes:
        - name: config
          hostPath:
            type: DirectoryOrCreate
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: {{ .Values.userspace.appCache }}/config
              {{- else }}
            path: {{ .Values.userspace.appCache }}/chromium/config
              {{- end }}
            {{- else }}
            path: {{ .Values.userspace.appCache }}/chromium/config
            {{- end }}
    {{- if and .Values.deviceName (eq .Values.deviceName "Olares One") }}
        - name: dev-dri
          hostPath:
            path: /dev/dri
    {{- end }}
status: {}
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.28.0 (c4137012e)
  creationTimestamp: null
  labels:
    io.kompose.service: chromium
  name: chromium
  namespace: {{ .Release.Namespace }}
spec:
  type: NodePort
  ports:
    - name: "3000"
      port: 3000
      targetPort: 3000
    - name: "3001"
      port: 3001
      targetPort: 3001
      nodePort: 30001
    - name: "8082"
      port: 8082
      targetPort: 8082
  selector:
    io.kompose.service: chromium
status:
  loadBalancer: {}
