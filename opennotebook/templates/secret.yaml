apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: opennotebook
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  OPEN_NOTEBOOK_PASSWORD: {{ .Values.olaresEnv.OPEN_NOTEBOOK_PASSWORD | default "admin" | quote }}
