metadata:
  title: llama.cpp LLM Base (llm-init)
  description: "Generic llama.cpp + llm-init base; choose any GGUF model at install time via env"

spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app and a generic *base*: it is NOT tied to any specific
    model. The GGUF model to serve is chosen entirely at install time through
    environment variables, so the same Helm chart can serve any GGUF model that
    llama.cpp supports.

    **Stack**
    - **llama.cpp** (`ggml-org/llama.cpp`, port 8081): GGUF inference, OpenAI server.
    - **llm-init** (`beclab/llm-init`, port 8090): GGUF download, OpenAI `/v1/*`,
      progress UI; proxies the engine at `http://llamacpp:8081`.

    **Install-time parameters**
    - `MODEL_SOURCE` — `hf://<repo> --include <file>.gguf`. For VLM, append a
      comma-separated mmproj segment (`...,hf://<repo> --include mmproj-*.gguf`).
    - `MODEL_NAME` — Hugging Face repo id for `llama-server -hf`, format
      `owner/repo:quant` (recommended; e.g. `unsloth/Qwen3.5-2B-GGUF:UD-Q4_K_XL`).
      Omit `:quant` only if the repo has a default `Q4_K_M` GGUF. Also used as
      OpenAI `/v1/models` alias (`--alias`). Must match the repo in `MODEL_SOURCE`;
      the engine loads from HF cache after llm-init finishes download (sentinel).
    - `ENGINE_ARGS` — llama.cpp flags, e.g. `-c 8192 -ngl all -fa on`.
    - `LLAMACPP_CPU_*` / `LLAMACPP_MEMORY_*` — engine pod CPU/RAM (fixed per clone).
    - `LLAMACPP_REQUIRED_GPU_MEMORY` — model memory quota (required at install).
      NVIDIA: `nvidia.com/gpumem` in Mi; Spark: pod `memory`.
