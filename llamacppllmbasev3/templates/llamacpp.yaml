{{- $oe := .Values.olaresEnv | default dict -}}
{{- $modelName := $oe.MODEL_NAME | default "" -}}
{{- $engineArgs := $oe.ENGINE_ARGS | default "" -}}
{{- $hfEndpoint := $oe.HF_ENDPOINT | default "" -}}
{{- $hfToken := $oe.HF_TOKEN | default "" -}}
{{- $cpuRequest := trim ($oe.LLAMACPP_CPU_REQUEST | default "500m") -}}
{{- $memRequest := trim ($oe.LLAMACPP_MEMORY_REQUEST | default "2Gi") -}}
{{- $cpuLimit := trim ($oe.LLAMACPP_CPU_LIMIT | default "6") -}}
{{- $memLimit := trim ($oe.LLAMACPP_MEMORY_LIMIT | default "16Gi") -}}
{{- $runStateHostPath := printf "%s/llm-init-run/%s" .Values.userspace.appCache .Release.Name -}}
---
# llama.cpp engine Deployment. wrappers/llamacpp.sh blocks on the sentinel
# (download ready), then execs llama-server -hf "$MODEL_NAME". HF_HUB_CACHE/
# HF_HOME/HF_HUB_OFFLINE pin the read-only shared cache llm-init populated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: llamacpp
  annotations:
    applications.app.bytetrade.io/gpu-inject: "llamacpp"
spec:
  replicas: {{ .Values.workloads.llamacpp.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: llamacpp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacpp
    spec:
      restartPolicy: Always
      volumes:
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.appCommon }}/huggingface"
            type: DirectoryOrCreate
        - name: run-state
          hostPath:
            path: "{{ $runStateHostPath }}"
            type: DirectoryOrCreate
        - name: wrappers
          configMap:
            name: llm-init-wrappers
            defaultMode: 0555
      containers:
        - name: llamacpp
          image: docker.io/beclab/ggml-org-llama.cpp:server-cuda12-b9426
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/llm-init/wrappers/llamacpp.sh"]
          env:
            - name: ENGINE_KIND
              value: llamacpp
            - name: MODEL_NAME
              value: "{{ $modelName }}"
            - name: LLAMACPP_PORT
              value: "8081"
            - name: WAIT_TIMEOUT
              value: "3600"
            - name: ENGINE_ARGS
              value: "{{ $engineArgs }}"
            - name: HF_HUB_CACHE
              value: /cache/hf/hub
            - name: HF_HOME
              value: /cache/hf
            - name: HF_HUB_OFFLINE
              value: "1"
{{- if $hfEndpoint }}
            - name: HF_ENDPOINT
              value: "{{ $hfEndpoint }}"
{{- end }}
{{- if $hfToken }}
            - name: HF_TOKEN
              value: "{{ $hfToken }}"
{{- end }}
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
          ports:
            - name: llamacpp
              containerPort: 8081
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
              readOnly: true
            - name: run-state
              mountPath: /run/llm-init
              readOnly: true
            - name: wrappers
              mountPath: /llm-init/wrappers
              readOnly: true
          resources:
            requests:
              cpu: "{{ $cpuRequest }}"
              memory: "{{ $memRequest }}"
            limits:
              cpu: "{{ $cpuLimit }}"
              memory: "{{ $memLimit }}"
---
apiVersion: v1
kind: Service
metadata:
  name: llamacpp
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llamacpp
spec:
  selector:
    io.kompose.service: llamacpp
  ports:
    - name: llamacpp
      port: 8081
      targetPort: 8081
  type: ClusterIP
