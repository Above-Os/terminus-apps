{{- $oe := .Values.olaresEnv | default dict -}}
{{- $modelName := $oe.MODEL_NAME | default "" -}}
{{- $engineArgs := $oe.ENGINE_ARGS | default "" -}}
{{- $hfEndpoint := $oe.HF_ENDPOINT | default "" -}}
{{- $hfToken := $oe.HF_TOKEN | default "" -}}
{{- $cpuRequest := trim ($oe.LLAMACPP_CPU_REQUEST | default "200m") -}}
{{- $memRequest := trim ($oe.LLAMACPP_MEMORY_REQUEST | default "2Gi") -}}
{{- $cpuLimit := trim ($oe.LLAMACPP_CPU_LIMIT | default "6") -}}
{{- $memLimit := trim ($oe.LLAMACPP_MEMORY_LIMIT | default "35Gi") -}}
{{- $gpuMem := trim ($oe.LLAMACPP_REQUIRED_GPU_MEMORY | default "4096Mi") -}}
{{- $gpuMemMi := $gpuMem -}}
{{- if hasSuffix "Gi" $gpuMem -}}
{{- $gpuMemMi = printf "%dMi" (mul (int (trimSuffix "Gi" $gpuMem)) 1024) -}}
{{- end -}}
{{- $gpuType := .Values.gpu | default "" -}}
{{- if not $gpuType -}}
{{- $gpuType = .Values.GPU.Type | default "nvidia" -}}
{{- end -}}
{{- $unifiedMem := eq $gpuType "nvidia-gb10" -}}
{{- if $unifiedMem -}}
{{- $memRequest = $gpuMem -}}
{{- $memLimit = $gpuMem -}}
{{- end -}}
{{- $runStateHostPath := printf "%s/llm-init-run/%s" .Values.userspace.appCache .Release.Name -}}
---
# llama.cpp engine Deployment. wrappers/llamacpp.sh blocks on the sentinel
# (download ready), then execs llama-server -hf "$MODEL_NAME".
# llm-init reverse-proxies at http://llamacpp:8081 — Service name MUST be
# "llamacpp". GPU base: CUDA server build + gpu-inject; put `-ngl all` in
# ENGINE_ARGS to offload all layers to the GPU.
apiVersion: apps/v1
kind: Deployment
metadata:
  # Primary workload: named after the release (== appid llamacppllmbasev3) for v3
  # allowMultipleInstall. Label/selector stays io.kompose.service: llamacpp.
  name: '{{ .Release.Name }}'
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: llamacpp
  annotations:
    applications.app.bytetrade.io/gpu-inject: "llamacpp"
spec:
  replicas: {{ .Values.workloads.llamacppllmbasev3.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: llamacpp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llamacpp
    spec:
      restartPolicy: Always
      volumes:
        - name: hf-cache
          hostPath:
            path: "{{ .Values.userspace.appCommon }}/huggingface"
            type: DirectoryOrCreate
        - name: run-state
          hostPath:
            path: "{{ $runStateHostPath }}"
            type: DirectoryOrCreate
        - name: wrappers
          configMap:
            name: llm-init-wrappers
            defaultMode: 0555
      containers:
        - name: llamacpp
          image: docker.io/beclab/ggml-org-llama.cpp:server-cuda12-b9426
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/llm-init/wrappers/llamacpp.sh"]
          env:
            - name: ENGINE_KIND
              value: llamacpp
            - name: MODEL_NAME
              value: "{{ $modelName }}"
            - name: LLAMACPP_PORT
              value: "8081"
            - name: WAIT_TIMEOUT
              value: "3600"
            - name: ENGINE_ARGS
              value: "{{ $engineArgs }}"
            - name: HF_HUB_CACHE
              value: /cache/hf/hub
{{- if $hfEndpoint }}
            - name: HF_ENDPOINT
              value: "{{ $hfEndpoint }}"
{{- end }}
{{- if $hfToken }}
            - name: HF_TOKEN
              value: "{{ $hfToken }}"
{{- end }}
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PGID
              value: "1000"
            - name: PUID
              value: "1000"
            - name: TZ
              value: Etc/UTC
          ports:
            - name: llamacpp
              containerPort: 8081
          volumeMounts:
            - name: hf-cache
              mountPath: /cache/hf/hub
              readOnly: true
            - name: run-state
              mountPath: /run/llm-init
              readOnly: true
            - name: wrappers
              mountPath: /llm-init/wrappers
              readOnly: true
          resources:
            requests:
              cpu: "{{ $cpuRequest }}"
              memory: "{{ $memRequest }}"
{{- if not $unifiedMem }}
              nvidia.com/gpumem: "{{ $gpuMemMi }}"
{{- end }}
            limits:
              cpu: "{{ $cpuLimit }}"
              memory: "{{ $memLimit }}"
---
apiVersion: v1
kind: Service
metadata:
  name: llamacpp
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llamacpp
spec:
  selector:
    io.kompose.service: llamacpp
  ports:
    - name: llamacpp
      port: 8081
      targetPort: 8081
  type: ClusterIP
