{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name) -}}
{{- $crypt := "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6" -}}
{{- $cookie := "f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1" -}}
{{- if and $existing $existing.data (index $existing.data "JUPYTERHUB_CRYPT_KEY") -}}
{{- $crypt = index $existing.data "JUPYTERHUB_CRYPT_KEY" | b64dec -}}
{{- end -}}
{{- if and $existing $existing.data (index $existing.data "JUPYTERHUB_COOKIE_SECRET") -}}
{{- $cookie = index $existing.data "JUPYTERHUB_COOKIE_SECRET" | b64dec -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: jupyterhub
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  JUPYTERHUB_CRYPT_KEY: {{ $crypt | quote }}
  JUPYTERHUB_COOKIE_SECRET: {{ $cookie | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
