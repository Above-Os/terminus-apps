apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ytnavigator
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  DJANGO_SECRET_KEY: '{{ .Values.olaresEnv.DJANGO_SECRET_KEY }}'
  GROQ_API_KEY: '{{ .Values.olaresEnv.GROQ_API_KEY }}'
  LANGSMITH_API_KEY: '{{ .Values.olaresEnv.LANGSMITH_API_KEY }}'
