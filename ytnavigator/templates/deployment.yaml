apiVersion: apps/v1
kind: Deployment
metadata:
  name: ytnavigator
  namespace: {{ .Release.Namespace }}
  labels:
    app: ytnavigator
spec:
  replicas: {{ .Values.workloads.ytnavigator.replicaCount }}
  selector:
    matchLabels:
      app: ytnavigator
  template:
    metadata:
      labels:
        app: ytnavigator
    spec:
      containers:
      - name: server
        image: "docker.io/beclab/bleachzou-yt-navigator:0.0.8"
        imagePullPolicy: IfNotPresent
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_DB
          value: '{{ .Values.postgres.databases.ytnavigator }}'
        - name: POSTGRES_USER
          value: '{{ .Values.postgres.username }}'
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          value: '{{ .Values.postgres.host }}'
        - name: POSTGRES_PORT
          value: '{{ .Values.postgres.port }}'
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: GROQ_API_KEY
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: DJANGO_SECRET_KEY
        - name: LANGSMITH_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: LANGSMITH_API_KEY
        {{- if .Values.csrfTrustedOrigins }}
        - name: CSRF_TRUSTED_ORIGINS
          value: {{ .Values.csrfTrustedOrigins | quote }}
        {{- end }}

