---
olaresManifest.version: "0.10.0"
olaresManifest.type: app
apiVersion: "v1"
metadata:
  name: llmgateway
  description: "LLM Gateway"
  icon: https://app.cdn.olares.com/appstore/mtranserver/icon.png
  appid: llmgateway
  version: "1.0.1"
  title: LLM Gateway
  categories:
    - Productivity_v112
    - Productivity
permission:
  appData: true
  appCache: true
spec:
  versionName: 1.0.0
  featuredImage: https://app.cdn.olares.com/appstore/mtranserver/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/mtranserver/1.webp
  fullDescription: |
    LLM Gateway
  developer: olares
  website: https://github.com/beclab/llm-gateway
  sourceCode: https://github.com/beclab/llm-gateway
  submitter: Olares
  doc: https://github.com/beclab/llm-gateway
  license:
    - text: Apache-2.0
      url: https://github.com/xxnuo/MTranServer?tab=Apache-2.0-1-ov-file
  locale:
    - en-US
    - zh-CN
  requiredMemory: 2000Mi
  limitedMemory: 4Gi
  requiredDisk: 1Gi
  limitedDisk: 10Gi
  requiredCpu: 800m
  limitedCpu: 4
  supportArch:
    - amd64
    - arm64
options:
  allowedOutboundPorts:
    - 8080
  dependencies:
    - name: olares
      version: ">=1.12.3-0"
      type: system
  appScope:
    clusterScoped: false
entrances:
  - authLevel: internal
    name: llmgateway-frontend
    host: llmgateway-svc
    port: 80
    icon: https://app.cdn.olares.com/appstore/mtranserver/icon.png
    openMethod: window
    title: LLM Gateway
middleware:
  postgres:
    username: llmgateway
    password: llmgateway
    databases:
      - name: llmgateway
        distributed: false
