metadata:
  title: NOMAD
  description: A self-hosted travel/trip planner with real-time collaboration.
spec:
  fullDescription: |
    ## OVERVIEW ##
    NOMAD (Navigation Organizer for Maps, Activities & Destinations) is a self-hosted, real-time collaborative travel planner with interactive maps, budgets, packing lists, and more.

    ## FEATURES ##

    Trip Planning
    - Drag & Drop Planner: Organize places into day plans with reordering and cross-day moves
    - Interactive Map: Leaflet map with photo markers, clustering, route visualization
    - Place Search: Search via Google Places or OpenStreetMap (free, no API key needed)
    - Day Notes: Add timestamped, icon-tagged notes to individual days
    - Route Optimization: Auto-optimize place order and export to Google Maps
    - Weather Forecasts: 16-day forecasts via Open-Meteo (no API key needed)

    Travel Management
    - Reservations & Bookings: Track flights, hotels, restaurants with status and file attachments
    - Budget Tracking: Category-based expenses with pie chart, per-person splitting, multi-currency
    - Packing Lists: Categorized checklists with progress tracking and smart suggestions
    - Document Manager: Attach documents, tickets, PDFs (up to 50 MB per file)
    - PDF Export: Export complete trip plans as PDF

    Collaboration
    - Real-Time Sync: Plan together via WebSocket, changes appear instantly
    - Multi-User: Invite members with role-based access
    - Single Sign-On (OIDC): Login with Google, Apple, Authentik, Keycloak, or any OIDC provider

    Mobile & PWA
    - Progressive Web App: Install on iOS and Android from the browser
    - Offline Support: Service Worker caches map tiles, API data, and static assets
    - Touch Optimized: Responsive design with mobile-specific layouts

    Addons
    - Vacay: Personal vacation day planner with calendar view and public holidays (100+ countries)
    - Atlas: Interactive world map with visited countries, travel stats, and streak tracking
    - Collab: Chat with your group, share notes, create polls
    - Dashboard Widgets: Currency converter and timezone clock
  upgradeDescription: |
    Fix WebSocket real-time sync by adding nginx reverse proxy with proper Upgrade headers. Multi-user collaborative editing now works correctly across browsers.
