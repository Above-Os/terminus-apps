metadata:
  title: NOMAD
  description: 自托管的旅行规划工具，支持实时协作。
spec:
  fullDescription: |
    ## 应用概览 ##
    NOMAD（地图、活动与目的地导航管理器）是一款自托管的实时协作旅行规划工具，集成交互式地图、预算管理、行李清单等功能。

    ## 功能特性 ##

    行程规划
    - 拖放式规划器：将地点组织到每日计划中，支持重新排序和跨日移动
    - 交互式地图：基于 Leaflet 的地图，支持照片标记、聚合显示、路线可视化
    - 地点搜索：支持 Google Places 或 OpenStreetMap（免费，无需 API 密钥）搜索
    - 每日笔记：为每一天添加带时间戳和图标标签的笔记
    - 路线优化：自动优化地点顺序并导出到 Google 地图
    - 天气预报：通过 Open-Meteo 获取 16 天天气预报（无需 API 密钥）

    旅行管理
    - 预订管理：追踪航班、酒店、餐厅的预订状态、确认号和附件
    - 预算追踪：按类别记录支出，支持饼图展示、按人/按日分摊、多币种
    - 行李清单：分类清单，支持进度追踪、颜色标记和智能建议
    - 文档管理：为行程、地点或预订附加文档、门票和 PDF（单文件最大 50 MB）
    - PDF 导出：将完整行程导出为 PDF

    协作功能
    - 实时同步：通过 WebSocket 协同规划，更改即时同步到所有用户
    - 多用户：邀请成员协作，支持基于角色的访问控制
    - 单点登录（OIDC）：支持 Google、Apple、Authentik、Keycloak 或任何 OIDC 提供者登录

    移动端与 PWA
    - 渐进式 Web 应用：从浏览器直接安装到 iOS 和 Android
    - 离线支持：Service Worker 缓存地图瓦片、API 数据和静态资源
    - 触控优化：响应式设计，移动端专属布局

    扩展插件
    - Vacay：个人假期规划器，支持日历视图和 100+ 国家公共假期
    - Atlas：交互式世界地图，展示到访国家、旅行统计和连续记录
    - Collab：群组聊天、共享笔记、创建投票
    - 仪表盘小组件：货币转换器和时区时钟
  upgradeDescription: |
    修复 WebSocket 实时同步，添加 nginx 反向代理以正确转发 Upgrade 头。多用户协作编辑现在可以在不同浏览器间正常工作。
