{{- $oe := .Values.olaresEnv | default dict -}}
{{- $val := $oe.PASSWORD | default "" -}}
{{- if $val }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: windowsarm
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  PASSWORD: {{ $val | quote }}
{{- end }}
