olaresManifest.version: "0.12.0"
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: deepseekocrwebuiv3
  description: Ready-to-use DeepSeek-OCR-2 Web UI
  icon: https://app.cdn.olares.com/appstore/deepseekocr/icon.png
  appid: deepseekocrwebuiv3
  version: '1.1.6'
  title: DeepSeek-OCR2 WebUI V3
  categories:
    - AI
    - Utilities_v112
    - Utilities

entrances:
  - name: deepseekocrwebuiv3
    port: 8080
    host: deepseekocrwebui-web-svc
    title: DeepSeek-OCR-2 WebUI
    icon: https://app.cdn.olares.com/appstore/deepseekocr/icon.png
    authLevel: internal
    openMethod: window

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   deepseekocrwebuiv3         — OCR engine Deployment (must match appid)
#   deepseekocrwebuiv3download — HuggingFace model downloader Deployment
#   deepseekocrwebuiv3web       — nginx clientproxy Deployment
workloadReplicas:
  deepseekocrwebuiv3: 1
  deepseekocrwebuiv3download: 1
  deepseekocrwebuiv3web: 1

permission:
  appData: true
  appCache: true
  userData:
    - Home

spec:
  versionName: '2.0.3'
  promoteImage:
    - https://app.cdn.olares.com/appstore/deepseekocr/1.webp
    - https://app.cdn.olares.com/appstore/deepseekocr/2.webp

  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **OVERVIEW**
    DeepSeek-OCR-WebUI is an intelligent image recognition web application based on the DeepSeek-OCR-2 model (Visual Causal Flow), providing an intuitive user interface and powerful recognition capabilities.

    **Core Highlights**
    - DeepSeek-OCR-2 Model - Next-gen OCR powered by Visual Causal Flow architecture
    - 7 Recognition Modes - Document, OCR, Chart, Find, Freeform, etc.
    - Bounding Box Visualization - Find mode automatically annotates positions
    - Batch Processing - Support for multiple image sequential recognition
    - PDF Support - Upload PDF files, automatically convert to images
    - Modern UI - Cool gradient backgrounds and animation effects
    - Multilingual Support - Simplified Chinese, Traditional Chinese, English, Japanese
    - GPU Acceleration - High-performance inference based on NVIDIA GPU
    - Auto Model Download - Built-in HuggingFace model downloader with progress tracking
    - ModelScope Fallback - Auto-switch to ModelScope when HuggingFace is unavailable

  upgradeDescription: |
    Migrated DeepSeek-OCR-2 WebUI to apiVersion v3 shared app pattern (deepseekocrwebuiv2 → deepseekocrwebuiv3).

    **What's Changed**

    - **Accelerator**: declared the GPU requirement via the accelerator modes list and added nvidia-gb10 (GB10/Spark) support.

    - **Multi-install**: the main Deployment now uses {{ .Release.Name }} so allowMultipleInstall installs don't collide on workload names.

    - **Architecture**: flattened sub-charts into a single chart; nginx clientproxy
      upstreams now target in-namespace Services.
    - **Scaling**: `workloadReplicas` declares replica counts for OCR, downloader,
      and web proxy workloads.

  developer: neosun100
  website: https://github.com/neosun100/DeepSeek-OCR-WebUI
  sourceCode: https://github.com/neosun100/DeepSeek-OCR-WebUI
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://github.com/neosun100/DeepSeek-OCR-WebUI
  license:
    - text: MIT License
      url: https://github.com/neosun100/DeepSeek-OCR-WebUI?tab=License-1-ov-file

  accelerator:
  # nvidia      — discrete GPU; GPU memory via nvidia.com/gpumem.
  # nvidia-gb10 — GB10/Spark (arm64) unified memory; GPU memory comes from pod RAM,
  #               so the GPU-memory fields are dropped.
  - mode: nvidia
    requiredCpu: "1"
    limitedCpu: "5"
    requiredMemory: 6Gi
    limitedMemory: 25Gi
    requiredDisk: 8Gi
    limitedDisk: 20Gi
    requiredGPUMemory: 10Gi
    limitedGPUMemory: 16Gi
  - mode: nvidia-gb10
    requiredCpu: "1"
    limitedCpu: "5"
    requiredMemory: 6Gi
    limitedMemory: 25Gi
    requiredDisk: 8Gi
    limitedDisk: 20Gi

  supportArch:
    - amd64
    - arm64
  onlyAdmin: true

options:
  shared: true
  apiTimeout: 0
  allowMultipleInstall: true
  conflicts:
    - name: deepseekocrwebuiv2
      type: application
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'

envs:
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: HF_ENDPOINT
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
