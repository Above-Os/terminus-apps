---
olaresManifest.version: '0.11.0'
olaresManifest.type: app
apiVersion: 'v1'
metadata:
  name: texttoimagesearch
  description: Text-to-image search web UI (nginx + SPA)
  icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
  appid: texttoimagesearch
  version: '1.0.1'
  title: Text-Image Search
  categories:
  - Utilities
  - AI
entrances:
- name: texttoimagesearch-client
  port: 80
  host: texttoimagesearch-svc
  title: Text-Image Search
  icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
  authLevel: internal
  openMethod: window
permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: '1.0'
  fullDescription: |
    纯前端应用：镜像 `beclab/text-to-image-search-frontend`，内置静态资源；通过 nginx 将
    `/search`、`/image`、`/task`、`/document`、`/file`、`/monitorsetting` 等路径代理到集群内后端 Service（可在子 Chart `values` 中配置）。

    本地 Docker 参考：`tests/frontend/infra/run_frontend_docker.sh`（默认监听 8088；本应用容器内为 80）。
  developer: Olares
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 128Mi
  limitedMemory: 1Gi
  requiredDisk: 128Mi
  limitedDisk: 2Gi
  requiredCpu: 0.1
  limitedCpu: 1
  supportArch:
    - amd64
    - arm64
options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
  appScope:
    clusterScoped: false
