replicas: 1

# 镜像在 templates/deployment.yaml 中写死；升级时改 tag（勿用 latest，check-chart 会拒绝）
# docker.io/beclab/text-to-image-search-frontend:0.0.1

# 后端 API（search3 风格路由）；按实际集群中的 Service 修改
backend:
  service: search3-api
  namespace: search3-shared
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 64Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 80
