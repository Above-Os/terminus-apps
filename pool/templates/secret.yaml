{{- $oe := .Values.olaresEnv | default dict -}}
{{- $apiKey := index $oe "POOLSIDE_API_KEY" | default "ollama" -}}
{{- $token := index $oe "POOLSIDE_TOKEN" | default "" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pool
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  POOLSIDE_API_KEY: {{ $apiKey | quote }}
  {{- if $token }}
  POOLSIDE_TOKEN: {{ $token | quote }}
  {{- end }}
