metadata:
  title: Qwen3.6 35B A3B UD-Q4_K_M (Ollama)
  description: Run Qwen3.6-35B-A3B GGUF (Q4_K_M quantization) locally via Ollama.

spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through the reference app.

    **MODEL**
    Qwen3.6-35B-A3B is a Mixture-of-Experts model from the Qwen3.6 series by Alibaba. It activates 3B parameters out of 35B total, delivering strong performance with lower resource usage.

    - Model: Qwen3.6-35B-A3B-UD-Q4_K_M
    - Source: unsloth/Qwen3.6-35B-A3B-GGUF (Hugging Face)
    - Quantization: Q4_K_M
    - Context: 32768
    - Backend: Ollama

  upgradeDescription: |
    Ollama runtime: ollama/ollama:0.30.0-rc23. CUDA ComputeCache shared at Home/Ollama/.nv (all Ollama apps). Proxy API: beclab/harveyff-olares-ollama:v0.1.20. Context length: 32768 (32k).
