metadata:
  title: Qwen3.6 35B A3B UD-Q4 (Ollama)
  description: 通过 Ollama 本地运行 Qwen3.6-35B-A3B GGUF（Q4_K_M 量化）。

spec:
  fullDescription: |
    **使用须知**
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    **模型**
    Qwen3.6-35B-A3B 是阿里巴巴 Qwen3.6 系列的混合专家（MoE）模型，总参数 35B，激活参数 3B，以较低的资源消耗实现优秀的性能。

    - 模型：Qwen3.6-35B-A3B-UD-Q4_K_M
    - 来源：unsloth/Qwen3.6-35B-A3B-GGUF（Hugging Face）
    - 量化：Q4_K_M
    - 上下文：131072
    - 后端：Ollama

  upgradeDescription: |
    Ollama 运行时：ollama/ollama:0.30.0-rc23。CUDA ComputeCache 共享目录 Home/Ollama/.nv（多应用共用）。代理 API：beclab/harveyff-olares-ollama:v0.1.20。上下文长度：131072（128k）。
