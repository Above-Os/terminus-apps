---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: opencode
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: opencode
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: opencode
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              mkdir -p /home/opencode/workspace /home/opencode/.opencode /home/opencode/.config/opencode
          resources: {}
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: opencode-workspace
              mountPath: /home/opencode/workspace
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
        - name: opencode
          image: "docker.io/beclab/anomalyco-opencode:1.2.27"
          command: ["opencode"]
          args: ["web", "--hostname", "0.0.0.0", "--port", "3000"]
          workingDir: /home/opencode/workspace
          securityContext:
            runAsUser: 0
          env:
            - name: HOME
              value: /home/opencode
            - name: TERM
              value: xterm-256color
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 512Mi
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: opencode-home
              mountPath: /home/opencode
            - name: opencode-workspace
              mountPath: /home/opencode/workspace
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always
      volumes:
        - name: opencode-home
          hostPath:
            path: "{{ .Values.userspace.appData }}"
            type: DirectoryOrCreate
        - name: opencode-workspace
          hostPath:
            path: "{{ .Values.userspace.userData }}/Code"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: opencode
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: opencode
spec:
  ports:
    - name: web
      port: 3000
      targetPort: 3000
  selector:
    io.kompose.service: opencode
status:
  loadBalancer: {}
