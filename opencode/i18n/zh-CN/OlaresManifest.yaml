metadata:
  title: OpenCode
  description: 开源 AI 编程助手
spec:
  fullDescription: |
    OpenCode 是一款开源的 AI 编程助手。

    主要特性
    - 100% 开源，不绑定任何单一供应商。
    - 支持 Claude、OpenAI、Google 以及本地模型（包括 Ollama）。
    - 内置 agent：build（完整权限，用于开发）和 plan（只读，用于分析和规划）。
    - 开箱即用的 LSP 支持，提供智能代码导航。
    - 客户端/服务端架构，支持移动端远程访问。
    - 通用子代理，适用于复杂搜索和多步骤任务。

    使用方法
    - 打开应用，直接在浏览器中使用 Web UI。
    - 通过 Web UI 配置 LLM 提供商和 API 密钥。
    - 代码工作区挂载在 /home/opencode/workspace（关联到 Home/Code 目录）。
