metadata:
  title: OpenCode
  description: The open source AI coding agent
spec:
  fullDescription: |
    OpenCode is the open source AI coding agent.

    Key Features
    - 100% open source, not coupled to any provider.
    - Supports Claude, OpenAI, Google, or even local models (including Ollama).
    - Built-in agents: build (full-access for development) and plan (read-only for analysis).
    - Out-of-the-box LSP support for intelligent code navigation.
    - Client/server architecture allows remote access from mobile apps.
    - General subagent for complex searches and multistep tasks.

    Usage
    - Open the app and use the Web UI directly in your browser.
    - Configure your LLM provider and API keys in the Web UI.
    - Your code workspace is mounted at /home/opencode/workspace (linked to your Home/Code directory).
