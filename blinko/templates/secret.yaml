{{- $pgPort := .Values.postgres.port | toString -}}
{{- $pgUrl := printf "postgres://%s:%s@%s:%s/%s" (.Values.postgres.username | toString) (.Values.postgres.password | toString) (.Values.postgres.host | toString) $pgPort (.Values.postgres.databases.blinko | toString) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name) -}}
{{- $nextauth := "" -}}
{{- if and $existing $existing.data (index $existing.data "NEXTAUTH_SECRET") -}}
{{- $nextauth = index $existing.data "NEXTAUTH_SECRET" | b64dec -}}
{{- else -}}
{{- $nextauth = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: blinko
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DATABASE_URL: {{ $pgUrl | quote }}
  NEXTAUTH_SECRET: {{ $nextauth | quote }}
