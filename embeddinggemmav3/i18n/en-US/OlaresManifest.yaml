metadata:
  title: EmbeddingGemma 300M
  description: "EmbeddingGemma-300M text embeddings via IREmbeddingServer (OpenVINO / ONNX)"

spec:
  fullDescription: |
    **EmbeddingGemma-300M** text embedding service powered by IREmbeddingServer.
    OpenAI-compatible `/v1/embeddings` on port 8080.

    **Accelerator modes**
    - `cpu` — ov-intel image, OpenVINO IR, `EMBED_DEVICE=auto`
    - `nvidia` — onnx-cuda12/13, `EMBED_DEVICE=cuda`
    - `nvidia-gb10` — onnx-cuda13 unified memory
    - `strix-halo` — onnx-rocm, `EMBED_DEVICE=rocm`

    llm-init downloads both HF repos (OV + ONNX) into the shared App Common cache.
    Check `GET /v1/capabilities` → `configured_device_kind` for the actual device.

    **Web Console** (`console` entrance): Playground, text similarity compare,
    device/capability diagnostics, and optional API key. All API calls go through
    `/api` on the console host; nginx forwards to embed-server. Use **embedclient**
    while models are still downloading.
