# Engine wrapper: wait for llm-init sentinel, resolve HF snapshot paths, exec embed_server.
apiVersion: v1
kind: ConfigMap
metadata:
  name: embed-server-wrappers
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: embed-server
data:
  embed-server.sh: |
    #!/bin/sh
    set -eu

    ENGINE=embed-server
    SENTINEL=${SENTINEL:-/run/llm-init/model_download_finish}
    WAIT_INTERVAL=${WAIT_INTERVAL:-5}
    WAIT_TIMEOUT=${WAIT_TIMEOUT:-3600}
    HF_HUB=${HF_HUB_CACHE:-/cache/hf/hub}

    log() { printf '[wrapper-%s] %s\n' "$ENGINE" "$*" >&2; }

    resolve_snapshot() {
        slug="$1"
        base="${HF_HUB}/models--${slug}/snapshots"
        if [ ! -d "$base" ]; then
            log "missing HF cache dir: $base"
            return 1
        fi
        # shellcheck disable=SC2012
        dir=$(ls -1d "${base}"/*/ 2>/dev/null | head -1)
        if [ -z "$dir" ]; then
            log "no snapshot under $base"
            return 1
        fi
        dir=${dir%/}
        log "resolved snapshot slug=${slug} -> ${dir}"
        printf '%s\n' "$dir"
    }

    elapsed=0
    while [ ! -f "$SENTINEL" ]; do
        if [ "$elapsed" -ge "$WAIT_TIMEOUT" ]; then
            log "timed out after ${WAIT_TIMEOUT}s waiting for $SENTINEL"
            exit 1
        fi
        log "waiting for $SENTINEL (elapsed=${elapsed}s)"
        sleep "$WAIT_INTERVAL"
        elapsed=$((elapsed + WAIT_INTERVAL))
    done
    log "sentinel $SENTINEL found after ${elapsed}s"

    case "${EMBED_BACKEND:-openvino}" in
        openvino)
            EMBED_MODEL_DIR=$(resolve_snapshot "wangzhong--embeddinggemma-300m-ov") || exit 1
            export EMBED_MODEL_DIR
            export MODEL_ID="${MODEL_ID:-embeddinggemma-300m-ov}"
            export EMBED_DEVICE="${EMBED_DEVICE:-auto}"
            ;;
        onnx)
            EMBED_MODEL_DIR=$(resolve_snapshot "wangzhong--embeddinggemma-300m-onnx-export") || exit 1
            export EMBED_MODEL_DIR
            export MODEL_ID="${MODEL_ID:-embeddinggemma-300m-onnx}"
            export EMBED_DEVICE="${EMBED_DEVICE:-auto}"
            ;;
        *)
            log "unknown EMBED_BACKEND=${EMBED_BACKEND:-<empty>}"
            exit 1
            ;;
    esac

    if [ ! -d "$EMBED_MODEL_DIR" ]; then
        log "EMBED_MODEL_DIR is not a directory: $EMBED_MODEL_DIR"
        exit 1
    fi

    log "starting embed_server MODEL_ID=$MODEL_ID EMBED_DEVICE=$EMBED_DEVICE EMBED_MODEL_DIR=$EMBED_MODEL_DIR"
    exec /usr/local/bin/embed_server
