---
olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v2'

metadata:
  name: vllmdeepseekocr3bv2
  icon: https://app.cdn.olares.com/appstore/llm/vllm/llm/gemma3-12B.png
  description: DeepSeek-OCR optical compression model for document and image OCR.
  appid: vllmdeepseekocr3bv2
  title: DeepSeek OCR (vLLM)
  version: '1.0.16'
  categories:
    - AI

sharedEntrances:
  - name: vllmdeepseekocr3b
    host: download-svc
    post: 8090
entrances:
  - authLevel: internal
    host: vllmclient
    icon: https://app.cdn.olares.com/appstore/llm/vllm/llm/gemma3-12B.png
    name: vllmclient
    openMethod: window
    port: 8080
    title: DeepSeek OCR

spec:
  versionName: 'deepseek-ai/DeepSeek-OCR'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference app.

    **MODEL OVERVIEW**
    DeepSeek-OCR explores optical compression for document and image understanding: pages are encoded into vision tokens and decoded back into text (OCR, layout parsing, and figure extraction). The model is supported in upstream vLLM for production inference.

    **Inputs and outputs**
    *Input:*
    - Image files (documents, screenshots, figures)
    - Prompts for document OCR (e.g. convert document to markdown) or free OCR on images

    *Output:*
    - Extracted text, markdown, or structured layout grounded to the source image

    **Key features**
    - Document OCR and markdown conversion with layout grounding
    - Multiple resolution modes (e.g. 512 to 1280) trading speed vs. fidelity
    - Practical for batch document digitization and vision-text compression research
  upgradeDescription: |
    Fix garbled manifest text; replace mistaken Gemma copy with DeepSeek-OCR description.

  developer: DeepSeek
  website: https://github.com/deepseek-ai/DeepSeek-OCR
  sourceCode: https://huggingface.co/deepseek-ai/DeepSeek-OCR
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://github.com/deepseek-ai/DeepSeek-OCR
  license:
    - text: MIT License
      url: https://github.com/deepseek-ai/DeepSeek-OCR/blob/main/LICENSE
  limitedCpu: 21
  requiredCpu: 1
  requiredDisk: 10Gi
  limitedDisk: 50Gi
  limitedMemory: 30Gi
  requiredMemory: 10Gi
  requiredGpu: 16Gi
  limitedGpu: 30Gi

  supportArch:
    - amd64
    - arm64
  subCharts:
  - name: vllmserver
    shared: true
  - name: vllmdeepseekocr3b
permission:
  appData: true
  appCache: true
  userData:
    - Home
options:
  apiTimeout: 0
  appScope:
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
    clusterScoped: true
    appRef:
      - vllmdeepseekocr3b
  {{- else }}
    clusterScoped: false
  {{- end }}
  dependencies:
    - name: olares
      version: '>=1.12.2-0'
      type: system
  {{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
  {{- else }}
    - name: vllmdeepseekocr3b
      type: application
      version: '>=1.0.1'
      mandatory: true
  {{- end }}

{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
envs:
  - envName: OLARES_USER_HUGGINGFACE_TOKEN
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: OLARES_USER_HUGGINGFACE_SERVICE
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
{{- end }}