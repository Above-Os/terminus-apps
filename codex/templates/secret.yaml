{{- $oe := .Values.olaresEnv | default dict -}}
{{- $apiKey := index $oe "OPENAI_API_KEY" | default "" -}}
{{- if $apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: codex
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ $apiKey | quote }}
{{- end }}
