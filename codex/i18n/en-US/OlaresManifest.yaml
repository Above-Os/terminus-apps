metadata:
  title: Codex CLI
  description: OpenAI's lightweight coding agent that runs in your terminal
spec:
  fullDescription: |
    # Overview
    Codex CLI is OpenAI's lightweight, open-source coding agent that
    runs locally in your terminal. It understands your codebase,
    executes routine tasks through natural language, and helps you
    ship faster while staying in flow.

    # Key Features
    Terminal-native TUI
    - Streaming tool output, slash commands, interrupt-and-redirect,
      multiline editing, and rich diff review.

    Real Coding Loop
    - File edits, shell execution, git workflows, and test runs driven
      by natural language instructions.

    Skills, AGENTS.md and MCP
    - Project-level `AGENTS.md`, reusable `.codex/skills`, and any
      MCP-compatible tool server are first-class citizens.

    Flexible Auth
    - Works with a ChatGPT Plus / Pro / Business / Edu / Enterprise
      plan via OAuth, or with an OpenAI API key.

    Persistent Workspace
    - Configuration, session history, login state and skills persist
      across Pod restarts via the Olares app data volume.
  upgradeDescription: |
    Initial release of Codex CLI on Olares (upstream rust-v0.125.0).
