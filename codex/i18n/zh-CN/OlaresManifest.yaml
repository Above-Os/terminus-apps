metadata:
  title: Codex CLI
  description: OpenAI 官方原版的终端 AI 编码助手
spec:
  fullDescription: |
    # 简介
    Codex CLI 是 OpenAI 官方出品、开源、直接运行在终端里的轻量级
    AI 编码助手。它能理解整个代码库，用自然语言驱动日常编码任务，
    让你在专注状态下更快完成工作。

    # 核心功能
    原生终端 TUI
    - 流式工具输出、斜杠命令、中断改向、多行编辑、富文本 diff 审阅。

    真实编码闭环
    - 用自然语言指令完成文件修改、命令执行、git 工作流、跑测试。

    Skills / AGENTS.md / MCP
    - 项目级 `AGENTS.md`、可复用的 `.codex/skills`，以及任意
      MCP 协议工具服务，都是一等公民。

    灵活鉴权
    - 支持 ChatGPT Plus / Pro / Business / Edu / Enterprise 套餐的
      OAuth 登录，也支持 OpenAI API Key。

    持久化工作区
    - 配置、会话历史、登录态与 Skills 通过 Olares 应用数据卷持久化，
      Pod 重启不会丢失登录态和上下文。
  upgradeDescription: |
    Codex CLI 在 Olares 上的首个版本（上游 rust-v0.125.0）。
