metadata:
  description: Airtable 开源替代产品。
  title: NocoDB
spec:
  fullDescription: |
    NocoDB 使得构建无代码数据库解决方案像使用电子表格一样简单。

    NocoDB 提供了一个直观的电子表格界面，用户可以从零开始或者连接现有数据库来创建在线数据库。您可以把 MySQL、PostgreSQL、SQL Server、SQLite 和 MariaDB 等数据库转换成智能电子表格，并通过看板、表单、画廊等交互式界面或通过 API 和 SQL 访问数据。

    功能介绍
    * 多视图和多元单元格类型的电子表格界面。
    * 与团队共享数据库和视图。
    * 提供多层次的细致访问控制。
    * 与聊天、邮件和存储服务无缝结合，实现工作流自动化。
    * 通过 REST API 或 NocoDB SDK 进行编程操作。
    * 在 NocoDB GUI 外同步架构更改。
    * 保存所有用户操作的审计日志。

  upgradeDescription: |
    升级至 **2026.07.0**（`nocodb/nocodb:2026.07.0`）。

    **重点更新**
    * 日历同步（Google / Outlook / CalDAV）— 付费 / 授权版
    * 图片批注 — 付费 / 授权版
    * 工作流评论触发器；评论附件与评论 Webhook
    * 公式：`MD5()` / `SHA256()` / `SHA512()`、`DATETIME_FORMAT()`、Jalali 日历格式
    * 日历：导出 .ics、自定义时间尺度、移动端日历改进
    * Excel 导入：可跳过工作表；导入时可新建字段
    * 自托管：按签名许可证解析套餐；试用过期回落 Community 而非全屏锁定
    * 新增可选环境变量：`NC_ALLOW_LOCAL_DATA_IMPORT`、`NC_AI_*`（默认安装不需要）
    * 将 `NC_DB`、`NC_AUTH_JWT_SECRET` 迁入 Kubernetes Secret（`secretKeyRef`）

    **环境变量 / 启动参数**
    * `NC_DB` 连接串格式未变（`pg://host:port?u=&p=&d=`）
    * 数据目录仍为 `/usr/app/data`；HTTP 端口仍为 `8080`
    * 本次升级无新增必需启动参数

    完整发布说明: https://github.com/nocodb/nocodb/releases/tag/2026.07.0

