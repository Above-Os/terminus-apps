{{- $secretName := printf "%s-secrets" .Release.Name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $jwt := "" -}}
{{- if and $existing $existing.data (index $existing.data "NC_AUTH_JWT_SECRET") -}}
{{- $jwt = index $existing.data "NC_AUTH_JWT_SECRET" | b64dec -}}
{{- else -}}
{{- $jwt = randAlphaNum 48 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: nocodb
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  NC_DB: "pg://{{ .Values.postgres.host }}:{{ .Values.postgres.port }}?u={{ .Values.postgres.username }}&p={{ .Values.postgres.password }}&d={{ .Values.postgres.databases.nocodb }}"
  NC_AUTH_JWT_SECRET: {{ $jwt | quote }}
