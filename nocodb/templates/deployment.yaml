apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: nocodb
spec:
  replicas: {{ .Values.workloads.nocodb.replicaCount }}
  selector:
    matchLabels:
      app: nocodb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nocodb
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              chown -R 1000:1000 /app-data-root
          resources: {}
          volumeMounts:
            - name: app-data-root
              mountPath: /app-data-root
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
        - name: nocodb
          image: "docker.io/nocodb/nocodb:2026.07.0"
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          ports:
            - containerPort: 8080
          env:
            - name: NC_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: NC_DB
            - name: NC_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: NC_AUTH_JWT_SECRET
            - name: NC_ATTACHMENT_FIELD_SIZE
              value: "104857600"
            - name: NC_MAX_ATTACHMENTS_ALLOWED
              value: "10"
          volumeMounts:
            - name: nc-data
              mountPath: /usr/app/data
      volumes:
        - name: nc-data
          hostPath:
            type: DirectoryOrCreate
            path: "{{ .Values.userspace.appData }}/nc-data"
        - name: app-data-root
          hostPath:
            type: DirectoryOrCreate
            path: "{{ .Values.userspace.appData }}"

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: nocodbtcp
      protocol: TCP
      port: 80
      targetPort: 8080
