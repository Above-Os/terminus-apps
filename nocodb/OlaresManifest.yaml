---
olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  nocodb: 1
metadata:
  name: nocodb
  description: Open Source Airtable Alternative.
  icon: https://app.cdn.olares.com/appstore/nocodb/icon.png
  appid: nocodb
  version: '1.0.14'
  title: NocoDB
  categories:
  - Productivity_v112

permission:
  appData: true
  appCache: true
spec:
  versionName: '2026.07.0'
  fullDescription: |
    NocoDB allows building no-code database solutions with ease of spreadsheets.

    NocoDB provides an intuitive spreadsheet interface for creating online databases, either from scratch or by connecting to databases. You can turns any MySQL, PostgreSQL, SQL Server, SQLite & MariaDB into a smart spreadsheet and access your data through interactive UIs like Kanban, Form, and Gallery, or via API and SQL.

    Features

    * Rich spreadsheet interface with multiple views and variant cell types.

    * Share bases / views with team.

    * Fine-grained Access Control at different levels.

    * Connect seamlessly to your chat, email, storage service for workflow automations.

    * Programmatic invoke actions using REST APIs or NocoDB SDK.

    * Sync your schema changes outside NocoDB GUI.

    * All the user operation logs are kept under Audit.

  upgradeDescription: |
    Upgrade to **2026.07.0** (`nocodb/nocodb:2026.07.0`).

    **Highlights**
    * Calendar Sync (Google / Outlook / CalDAV) — paid / licensed plans
    * Image annotations on attachments — paid / licensed plans
    * Workflow comment trigger; comment attachments and comment webhooks
    * Formula: `MD5()` / `SHA256()` / `SHA512()`, `DATETIME_FORMAT()`, Jalali calendar formats
    * Calendar: .ics export, custom timescale, mobile calendar improvements
    * Excel import: skip sheets; create new fields while importing
    * Self-hosting: license plan resolution from signed license type; expired trials fall back to Community instead of blocking UI
    * New optional env: `NC_ALLOW_LOCAL_DATA_IMPORT`, `NC_AI_*` (not required for default install)
    * Move `NC_DB` and `NC_AUTH_JWT_SECRET` into Kubernetes Secret (`secretKeyRef`)
    * Drop obsolete `sysVersion >=1.12.3` path branches (minimum Olares is 1.12.6)

    **Env / startup**
    * `NC_DB` connection string format unchanged (`pg://host:port?u=&p=&d=`)
    * Data volume still `/usr/app/data`; HTTP port still `8080`
    * No new required startup args for this upgrade

    Full release notes: https://github.com/nocodb/nocodb/releases/tag/2026.07.0

