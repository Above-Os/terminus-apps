metadata:
  title: PaddleOCR-VL GGUF
  description: 基于 llama.cpp 的 PaddleOCR-VL 1.5 GGUF（CPU / CUDA / Vulkan 核显 / ROCm AMD 核显）。
spec:
  fullDescription: |
    **PaddleOCR-VL 1.5** 多模态 OCR GGUF，使用 **llama.cpp** 提供 OpenAI 兼容 HTTP API。
    所有后端共用同一 Hugging Face 模型缓存；管理员可选择 **CPU**、**NVIDIA CUDA**、**Intel 核显（Vulkan）** 或 **AMD 核显（ROCm）**。
