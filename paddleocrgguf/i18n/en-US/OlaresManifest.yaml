metadata:
  title: PaddleOCR-VL GGUF
  description: PaddleOCR-VL 1.5 GGUF via llama.cpp (CPU / CUDA / Vulkan / ROCm).
spec:
  fullDescription: |
    Multimodal OCR model **PaddleOCR-VL 1.5** in GGUF form, served with **llama.cpp**.
    One Hugging Face repo for all backends; admin chooses **CPU**, **NVIDIA CUDA**, **Intel iGPU (Vulkan)**, or **AMD iGPU (ROCm)**.
