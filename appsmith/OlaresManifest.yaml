olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  appsmith: 1
  appsmith-redis: 1
metadata:
  name: appsmith
  description: Platform to build admin panels, internal tools, and dashboards
  icon: https://app.cdn.olares.com/appstore/appsmith/icon.png
  appid: appsmith
  version: '1.0.11'
  title: Appsmith
  categories:
  - Developer Tools

permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: '2.2.1'
  upgradeDescription: |
    Upgrade Appsmith EE to 2.2.1 (`appsmith/appsmith-ee:v2.2.1`).

    Move `APPSMITH_ENCRYPTION_PASSWORD` and `APPSMITH_ENCRYPTION_SALT` into a Kubernetes Secret and inject via `secretKeyRef`.

    Drop unused `PUID` / `PGID` / `DISPLAY` env vars not used by the official image.

    Drop legacy `sysVersion >= 1.12.3` appData path branching; always use `appData/stacks` (Olares minimum 1.12.6).

    Slightly raise CPU/memory requests and limits for the Appsmith container and app envelope.
  featuredImage: https://app.cdn.olares.com/appstore/appsmith/1.jpg
  promoteImage:
  - https://app.cdn.olares.com/appstore/appsmith/1.jpg
  - https://app.cdn.olares.com/appstore/appsmith/2.jpg
  - https://app.cdn.olares.com/appstore/appsmith/3.jpg
  - https://app.cdn.olares.com/appstore/appsmith/4.jpg  
  fullDescription: |
    Appsmith is an open-source tool that enables the rapid development of internal apps. You can drag and drop pre-built widgets to build UI. Connect securely to your databases & APIs using its datasources. Write business logic to read & write data using queries & JavaScript.

    Thousands of teams use the Appsmith low-code application platform to quickly build, deploy, and manage effective software with enterprise-grade security and governance.

    **Why Appsmith**
    Appsmith makes it easy to build a UI that talks to any datasource. You can create anything from simple CRUD apps to complicated multi-step workflows with a few simple steps:

    Connect Datasource
    Integrate with a database or API. Appsmith supports the most popular databases and REST APIs.

    Build UI
    Use built-in widgets to build your app layout.

    Write Logic
    Express your business logic using queries and JavaScript anywhere in the editor.

    Collaborate, Deploy, Share
    Appsmith supports version control using Git to build apps in collaboration using branches to track and roll back changes. Deploy the app and share it with other users.
  developer: Appsmith, Inc
  website: https://www.appsmith.com/
  sourceCode: https://github.com/appsmithorg/appsmith
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 4Gi
  limitedMemory: 8Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 2.5
  limitedCpu: 4
  doc: https://docs.appsmith.com/
  license:
  - text: Apache-2.0
    url: https://github.com/appsmithorg/appsmith?tab=Apache-2.0-1-ov-file#readme
  supportArch:
    - amd64
    - arm64
options:
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
entrances:
  - name: appsmith
    port: 80
    host: appsmith
    title: Appsmith
    icon: https://app.cdn.olares.com/appstore/appsmith/icon.png
    authLevel: internal
    openMethod: window