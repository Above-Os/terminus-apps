apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: photoview
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  PHOTOVIEW_MYSQL_URL: "{{ .Values.mariadb.username}}:{{ .Values.mariadb.password}}@tcp({{ .Values.mariadb.host }}:3306)/{{ .Values.mariadb.databases.photoview }}"
