apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-config
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    homeDir="/olares/userdata/home"
    externalDir="/olares/userdata/external"
    appDataDir="/appData"
    confFile="$appDataDir/qBittorrent.conf"
    defaultConf="/chart-defaults/qBittorrent.conf"

    mkdir -p "$homeDir/Downloads/qBittorrent"
    chown -R 1000:1000 "$homeDir" "$appDataDir" "$externalDir"

    # Seed the default config ONCE from the chart default if absent, then leave it
    # alone. Upgrades and restarts never overwrite user-edited qBittorrent.conf.
    if [ ! -f "$confFile" ]; then
      echo "First-time setup: copying default qBittorrent.conf into appData."
      mkdir -p "$(dirname "$confFile")"
      cp "$defaultConf" "$confFile"
    else
      echo "Existing qBittorrent.conf found in appData, leaving user edits intact."
    fi
  # linuxserver/docker-qbittorrent@libtorrentv1-release-5.1.4_v1.2.20-ls112
  # root/defaults/qBittorrent.conf + Olares path/WebUI overrides
  qBittorrent.conf: |
    [AutoRun]
    enabled=false
    program=

    [LegalNotice]
    Accepted=true

    [Preferences]
    Connection\UPnP=false
    Connection\PortRangeMin=6881
    Downloads\SavePath=/olares/userdata/home/Downloads/qBittorrent
    Downloads\ScanDirsV2=@Variant(\0\0\0\x1c\0\0\0\0)
    Downloads\TempPath=/olares/userdata/home/Downloads/qBittorrent/incomplete/
    WebUI\Address=*
    WebUI\ServerDomains=*
    WebUI\Port=8080
    WebUI\CSRFProtection=false
    WebUI\HostHeaderValidation=false
    WebUI\Authentication=false
    WebUI\LocalHostAuth=false

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      volumes:
        - name: external-downloads
          hostPath:
            type: DirectoryOrCreate
            path: "{{ .Values.sharedlib }}"
        - name: home-downloads
          hostPath:
            type: DirectoryOrCreate
            path: {{ .Values.userspace.userData }}
        - name: appdata
          hostPath:
            type: DirectoryOrCreate
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: {{ .Values.userspace.appData }}
              {{- else }}
            path: {{ .Values.userspace.appData }}/qbittorrent
              {{- end }}
            {{- else }}
            path: {{ .Values.userspace.appData }}/qbittorrent
            {{- end }}
        - name: qbittorrent-config
          configMap:
            name: qbittorrent-config
            defaultMode: 438
            items:
              - key: init.sh
                path: init.sh
              - key: qBittorrent.conf
                path: qBittorrent.conf
      initContainers:
        - name: init-qbittorrent
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
            - |
              sh /chart-defaults/init.sh
          resources: {}
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: home-downloads
              mountPath: /olares/userdata/home
            - name: home-downloads
              mountPath: /downloads/home
            - name: external-downloads
              mountPath: /olares/userdata/external
            - name: external-downloads
              mountPath: /downloads/external
            - name: appdata
              mountPath: /appData
            - name: qbittorrent-config
              mountPath: /chart-defaults
              readOnly: true
          securityContext:
            runAsUser: 0
      containers:
        - name: qbittorrent
          image: "docker.io/beclab/linuxserver-qbittorrent:5.2.2"
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: "1"
              memory: 2Gi
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PGID
              value: "1000" 
            - name: PUID
              value: "1000" 
            - name: UMASK
              value: "002" 
            - name: TZ
              value: UTC
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "6881"
          volumeMounts:
            - name: home-downloads
              mountPath: /olares/userdata/home
            - name: home-downloads
              mountPath: /downloads/home
            - name: home-downloads
              mountPath: /home
            - name: external-downloads
              mountPath: /olares/userdata/external
            - name: external-downloads
              mountPath: /downloads/external
            - name: appdata
              mountPath: /config/qBittorrent
          livenessProbe:
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 30
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      serviceAccountName: default
      serviceAccount: default
      automountServiceAccountToken: true
      securityContext: {}
      enableServiceLinks: true
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 600
