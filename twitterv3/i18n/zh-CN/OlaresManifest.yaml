metadata:
  title: Twitter/X V3 for test
  description: 用于从 Twitter/X 采集内容的 Wise 插件。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序（例如 wise）调用它。

    ## 应用概览 ##
    Twitter/X 是 Wise 的插件，可用于无缝采集 Twitter/X 上的内容。

    **特性**
    - 直接将推文保存到 Wise
    - 下载推文中的媒体文件

  upgradeDescription: |
    将 Twitter/X 插件迁移到 v3 共享应用 schema。

    **更新内容**

    - **Schema**：OlaresManifest 升级至 `apiVersion: v3`。
    - **结构**：将原 `twittersvr` + `twitter` 双子 chart 合并为单 chart。
    - **共享**：将 `appScope.clusterScoped` + `appRef` 替换为 `options.shared: true`；调用方通过 `sharedentrances-twitter` 访问 API。
    - **扩缩容**：通过 `workloadReplicas` 声明 `twitterv3` 副本数。
