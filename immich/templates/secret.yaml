{{- $secret := .Values.oidc.client.secret | default "" -}}
{{- if $secret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: immich
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  OAUTH_CLIENT_SECRET: {{ $secret | quote }}
{{- end }}
