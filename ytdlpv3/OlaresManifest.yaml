olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: ytdlpv3
  description: A Wise plugin for downloading audio/video from websites.
  icon: https://app.cdn.olares.com/appstore/ytdlp/icon.png
  appid: ytdlpv3
  version: '1.1.4'
  title: YT-DLP V3 for test
  categories:
    - Utilities_v112

sharedEntrances:
  - name: ytdlp
    host: sharedentrances-ytdlp
    port: 0
    title: YT-DLP API
    icon: https://app.cdn.olares.com/appstore/ytdlp/icon.png
    invisible: true
    authLevel: internal
entrances:
  - name: ytdlp-svc
    port: 3082
    host: ytdlp-svc
    title: YT-DLP API
    icon: https://app.cdn.olares.com/appstore/ytdlp/icon.png
    authLevel: private
    invisible: true

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   ytdlpv3 — yt-dlp server Deployment (must match metadata.name / appid)
workloadReplicas:
  ytdlpv3: 1

spec:
  versionName: '1.0.1'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference apps (e.g. wise).

    A Wise plugin for downloading audio/video from websites using YT-DLP.

    YT-DLP is a feature-rich command-line tool based on youtube-dl that downloads videos and audio from websites such as YouTube, Vimeo, and hundreds more. The project is a fork of youtube-dl based on the now inactive youtube-dlc.

    *Features*

    - Support for thousands of sites
    - Automatic format selection
    - Embedded subtitles
    - Audio extraction
    - Metadata embedding
    - Cookie-based authentication
    - Segmented livestream handling

  upgradeDescription: |
    v1.1.3: Move `YTDLP_PG_PASSWORD` into Kubernetes Secret (`secretKeyRef`).

    Migrate YT-DLP to the v3 shared-app schema.

    **What's Changed**

    - **Schema**: OlaresManifest upgraded to `apiVersion: v3`.
    - **Layout**: merged the previous `ytserver` + `ytdlp` subCharts into a single chart.
    - **Sharing**: replaced `appScope.clusterScoped` + `appRef` with `options.shared: true`; consumers now reach the API via `sharedentrances-ytdlp`.
    - **Scaling**: `workloadReplicas` declares replica counts for the `ytdlpv3` workload.

  website: https://github.com/yt-dlp/yt-dlp
  sourceCode: https://github.com/yt-dlp/yt-dlp
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://github.com/yt-dlp/yt-dlp?tab=readme-ov-file
  requiredMemory: 200Mi
  limitedMemory: 1Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 200m
  limitedCpu: 1
  supportArch:
    - amd64
    - arm64
  onlyAdmin: true
  license:
    - text: Unlicense
      url: https://github.com/yt-dlp/yt-dlp?tab=Unlicense-1-ov-file#Unlicense-1-ov-file

permission:
  appData: true
  appCache: true
options:
  shared: true
  apiTimeout: 0
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
middleware:
  postgres:
    username: ytdlp
    databases:
      - name: ytdlp
