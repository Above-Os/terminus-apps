metadata:
  title: YT-DLP V3 for test
  description: A Wise plugin for downloading audio/video from websites.
spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference apps (e.g. wise).

    A Wise plugin for downloading audio/video from websites using YT-DLP.

    YT-DLP is a feature-rich command-line tool based on youtube-dl that downloads videos and audio from websites such as YouTube, Vimeo, and hundreds more. The project is a fork of youtube-dl based on the now inactive youtube-dlc.

    *Features*

    - Support for thousands of sites
    - Automatic format selection
    - Embedded subtitles
    - Audio extraction
    - Metadata embedding
    - Cookie-based authentication
    - Segmented livestream handling

  upgradeDescription: |
    Migrate YT-DLP to the v3 shared-app schema.

    **What's Changed**

    - **Schema**: OlaresManifest upgraded to `apiVersion: v3`.
    - **Layout**: merged the previous `ytserver` + `ytdlp` subCharts into a single chart.
    - **Sharing**: replaced `appScope.clusterScoped` + `appRef` with `options.shared: true`.
    - **Scaling**: `workloadReplicas` declares replica counts for the `ytdlpv3` workload.
