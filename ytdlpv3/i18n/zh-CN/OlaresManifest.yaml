metadata:
  title: YT-DLP V3 for test
  description: Wise 的 YT-DLP 音视频下载插件。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序（例如 wise）调用它。

    ## 应用概览 ##
    Wise 的 YT-DLP 插件，可从 YouTube、Vimeo 等数百个网站下载音视频。

    YT-DLP 是基于 youtube-dl 的功能丰富的命令行工具，是已不再维护的 youtube-dlc 的延续分支。

    *特性*

    - 支持数千个站点
    - 自动选择最佳格式
    - 嵌入字幕
    - 音轨提取
    - 元数据嵌入
    - 基于 Cookie 的鉴权
    - 分段直播处理

  upgradeDescription: |
    将 YT-DLP 迁移到 v3 共享应用 schema。

    **更新内容**

    - **Schema**：OlaresManifest 升级至 `apiVersion: v3`。
    - **结构**：将原 `ytserver` + `ytdlp` 双子 chart 合并为单 chart。
    - **共享**：将 `appScope.clusterScoped` + `appRef` 替换为 `options.shared: true`；调用方通过 `sharedentrances-ytdlp` 访问 API。
    - **扩缩容**：通过 `workloadReplicas` 声明 `ytdlpv3` 副本数。
