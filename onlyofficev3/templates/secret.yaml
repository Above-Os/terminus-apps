apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: onlyofficev3
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DB_PWD: {{ .Values.postgres.password | quote }}
  REDIS_SERVER_PASS: {{ .Values.redis.password | quote }}
