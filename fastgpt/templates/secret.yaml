---
apiVersion: v1
kind: Secret
metadata:
  name: fastgpt-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  AIPROXY_API_TOKEN: "aiproxy"
  PLUGIN_TOKEN: "token"
  CODE_SANDBOX_TOKEN: "codesandbox"
  TOKEN_KEY: "olares"
  ROOT_KEY: "olares"
  FILE_TOKEN_KEY: "olares"
  DEFAULT_ROOT_PSW: {{ .Values.olaresEnv.DEFAULT_ROOT_PSW | quote }}
  AES256_SECRET_KEY: "fastgptsecret"
  MONGODB_URI: "mongodb://fastgpt:fastgpt@mongo-service:27017/fastgpt?authSource=admin&directConnection=true"
  PG_URL: "postgresql://fastgpt:fastgpt@localhost:5432/postgres"
  MONGO_INITDB_ROOT_PASSWORD: "fastgpt"
  POSTGRES_PASSWORD: "fastgpt"
  MINIO_ROOT_PASSWORD: "minioadmin"
  STORAGE_ACCESS_KEY_ID: "minioadmin"
  STORAGE_SECRET_ACCESS_KEY: "minioadmin"
  ADMIN_KEY: "aiproxy"
  SQL_DSN: "postgres://postgres:aiproxy@localhost:5432/aiproxy"
  AIPROXY_POSTGRES_PASSWORD: "aiproxy"
