metadata:
  title: FlareSolverr
  description: Proxy server to bypass Cloudflare and DDoS-GUARD protection.
spec:
  fullDescription: |
    FlareSolverr is a proxy server to bypass Cloudflare and DDoS-GUARD protection.

    # How it works
    FlareSolverr starts a proxy server, and it waits for user requests in an idle state using few resources. When some request arrives, it uses Selenium with the undetected-chromedriver to create a web browser (Chrome). It opens the URL with user parameters and waits until the Cloudflare challenge is solved (or timeout). The HTML code and the cookies are sent back to the user, and those cookies can be used to bypass Cloudflare using other HTTP clients.

    # Features
    * Bypass Cloudflare protection automatically
    * Bypass DDoS-GUARD protection
    * Support for GET and POST requests
    * Session management for persistent browser instances
    * Cookie extraction for reuse with other HTTP clients
    * Configurable timeout for challenge solving
    * Proxy support (HTTP, SOCKS4, SOCKS5)
    * Prometheus metrics endpoint
    * Low resource usage in idle state
    * Screenshot capture support
    * Disable media loading option for bandwidth saving
  upgradeDescription: |
    Upgrade to v3.4.6

    Changes:
    * Add disable image, CSS, fonts option with CDP (#1626)

    Full release notes at: https://github.com/FlareSolverr/FlareSolverr/releases/tag/v3.4.6
