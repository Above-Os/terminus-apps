metadata:
  title: FlareSolverr
  description: 绕过 Cloudflare 和 DDoS-GUARD 保护的代理服务器。
spec:
  fullDescription: |
    FlareSolverr 是一个用于绕过 Cloudflare 和 DDoS-GUARD 保护的代理服务器。

    # 工作原理
    FlareSolverr 启动一个代理服务器，在空闲状态下等待用户请求，使用极少的资源。当请求到达时，它使用 Selenium 和 undetected-chromedriver 创建一个 Web 浏览器（Chrome），打开带有用户参数的 URL，并等待 Cloudflare 挑战被解决（或超时）。然后将 HTML 代码和 cookies 返回给用户，这些 cookies 可以用于通过其他 HTTP 客户端绕过 Cloudflare。

    # 功能
    * 自动绕过 Cloudflare 保护
    * 绕过 DDoS-GUARD 保护
    * 支持 GET 和 POST 请求
    * 会话管理，支持持久化浏览器实例
    * Cookie 提取，可在其他 HTTP 客户端中复用
    * 可配置的挑战解决超时时间
    * 代理支持（HTTP、SOCKS4、SOCKS5）
    * Prometheus 指标端点
    * 空闲状态下低资源占用
    * 截图捕获支持
    * 禁用媒体加载选项以节省带宽
  upgradeDescription: |
    升级到 v3.4.6

    更新内容:
    * 添加通过 CDP 禁用图片、CSS、字体加载的选项 (#1626)

    完整发布说明参见: https://github.com/FlareSolverr/FlareSolverr/releases/tag/v3.4.6
