{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: flaresolverr
  name: flaresolverr
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: flaresolverr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: "docker.io/beclab/flaresolverr-flaresolverr:v3.4.6"
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8191
          env:
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8191
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: flaresolverr
spec:
  ports:
    - name: http
      port: 8191
      targetPort: 8191
  selector:
    io.kompose.service: flaresolverr

---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-flaresolverr
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: flaresolverr
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8191
  selector:
    io.kompose.service: flaresolverr
status:
  loadBalancer: {}
{{- end }}
