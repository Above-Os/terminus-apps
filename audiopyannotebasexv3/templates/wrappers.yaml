        log.warning("gpu /metrics unavailable: %s", _e)
    _state = {"ready": False, "error": None, "model": None, "kind": None, "device": "cpu"}

    def _decode(path):
        # Decode to a mono float32 16k torch tensor with our own resample, avoiding the image's broken torchcodec AudioDecoder path (see diar/embed).
        import torch
        try:
            import soundfile as sf
            data, sr = sf.read(path, dtype="float32", always_2d=True)  # (time, channels)
            wav = torch.from_numpy(data.T.copy())  # (channels, time)
        except Exception:
            import torchaudio
            wav, sr = torchaudio.load(path)  # (channels, time)
            wav = wav.float()
        if wav.shape[0] > 1:
            wav = wav.mean(dim=0, keepdim=True)  # downmix to mono
        if int(sr) != SR:
            import torchaudio
            wav = torchaudio.functional.resample(wav, int(sr), SR)
        return wav  # (1, time) @ 16k

    def _load():
        try:
            # SpeechBrain is not bundled in the pyannote image; pip-install on first load.
            try:
                import speechbrain  # noqa: F401
            except ImportError:
                import subprocess, sys
                log.info("speechbrain missing; pip-installing (no new image)...")
                subprocess.run([sys.executable, "-m", "pip", "install", "-q", "speechbrain"], check=False)
            import torch
            from huggingface_hub import snapshot_download
            src = snapshot_download(MODEL_REPO, local_files_only=True,
                                    cache_dir=os.environ.get("HF_HUB_CACHE"), token=HF_TOKEN)
