metadata:
  title: Bifrost
  description: The fastest way to build AI applications that never go down
spec:
  fullDescription: |
    Bifrost is a high-performance AI gateway that unifies access to 15+ providers (OpenAI, Anthropic, AWS Bedrock, Google Vertex, and more) through a single OpenAI-compatible API.
    Deploy in seconds with zero configuration and get automatic failover, load balancing, semantic caching, and enterprise-grade features.