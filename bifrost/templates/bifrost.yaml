
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bifrost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: bifrost
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: bifrost
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: bifrost
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
          args:
            - |
              mkdir -p /app/data/logs
              chown -R 1000:1000 /app/data
              chmod -R 755 /app/data
          resources: { }
          volumeMounts:
            - name: bifrost-data
              mountPath: /app/data
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
      containers:
        - name: bifrost
          image: docker.io/beclab/maximhq-bifrost:v1.4.9
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.port | default 3000 }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.port | default 3000 }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: bifrost-data
              mountPath: /app/data

      restartPolicy: Always
      volumes:
        - name: bifrost-data
          hostPath:
            type: DirectoryOrCreate
                {{- if .Values.sysVersion }}
                  {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appCache }}'
                  {{- else }}
            path: '{{ .Values.userspace.appCache }}/bifrost'
                  {{- end }}
                {{- else }}
            path: '{{ .Values.userspace.appCache }}/bifrost'
                {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: bifrost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: bifrost
spec:
  ports:
    - name: "{{ .Values.port | default 3000 }}"
      port: {{ .Values.port | default 3000 }}
      targetPort: {{ .Values.port | default 3000 }}
      protocol: TCP
  selector:
    io.kompose.service: bifrost
status:
  loadBalancer: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-bifrost
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: bifrost
spec:
  ports:
    - name: "{{ .Values.port | default 3000 }}"
      port: 80
      targetPort: {{ .Values.port | default 3000 }}
  selector:
    io.kompose.service: bifrost
status:
  loadBalancer: {}
