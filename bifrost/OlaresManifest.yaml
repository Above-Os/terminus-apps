olaresManifest.version: '0.10.0'
metadata:
  name: bifrost
  description: The fastest way to build AI applications that never go down
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: bifrost
  version: '1.0.1'
  title: Bifrost
  categories:
  - Productivity_v112
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1.4.10'
  fullDescription: |
    Bifrost is a high-performance AI gateway that unifies access to 15+ providers (OpenAI, Anthropic, AWS Bedrock, Google Vertex, and more) through a single OpenAI-compatible API.
    Deploy in seconds with zero configuration and get automatic failover, load balancing, semantic caching, and enterprise-grade features.
  developer: maxim
  website: https://www.getmaxim.ai/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 512Mi
  limitedMemory: 1.5Gi
  requiredDisk: 256Mi
  limitedDisk: 1Gi
  requiredCpu: 0.5
  limitedCpu: 1.5
  doc: https://docs.getbifrost.ai/
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
sharedEntrances:
  - name: bifrost
    host: sharedentrances-bifrost
    port: 0
    title: Bifrost
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    invisible: true
    authLevel: internal
entrances:
  - authLevel: internal
    host: bifrostingress
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    name: bifrost
    openMethod: window
    port: 8080
    title: Bifrost
olaresManifest.type: app
middleware:
  redis:
    namespace: bifrost
  postgres:
    username: bifrost
    databases:
      - name: bifrostdb
        distributed: false
        extensions:
          - vector
