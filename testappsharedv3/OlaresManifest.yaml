olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: testappsharedv3
  description: test shared app v3
  icon: https://app.cdn.olares.com/appstore/rembg/icon.png
  appid: testappsharedv3
  version: '1.0.0'
  title: Test App Shared V3
  categories:
    - AI
    - Utilities_v112

sharedEntrances:
  - name: testappsharedv3
    title: Test App Shared V3
    host: sharedentrances-testappsharedv3
    icon: https://app.cdn.olares.com/appstore/rembg/icon.png
    port: 0
    invisible: true
    authLevel: internal

entrances:
  - name: testappsharedv3
    port: 8080
    host: testappsharedv3-web-svc
    title: Test App Shared V3
    icon: https://app.cdn.olares.com/appstore/rembg/icon.png
    authLevel: internal
    openMethod: window

workloadReplicas:
  testappsharedv3: 1
  testappsharedv3client: 1

permission:
  appData: true
  appCache: true
  userData:
    - Home

spec:
  versionName: '2.0.68'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app test for apiVersion v3. Only one service will be installed across the entire Olares system.

    **OVERVIEW**
    Test App Shared V3 — based on rembgv3 shared app pattern.

    ONNX models are downloaded at install time from the Olares CDN bundle via `downloader-init`.

  upgradeDescription: |
    Test App Shared V3 initial release.

  developer: Olares
  website: https://github.com/danielgatis/rembg
  sourceCode: https://github.com/danielgatis/rembg
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://github.com/danielgatis/rembg
  license:
    - text: MIT License
      url: https://github.com/danielgatis/rembg?tab=MIT-1-ov-file

  accelerator:
  - mode: nvidia
    requiredCpu: "1"
    limitedCpu: "5"
    requiredMemory: 6Gi
    limitedMemory: 20Gi
    requiredDisk: 8Gi
    limitedDisk: 20Gi
    requiredGPUMemory: 4Gi
    limitedGPUMemory: 16Gi

  supportArch:
    - amd64
  onlyAdmin: true

options:
  shared: true
  apiTimeout: 0
  allowedOutboundPorts:
    - 80
    - 443
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
