olaresManifest.version: '0.10.0'
metadata:
  name: agentzero
  description: A personal, organic agentic framework that grows and learns with you.
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: agentzero
  version: '1.0.0'
  title: Agent Zero
  categories:
  - Productivity_v112
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '0.9.8.2'
  fullDescription: |
    A personal, organic agentic framework that grows and learns with you.
      - Agent Zero is not a predefined agentic framework. It is designed to be dynamic, organically growing, and learning as you use it.
      - Agent Zero is fully transparent, readable, comprehensible, customizable, and interactive.
      - Agent Zero uses the computer as a tool to accomplish its (your) tasks.
  developer: agent0ai
  website: https://www.agent-zero.ai/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 2.5Gi
  limitedMemory: 4.5Gi
  requiredDisk: 2.5Gi
  limitedDisk: 5Gi
  requiredCpu: 2.1
  limitedCpu: 4.1
  doc: https://www.agent-zero.ai/p/docs/
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
sharedEntrances:
  - name: agentzero
    host: sharedentrances-agentzero
    port: 0
    title: Agent Zero
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    invisible: true
    authLevel: internal
entrances:
  - authLevel: internal
    host: agentzeroingress
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    name: agentzero
    openMethod: window
    port: 8080
    title: Agent Zero
olaresManifest.type: app
