apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: wordpresspure
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  WORDPRESS_DATABASE_PASSWORD: {{ .Values.mariadb.password | quote }}
  WORDPRESS_PASSWORD: {{ .Values.olaresEnv.WORDPRESS_PASSWORD | quote }}
