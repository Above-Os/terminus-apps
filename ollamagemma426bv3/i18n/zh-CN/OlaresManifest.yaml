metadata:
  description: "使用 Ollama 运行 Gemma 4 26B 模型。"
  title: Gemma 4 26B (Ollama)

spec:
  fullDescription: |
    **模型简介**
    使用 Ollama 运行 Gemma 4 26B，从 Ollama 模型库拉取 `gemma4:26b`。开箱即用，支持思考、工具调用与视觉能力。

    **预设配置**
    - 模型：`gemma4:26b`
    - 能力：思考、工具、视觉
    - 引擎参数：`OLLAMA_KEEP_ALIVE=-1 OLLAMA_CONTEXT_LENGTH=131072 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_NUM_PARALLEL=1`（128K 上下文、模型常驻显存、flash attention、q8_0 KV 缓存）
    - 所需显存：`23Gi`

    **工作流程说明**
    首先，`llm-init` 从 Ollama 模型库拉取并准备模型，然后 Ollama 守护进程在模型准备好后启动服务。这两个部分独立运行但共享文件与进度信息。

    **技术栈说明**
    - **Ollama 守护进程**（11434 端口）：拉取并服务模型
    - **llm-init**（8090 端口）：驱动模型拉取、展示进度，并通过 OpenAI API 代理到 Ollama

    **加速器模式**
    | 模式           | 设备             | 说明                                                         |
    |----------------|------------------|--------------------------------------------------------------|
    | `nvidia`       | GPU (CUDA)       | 使用 `23Gi` 显存；Ollama 默认使用 GPU                       |
    | `nvidia-gb10`  | GPU (Spark)      | 类似上方，但显存由 pod 管理                                  |
    | `cpu`          | CPU              | 图表自动注入 `OLLAMA_NUM_GPU=0`，禁用 GPU                    |

    **模型存储**
    所有拉取的模型存储在共享目录 `appCommon/ollama`。所有 Ollama 应用共用此目录，按 digest 去重，避免重复占用存储。

    **资源建议**
    - CPU、内存和 GPU 数量随图表自动配置，磁盘配额为固定
    - 该模型需要至少 23Gi 显存的 GPU
