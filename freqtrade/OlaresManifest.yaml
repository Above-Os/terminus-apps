---
olaresManifest.version: "0.10.0"
olaresManifest.type: app
apiVersion: 'v2'
metadata:
  name: freqtrade
  icon: https://www.freqtrade.io/en/stable/images/logo.png
  description: Run a Freqtrade trading bot on Olares.
  appid: freqtrade
  title: Freqtrade
  version: "1.0.0"
  categories:
    - Utilities

entrances:
  - name: freqtrade
    port: 8080
    host: freqtrade
    title: FreqUI
    icon: https://www.freqtrade.io/en/stable/images/logo.png
    authLevel: private
    openMethod: window

spec:
  versionName: "stable"
  fullDescription: |
    Freqtrade is a free and open-source crypto trading bot.

    This app runs two bots and FreqUI on one entrance:
    - Spot bot API: this page URL + /api-spot (e.g. https://your-app.olares.com/api-spot)
    - Futures bot API: this page URL + /api-future (e.g. https://your-app.olares.com/api-future)
    Create secret freqtrade-binance-secret (api-key, api-secret) to enable live
    trading for both. Both run in dry-run by default.

    Open this app to get FreqUI, log in with username "admin", password "admin".
    To connect to the Futures bot, add a bot in FreqUI and set API URL to this
    page URL + /api-future (no extra port). Backtesting is
    available from FreqUI (Backtesting tab) using the same config and strategy.

    Config and strategy files are stored in app data: each bot has own directory
    at the app root — freqtrade-spot/ and freqtrade-future/ (each with
    config/config.json and strategies/*.py). Set "strategy" in config.json to the class name of the
    strategy file (e.g. DoubleSmaTrend ). You can add
    multiple .py files and switch by editing config; then stop and start the
    bot from FreqUI to apply changes.
  upgradeDescription: |
    Initial release.
  developer: Freqtrade
  website: https://www.freqtrade.io/
  sourceCode: https://github.com/freqtrade/freqtrade
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://www.freqtrade.io/en/stable/
  license:
    - text: GPL-3.0
      url: https://github.com/freqtrade/freqtrade/blob/develop/LICENSE
  requiredMemory: 768Mi
  limitedMemory: 3Gi
  requiredDisk: 1Gi
  limitedDisk: 5Gi
  requiredCpu: 600m
  limitedCpu: "3"
  supportArch:
    - amd64
    - arm64

permission:
  appData: true
  appCache: true

options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.2-0"
