---
olaresManifest.version: "0.11.0"
olaresManifest.type: app
metadata:
  name: freqtrade
  icon: https://app.cdn.olares.com/appstore/freqtrade/icon.png
  description: Run a Freqtrade trading bot on Olares.
  appid: freqtrade
  title: Freqtrade
  version: "1.0.1"
  categories:
    - Utilities
    - Productivity_v112
entrances:
  - name: freqtrade
    port: 8080
    host: freqtrade
    title: FreqUI
    icon: https://app.cdn.olares.com/appstore/freqtrade/icon.png
    authLevel: private
    openMethod: window

spec:
  versionName: "2026.3"
  promoteImage:
    - https://app.cdn.olares.com/appstore/freqtrade/1.webp
    - https://app.cdn.olares.com/appstore/freqtrade/2.webp
    - https://app.cdn.olares.com/appstore/freqtrade/3.webp
  fullDescription: |
    Freqtrade is a free and open-source crypto trading bot.

    This app runs two trading bots, an optional backtest webserver, and FreqUI on one entrance:
    - Spot bot API: this page URL + /api-spot (e.g. https://your-app.olares.com/api-spot)
    - Futures bot API: this page URL + /api-future (e.g. https://your-app.olares.com/api-future)
    - Backtest / download-data API (separate data): this page URL + /api-backtest/
      (e.g. https://your-app.olares.com/api-backtest). In FreqUI add a bot and set
      the API URL to that base; use Download data and Backtesting against this instance
      so K-line files stay under freqtrade-backtest/, not spot or futures.
    Disable the backtest deployment by setting values.backtest.enabled to false in the chart.

    Create secrets for exchange access: centralized exchanges (e.g., Binance) require key and secret, 
    while decentralized exchanges (e.g., Hyperliquid) use walletAddress and privateKey.
    For example, create freqtrade-hyperliquid-secret (walletAddress, privateKey) to enable live trading for spot and futures. 
    Both run in dry-run mode by default.

    Open this app to get FreqUI, log in with username "admin", password "admin".
    To connect a bot, add it in FreqUI and set API URL to /api-spot, /api-future,
    or /api-backtest as above (no extra port).

    Config and strategy files are stored in app data: each instance has its own directory
    at the app root — freqtrade-spot/, freqtrade-future/, and optionally freqtrade-backtest/
    (each with config/config.json and strategies/*.py). Set "strategy" in config.json to the class name of the
    strategy file (e.g. Strategy001 ). You can add
    multiple .py files and switch by editing config; then stop and start the
    bot from FreqUI to apply changes.

  developer: Freqtrade
  website: https://www.freqtrade.io/
  sourceCode: https://github.com/freqtrade/freqtrade
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://www.freqtrade.io/en/stable/
  license:
    - text: GPL-3.0
      url: https://github.com/freqtrade/freqtrade/blob/develop/LICENSE
  requiredMemory: 2048Mi
  limitedMemory: 6144Mi
  requiredDisk: 1Gi
  limitedDisk: 5Gi
  requiredCpu: 1000m
  limitedCpu: 5000m
  supportArch:
    - amd64
    - arm64

permission:
  appData: true
  appCache: true

options:
  allowMultipleInstall: true
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.5-0"
