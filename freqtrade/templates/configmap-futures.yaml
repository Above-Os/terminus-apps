# Default config for Binance USDT Futures bot (seeded into appData on first run).
apiVersion: v1
kind: ConfigMap
metadata:
  name: freqtrade-futures-config
  namespace: {{ .Release.Namespace }}
data:
  config.json: |
    {
      "max_open_trades": 4,
      "stake_currency": "USDT",
      "stake_amount": 20,
      "dry_run": true,
      "dry_run_wallet": 100,
      "timeframe": "15m",
      "tradable_balance_ratio": 0.95,
      "cancel_open_orders_on_exit": true,
      "process_throttle_secs": 5,
      "process_only_new_candles": false,
      "db_url": "sqlite:////data/tradesv3.sqlite",
      "entry_pricing": {
        "price_side": "other",
        "use_order_book": true,
        "order_book_top": 1,
        "check_depth_of_market": { "enabled": false, "bids_to_ask_delta": 1 }
      },
      "exit_pricing": {
        "price_side": "other",
        "use_order_book": true,
        "order_book_top": 1
      },
      "order_types": {
        "entry": "market",
        "exit": "market",
        "stoploss": "market",
        "stoploss_on_exchange": true
      },
      "stoploss_on_exchange_interval": 5,
      "unfilledtimeout": {
        "entry": 10,
        "exit": 10,
        "unit": "minutes"
      },
      "minimal_roi": { "0": 1000 },
      "exchange": {
        "name": "binance",
        "key": "",
        "secret": "",
        "ccxt_config": { "enableRateLimit": true, "options": { "defaultType": "future" } },
        "ccxt_async_config": { "enableRateLimit": true, "options": { "defaultType": "future" } },
        "pair_whitelist": ["BTC/USDT:USDT", "ETH/USDT:USDT", "AVAX/USDT:USDT", "XRP/USDT:USDT"],
        "pair_blacklist": []
      },
      "pairlists": [
        { "method": "StaticPairList" }
      ],
      "api_server": {
        "enabled": true,
        "listen_ip_address": "0.0.0.0",
        "listen_port": 8081,
        "username": "admin",
        "password": "admin",
        "jwt_secret_key": "somethingRandomSomethingRandom123",
        "CORS_origins": ["*"],
        "cors_origins": ["*"],
        "verbosity": "error",
        "enable_openapi": true
      },
      "bot_name": "freqtrade-futures",
      "initial_state": "running",
      "strategy": "SampleStrategy",
      "trading_mode": "futures",
      "margin_mode": "cross",
      "leverage": 10
    }
