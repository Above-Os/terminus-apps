---
# Gateway: one port 8080. FreqUI at /, Spot API at /api/, Futures API at /api-futures/ (path-based so no :8081 needed).
apiVersion: v1
data:
  nginx.conf: |
    server {
      listen 8080;
      server_name _;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      proxy_connect_timeout 30s;
      proxy_send_timeout 60s;
      proxy_read_timeout 300s;
      proxy_set_header host $host;
      proxy_set_header x-forwarded-host $http_host;
      proxy_set_header x-forwarded-proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header upgrade $http_upgrade;
      proxy_set_header connection "upgrade";
      proxy_hide_header X-Frame-Options;

      location /api-futures/ {
        rewrite ^/api-futures/api/(.*)$ /api/$1 break;
        rewrite ^/api-futures/(.*)$ /api/$1 break;
        proxy_pass http://freqtrade-futures:8081;
      }
      location /api/ {
        rewrite ^/api/api/(.*)$ /api/$1 break;
        proxy_pass http://freqtrade-binance:8080;
      }
      location / {
        proxy_pass http://frequi:3000/;
      }
    }
kind: ConfigMap
metadata:
  name: freqtrade-gateway-config
  namespace: {{ .Release.Namespace }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-gateway
  name: freqtrade-gateway
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: freqtrade-gateway
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.service: freqtrade-gateway
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: freqtrade-gateway-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf
      restartPolicy: Always
status: {}

---
# Primary entrance service (name must match app for platform routing).
apiVersion: v1
kind: Service
metadata:
  name: freqtrade
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: freqtrade-gateway
  ports:
