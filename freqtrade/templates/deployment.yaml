---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-spot
  name: freqtrade
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: freqtrade-spot
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.service: freqtrade-spot
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          env:
            - name: CHART_USERSPACE_APPDATA
              value: {{ .Values.userspace.appData | quote }}
            - name: CHART_RELEASE_NAME
              value: {{ .Release.Name | quote }}
          command:
            - sh
            - "-c"
            - |
              echo "freqtrade-spot init: userspace.appData=[${CHART_USERSPACE_APPDATA}] hostPath base=.../freqtrade-spot (single level under Olares app data root; release=[${CHART_RELEASE_NAME}] for debug only)"
              mkdir -p /data /config /strategies
              chown -R 1000:1000 /data /config /strategies
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-dir
              mountPath: /config
            - name: strategies-dir
              mountPath: /strategies
          securityContext:
            runAsUser: 0
        - name: init-seed-config-and-strategies
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              if [ ! -f /config/config.json ]; then cp /tmp/default-config/config.json /config/config.json; chown 1000:1000 /config/config.json; fi
              if [ ! -f /strategies/DoubleSmaTrend.py ]; then cp /tmp/default-strategies/double_sma_trend_strategy.py /strategies/DoubleSmaTrend.py; chown 1000:1000 /strategies/DoubleSmaTrend.py; fi
          volumeMounts:
            - name: config-dir
              mountPath: /config
            - name: strategies-dir
              mountPath: /strategies
            - name: default-config
              mountPath: /tmp/default-config
              readOnly: true
            - name: default-strategies
              mountPath: /tmp/default-strategies
              readOnly: true
          securityContext:
            runAsUser: 0
      containers:
        - name: freqtrade
          image: "docker.io/freqtradeorg/freqtrade:{{ .Values.image.version }}"
          args:
            - "trade"
            - "--config"
            - "/freqtrade/config/config.json"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: FT_CONFIG
              value: "/freqtrade/config/config.json"
            - name: FT_USERDATA_DIR
              value: "/freqtrade/user_data"
            - name: FT_CMD
              value: "trade"
            - name: DISABLE_TRADING
              value: "1"
            - name: DATA_DIR
              value: "/data"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-dir
              mountPath: /freqtrade/config
            - name: strategies-dir
              mountPath: /freqtrade/user_data/strategies
      restartPolicy: Always
      volumes:
        - name: data
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-spot'
            type: DirectoryOrCreate
        - name: config-dir
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-spot/config'
            type: DirectoryOrCreate
        - name: strategies-dir
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-spot/strategies'
            type: DirectoryOrCreate
        - name: default-config
          configMap:
            name: freqtrade-spot-config
        - name: default-strategies
          configMap:
            name: freqtrade-strategy
status: {}

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-spot
  name: freqtrade-spot
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "http"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: freqtrade-spot
status:
  loadBalancer: {}

