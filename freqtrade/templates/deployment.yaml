---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-binance
  name: freqtrade
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: freqtrade-binance
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.service: freqtrade-binance
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              mkdir -p /data /config /strategies
              chown -R 1000:1000 /data /config /strategies
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-dir
              mountPath: /config
            - name: strategies-dir
              mountPath: /strategies
          securityContext:
            runAsUser: 0
        - name: init-seed-config-and-strategies
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              if [ ! -f /config/config.json ]; then cp /tmp/default-config/config.json /config/config.json; chown 1000:1000 /config/config.json; fi
              if [ ! -f /strategies/SampleStrategy.py ]; then cp /tmp/default-strategies/sample_strategy.py /strategies/SampleStrategy.py; chown 1000:1000 /strategies/SampleStrategy.py; fi
          volumeMounts:
            - name: config-dir
              mountPath: /config
            - name: strategies-dir
              mountPath: /strategies
            - name: default-config
              mountPath: /tmp/default-config
              readOnly: true
            - name: default-strategies
              mountPath: /tmp/default-strategies
              readOnly: true
          securityContext:
            runAsUser: 0
      containers:
        - name: freqtrade
          image: "docker.io/freqtradeorg/freqtrade:stable"
          args:
            - "trade"
            - "--config"
            - "/freqtrade/config/config.json"
            - "--strategy"
            - "SampleStrategy"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: FT_CONFIG
              value: "/freqtrade/config/config.json"
            - name: FT_STRATEGY
              value: "SampleStrategy"
            - name: FT_USERDATA_DIR
              value: "/freqtrade/user_data"
            - name: FT_CMD
              value: "trade"
            - name: DISABLE_TRADING
              value: "1"
            - name: DATA_DIR
              value: "/data"
            - name: FREQTRADE__EXCHANGE__KEY
              valueFrom:
                secretKeyRef:
                  name: freqtrade-binance-secret
                  key: api-key
                  optional: true
            - name: FREQTRADE__EXCHANGE__SECRET
              valueFrom:
                secretKeyRef:
                  name: freqtrade-binance-secret
                  key: api-secret
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-dir
              mountPath: /freqtrade/config
            - name: strategies-dir
              mountPath: /freqtrade/user_data/strategies
      restartPolicy: Always
      volumes:
        - name: data
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/{{ .Release.Name }}/freqtrade-binance'
            type: DirectoryOrCreate
        - name: config-dir
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/{{ .Release.Name }}/freqtrade-binance/config'
            type: DirectoryOrCreate
        - name: strategies-dir
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/{{ .Release.Name }}/freqtrade-binance/strategies'
            type: DirectoryOrCreate
        - name: default-config
          configMap:
            name: freqtrade-binance-config
        - name: default-strategies
          configMap:
            name: freqtrade-strategy
status: {}

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-binance
  name: freqtrade-binance
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "http"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: freqtrade-binance
status:
  loadBalancer: {}

