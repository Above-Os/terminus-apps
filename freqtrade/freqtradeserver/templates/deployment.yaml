---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-spot
  name: freqtrade
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: freqtrade-spot
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.service: freqtrade-spot
    spec:
      containers:
        - name: freqtrade
          image: "docker.io/freqtradeorg/freqtrade:{{ .Values.version }}"
          args:
            - "trade"
            - "--config"
            - "/freqtrade/config/config.json"
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          env:
            - name: FT_CONFIG
              value: "/freqtrade/config/config.json"
            - name: FT_CMD
              value: "trade"
            - name: DISABLE_TRADING
              value: "1"
            - name: DATA_DIR
              value: "/data"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: freqtrade-config
              mountPath: /freqtrade/config/config.json
              subPath: config.json
            - name: strategy
              mountPath: /freqtrade/user_data/strategies
      restartPolicy: Always
      volumes:
        - name: data
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/freqtrade-spot'
            type: DirectoryOrCreate
        - name: freqtrade-config
          configMap:
            name: freqtrade-spot-config
        - name: strategy
          configMap:
            name: freqtrade-strategy
status: {}

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: freqtrade-spot
  name: freqtrade-spot
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "http"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: freqtrade-spot
status:
  loadBalancer: {}
