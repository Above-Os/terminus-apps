apiVersion: v1
kind: ConfigMap
metadata:
  name: freqtrade-strategy
  namespace: {{ .Release.Namespace }}
data:
  double_sma_trend_strategy.py: |
    import logging
    
    from freqtrade.strategy import IStrategy
    from pandas import DataFrame
    import talib.abstract as ta
    
    logger = logging.getLogger(__name__)
    
    
    class DoubleSmaTrend(IStrategy):
        timeframe = "15m"
        startup_candle_count = 120
        minimal_roi = {"0": 0.05}
        stoploss = -0.12
        can_short = False
    
        def __init__(self, config: dict) -> None:
            super().__init__(config)
            mode = str((config or {}).get("trading_mode") or "spot").lower()
            if(mode == "futures" or mode == "swap"):
                self.can_short = True
            lev = (config or {}).get("leverage")
            self._trade_leverage: float | None = float(lev) if lev is not None else None
            logger.info(
                "DoubleSmaTrend init trading_mode=%s can_short=%s leverage_cfg=%s",
                mode,
                self.can_short,
                self._trade_leverage,
            )

        def leverage(
            self,
            pair: str,
            current_time,
            current_rate: float,
            proposed_leverage: float,
            max_leverage: float,
            entry_tag: str | None,
            side: str,
            **kwargs,
        ) -> float:
            if self._trade_leverage is not None:
                return min(float(self._trade_leverage), float(max_leverage))
            return min(float(proposed_leverage), float(max_leverage))
    
        def populate_indicators(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
            dataframe["fast"] = ta.SMA(dataframe, timeperiod=20)
            dataframe["slow"] = ta.SMA(dataframe, timeperiod=80)
            return dataframe
    
        def populate_entry_trend(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
            dataframe.loc[(dataframe["fast"] > dataframe["slow"]), "enter_long"] = 1
            dataframe.loc[(dataframe["fast"] < dataframe["slow"]), "enter_short"] = 1
            return dataframe
    
    
        def populate_exit_trend(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
            dataframe.loc[(dataframe["fast"] < dataframe["slow"]), "exit_long"] = 1
            dataframe.loc[(dataframe["fast"] > dataframe["slow"]), "exit_short"] = 1
            return dataframe