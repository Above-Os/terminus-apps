metadata:
  title: Intel APP
  description: "支持 Intel 加速器的测试 app"

spec:
  fullDescription: |
    **Intel APP** 测试应用，支持 Intel 加速器。

    **加速模式**
    - `cpu` — ov-intel 镜像，OpenVINO IR，`EMBED_DEVICE=auto`（非 onnx-cpu）
    - `nvidia` — onnx-cuda12/13，`EMBED_DEVICE=cuda`
    - `nvidia-gb10` — onnx-cuda13 统一内存
    - `strix-halo` — onnx-rocm，`EMBED_DEVICE=rocm`

    llm-init 会从 Hugging Face 下载 OV 与 ONNX 两个模型仓库到共享 App Common 缓存。
    可通过 `GET /v1/capabilities` 的 `configured_device_kind` 确认实际运行设备。

    **Web Console**（`console` 入口）：Embedding Playground、文本相似度对比、
    设备/能力诊断与可选 API Key。浏览器仅请求 Console 同源 `/api`，由 nginx
    反代至 embed-server。模型仍在下载时请使用 **embedclient** 查看进度。