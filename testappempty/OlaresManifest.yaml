olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: testappempty
  description: app without apiVersion 
  icon: https://app.cdn.olares.com/appstore/firefox/icon.png
  appid: testappempty
  version: '1.0.2'
  title: Test App apiVersion Empty
  categories:
  - Utilities_v112

permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '1151.0.1'
  fullDescription: |
    Firefox Browser, also known as Mozilla Firefox or simply Firefox, is a free and open-source web browser developed by the Mozilla Foundation and its subsidiary, the Mozilla Corporation. Firefox uses the Gecko layout engine to render web pages, which implements current and anticipated web standards.
  upgradeDescription: |
    - Upgrade LinuxServer Firefox to the late-May 2026 release
  developer: Mozilla
  website: https://www.mozilla.org/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1Gi
  limitedMemory: 6Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: "500m"
  limitedCpu: "3"
  doc: https://support.mozilla.org/
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.5-0'
envs:
  - envName: FIREFOX_HOMEPAGE
    type: url
    required: false
    editable: true
    applyOnChange: true
    default: "https://www.google.com"
    description: "URL opened when Firefox starts."
entrances:
- name: testappempty
  port: 3000
  host: testappempty
  title: Test App Empty
  icon: https://app.cdn.olares.com/appstore/firefox/icon.png
  openMethod: window

workloadReplicas:
  testappempty: 1
