{{- /*
  Reverse-proxy config for the `nginx` sidecar in the knowledge Pod.

  The sidecar is the new front door for the knowledge HTTP API (rss-svc:3010
  now targets it instead of the knowledge container directly). It splits
  traffic by path:

    /download/*  -> download-server (manager) behind the os-framework
                    download provider-proxy.
    everything   -> knowledge-base-api on 127.0.0.1:3010 (same Pod).

  Why the SA token is injected for /download:
  `download-provider-svc.os-framework:28080` is a provider-proxy that gates
  every request with a Kubernetes TokenReview + SubjectAccessReview. The
  knowledge backend used to call it with a `knowledge-cluster-view`
  ServiceAccount token (see the removed relay endpoints). Now that the
  frontend calls /download directly, the sidecar attaches the same
  identity: the Pod's auto-mounted SA token, which is the
  `knowledge-cluster-view` SA bound to the `backend:download-provider`
  ClusterRole in rbac.yaml. The tenant header `X-Bfl-User` is already
  injected upstream by the BFL gateway and passes straight through.

  The mounted server block is included by the bitnami-openresty image's
  default nginx.conf (http{} { include server_blocks/*.conf; }).
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: knowledge-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: knowledge
data:
  nginx.conf: |
    server {
        listen 3009;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log  /opt/bitnami/openresty/nginx/logs/error.log;

        # wise uploads (opml / cookie batch / multipart attachments) can be a
        # few MB; mirror the backend's 100 MB cap so the proxy never truncates
        # a request the backend would otherwise accept.
        client_max_body_size 100m;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Local health endpoint for the sidecar's k8s probes.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok\n';
        }

        # Anything under /download/ is served by the download-server (manager)
        # behind the os-framework download provider-proxy — NOT by knowledge.
        # The provider-proxy authenticates every call with a Kubernetes
        # TokenReview, so attach the Pod's knowledge-cluster-view SA token
        # (the same identity knowledge used when it still proxied these
        # routes). The trailing slash on proxy_pass strips the /download
        # prefix: /download/api/user/preferences -> /api/user/preferences.
        location /download/ {
            access_by_lua_block {
                local f = io.open("/var/run/secrets/kubernetes.io/serviceaccount/token", "r")
                if f then
                    local tok = f:read("*a")
                    f:close()
                    if tok then
                        tok = tok:gsub("%s+$", "")
                        ngx.req.set_header("Authorization", "Bearer " .. tok)
                    end
                end
            }
            proxy_pass http://download-provider-svc.os-framework:28080/;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Everything else is the knowledge-base-api in the same Pod.
        location / {
            proxy_pass http://127.0.0.1:3010;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
