metadata:
  title: Knowledge Backend V3 for test
  description: Shared knowledge backend for Wise
spec:
  fullDescription: |
    Shared knowledge backend used by Wise. Provides the knowledge-base-api,
    a vector-crawl indexer and a flaresolverr companion. Installed once by the
    Olares Admin; every Wise user instance on this cluster talks to the same
    backend through the shared entrance `sharedentrances-knowledge`.
  upgradeDescription: |
    Migrated the legacy `wise/knowledge` sub-chart into a standalone v3
    shared app (knowledge 1.0.1).
