metadata:
  title: 知识库后端
  description: Wise 的共享知识库后端
spec:
  fullDescription: |
    Wise 共享知识库后端，包含 knowledge-base-api、vector-crawl 索引器以及
    flaresolverr 反爬伴随容器。由 Olares 管理员安装一份，集群内每个用户的
    Wise 实例都通过共享入口 `sharedentrances-knowledge` 访问同一后端。
  upgradeDescription: |
    将原 `wise/knowledge` 子 Chart 抽出，独立为 v3 共享应用 (knowledgev3 1.0.1)。
