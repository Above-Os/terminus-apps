olaresManifest.version: "0.12.0"
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: acestep15v3
  description: The most powerful local music generation model that outperforms most commercial alternatives
  icon: https://app.cdn.olares.com/appstore/acestep/icon2.png
  appid: acestep15v3
  version: '1.1.0'
  title: ACE-Step 1.5 V3 for test
  categories:
    - Creativity
    - AI
    - Utilities

entrances:
  - name: acestep15
    port: 8080
    host: acestep-web-svc
    title: ACE-Step 1.5 V3 for test
    icon: https://app.cdn.olares.com/appstore/acestep/icon2.png
    authLevel: internal
    openMethod: window

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   acestep15v3    — nginx entrance Deployment (must match metadata.name / appid)
#   acestep-server — ACE-Step 1.5 gradio engine Deployment
# The download Job carries no replica count.
workloadReplicas:
  acestep15v3: 1
  acestep-server: 1

permission:
  appData: true
  appCache: true
  externalData: true
  userData:
    - Home

spec:
  versionName: '0.1.8'
  featuredImage: https://app.cdn.olares.com/appstore/acestep/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/acestep/1.webp
    - https://app.cdn.olares.com/appstore/acestep/2.webp
    - https://app.cdn.olares.com/appstore/acestep/3.webp

  fullDescription: |
    We present ACE-Step v1.5, a highly efficient open-source music foundation model that brings commercial-grade generation to consumer hardware. On commonly used evaluation metrics, ACE-Step v1.5 achieves quality beyond most commercial music models while remaining extremely fast—under 2 seconds per full song on an A100 and under 10 seconds on an RTX 3090. The model runs locally with less than 4GB of VRAM, and supports lightweight personalization: users can train a LoRA from just a few songs to capture their own style.

    **Features**
    Performance
    - Ultra-Fast Generation: Under 2s per full song on A100, under 10s on RTX 3090 (0.5s to 10s on A100 depending on think mode & diffusion steps)
    - Flexible Duration: Supports 10 seconds to 10 minutes (600s) audio generation
    - Batch Generation: Generate up to 8 songs simultaneously

    Generation Quality
    - Commercial-Grade Output: Quality beyond most commercial music models (between Suno v4.5 and Suno v5)
    - Rich Style Support: 1000+ instruments and styles with fine-grained timbre description
    - Multi-Language Lyrics: Supports 50+ languages with lyrics prompt for structure & style control

    Versatility & Control
    - Reference Audio Input: Use reference audio to guide generation style
    - Cover Generation: Create covers from existing audio
    - Repaint & Edit: Selective local audio editing and regeneration
    - Track Separation: Separate audio into individual stems
    - Multi-Track Generation: Add layers like Suno Studio's "Add Layer" feature
    - Vocal2BGM: Auto-generate accompaniment for vocal tracks
    - Metadata Control: Control duration, BPM, key/scale, time signature
    - Simple Mode: Generate full songs from simple descriptions
    - Query Rewriting: Auto LM expansion of tags and lyrics
    - Audio Understanding: Extract BPM, key/scale, time signature & caption from audio
    - LRC Generation: Auto-generate lyric timestamps for generated music
    - LoRA Training: One-click annotation & training in Gradio. 8 songs, 1 hour on 3090 (12GB VRAM)
    - Quality Scoring: Automatic quality assessment for generated audio

    **ACE-Step 1.5 XL (4B DiT)**
    - acestep-v15-xl-base, acestep-v15-xl-sft, acestep-v15-xl-turbo — higher audio quality with 4B-parameter DiT decoder
    - Requires ≥12GB VRAM (with offload) or ≥20GB recommended; all LM models remain compatible

  upgradeDescription: |
    Migrated ACE-Step 1.5 to apiVersion v3 shared app pattern (acestep15v2 → acestep15v3).

    **What's Changed**

    - **Architecture**: flattened the acestep15v2/acestep15v2server sub-charts
      into a single chart; renamed the nginx entrance Deployment to `acestep15v3`
      so it matches appid for v3 workload verification. Cross-namespace backend
      references now resolve within the release namespace.
    - **Scaling**: `workloadReplicas` declares replica counts for the
      `acestep15v3` entrance and `acestep-server` gradio engine workloads.
      The model-download Job carries no replicas.
    - **Runtime**: container image `beclab/ace-step-ace-step-1.5:0.1.8`,
      default preset acestep-v15-xl-sft + acestep-5Hz-lm-4B with CPU offload.

  developer: ace-step
  website: https://acemusic.ai/
  sourceCode: https://github.com/ace-step/ACE-Step-1.5
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://github.com/ace-step/ACE-Step-1.5
  license:
    - text: MIT License
      url: https://github.com/ace-step/ACE-Step-1.5?tab=MIT-1-ov-file

  requiredMemory: 11Gi
  limitedMemory: 30Gi
  requiredDisk: 36Gi
  limitedDisk: 100Gi
  requiredCpu: 1
  limitedCpu: 6
  requiredGpu: 12Gi
  limitedGpu: 24Gi

  supportArch:
    - amd64
  onlyAdmin: true

envs:
  - envName: HF_ENDPOINT
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE

options:
  allowMultipleInstall: true
  apiTimeout: 0
  conflicts:
    - name: acestep15v2
      type: application
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
