metadata:
  title: n8n
  description: n8n 是一款可扩展的工作流自动化工具。

spec:
  fullDescription: |
    n8n 是一款可扩展的工作流自动化工具。n8n 采用开放源码，支持自托管，您还可以添加自定义功能和应用。n8n 的节点式架构让它具备高度的灵活性，能连接任何东西到一切。

    **海量工作流**
    n8n 提供超过 200 种不同节点用于自动化工作流。更多信息请见：https://n8n.io/integrations

    **快速构建强大的工作流程**
    - 处理复杂流程  
    - 简化调试  
    - 使用模板快速启动  
    - 需要编程时编码，不需要时用 UI  
    - 复用成果

    **安心无忧**
    - 接入任何系统  
    - 自定义错误处理  
    - 横向扩展  
    - 在自有基础设施上部署

    **功能**
    - 可视化工作流编辑器
    - 执行 JavaScript
    - 引入 npm 包
    - 工作流可暂停
    - 条件逻辑与分支
    - Webhook 触发
    - 重试失败任务
    - 多触发器工作流
    - 开放源代码
    - 用户管理
    - 制作自定义节点
    - 加密的凭证存储
    - 复制粘贴工作流
    - 工作流导出为 JSON
    - 定制错误处理流程

  upgradeDescription: |
    升级应用版本至 2.26.9

    **版本升级**
    本次升级将 n8n 从 2.20.9 更新至 2.26.9。

    **部署变更**
    - 镜像由自定义 `beclab/n8nio-n8n` 切换为官方 `n8nio/n8n:2.26.9`
    - 移除强制 root 的 `securityContext`，容器现以镜像默认用户（`node`，UID 1000）运行
    - 数据卷挂载路径由 `/root/.n8n` 改为官方路径 `/home/node/.n8n`
    - 新增 init 容器，启动前将 appData 目录 `chown` 为 UID 1000
    - n8n 内部监听 5678 端口；Service 仍对外暴露 80 并转发至 5678（非 root 无法绑定特权端口 80）
    - 新增反向代理相关环境变量（`N8N_PROTOCOL`、`WEBHOOK_URL`、`N8N_EDITOR_BASE_URL`、`N8N_PROXY_HOPS`、`N8N_SECURE_COOKIE`），确保经 Olares 网关以 HTTPS 访问时 URL 正确
    - 启用 `N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS`，加强配置文件权限校验
    - 移除对 `ollamaclient` provider 的权限申请、`legacy_ollama` sysData 访问以及 ollama 应用依赖
    - 为适配 n8n 2.26 内置 task runner，提升资源上限（内存 request 1Gi -> 2Gi，limit 4Gi -> 6Gi；CPU limit 2 -> 3 核）

    **重要提示**
    - 启动时将自动执行数据库迁移
    - 使用迁移工具检查工作流兼容性（设置 > 迁移报告）

    完整发布说明请见：https://github.com/n8n-io/n8n/releases/tag/n8n%402.26.9
