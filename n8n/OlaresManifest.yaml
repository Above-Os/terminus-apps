olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: n8n
  description: n8n is an extendable workflow automation tool.
  icon: https://app.cdn.olares.com/appstore/n8n/icon.png
  appid: n8n
  version: '1.0.18'
  title: n8n
  categories:
    - Productivity_v112

permission:
  appData: true
  appCache: true
middleware:
  postgres:
    username: n8n
    password: n8n
    databases:
      - name: n8n
        distributed: true

spec:
  versionName: '2.26.9'
  featuredImage: https://app.cdn.olares.com/appstore/n8n/promote_image_1v2.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/n8n/promote_image_1v2.webp
    - https://app.cdn.olares.com/appstore/n8n/promote_image_2v2.webp
    - https://app.cdn.olares.com/appstore/n8n/promote_image_3v2.webp
    - https://app.cdn.olares.com/appstore/n8n/promote_image_4v2.webp
  fullDescription: |
    n8n is an extendable workflow automation tool. With a fair-code distribution model, n8n will always have visible source code, be available to self-host, and allow you to add your own custom functions, logic and apps. n8n's node-based approach makes it highly versatile, enabling you to connect anything to everything.

    **Available integrations**
    n8n has 200+ different nodes to automate workflows. The list can be found on: https://n8n.io/integrations

    **Build powerful workflows, really fast**
    - Handle really complex processes  
    - Simple debugging  
    - Use templates to get started fast  
    - Code when you need it, UI when you don't  
    - Reuse your work

    **Get peace of mind**
    - Connect to any system  
    - Customize error handling  
    - Horizontal scaling  
    - Host on your own infrastructure

    **Features**
    - Visual workflow editor
    - Run JavaScript
    - npm package import
    - Workflows can wait
    - Conditional logic and branching
    - Webhook triggers
    - Retry failed executions
    - Multi-trigger workflows
    - Source code available
    - User management
    - Create custom nodes
    - Encrypted credential store
    - Copy + paste workflows
    - Export workflows to JSON
    - Custom error workflows

  upgradeDescription: |
    Upgrade app version to 2.26.9

    **Version Upgrade**
    This upgrade brings n8n from 2.20.9 to 2.26.9.

    **Deployment Changes**
    - Switched from the custom `beclab/n8nio-n8n` image to the official `n8nio/n8n:2.26.9` image
    - Removed the forced root `securityContext`; the container now runs as the image default user (`node`, UID 1000)
    - Data volume mount path changed from `/root/.n8n` to the official `/home/node/.n8n`
    - Added an init container to `chown` appData to UID 1000 before startup
    - n8n now listens on port 5678 internally; the Service still exposes port 80 and forwards to 5678 (non-root cannot bind privileged port 80)
    - Added reverse-proxy environment variables (`N8N_PROTOCOL`, `WEBHOOK_URL`, `N8N_EDITOR_BASE_URL`, `N8N_PROXY_HOPS`, `N8N_SECURE_COOKIE`) for correct HTTPS URLs behind the Olares gateway
    - Enabled `N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS` for stricter config file permission checks
    - Removed the `ollamaclient` provider permission request, `legacy_ollama` sysData access, and the ollama application dependency
    - Raised resource limits for n8n 2.26 built-in task runners (memory request 1Gi -> 2Gi, limit 4Gi -> 6Gi; CPU limit 2 -> 3 cores)

    **Important Notes**
    - Database migrations will run automatically on startup
    - Review workflow compatibility using the migration tool (Settings > Migration Report)

    Check full release notes at: https://github.com/n8n-io/n8n/releases/tag/n8n%402.26.9

  developer: n8n
  website: https://n8n.io/
  sourceCode: https://github.com/n8n-io/n8n
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://docs.n8n.io/?_gl=1*1s8nde9*_ga*MTAyODQxOTEuMTY5NzQyODM3MA..*_ga_0SC4FF2FH9*MTY5NzQyODM3MC4xLjAuMTY5NzQyODM3MC42MC4wLjA.
  requiredMemory: 2Gi
  limitedMemory: 6Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 0.5
  limitedCpu: 3
  legal:
    - text: n8n Legal
      url: https://n8n.io/legal/
  license:
    - text: Sustainable Use License
      url: https://github.com/n8n-io/n8n/blob/master/LICENSE.md
  supportArch:
    - amd64
    - arm64
  runAsUser: true

options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: '>=1.10.1-0'
  policies:
    - uriRegex: ^/(webhook)
      level: public
      oneTime: false
      validDuration: 3600s
      entranceName: n8n

entrances:
  - name: n8n
    port: 80
    host: n8n
    title: n8n
    icon: https://app.cdn.olares.com/appstore/n8n/icon.png
    authLevel: internal
    openMethod: window
