metadata:
  title: TensorZero
  description: TensorZero是一个面向工业级大语言模型（LLM）应用的开源技术栈
spec:
  fullDescription: |
    TensorZero是一个面向工业级大语言模型（LLM）应用的开源技术栈，其核心功能包括：
      - 统一网关：通过标准化API无缝接入各类大语言模型服务商，性能优化至极（p99延迟低于1毫秒）
      - 全链路可观测：将推理过程与用户反馈持久化存储至自有数据库，支持编程接口或可视化界面查询
      - 智能优化：基于实时指标与人工反馈持续优化提示词、模型选择及推理策略
      - 自动化评估：通过启发式规则、大模型评审等方式，对单次推理或全流程进行基准测试
      - 安全实验：内置A/B测试、智能路由、故障回退、重试机制等，保障系统稳定性与迭代安全性
    该方案支持模块化部署，企业可按需选用组件，并与现有技术栈无缝集成。