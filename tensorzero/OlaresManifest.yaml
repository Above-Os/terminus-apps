olaresManifest.version: '0.10.0'
metadata:
  name: tensorzero
  description: TensorZero is an open-source stack for industrial-grade LLM applications
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: tensorzero
  version: '1.0.1'
  title: TensorZero
  categories:
  - Productivity_v112
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '2026.2.2'
  fullDescription: |
    TensorZero is an open-source stack for industrial-grade LLM applications:
      - Gateway: access every LLM provider through a unified API, built for performance (<1ms p99 latency)
      - Observability: store inferences and feedback in your database, available programmatically or in the UI
      - Optimization: collect metrics and human feedback to optimize prompts, models, and inference strategies
      - Evaluation: benchmark individual inferences or end-to-end workflows using heuristics, LLM judges, etc.
      -Experimentation: ship with confidence with built-in A/B testing, routing, fallbacks, retries, etc.
    Take what you need, adopt incrementally, and complement with other tools.
  developer: TensorZero
  website: https://www.tensorzero.com/
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 1.5Gi
  limitedMemory: 7Gi
  requiredDisk: 512Mi
  limitedDisk: 2Gi
  requiredCpu: 0.5
  limitedCpu: 4.5
  doc: https://www.tensorzero.com/docs
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
sharedEntrances:
  - name: tensorzero
    host: sharedentrances-tensorzero
    port: 0
    title: TensorZero
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    invisible: true
    authLevel: internal
entrances:
  - authLevel: internal
    host: tensorzeroingress
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    name: tensorzero
    openMethod: window
    port: 8080
    title: TensorZero
olaresManifest.type: app
middleware:
  postgres:
    username: tensorzero
    databases:
      - name: tensorzerodb
        distributed: false
        extensions:
          - vector