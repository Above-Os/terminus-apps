# Optional API keys for built-in engines.
# Leave empty to fall back to the unofficial (HTML scraping) mode where applicable.
# Fill in to improve stability and reduce ban/captcha rate.
apiKeys:
  # YouTube Data API v3 (https://console.developers.google.com/project)
  # When set, switches the "youtube" engine from youtube_noapi (HTML) to youtube_api.
  youtube: ""

  # Wolfram|Alpha App ID (https://products.wolframalpha.com/api/)
  # When set, switches the "wolframalpha" engine from wolframalpha_noapi to wolframalpha_api.
  wolframalpha: ""

  # Flickr API key (https://www.flickr.com/services/apps/create/)
  # When set, switches the "flickr" engine from flickr_noapi to flickr.
  flickr: ""

  # Stack Exchange API key (https://stackapps.com/apps/oauth/register).
  # Shared by stackoverflow / askubuntu / superuser. Raises the quota from
  # 300 req/day (anonymous) to 10000 req/day.
  stackexchange: ""

  # MyMemory Translated API key (https://mymemory.translated.net/doc/keygen.php).
  # Without a key the daily quota is 1000 words.
  mymemory: ""

  # Wallhaven API key (https://wallhaven.cc/settings/account).
  # Optional, required mostly for NSFW content.
  wallhaven: ""
