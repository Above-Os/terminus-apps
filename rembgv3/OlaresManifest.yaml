olaresManifest.version: "0.12.0"
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: rembgv3
  description: Rembg is a tool to remove images background
  icon: https://app.cdn.olares.com/appstore/rembg/icon.png
  appid: rembgv3
  version: '1.1.0'
  title: Rembg
  categories:
    - AI
    - Utilities_v112
    - Utilities

sharedEntrances:
  - name: rembgv3
    title: Rembg
    host: sharedentrances-ai
    icon: https://app.cdn.olares.com/appstore/rembg/icon.png
    port: 0
    invisible: true
    authLevel: internal

entrances:
  - name: rembgv3
    port: 8080
    host: rembgv3-web-svc
    title: Rembg
    icon: https://app.cdn.olares.com/appstore/rembg/icon.png
    authLevel: internal
    openMethod: window

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   rembgv3         — rembg HTTP server Deployment (name: {{ .Release.Name }} == appid)
#   rembgv3download — llm-init download-only Deployment (shared HF cache)
#   rembgv3client   — nginx entrance Deployment
workloadReplicas:
  rembgv3: 1
  rembgv3download: 1
  rembgv3client: 1

permission:
  appData: true
  appCache: true
  appCommon: true
  userData:
    - Home

spec:
  versionName: '2.0.68'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Only one service will be installed across the entire Olares system. Every user can install a desktop entry to access or use the shared entrance to call the service API.

    **PREREQUISITES**
    Configure **HF_ENDPOINT** (mapped from your Olares Hugging Face mirror URL). **HF_TOKEN** is optional for this app — models are fetched from the public mirror repo `tomjackson2023/rembg`.

    Models are downloaded at install time via llm-init into the shared HF cache and symlinked into `/root/.u2net` before the rembg server starts:
    - `u2net.onnx`, `u2netp.onnx`, `u2net_human_seg.onnx`, `u2net_cloth_seg.onnx`
    - `silueta.onnx`, `isnet-general-use.onnx`, `isnet-anime.onnx`

    **OVERVIEW**
    Rembg is a tool to remove image backgrounds. The bundled ONNX models cover the standard rembg model set (u2net family, silueta, isnet). Some newer models from upstream rembg releases (e.g. bria-rmbg-2.0, SAM) are not included in the HF mirror.

  upgradeDescription: |
    Migrated Rembg to the apiVersion v3 shared app pattern and switched
    model provisioning to the shared llm-init downloader (rembgv2 → rembgv3).

    **What's Changed**

    - **Model download**: replaced the CDN `downloader-init` tar.zst bundle with
      an `llm-init:v1.2.4` download-only Deployment (`rembgv3download`) that fetches
      `tomjackson2023/rembg` (public HF mirror of official rembg ONNX release assets)
      into the shared cross-app HF cache (App Common, `/cache/hf/hub`). The engine
      symlinks `*.onnx` into `/root/.u2net` and gates on `/readyz`.
    - **Entrance routing**: nginx gates the UI/API on model download + engine
      readiness with auto-reload; llm-init API paths pin to `download-svc`.
    - **Architecture**: flattened the rembgv2 / rembgv2server sub-charts into a
      single chart; backends resolve within the release namespace (dropping the
      `*-shared` admin / non-admin split).
    - **Accelerator**: moved the GPU requirement into the accelerator modes list
      (nvidia only; amd64-only app).
    - **Scaling**: `workloadReplicas` declares the engine, downloader, and nginx
      client workloads.

  developer: danielgatis
  website: https://github.com/danielgatis/rembg
  sourceCode: https://github.com/danielgatis/rembg
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://github.com/danielgatis/rembg
  license:
    - text: MIT License
      url: https://github.com/danielgatis/rembg?tab=MIT-1-ov-file

  accelerator:
  # Olares validates per mode, summing ALL app containers (initContainers
  # excluded): Σ requests.memory <= requiredMemory, Σ limits.memory <= limitedMemory.
  #   container              req mem    lim mem
  #   rembg (gpu)            5Gi        18Gi
  #   llm-init               128Mi      1Gi
  #   nginx client           64Mi       500Mi
  #   --------------------------------------------------------
  #   Σ                      ~5.19Gi    ~19.5Gi
  - mode: nvidia
    requiredCpu: "1"
    limitedCpu: "5"
    requiredMemory: 5.5Gi
    limitedMemory: 20Gi
    requiredDisk: 8Gi
    limitedDisk: 20Gi
    requiredGPUMemory: 4Gi
    limitedGPUMemory: 16Gi

  supportArch:
    - amd64
  onlyAdmin: true

envs:
  - envName: HF_ENDPOINT
    required: true
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN

options:
  allowMultipleInstall: true
  apiTimeout: 0
  allowedOutboundPorts:
    - 80
    - 443
  conflicts:
    - name: rembgv2
      type: application
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
