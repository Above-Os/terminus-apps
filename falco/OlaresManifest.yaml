    url: https://github.com/falcosecurity/falco/blob/master/LICENSE
  requiredMemory: 512Mi
  limitedMemory: 4Gi
  requiredDisk: 256Mi
  limitedDisk: 2Gi
  requiredCpu: 0.5
  limitedCpu: 4
  supportArch:
