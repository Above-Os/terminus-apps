{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- if .Values.customRules }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: {{ .Release.Namespace }}
data:
{{- range $fileName, $ruleContent := .Values.customRules }}
  {{ $fileName }}: |
{{ $ruleContent | indent 4 }}
{{- end }}
{{- end }}
{{- if .Values.disabledRules }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-disable-rules
  namespace: {{ .Release.Namespace }}
data:
  falco_disable_rules.yaml: |
{{- range $ruleName := .Values.disabledRules }}
    - rule: {{ $ruleName | quote }}
      enabled: false
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-plugin-runtime-config
  namespace: {{ .Release.Namespace }}
data:
  plugins.yaml: |
    plugins:
      - name: k8saudit
        library_path: libk8saudit.so
        init_config: ""
        open_params: "http://0.0.0.0:8765/k8s-audit"
    load_plugins: [k8saudit]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: falco-agent
  name: falco-agent
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: falco-agent
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: falco-agent
    spec:
      tolerations:
        - operator: Exists
      initContainers:
        - name: falcoctl-install-plugins
          image: "docker.io/falcosecurity/falcoctl:main"
          imagePullPolicy: IfNotPresent
          command:
            - falcoctl
          args:
            - artifact
            - install
            - k8saudit
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: falco-plugins
              mountPath: /usr/share/falco/plugins
      containers:
        - name: falco
          image: "docker.io/falcosecurity/falco:0.43.0"
          imagePullPolicy: IfNotPresent
          args:
            - /usr/bin/falco
            - -o
            - json_output=true
            - -o
            - json_include_output_property=true
            - -o
            - http_output.enabled=true
            - -o
            - http_output.url=http://falco-sidekick.{{ .Release.Namespace }}:2801/
            - -c
            - /etc/falco/config.d/plugins.yaml
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
                - SYS_RESOURCE
                - SYS_PTRACE
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - mountPath: /host/proc
              name: proc
              readOnly: true
            - mountPath: /host/etc
              name: etc
              readOnly: true
            - mountPath: /sys/kernel/debug
              name: debugfs
              readOnly: true
            - mountPath: /dev
              name: dev
            - mountPath: /usr/share/falco/plugins
              name: falco-plugins
            - mountPath: /etc/falco/config.d/plugins.yaml
              name: falco-plugin-runtime-config
              subPath: plugins.yaml
              readOnly: true
{{- if .Values.customRules }}
{{- range $fileName, $_ := .Values.customRules }}
            - mountPath: /etc/falco/rules.d/{{ $fileName }}
              name: falco-custom-rules
              subPath: {{ $fileName }}
              readOnly: true
{{- end }}
{{- end }}
{{- if .Values.disabledRules }}
            - mountPath: /etc/falco/rules.d/falco_disable_rules.yaml
              name: falco-disable-rules
              subPath: falco_disable_rules.yaml
              readOnly: true
{{- end }}

      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: etc
          hostPath:
            path: /etc
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: dev
          hostPath:
            path: /dev
        - name: falco-plugins
          hostPath:
            type: DirectoryOrCreate
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}/plugins'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/{{ .Release.Name }}/plugins'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/{{ .Release.Name }}/plugins'
            {{- end }}
        - name: falco-plugin-runtime-config
          configMap:
            name: falco-plugin-runtime-config
{{- if .Values.customRules }}
        - name: falco-custom-rules
          configMap:
            name: falco-custom-rules
{{- end }}
{{- if .Values.disabledRules }}
        - name: falco-disable-rules
          configMap:
            name: falco-disable-rules
{{- end }}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: falco-sidekick
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 2801
      targetPort: 2801
  selector:
    app: falco-central

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: falco-central
  name: falco-central
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: falco-central
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: falco-central
    spec:
      containers:
        - name: sidekick
          image: "docker.io/falcosecurity/falcosidekick:2.33.0"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2801
          env:
            - name: WEBUI_URL
              value: "http://localhost:2802"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 500Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 2801
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 2801
            initialDelaySeconds: 10
            periodSeconds: 15

        - name: webui
          image: "docker.io/falcosecurity/falcosidekick-ui:2.2.0"
          imagePullPolicy: IfNotPresent
          args:
            - '-r'
            - 'localhost:6379'
            - '-d'
          env:
            - name: FALCOSIDEKICK_UI_TTL
              value: "72h"
          ports:
            - containerPort: 2802
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 500Mi
          readinessProbe:
            httpGet:
              path: /
              port: 2802
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 2802
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

        - name: redis
          image: "docker.io/redis/redis-stack:7.2.0-v11"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 1.2G
          volumeMounts:
            - mountPath: /data
              name: redis-data
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          hostPath:
            type: DirectoryOrCreate
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}/redis'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/{{ .Release.Name }}/redis'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/{{ .Release.Name }}/redis'
            {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: falco-webui
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 2802
      targetPort: 2802
  selector:
    app: falco-central
{{- end }}
