olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: twitter
  description: A Wise plugin for collecting content from Twitter/X.
  icon: https://app.cdn.olares.com/appstore/twitter/icon.png
  appid: twitter
  version: '1.1.10'
  title: Twitter/X
  categories:
    - Utilities_v112

sharedEntrances:
  - name: twitter
    host: sharedentrances-twitter
    port: 0
    title: Twitter/X API
    icon: https://app.cdn.olares.com/appstore/twitter/icon.png
    invisible: true
    authLevel: internal
entrances:
  - name: twitter-svc
    port: 3060
    host: twitter-svc
    title: Twitter/X plugin
    icon: https://app.cdn.olares.com/appstore/twitter/icon.png
    authLevel: private
    invisible: true

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   twitter — twitter-fetcher Deployment (must match metadata.name / appid)
workloadReplicas:
  twitter: 1

spec:
  versionName: '1.0.1'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference apps (e.g. wise).

    Twitter/X is a plugin for Wise that enables seamless collection of content from Twitter/X.

    **Features**
    - Save tweets directly to Wise
    - Download media files from tweets

  upgradeDescription: |
    Migrate Twitter/X plugin to the v3 shared-app schema.

    **What's Changed**

    - **Schema**: OlaresManifest upgraded to `apiVersion: v3`.
    - **Layout**: merged the previous `twittersvr` + `twitter` subCharts into a single chart.
    - **Sharing**: replaced `appScope.clusterScoped` + `appRef` with `options.shared: true`; consumers now reach the API via `sharedentrances-twitter`.
    - **Scaling**: `workloadReplicas` declares replica counts for the `twitter` workload.

  developer: BECLab
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 50Mi
  limitedMemory: 900Mi
  requiredDisk: 128Mi
  limitedDisk: 128Mi
  requiredCpu: 200m
  limitedCpu: 4
  supportArch:
    - amd64
    - arm64
  onlyAdmin: true

permission:
  appData: true
  appCache: true
options:
  shared: true
  apiTimeout: 0
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
