apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: twitter
    applications.app.bytetrade.io/author: bytetrade.io
spec:
  replicas: {{ .Values.workloads.twitter.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: twitter
  template:
    metadata:
      labels:
        app: twitter
        io.kompose.service: twitter
    spec:
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      containers:
        - name: twitter
          image: "docker.io/beclab/twitter-fetcher:v1.0.1"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
          ports:
            - containerPort: 3060
          startupProbe:
            tcpSocket:
              port: 3060
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 3060
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: 3060
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          resources:
            requests:
              cpu: 20m
              memory: 50Mi
            limits:
              cpu: "1"
              memory: 300Mi

---
apiVersion: v1
kind: Service
metadata:
  name: twitter-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: twitter
  ports:
    - name: twitter-server
      protocol: TCP
      port: 3060
      targetPort: 3060

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: twitter
  name: sharedentrances-twitter
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: "3060"
      port: 80
      targetPort: 3060
  selector:
    io.kompose.service: twitter
status:
  loadBalancer: {}
