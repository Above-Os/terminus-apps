metadata:
  title: Twitter/X V3 for test
  description: A Wise plugin for collecting content from Twitter/X.
spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference apps (e.g. wise).

    Twitter/X is a plugin for Wise that enables seamless collection of content from Twitter/X.

    **Features**
    - Save tweets directly to Wise
    - Download media files from tweets

  upgradeDescription: |
    Migrate Twitter/X plugin to the v3 shared-app schema.

    **What's Changed**

    - **Schema**: OlaresManifest upgraded to `apiVersion: v3`.
    - **Layout**: merged the previous `twittersvr` + `twitter` subCharts into a single chart.
    - **Sharing**: replaced `appScope.clusterScoped` + `appRef` with `options.shared: true`.
    - **Scaling**: `workloadReplicas` declares replica counts for the `twitter` workload.
