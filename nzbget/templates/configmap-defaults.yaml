apiVersion: v1
kind: ConfigMap
metadata:
  name: nzbget-defaults
  namespace: {{ .Release.Namespace }}
data:
  # Olares path overrides — all MainDir-relative paths must be absolute; a partial
  # nzbget.conf leaves LogFile/QueueDir on the system default ~/downloads.
  nzbget.conf: |
    MainDir=/config
    DestDir=/olares/userdata/home/Downloads/nzbget
    InterDir=/olares/userdata/home/Downloads/nzbget/inter
    NzbDir=/config/nzb
    QueueDir=/config/queue
    TempDir=/config/tmp
    ScriptDir=/config/scripts
    LockFile=/config/nzbget.lock
    LogFile=/config/nzbget.log
