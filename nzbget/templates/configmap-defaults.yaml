apiVersion: v1
kind: ConfigMap
metadata:
  name: nzbget-defaults
  namespace: {{ .Release.Namespace }}
data:
  # linuxserver/nzbget: MainDir=/config; Olares path overrides for DestDir/InterDir
  nzbget.conf: |
    MainDir=/config
    DestDir=/olares/userdata/home/Downloads/nzbget
    InterDir=/olares/userdata/home/Downloads/nzbget/inter
