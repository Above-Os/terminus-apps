apiVersion: v1
kind: ConfigMap
metadata:
  name: nzbget-init
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    homeDir="/olares/userdata/home"
    downloadDir="$homeDir/Downloads/nzbget"
    confFile="/config/nzbget.conf"
    defaultConf="/chart-defaults/nzbget.conf"

    mkdir -p \
      "$downloadDir/inter" \
      /config/nzb \
      /config/queue \
      /config/tmp \
      /config/scripts
    chown -R 1000:1000 "$homeDir" /config

    if [ ! -f "$confFile" ]; then
      echo "First-time setup: copying default nzbget.conf into /config."
      cp "$defaultConf" "$confFile"
    else
      echo "Existing nzbget.conf found in /config."
    fi
