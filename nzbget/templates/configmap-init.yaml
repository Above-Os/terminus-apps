apiVersion: v1
kind: ConfigMap
metadata:
  name: nzbget-init
  namespace: {{ .Release.Namespace }}
data:
  init.sh: |
    #!/bin/sh
    set -e

    homeDir="/olares/userdata/home"
    confFile="/config/nzbget.conf"
    defaultConf="/chart-defaults/nzbget.conf"

    mkdir -p "$homeDir/Downloads/nzbget/inter" \
      /config/nzb /config/queue /config/tmp /config/scripts

    if [ -f "$confFile" ]; then
      echo "Existing nzbget.conf found, skipping first-time path setup."
      exit 0
    fi

    echo "First-time setup: copying default nzbget.conf into /config."
    cp "$defaultConf" "$confFile"
