olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  nzbget: 1
metadata:
  name: nzbget
  description: Efficient Usenet downloader.
  icon: https://app.cdn.olares.com/appstore/nzbget/icon.png
  appid: nzbget
  version: '1.0.18'
  title: Nzbget
  categories:
  - Utilities_v112

permission:
  appData: true
  appCache: true
  userData:
  - Home
  externalData: true
spec:
  versionName: '26.2'
  promoteImage:
  - https://app.cdn.olares.com/appstore/nzbget/1.webp
  - https://app.cdn.olares.com/appstore/nzbget/2.webp
  - https://app.cdn.olares.com/appstore/nzbget/3.webp

  fullDescription: |
    NZBGet is a binary downloader, which downloads files from Usenet based on information given in nzb-files.

    **About this app**

    The original NZBGet project was maintained at [nzbget/nzbget](https://github.com/nzbget/nzbget) (hugbug). Development continues under the community successor [nzbgetcom/nzbget](https://github.com/nzbgetcom/nzbget), which this Olares app uses.

    - Original project: https://github.com/nzbget/nzbget
    - Active successor: https://github.com/nzbgetcom/nzbget

    **Credentials**

    Set your NZBGet web username and password when installing this app.

  upgradeDescription: |
    Upgrade NZBGet to version 26.2 (2026-06-26)
    Config changes: unified download directory & entrance auth level.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Add Olares External Directory mount path to /olares/userdata/external
    - Keep legacy /downloads mount for existing configurations
    - Default download path for new installs: Home/Downloads/nzbget
    - Entrance auth level changed to internal

  developer: nzbgetcom
  website: https://nzbget.com/
  sourceCode: https://github.com/nzbgetcom/nzbget
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 128Mi
  limitedMemory: 256Mi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 0.1
  limitedCpu: 0.5
  doc: https://nzbget.com/documentation
  license:
  - text: GPL-2.0
    url: https://github.com/nzbgetcom/nzbget/blob/develop/COPYING
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: nzbget-svc
  port: 6789
  host: nzbget-svc
  title: Nzbget
  icon: https://app.cdn.olares.com/appstore/nzbget/icon.png
  openMethod: window
  authLevel: internal
envs:
  - envName: NZBGET_USER
    type: string
    required: true
    editable: false
    description: "Username must be at least 4 characters long, contain only letters and numbers"
    regex: '^[a-zA-Z0-9]{4,}$'
  - envName: NZBGET_PASS
    type: password
    required: true
    editable: false
    description: "Password must be at least 6 characters long"
    regex: '^[\w\-!@#$%^&*()+={}\[\]:,.?~]{6,}$'
