olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  nzbget: 1
metadata:
  name: nzbget
  description: Efficient Usenet downloader.
  icon: https://app.cdn.olares.com/appstore/nzbget/icon.png
  appid: nzbget
  version: '1.0.17'
  title: Nzbget
  categories:
  - Utilities_v112

permission:
  appData: true
  appCache: true
  userData:
  - Home
  externalData: true
spec:
  versionName: '26.2'
  promoteImage:
  - https://app.cdn.olares.com/appstore/nzbget/1.webp
  - https://app.cdn.olares.com/appstore/nzbget/2.webp
  - https://app.cdn.olares.com/appstore/nzbget/3.webp

  fullDescription: |
    NZBGet is a binary downloader, which downloads files from Usenet based on information given in nzb-files.

    **About this app**

    The original NZBGet project was maintained at [nzbget/nzbget](https://github.com/nzbget/nzbget) (hugbug). Development continues under the community successor [nzbgetcom/nzbget](https://github.com/nzbgetcom/nzbget), which this Olares app uses.

    - Original project: https://github.com/nzbget/nzbget
    - Active successor: https://github.com/nzbgetcom/nzbget

    **Credentials**

    Set your NZBGet web username and password when installing this app.

  upgradeDescription: |
    Major update: switch to nzbgetcom successor and v26.2.
    - Switch container image to official nzbgetcom/nzbget:v26.2
    - Seed Olares download paths via ConfigMap on first install
    - Web credentials configured at install time (no hardcoded defaults)
    - Unified Olares Home/External directory mounts; legacy /downloads compat retained
    - Entrance auth level: internal

  developer: nzbgetcom
  website: https://nzbget.com/
  sourceCode: https://github.com/nzbgetcom/nzbget
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 32Mi
  limitedMemory: 64Mi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 0.1
  limitedCpu: 0.5
  doc: https://nzbget.com/documentation
  license:
  - text: GPL-2.0
    url: https://github.com/nzbgetcom/nzbget/blob/develop/COPYING
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: nzbget-svc
  port: 6789
  host: nzbget-svc
  title: Nzbget
  icon: https://app.cdn.olares.com/appstore/nzbget/icon.png
  openMethod: window
  authLevel: internal
envs:
  - envName: NZBGET_USER
    type: string
    required: true
    editable: false
  - envName: NZBGET_PASS
    type: password
    required: true
    editable: false
    description: "Password must be at least 6 characters long"
    regex: '^[\w\-!@#$%^&*()+={}\[\]:,.?~]{6,}$'
