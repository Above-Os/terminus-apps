metadata:
  title: Nzbget
  description: Efficient Usenet downloader.
spec:
  fullDescription: |
    NZBGet is a binary downloader, which downloads files from Usenet based on information given in nzb-files.

    **About this app**
    The original NZBGet project was maintained at [nzbget/nzbget](https://github.com/nzbget/nzbget) (hugbug). Development continues under the community successor [nzbgetcom/nzbget](https://github.com/nzbgetcom/nzbget), which this Olares app uses.

    - Original project: https://github.com/nzbget/nzbget
    - Active successor: https://github.com/nzbgetcom/nzbget

    **Access**
    The Olares entrance provides authentication. NZBGet starts without an app-level login by default; you can optionally set a username and password in Settings if needed.

  upgradeDescription: |
    Web UI settings are now read from nzbget.conf without environment variable overrides.
    - Existing nzbget.conf on disk is preserved on upgrade (including any credentials you set in the UI)
    - New installs default to no app-level login; optional password can be set in Settings