apiVersion: v3
olaresManifest.version: '0.12.0'
olaresManifest.type: app

metadata:
  name: jupyternotebook
  appid: jupyternotebook
  title: Jupyter Notebook
  description: Jupyter Notebook V7 single-user interactive computing (CPU or NVIDIA GPU).
  icon: https://app.cdn.olares.com/appstore/jupyterhub/icon.png
  version: 1.0.0
  categories:
  - Productivity_v112
  - Utilities_v112

entrances:
- name: jupyternotebook
  host: jupyternotebook
  port: 8888
  title: Jupyter Notebook
  authLevel: private
  openMethod: window

permission:
  appData: true
  userData:
  - Home

spec:
  versionName: '7.6.0'
  runAsUser: true
  supportArch:
  - amd64
  - arm64
  fullDescription: |
    **Jupyter Notebook V7** — single-user interactive computing environment based on
    [Project Jupyter docker-stacks](https://github.com/jupyter/docker-stacks).

    **Features**
    - Classic Jupyter Notebook UI (not JupyterHub / JupyterLab)
    - **CPU** or **NVIDIA GPU** mode at install time
    - **Cloneable** — install multiple independent instances (`allowMultipleInstall`)
    - Persistent notebooks under app data; Jupyter state stored under `work/.jupyter/`
    - GPU image: `beclab/jupyter-pytorch-notebook:cuda13-notebook-7.6.0` (CUDA 13 / Blackwell ready)

    **GPU mode**
    - Requires Olares >= 1.12.6 with GPU binding on resume
    - Default envelope: 20Gi GPU memory limit, 20Gi container memory limit

    Each user install is an isolated per-user instance on Olares.
  upgradeDescription: |
    Mount Olares Home (userData) into the notebook workspace so Home files are accessible.

  developer: Project Jupyter
  website: https://jupyter.org/
  sourceCode: https://github.com/jupyter/docker-stacks
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  accelerator:
  - mode: cpu
    requiredCpu: "500m"
    limitedCpu: "4"
    requiredMemory: 1Gi
    limitedMemory: 8Gi
    requiredDisk: 2Gi
    limitedDisk: 20Gi
  - mode: nvidia
    requiredCpu: "1"
    limitedCpu: "8"
    requiredMemory: 8Gi
    limitedMemory: 20Gi
    requiredDisk: 2Gi
    limitedDisk: 20Gi
    requiredGPUMemory: 20Gi
    limitedGPUMemory: 20Gi

options:
  allowMultipleInstall: true
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
  apiTimeout: 0

workloadReplicas:
  jupyternotebook: 1
