metadata:
  title: FaceFusion
  description: 业界领先的人脸处理平台

spec:
  fullDescription: |
    FaceFusion 是业界领先的人脸处理平台。它让您轻松交换人脸，并创作令人惊艳的照片处理效果。

    **主要功能：**
    先进的人脸图像生成和编辑
    - 采用高质量算法，无缝逼真地融合人脸特征，并可自定义强度级别，提供面部变形、多张人脸融合、逼真变形等功能。

    多张人脸交换：
    - 支持在单个项目中交换多张人脸。

    实时处理：
    - 提供即时预览和结果，通过快速交互式的人脸融合提升用户体验。

    年龄修改：
    - 改变人脸的表观年龄

    唇形同步：
    - 确保视频中交换的人脸与音频完美同步，创造出与语音匹配的无缝口型。

    Deep Swapper（兼容 DeepFaceLive 模型）：
    - 基于社区训练的 DeepFaceLive `.dfm` 模型的专用换脸 processor，内置 24+ 个开箱即用的名人脸模型。
  upgradeDescription: |
    升级 FaceFusion 至 3.6.1
    - 切换至官方上游镜像 `facefusion/facefusion:3.6.1-cuda`
    - 新增 `fran` 年龄编辑模型与 `corridor_key_1024` / `corridor_key_2048` 背景去除模型
    - 引入实验性 `QNN` 执行后端，并加固 `--processors` / `--ui-layouts` / `--job-id` 防止注入攻击
    - 模型下载方式从旧 CDN 切换为 HuggingFace 下载器，通过 `OLARES_USER_HUGGINGFACE_SERVICE` 按需拉取
