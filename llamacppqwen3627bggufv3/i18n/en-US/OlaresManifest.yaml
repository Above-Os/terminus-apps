metadata:
  description: "Qwen3.6-27B (GGUF Q4_K_M) served with llama.cpp."
  title: Qwen3.6-27B (llama.cpp)

spec:
  fullDescription: |
    **Model Overview**
    Qwen3.6-27B served with llama.cpp, using the `Q4_K_M` GGUF quantization from `unsloth/Qwen3.6-27B-GGUF`. The model ships ready to run and supports thinking, tools, and vision.

    **Preset Configuration**
    - Model: `unsloth/Qwen3.6-27B-GGUF:Q4_K_M` (with `mmproj-F16.gguf` projector for vision)
    - Capabilities: thinking, tools, vision
    - Engine args: `-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0 --jinja -np 1` (128K context, full GPU offload, q8_0 KV cache, Qwen3.6 chat template, single slot)
    - Required GPU memory: `23Gi`

    **How It Works**
    First, `llm-init` downloads the model and gets it ready, then `llama.cpp` starts serving the model when it’s ready. These two parts run separately but share files and progress info.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **llm-init**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`.

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    | `cpu`          | CPU only          | Adds `-ngl 0`; disables GPU                       |

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - This model needs a GPU with at least 23Gi of memory for full acceleration.
