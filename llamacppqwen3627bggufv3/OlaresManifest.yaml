#   llamacppqwen3627bggufv3 — engine Deployment (== appid / Release.Name)
#   llminit                  — llm-init / entrance Deployment
workloadReplicas:
  llamacppqwen3627bggufv3: 1
  llminit: 1
spec:
  onlyAdmin: true
  versionName: 'b9837'
  fullDescription: |
    **Model Overview**
    Qwen3.6-27B served with llama.cpp, using the `Q4_K_M` GGUF quantization from `unsloth/Qwen3.6-27B-GGUF`. The model ships ready to run and supports thinking, tools, and vision.

    **Preset Configuration**
    - Model: `unsloth/Qwen3.6-27B-GGUF:Q4_K_M` (with `mmproj-F16.gguf` projector for vision)
    - Capabilities: thinking, tools, vision
    - Engine args: `-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0` (128K context, full GPU offload, KV cache quantized to q8_0)
    - Required GPU memory: `23Gi`

    **How It Works**
    First, `llm-init` downloads the model and gets it ready, then `llama.cpp` starts serving the model when it’s ready. These two parts run separately but share files and progress info.

    **Stack**
    - **llama.cpp**: Runs the model and serves API requests (port 8081)
    - **llm-init**: Downloads the model, shows progress, and provides the OpenAI API on port 8090, proxying to `llamacpp`.

    **Accelerator modes**
    | Mode           | Device            | Details                                          |
    |----------------|-------------------|--------------------------------------------------|
    | `nvidia`       | GPU (CUDA)        | Uses `23Gi` GPU memory; `-ngl all` for full GPU  |
    | `nvidia-gb10`  | GPU (Spark)       | Like above, but memory is managed by the pod     |
    | `cpu`          | CPU only          | Adds `-ngl 0`; disables GPU                       |

    **Model Storage**
    All model files are stored in a shared folder at `appCommon/huggingface`, mounted as `/cache/hf/hub`. All similar apps use this location for models.

    **Resource Tips**
    - CPU, RAM, and GPU auto-configure based on the chart; disk settings are fixed.
    - This model needs a GPU with at least 23Gi of memory for full acceleration.

  developer: ggml-org
  website: https://llama.app/
  sourceCode: https://github.com/ggml-org/llama.cpp
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
      url: https://github.com/ggml-org/llama.cpp?tab=MIT-1-ov-file

  accelerator:
    #   cpu          — CPU-only inference; chart injects -ngl 0, no GPU inject / gpumem
    #   nvidia       — discrete GPU; LLAMACPP_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    - mode: cpu
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
    - mode: nvidia
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
      requiredGPUMemory: "-1"
      limitedGPUMemory: "-1"
    - mode: nvidia-gb10
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"

  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  appCommon: true
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  allowMultipleInstall: true
  shared: true
  templateOnly: false
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Model is preset for this app; these values are fixed and not user-editable.
  - envName: MODEL_SOURCE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "hf://unsloth/Qwen3.6-27B-GGUF --include Qwen3.6-27B-Q4_K_M.gguf,hf://unsloth/Qwen3.6-27B-GGUF --include mmproj-F16.gguf"
  - envName: MODEL_NAME
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "unsloth/Qwen3.6-27B-GGUF:Q4_K_M"
  - envName: MODEL_MODE
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "chat"
  - envName: MODEL_SUPPORTS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "thinking,tools,vision"
  - envName: ENGINE_ARGS
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "-c 131072 -ngl all -fa on -ctk q8_0 -ctv q8_0"
  - envName: LOG_LEVEL
    required: false
    type: string
    editable: false
    applyOnChange: false
    default: "info"
  - envName: HF_ENDPOINT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_SERVICE
  - envName: HF_TOKEN
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_HUGGINGFACE_TOKEN
  - envName: LLAMACPP_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: LLAMACPP_REQUIRED_GPU_MEMORY  # GPU modes: 8Gi/8192/8192Mi -> bare-MiB gpumem; cpu: ignored
    required: true
    type: string
    editable: false
    applyOnChange: false
    default: "23Gi"
    description:  "Example: `8Gi`, `8192`, or `8192Mi`. GPU memory required for the model. Use `0` on CPU. On NVIDIA this sets `nvidia.com/gpumem` in MiB. On Spark it sets pod memory."
    regex: "^[0-9]+(Gi|Mi)?$"
