{{- /* Engine wrapper scripts injected into a REUSED converted image (no new image
       build). A mode whose $engines entry sets "cmd" runs one of these via a command
       override (see engine.yaml). EVERY non-stt capability rides the ONE pyannote/torch
       image and pip-installs any missing dep on first load (vad: silero-vad; translate:
       ctranslate2+tokenizers; embed: omegaconf; enhance: speechbrain). */ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: audio-wrappers
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: audio-engine
data:
  vad.py: |
    # Silero VAD service running on the shared pyannote/torch image (NO faster-whisper).
    # Decodes with soundfile (+ torchaudio only to resample) and runs Silero via the
    # `silero-vad` pip pkg (bundles its own model, uses the image's torch), pip-installed
    # on first load like embed/enhance. Exposes: GET /healthz, GET /readyz, GET /v1/models,
    # POST /v1/audio/vad.
    import io, os, sys, subprocess, threading, logging
    from fastapi import FastAPI, UploadFile, File, Form, HTTPException
    import uvicorn

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "info").lower()
    logging.basicConfig(level=getattr(logging, LOG_LEVEL.upper(), logging.INFO))
    log = logging.getLogger("audio-vad")

    MODEL_NAME = os.environ.get("MODEL_NAME", "silero-v5")
    PORT = int(os.environ.get("WRAPPER_PORT", "8000"))
    SR = 16000

    # Defaults tuned for music/singing (silero's stock defaults over-split and drop
    # sung passages that have backing music). Each is overridable per-request via form.
    #   threshold            silero default 0.5 -> 0.3  (catch quieter / accompanied vocals)
    #   min_silence_ms        silero default 100 -> 500  (don't shred on short pauses)
    #   speech_pad_ms         silero default  30 -> 200  (keep word edges, less clipping)
    #   min_speech_ms         silero default 250         (drop ultra-short blips)
    #   max_speech_s          silero default inf -> 30   (cap windows to Whisper's frame)
    def _envf(name, default):
        try:
            return float(os.environ.get(name, "") or default)
        except Exception:
            return default
    VAD_THRESHOLD = _envf("VAD_THRESHOLD", 0.3)
    VAD_MIN_SILENCE_MS = _envf("VAD_MIN_SILENCE_MS", 500)
    VAD_SPEECH_PAD_MS = _envf("VAD_SPEECH_PAD_MS", 200)
    VAD_MIN_SPEECH_MS = _envf("VAD_MIN_SPEECH_MS", 250)
    VAD_MAX_SPEECH_S = _envf("VAD_MAX_SPEECH_S", 30)

    app = FastAPI(title="audio-vad (silero)")
    _state = {"ready": False, "error": None, "model": None, "get_ts": None}

    def _decode(data):
        # Bytes -> mono float32 torch tensor @ 16k. soundfile first (same as diar/embed),
        # torchaudio only as fallback + for resample, so we never touch the image's broken
        # torchcodec AudioDecoder path.
        import torch
        try:
            import soundfile as sf
            arr, sr = sf.read(io.BytesIO(data), dtype="float32", always_2d=True)  # (time, ch)
            wav = torch.from_numpy(arr.mean(axis=1).copy())  # mono (time,)
        except Exception:
            import torchaudio
            w, sr = torchaudio.load(io.BytesIO(data))  # (ch, time)
            wav = w.float().mean(dim=0)
        if int(sr) != SR:
            import torchaudio
            wav = torchaudio.functional.resample(wav, int(sr), SR)
        return wav.contiguous()

    def _load():
        try:
            try:
                from silero_vad import load_silero_vad, get_speech_timestamps
            except Exception:
                subprocess.run([sys.executable, "-m", "pip", "install", "-q", "silero-vad"], check=False)
                from silero_vad import load_silero_vad, get_speech_timestamps
            _state["model"] = load_silero_vad()
            _state["get_ts"] = get_speech_timestamps
            _state["ready"] = True
            log.info("silero-vad loaded; ready")
        except Exception as e:
            _state["error"] = str(e)
            log.exception("vad load failed: %s", e)

    @app.on_event("startup")
    def _startup():
        threading.Thread(target=_load, daemon=True).start()

    @app.get("/healthz")
    def healthz():
        return {"status": "ok"}

    @app.get("/readyz")
    def readyz():
        if _state["ready"]:
            return {"status": "ready"}
        raise HTTPException(status_code=503, detail=_state["error"] or "model not loaded yet")

    @app.get("/v1/models")
    def models():
        return {"object": "list", "data": [{"id": MODEL_NAME, "object": "model", "mode": "vad"}]}

    @app.post("/v1/audio/vad")
    async def vad(
        file: UploadFile = File(...),
        threshold: str = Form(default=None),
        min_silence_ms: str = Form(default=None),
        speech_pad_ms: str = Form(default=None),
        min_speech_ms: str = Form(default=None),
        max_speech_s: str = Form(default=None),
    ):
        if not _state["ready"]:
            raise HTTPException(status_code=503, detail=_state["error"] or "model not ready")
        data = await file.read()
        try:
            wav = _decode(data)
        except Exception as e:
            raise HTTPException(status_code=400, detail="audio decode failed: %s" % e)

        def _pick(form_val, default):
            if form_val is None or form_val == "":
                return default
            try:
                return float(form_val)
            except Exception:
                return default

        thr = _pick(threshold, VAD_THRESHOLD)
        max_s = _pick(max_speech_s, VAD_MAX_SPEECH_S)
        kw = {
            "sampling_rate": SR,
            "threshold": thr,
            "min_silence_duration_ms": int(_pick(min_silence_ms, VAD_MIN_SILENCE_MS)),
            "speech_pad_ms": int(_pick(speech_pad_ms, VAD_SPEECH_PAD_MS)),
            "min_speech_duration_ms": int(_pick(min_speech_ms, VAD_MIN_SPEECH_MS)),
        }
        # silero treats max_speech_duration_s=inf as "no cap"; only pass a finite cap.
        if max_s and max_s > 0:
            kw["max_speech_duration_s"] = max_s
        log.info("vad params: %s", {k: v for k, v in kw.items() if k != "sampling_rate"})
        try:
            # silero get_speech_timestamps returns [{'start','end'}] in SAMPLES.
            ts = _state["get_ts"](wav, _state["model"], **kw)
        except Exception as e:
            raise HTTPException(status_code=500, detail="vad failed: %s" % e)
        segs = [{"start": round(t["start"] / SR, 3), "end": round(t["end"] / SR, 3)} for t in ts]
        speech = round(sum(s["end"] - s["start"] for s in segs), 3)
        return {
            "model": MODEL_NAME,
            "mode": "vad",
            "sampling_rate": SR,
            "duration": round(int(wav.shape[-1]) / SR, 3),
            "speech_seconds": speech,
            "num_segments": len(segs),
            "params": {k: v for k, v in kw.items() if k != "sampling_rate"},
            "segments": segs,
        }

    if __name__ == "__main__":
        uvicorn.run(app, host="0.0.0.0", port=PORT, log_level=LOG_LEVEL)
  diar.py: |
    # Speaker diarization via pyannote, reusing the pyannote_fastapi image's torch +
    # pyannote.audio (we override its native SSE/auth API with this simpler one).
    # Model is the llm-init-downloaded repo (read from the shared HF cache).
    # Exposes: GET /healthz, GET /readyz, GET /v1/models, POST /v1/audio/diarization.
    import os, tempfile, threading, logging
    from fastapi import FastAPI, UploadFile, File, Form, HTTPException
    import uvicorn

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "info").lower()
    logging.basicConfig(level=getattr(logging, LOG_LEVEL.upper(), logging.INFO))
    log = logging.getLogger("audio-diar")

    MODEL_NAME = os.environ.get("MODEL_NAME", "pyannote-community-1")
    _src = os.environ.get("MODEL_SOURCE", "")
    MODEL_REPO = _src[5:] if _src.startswith("hf://") else (_src or MODEL_NAME)
    PORT = int(os.environ.get("WRAPPER_PORT", "8000"))
    HF_TOKEN = os.environ.get("HF_TOKEN") or None

    app = FastAPI(title="audio-diarization (pyannote)")
    _state = {"ready": False, "error": None, "pipeline": None, "device": "cpu"}

    def _decode(path):
        # Decode to a (channels, time) float32 tensor + sample_rate, so we can feed
        # pyannote an in-memory waveform and bypass its torchcodec AudioDecoder path
        # (which fails in this image: "name 'AudioDecoder' is not defined").
        import torch
        try:
            import soundfile as sf
            data, sr = sf.read(path, dtype="float32", always_2d=True)  # (time, channels)
            return torch.from_numpy(data.T.copy()), int(sr)
        except Exception:
            pass
        try:
            import torchaudio
            wav, sr = torchaudio.load(path)  # (channels, time)
            return wav.float(), int(sr)
        except Exception:
            pass
        import wave, numpy as np
        with wave.open(path, "rb") as wf:
            sr, ch, sw = wf.getframerate(), wf.getnchannels(), wf.getsampwidth()
            raw = wf.readframes(wf.getnframes())
        dt = {1: np.uint8, 2: np.int16, 4: np.int32}[sw]
        a = np.frombuffer(raw, dtype=dt).astype(np.float32)
        if sw == 2:
            a /= 32768.0
        elif sw == 4:
            a /= 2147483648.0
        else:
            a = (a - 128.0) / 128.0
        a = a.reshape(-1, ch).T
        return torch.from_numpy(a.copy()), int(sr)

    def _load():
        try:
            import torch
            from pyannote.audio import Pipeline
            # pyannote.audio 4 uses token=; older used use_auth_token=.
            try:
                pipe = Pipeline.from_pretrained(MODEL_REPO, token=HF_TOKEN)
            except TypeError:
                pipe = Pipeline.from_pretrained(MODEL_REPO, use_auth_token=HF_TOKEN)
            dev = "cuda" if torch.cuda.is_available() else "cpu"
            pipe.to(torch.device(dev))
            _state["pipeline"], _state["device"], _state["ready"] = pipe, dev, True
            log.info("pyannote pipeline %s loaded on %s", MODEL_REPO, dev)
        except Exception as e:
            _state["error"] = str(e)
            log.exception("pipeline load failed: %s", e)

    @app.on_event("startup")
    def _startup():
        threading.Thread(target=_load, daemon=True).start()

    @app.get("/healthz")
    def healthz():
        if _state["ready"]:
            return {"status": "ok", "device": _state["device"]}
        raise HTTPException(status_code=503, detail=_state["error"] or "loading pipeline")

    @app.get("/readyz")
    def readyz():
        return healthz()

    @app.get("/v1/models")
    def models():
        return {"object": "list", "data": [{"id": MODEL_NAME, "object": "model", "mode": "diar"}]}

    @app.post("/v1/audio/diarization")
    async def diarize(file: UploadFile = File(...), num_speakers: str = Form(default=None),
                      min_speakers: str = Form(default=None), max_speakers: str = Form(default=None)):
        if not _state["ready"]:
            raise HTTPException(status_code=503, detail=_state["error"] or "pipeline not ready")
        data = await file.read()
        suffix = os.path.splitext(file.filename or "a.wav")[1] or ".wav"
        with tempfile.NamedTemporaryFile(suffix=suffix, delete=False) as f:
            f.write(data)
            path = f.name
        try:
            kw = {}
            if num_speakers:
                kw["num_speakers"] = int(num_speakers)
            if min_speakers:
                kw["min_speakers"] = int(min_speakers)
            if max_speakers:
                kw["max_speakers"] = int(max_speakers)
            waveform, sr = _decode(path)
            out = _state["pipeline"]({"waveform": waveform, "sample_rate": sr}, **kw)
        except Exception as e:
            raise HTTPException(status_code=500, detail="diarization failed: %s" % e)
        finally:
            try:
                os.unlink(path)
            except Exception:
                pass
        # pyannote 4 returns an object whose .speaker_diarization is the Annotation;
        # v3 returned the Annotation directly. Unwrap to a common itertracks() form.
        ann = getattr(out, "speaker_diarization", out)
        segs = [{"start": round(float(t.start), 3), "end": round(float(t.end), 3), "speaker": str(spk)}
                for t, _, spk in ann.itertracks(yield_label=True)]
        speakers = sorted({s["speaker"] for s in segs})
        return {"model": MODEL_NAME, "mode": "diar", "device": _state["device"],
                "num_speakers": len(speakers), "speakers": speakers,
                "num_segments": len(segs), "segments": segs}

    if __name__ == "__main__":
        uvicorn.run(app, host="0.0.0.0", port=PORT, log_level=LOG_LEVEL)
  translate.py: |
    # Text->text machine translation on the shared pyannote/torch image, SELF-ADAPTIVE
    # across model families: the adapter is auto-picked from MODEL_NAME (same idea as stt's
    # engine auto-select), so ONE base serves many translation models with NO clone-form
    # change. Runtime is CPU ctranslate2 (GPU ct2 is broken on Blackwell; CPU ct2 runs on any
    # image); each adapter pip-installs only the deps it needs on first load (like
    # embed/enhance). Model is the llm-init-downloaded CT2 repo, read from the shared HF cache.
    # The EXTERNAL API is FIXED to FLORES-200 codes (eng_Latn, zho_Hans) for EVERY model —
    # each adapter maps FLORES<->its own scheme internally, so gateway/Demo never change.
    #   ADAPTERS (order = detection priority; picked by MODEL_NAME, file-sniff fallback):
    #     m2m100: M2M100Tokenizer via transformers+sentencepiece; FLORES->ISO(en/zh/ja/..);
    #             e.g. entai2965/m2m100-1.2B-ctranslate2  (MIT — the COMMERCIAL default).
    #     nllb (default/back-compat, BYTE-IDENTICAL to the old wrapper): tokenizer.json via
    #             `tokenizers` (NO sentencepiece); NLLB's codes ARE FLORES-200 already;
    #             e.g. entai2965/nllb-200-distilled-600M-ctranslate2 (CC-BY-NC — opt-in only,
    #             kept runnable for users who explicitly choose it, never offered by default).
    #   Adding another model/engine later = add one adapter class; nothing else changes.
    # Exposes: GET /healthz, GET /readyz, GET /v1/models,
    # POST /v1/translate {text, target, source?} with FLORES-200 codes.
    import os, re, sys, subprocess, threading, logging
    from typing import Optional
    from fastapi import FastAPI, HTTPException
    from pydantic import BaseModel
    import uvicorn

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "info").lower()
    logging.basicConfig(level=getattr(logging, LOG_LEVEL.upper(), logging.INFO))
    log = logging.getLogger("audio-translate")

    MODEL_NAME = os.environ.get("MODEL_NAME", "nllb-200-distilled-600M")
    _src = os.environ.get("MODEL_SOURCE", "")
    MODEL_REPO = _src[5:] if _src.startswith("hf://") else (_src or MODEL_NAME)
    PORT = int(os.environ.get("WRAPPER_PORT", "8000"))
    DEVICE = os.environ.get("CT2_DEVICE", "cpu")
    DEFAULT_SRC = os.environ.get("DEFAULT_SOURCE_LANG", "eng_Latn")
    # Advanced override only (NOT a clone-form field): force an adapter if name-detection
    # ever guesses wrong. Empty => auto-detect from MODEL_NAME/MODEL_REPO.
    FORCE_ADAPTER = (os.environ.get("TRANSLATE_ADAPTER", "") or "").strip().lower()

    def _pip(*pkgs):
        subprocess.run([sys.executable, "-m", "pip", "install", "-q", *pkgs], check=False)

    def _locate():
        # Resolve the CT2 model dir from the shared HF cache populated by llm-init.
        from huggingface_hub import snapshot_download
        return snapshot_download(MODEL_REPO, local_files_only=True,
                                 cache_dir=os.environ.get("HF_HUB_CACHE"))

    # ---- adapters: one per model family. External codes are ALWAYS FLORES-200; each adapter
    #      owns its tokenization, its ctranslate2 call, and its FLORES<->native code mapping. ----

    class _Adapter:
        name = "base"
        @staticmethod
        def matches(repo, mdir):
            return False
        def load(self, mdir):
            raise NotImplementedError
        def translate(self, sents, src_flores, tgt_flores, beam_size):
            raise NotImplementedError

    class NLLBAdapter(_Adapter):
        # NLLB CT2 repo ships tokenizer.json (read directly by `tokenizers`, NO sentencepiece).
        # NLLB's native language codes ARE FLORES-200, so there is NO mapping. This path is
        # byte-identical to the pre-multi-model wrapper (existing NLLB instances unaffected).
        name = "nllb"
        @staticmethod
        def matches(repo, mdir):
            if "nllb" in repo:
                return True
            return (os.path.exists(os.path.join(mdir, "tokenizer.json"))
                    and not os.path.exists(os.path.join(mdir, "sentencepiece.bpe.model")))
        def load(self, mdir):
            try:
                import ctranslate2
                from tokenizers import Tokenizer
            except Exception:
                _pip("ctranslate2", "tokenizers")
                import ctranslate2
                from tokenizers import Tokenizer
            self.tok = Tokenizer.from_file(os.path.join(mdir, "tokenizer.json"))
            self.tr = ctranslate2.Translator(mdir, device=DEVICE)
        def _decode_hyp(self, hyp, tgt):
            out = [t for t in hyp if t not in (tgt, "</s>", "<pad>", "<s>")]
            ids = [self.tok.token_to_id(t) for t in out]
            ids = [i for i in ids if i is not None]
            return self.tok.decode(ids).strip()
        def translate(self, sents, src, tgt, beam_size):
            # NLLB encoder input per sentence = [src_lang] + subwords + </s>; decoder prefix = [tgt].
            sources = [[src] + self.tok.encode(s, add_special_tokens=False).tokens + ["</s>"] for s in sents]
            res = self.tr.translate_batch(sources, target_prefix=[[tgt]] * len(sources),
                                          beam_size=beam_size, max_input_length=1024,
                                          max_decoding_length=1024)
            return [self._decode_hyp(r.hypotheses[0], tgt) for r in res]

    class M2M100Adapter(_Adapter):
        # m2m100 CT2 repo bundles the M2M100Tokenizer files (sentencepiece); its language codes
        # are ISO 639-1 (en/zh/ja/..). We map FLORES-200 -> ISO by the code's 3-letter prefix
        # (script suffix is irrelevant to m2m100; zho_Hans and zho_Hant both -> zh). Per the
        # CTranslate2 m2m100 recipe: src token seq = tokenizer.convert_ids_to_tokens(encode(text)),
        # target_prefix = [lang_code_to_token[tgt]], and hypotheses[0][1:] drops the forced tag.
        name = "m2m100"
        FLORES2M2M = {
            "eng": "en", "zho": "zh", "jpn": "ja", "kor": "ko", "fra": "fr", "deu": "de",
            "spa": "es", "rus": "ru", "ita": "it", "por": "pt", "arb": "ar", "hin": "hi",
            "vie": "vi", "tha": "th", "ind": "id", "nld": "nl", "pol": "pl", "tur": "tr",
            "ukr": "uk", "ces": "cs", "ell": "el", "heb": "he", "swe": "sv", "ron": "ro",
            "hun": "hu", "fin": "fi", "dan": "da", "nob": "no", "nno": "no", "afr": "af",
            "amh": "am", "ast": "ast", "azj": "az", "azb": "az", "bak": "ba", "bel": "be",
            "bul": "bg", "ben": "bn", "bos": "bs", "cat": "ca", "ceb": "ceb", "cym": "cy",
            "pes": "fa", "prs": "fa", "gle": "ga", "gla": "gd", "glg": "gl", "guj": "gu",
            "hau": "ha", "hrv": "hr", "hat": "ht", "hye": "hy", "ibo": "ig", "ilo": "ilo",
            "isl": "is", "jav": "jv", "kat": "ka", "kaz": "kk", "khm": "km", "kan": "kn",
            "ltz": "lb", "lug": "lg", "lin": "ln", "lao": "lo", "lit": "lt", "lvs": "lv",
            "plt": "mg", "mkd": "mk", "mal": "ml", "khk": "mn", "mar": "mr", "zsm": "ms",
            "mya": "my", "npi": "ne", "nso": "ns", "oci": "oc", "ory": "or", "pan": "pa",
            "pbt": "ps", "snd": "sd", "sin": "si", "slk": "sk", "slv": "sl", "som": "so",
            "als": "sq", "srp": "sr", "ssw": "ss", "sun": "su", "swh": "sw", "tam": "ta",
            "tgl": "tl", "tsn": "tn", "urd": "ur", "uzn": "uz", "wol": "wo", "xho": "xh",
            "ydd": "yi", "yor": "yo", "zul": "zu", "est": "et", "fuv": "ff", "bre": "br",
            "fry": "fy",
        }
        @staticmethod
        def matches(repo, mdir):
            return any(k in repo for k in ("m2m100", "m2m_100", "m2m-100"))
        def load(self, mdir):
            try:
                import ctranslate2, transformers
                import sentencepiece  # noqa: F401
            except Exception:
                _pip("ctranslate2", "transformers", "sentencepiece")
                import ctranslate2, transformers
            self.tok = transformers.AutoTokenizer.from_pretrained(mdir, clean_up_tokenization_spaces=True)
            self.tr = ctranslate2.Translator(mdir, device=DEVICE)
        def _iso(self, flores):
            code = self.FLORES2M2M.get(flores) or self.FLORES2M2M.get(flores.split("_")[0])
            if not code and flores in self.tok.lang_code_to_token:
                code = flores  # allow a raw ISO code passed straight through
            if not code or code not in self.tok.lang_code_to_token:
                raise HTTPException(status_code=400,
                                    detail="m2m100 does not support language '%s'" % flores)
            return code
        def translate(self, sents, src, tgt, beam_size):
            src_iso, tgt_iso = self._iso(src), self._iso(tgt)
            self.tok.src_lang = src_iso
            sources = [self.tok.convert_ids_to_tokens(self.tok.encode(s)) for s in sents]
            prefix = [self.tok.lang_code_to_token[tgt_iso]]
            res = self.tr.translate_batch(sources, target_prefix=[prefix] * len(sources),
                                          beam_size=beam_size, max_input_length=1024,
                                          max_decoding_length=1024)
            out = []
            for r in res:
                ids = self.tok.convert_tokens_to_ids(r.hypotheses[0][1:])
                out.append(self.tok.decode(ids, skip_special_tokens=True).strip())
            return out

    ADAPTERS = [M2M100Adapter, NLLBAdapter]

    def _pick_adapter(mdir):
        repo = MODEL_REPO.lower()
        if FORCE_ADAPTER:
            for A in ADAPTERS:
                if A.name == FORCE_ADAPTER:
                    return A()
        for A in ADAPTERS:
            if A.matches(repo, mdir):
                return A()
        return NLLBAdapter()  # safe default preserves legacy behaviour

    app = FastAPI(title="audio-translate (multi-model via ctranslate2)")
    _state = {"ready": False, "error": None, "adapter": None, "device": DEVICE}

    def _load():
        try:
            d = _locate()
            ad = _pick_adapter(d)
            ad.load(d)
            _state.update(adapter=ad, ready=True)
            log.info("translate ready: adapter=%s model=%s on %s", ad.name, MODEL_REPO, DEVICE)
        except Exception as e:
            _state["error"] = str(e)
            log.exception("load failed: %s", e)

    @app.on_event("startup")
    def _startup():
        threading.Thread(target=_load, daemon=True).start()

    @app.get("/healthz")
    def healthz():
        if _state["ready"]:
            return {"status": "ok", "device": _state["device"],
                    "adapter": _state["adapter"].name if _state["adapter"] else None}
        raise HTTPException(status_code=503, detail=_state["error"] or "loading model")

    @app.get("/readyz")
    def readyz():
        return healthz()

    @app.get("/v1/models")
    def models():
        return {"object": "list", "data": [{"id": MODEL_NAME, "object": "model", "mode": "translate"}]}

    class Req(BaseModel):
        text: str
        target: str                 # FLORES-200 code, e.g. zho_Hans
        source: Optional[str] = None  # FLORES-200 code; default DEFAULT_SOURCE_LANG

    # Every model here is SENTENCE-level: feeding a whole multi-sentence paragraph in one go
    # makes it translate only the first sentence(s) and drop the rest (looks "truncated"). So
    # we split the input with a NON-AI splitter (punctuation only — no model, no interface
    # change), translate the sentences as ONE ctranslate2 batch, then join. Languages that
    # don't separate words with spaces get a "" joiner. This is adapter-agnostic (keyed on the
    # external FLORES target), so it works the same for NLLB, m2m100, and any future model.
    _SENT_RE = re.compile(r"[^。！？!?；;…\n]*[。！？!?；;…\n]+|[^。！？!?；;…\n]+")
    _NOSPACE_TGT = ("zho", "jpn", "yue", "tha", "lao", "mya", "khm", "wuu", "bod")

    def _split_sentences(text, max_chars=220):
        sents = []
        for m in _SENT_RE.findall(text):
            s = m.strip()
            if not s:
                continue
            if len(s) <= max_chars:
                sents.append(s)
            else:  # hard-wrap a delimiter-less run so a single huge "sentence" can't truncate
                sents.extend(s[i:i + max_chars] for i in range(0, len(s), max_chars))
        return sents or [text.strip()]

    @app.post("/v1/translate")
    def translate(req: Req):
        if not _state["ready"]:
            raise HTTPException(status_code=503, detail=_state["error"] or "model not ready")
        if not req.text.strip():
            return {"model": MODEL_NAME, "mode": "translate", "translation": ""}
        src = req.source or DEFAULT_SRC
        tgt = req.target
        sents = _split_sentences(req.text)
        try:
            hyps = _state["adapter"].translate(sents, src, tgt, 4)
        except HTTPException:
            raise
        except Exception as e:
            raise HTTPException(status_code=500, detail="translation failed: %s" % e)
        joiner = "" if tgt[:3] in _NOSPACE_TGT else " "
        translation = joiner.join(h for h in hyps if h)
        return {"model": MODEL_NAME, "mode": "translate", "adapter": _state["adapter"].name,
                "source": src, "target": tgt, "sentences": len(sents), "translation": translation}

    if __name__ == "__main__":
        uvicorn.run(app, host="0.0.0.0", port=PORT, log_level=LOG_LEVEL)
