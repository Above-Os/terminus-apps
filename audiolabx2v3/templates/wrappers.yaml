    # STREAM_MAX_LEN. (Do NOT reuse VLLM_MAX_LEN=32768 — still too big for the KV budget here.)
    MAX_MODEL_LEN = int(os.environ.get("STREAM_MAX_LEN", "16384") or 16384)
