        # prefix = text already finalized by previous rolled segments (keeps the
        # emitted transcript monotonic across rolls); samples = audio fed to the
        # CURRENT state (drives the proactive roll).
        S = {"st": _new_state(), "prefix": "", "samples": 0}
        roll_samples = max(16000, int(ROLL_SEC * 16000))
        pending = np.zeros((0,), dtype="float32")
