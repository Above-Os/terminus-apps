    # Speaker/audio embedding via pyannote, reusing the pyannote_fastapi image's torch +
    # pyannote.audio (NO new image). The llm-init-downloaded embedding model (e.g.
    # pyannote/embedding -> 512-d x-vector) is read from the shared HF cache; gated repos
    # use the auto-injected HF_TOKEN, same as diar. Exposes: GET /healthz, GET /readyz,
    # GET /v1/models, POST /v1/audio/embeddings (multipart file -> one whole-file vector).
    import os, tempfile, threading, logging
    from fastapi import FastAPI, UploadFile, File, HTTPException
    import uvicorn

    LOG_LEVEL = os.environ.get("LOG_LEVEL", "info").lower()
    logging.basicConfig(level=getattr(logging, LOG_LEVEL.upper(), logging.INFO))
    log = logging.getLogger("audio-embed")

    MODEL_NAME = os.environ.get("MODEL_NAME", "pyannote-embedding")
    _src = os.environ.get("MODEL_SOURCE", "")
    MODEL_REPO = _src[5:] if _src.startswith("hf://") else (_src or MODEL_NAME)
    PORT = int(os.environ.get("WRAPPER_PORT", "8000"))
    HF_TOKEN = os.environ.get("HF_TOKEN") or None

    app = FastAPI(title="audio-embedding (pyannote)")
    _state = {"ready": False, "error": None, "inference": None, "device": "cpu", "dim": None}

    def _decode(path):
        # Decode to a (channels, time) float32 tensor + sample_rate, feeding pyannote an
        # in-memory waveform to bypass its torchcodec AudioDecoder path (broken in image).
        import torch
        try:
            import soundfile as sf
            data, sr = sf.read(path, dtype="float32", always_2d=True)  # (time, channels)
            return torch.from_numpy(data.T.copy()), int(sr)
        except Exception:
            pass
        try:
            import torchaudio
            wav, sr = torchaudio.load(path)  # (channels, time)
            return wav.float(), int(sr)
        except Exception:
            pass
        import wave, numpy as np
        with wave.open(path, "rb") as wf:
            sr, ch, sw = wf.getframerate(), wf.getnchannels(), wf.getsampwidth()
            raw = wf.readframes(wf.getnframes())
        dt = {1: np.uint8, 2: np.int16, 4: np.int32}[sw]
        a = np.frombuffer(raw, dtype=dt).astype(np.float32)
        if sw == 2:
            a /= 32768.0
        elif sw == 4:
            a /= 2147483648.0
        else:
            a = (a - 128.0) / 128.0
        a = a.reshape(-1, ch).T
        return torch.from_numpy(a.copy()), int(sr)

    def _load():
        try:
            # pyannote/embedding's checkpoint pickles an omegaconf config object, so
            # torch.load() needs the omegaconf module. This pyannote image ships
            # pyannote.audio but NOT omegaconf (diar's Pipeline path doesn't hit it).
            # Best-effort pip-install at first load — no new image; node-cached after.
            try:
                import omegaconf  # noqa: F401
            except ImportError:
                import subprocess, sys
                log.info("omegaconf missing; pip-installing for pyannote checkpoint...")
                subprocess.run([sys.executable, "-m", "pip", "install", "-q", "omegaconf"], check=False)
            import torch
            from pyannote.audio import Model, Inference
            # pyannote.audio 4 uses token=; older used use_auth_token=.
            try:
                model = Model.from_pretrained(MODEL_REPO, token=HF_TOKEN)
            except TypeError:
                model = Model.from_pretrained(MODEL_REPO, use_auth_token=HF_TOKEN)
            dev = "cuda" if torch.cuda.is_available() else "cpu"
            # window="whole" -> a single fixed-length vector for the entire clip.
            try:
                inf = Inference(model, window="whole", device=torch.device(dev))
            except TypeError:
                model.to(torch.device(dev))
                inf = Inference(model, window="whole")
            _state.update(inference=inf, device=dev, ready=True)
            log.info("pyannote embedding %s loaded on %s", MODEL_REPO, dev)
        except Exception as e:
            _state["error"] = str(e)
            log.exception("embedding load failed: %s", e)

    @app.on_event("startup")
    def _startup():
        threading.Thread(target=_load, daemon=True).start()

    @app.get("/healthz")
    def healthz():
        if _state["ready"]:
            return {"status": "ok", "device": _state["device"]}
        raise HTTPException(status_code=503, detail=_state["error"] or "loading model")

    @app.get("/readyz")
    def readyz():
        return healthz()

    @app.get("/v1/models")
    def models():
        return {"object": "list", "data": [{"id": MODEL_NAME, "object": "model", "mode": "embed"}]}

    @app.post("/v1/audio/embeddings")
    async def embeddings(file: UploadFile = File(...)):
        if not _state["ready"]:
            raise HTTPException(status_code=503, detail=_state["error"] or "model not ready")
        data = await file.read()
        suffix = os.path.splitext(file.filename or "a.wav")[1] or ".wav"
        with tempfile.NamedTemporaryFile(suffix=suffix, delete=False) as f:
            f.write(data)
            path = f.name
        try:
            import numpy as np
            waveform, sr = _decode(path)
            emb = _state["inference"]({"waveform": waveform, "sample_rate": sr})
            vec = np.asarray(emb, dtype="float32").reshape(-1)
        except Exception as e:
            raise HTTPException(status_code=500, detail="embedding failed: %s" % e)
        finally:
            try:
                os.unlink(path)
            except Exception:
                pass
        _state["dim"] = int(vec.shape[0])
        return {"model": MODEL_NAME, "mode": "embed", "device": _state["device"],
                "dim": int(vec.shape[0]), "embedding": vec.tolist()}

    if __name__ == "__main__":
        uvicorn.run(app, host="0.0.0.0", port=PORT, log_level=LOG_LEVEL)
