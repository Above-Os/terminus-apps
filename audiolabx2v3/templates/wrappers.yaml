            # Finalize the current segment, fold its text into the committed prefix,
            # then start a fresh state so the accumulated audio context (and vLLM's
            # encoder-cache usage) resets to ~zero.
            async with _infer_lock:
                await asyncio.to_thread(asr.finish_streaming_transcribe, S["st"])
            S["prefix"] = _join(S["prefix"], getattr(S["st"], "text", "") or "")
            S["st"] = _new_state()
            S["samples"] = 0

        async def _feed(cur):
            # Backstop: if the encoder cache overflows despite the proactive roll
            # (ROLL_SEC too high / very dense audio), roll and retry the chunk once.
            try:
                async with _infer_lock:
                    await asyncio.to_thread(asr.streaming_transcribe, cur, S["st"])
            except Exception as e:
                msg = str(e).lower()
                if "encoder cache" in msg or "exceeds" in msg or "pre-allocated" in msg:
                    log.warning("encoder-cache overflow; rolling session and retrying: %s", e)
                    await _roll()
                    async with _infer_lock:
                        await asyncio.to_thread(asr.streaming_transcribe, cur, S["st"])
                else:
                    raise
            S["samples"] += int(cur.shape[0])

        try:
            while True:
                msg = await ws.receive()
                if msg.get("type") == "websocket.disconnect":
                    break
                text = msg.get("text")
                if text is not None:
                    try:
                        obj = json.loads(text)
                    except Exception:
                        obj = {}
                    t = obj.get("type")
                    if t == "start":
                        language = obj.get("language") or None
                        sample_rate = int(obj.get("sample_rate") or 16000)
                        step_ms = int(obj.get("step_ms") or DEFAULT_STEP_MS)
