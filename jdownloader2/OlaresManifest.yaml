olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: jdownloader2
  description: Free, open-source download management tool with web browser access.
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: jdownloader2
  version: '1.0.0'
  title: JDownloader 2
  categories:
  - Utilities
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '26.02.3'
  fullDescription: |
    JDownloader 2 is a free, open-source download management tool with a huge community of developers that makes downloading as easy and fast as it should be. Users can start, stop or pause downloads, set bandwidth limitations, auto-extract archives and much more.

    The GUI of the application is accessed through a modern web browser, requiring no installation or configuration on the client side.

    # Features
    * Web-based GUI accessible from any modern browser
    * Start, stop, or pause downloads with ease
    * Set bandwidth limitations
    * Auto-extract archives
    * MyJDownloader integration for remote access via mobile apps and browser extensions
    * Support for hundreds of download sites and file hosts
    * Captcha recognition and solving
    * Multi-connection downloads for faster speeds
    * Scheduled downloads
    * Dark mode support
    * Click'n'Load support
    * Proxy support
  upgradeDescription: |
    Upgrade to v26.02.3

    Changes:
    * Updated baseimage to version 4.11.2
    * Fixed X server failing to find the appropriate Mesa driver on some setups

    Full release notes at: https://github.com/jlesage/docker-jdownloader-2/releases/tag/v26.02.3
  developer: jlesage
  website: https://github.com/jlesage/docker-jdownloader-2
  sourceCode: https://github.com/jlesage/docker-jdownloader-2
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://github.com/jlesage/docker-jdownloader-2#readme
  license:
  - text: MIT
    url: https://github.com/jlesage/docker-jdownloader-2/blob/master/LICENSE
  requiredMemory: 256Mi
  limitedMemory: 800Mi
  requiredDisk: 500Mi
  limitedDisk: 10Gi
  requiredCpu: 0.25
  limitedCpu: 1
  supportArch:
  - amd64
  - arm64
options:
  apiTimeout: 0
  allowedOutboundPorts:
    - 80
    - 443
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
sharedEntrances:
- name: jdownloader2
  host: sharedentrances-jdownloader2
  port: 0
  title: JDownloader 2
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  invisible: true
  authLevel: internal
entrances:
- name: jdownloader2
  port: 5800
  host: jdownloader2
  title: JDownloader 2
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  openMethod: window
