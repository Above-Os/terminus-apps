metadata:
  title: JDownloader 2
  description: Free, open-source download management tool with web browser access.
spec:
  fullDescription: |
    JDownloader 2 is a free, open-source download management tool with a huge community of developers that makes downloading as easy and fast as it should be. Users can start, stop or pause downloads, set bandwidth limitations, auto-extract archives and much more.

    The GUI of the application is accessed through a modern web browser, requiring no installation or configuration on the client side.

    # Features
    * Web-based GUI accessible from any modern browser
    * Start, stop, or pause downloads with ease
    * Set bandwidth limitations
    * Auto-extract archives
    * MyJDownloader integration for remote access via mobile apps and browser extensions
    * Support for hundreds of download sites and file hosts
    * Captcha recognition and solving
    * Multi-connection downloads for faster speeds
    * Scheduled downloads
    * Dark mode support
    * Click'n'Load support
    * Proxy support
  upgradeDescription: |
    Upgrade to v26.02.3

    Changes:
    * Updated baseimage to version 4.11.2
    * Fixed X server failing to find the appropriate Mesa driver on some setups

    Full release notes at: https://github.com/jlesage/docker-jdownloader-2/releases/tag/v26.02.3
