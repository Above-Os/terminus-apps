metadata:
  title: JDownloader 2
  description: 免费开源的下载管理工具，支持网页浏览器访问。
spec:
  fullDescription: |
    JDownloader 2 是一款免费的开源下载管理工具，拥有庞大的开发者社区，让下载变得简单快捷。用户可以启动、停止或暂停下载，设置带宽限制，自动解压归档文件等。

    应用的图形界面可通过现代 Web 浏览器访问，客户端无需安装或配置。

    # 功能
    * 基于 Web 的 GUI，可从任何现代浏览器访问
    * 轻松启动、停止或暂停下载
    * 设置带宽限制
    * 自动解压归档文件
    * MyJDownloader 集成，支持通过移动应用和浏览器扩展远程访问
    * 支持数百个下载站点和文件托管服务
    * 验证码识别和解决
    * 多连接下载，速度更快
    * 计划下载
    * 暗色模式支持
    * Click'n'Load 支持
    * 代理支持
  upgradeDescription: |
    升级到 v26.02.3

    更新内容:
    * 更新基础镜像到版本 4.11.2
    * 修复某些设置下 X 服务器找不到合适 Mesa 驱动的问题

    完整发布说明参见: https://github.com/jlesage/docker-jdownloader-2/releases/tag/v26.02.3
