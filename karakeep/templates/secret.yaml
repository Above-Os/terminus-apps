{{- $oe := .Values.olaresEnv | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: karakeep
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  NEXTAUTH_SECRET: {{ default (printf "%s-%s-karakeep-secret" .Release.Name .Release.Namespace) $oe.NEXTAUTH_SECRET | quote }}
  OPENAI_API_KEY: {{ $oe.OPENAI_API_KEY | default "" | quote }}
  SMTP_PASSWORD: {{ $oe.SMTP_PASSWORD | default "" | quote }}
