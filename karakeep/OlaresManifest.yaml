---
olaresManifest.type: app
olaresManifest.version: '0.11.0'
metadata:
  name: karakeep
  description: A self-hostable bookmark-everything app with AI-based automatic tagging and search.
  icon: https://app.cdn.olares.com/appstore/karakeep/icon.png
  appid: karakeep
  version: '1.0.2'
  title: Karakeep
  categories:
  - Utilities_v112
  - Utilities
permission:
  appData: true
  appCache: true
spec:
  versionName: '0.32.0'
  fullDescription: |
    Karakeep (previously Hoarder) is a self-hostable bookmark-everything app for links, notes, images, and PDFs.

    It combines automatic metadata extraction, full text search, list collaboration, and AI-based automatic tagging to make saved content easier to organize and rediscover.

    Key capabilities:
    - Bookmark links, notes, images, and PDFs
    - Automatic fetch for title, description, and preview image
    - Full text search across saved content
    - AI tagging and summarization (supports local models via Ollama)
    - Rule-based automation and RSS ingestion
    - OCR for images, highlights, and bulk actions
    - Browser extensions, mobile apps, API, and webhooks
    - Self-hosting first with privacy-focused deployment

  developer: Localhost Labs Ltd.
  website: https://karakeep.app
  sourceCode: https://github.com/karakeep-app/karakeep
  submitter: Olares
  doc: https://docs.karakeep.app
  license:
  - text: AGPL-3.0
    url: https://github.com/karakeep-app/karakeep/blob/main/LICENSE
  locale:
  - en-US
  - zh-CN
  requiredMemory: 700Mi
  limitedMemory: 3Gi
  requiredDisk: 1Gi
  limitedDisk: 20Gi
  requiredCpu: 0.5
  limitedCpu: 3
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
envs:
  - envName: NEXTAUTH_SECRET
    type: string
    required: false
    applyOnChange: true
    editable: true
    description: "Secret used by Karakeep auth. Set this for production."
  - envName: OPENAI_API_KEY
    type: string
    required: false
    applyOnChange: true
    editable: true
    description: "Secret API key for OpenAI-powered tagging and summarization."
  - envName: OLLAMA_BASE_URL
    type: url
    required: false
    applyOnChange: true
    editable: true
    description: "Base URL for local Ollama models used by Karakeep."
  - envName: INFERENCE_TEXT_MODEL
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "gemma3"
    description: "Model used for text inference (tags, summaries). Defaults to gemma3 for Ollama."
  - envName: INFERENCE_IMAGE_MODEL
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "llava"
    description: "Model used for image/vision inference. Must support vision when using Ollama (e.g. llava)."
  - envName: INFERENCE_OUTPUT_SCHEMA
    type: string
    required: false
    applyOnChange: true
    editable: true
    default: "plain"
    description: "Inference output format: structured, json, or plain. Use plain for models without structured output support."
  - envName: USE_SYSTEM_SMTP_SETTINGS
    required: false
    applyOnChange: true
    editable: true
    type: bool
    default: "true"
    description: "Use system SMTP settings (when enabled, SMTP envs are managed by system envs)."
  - envName: SMTP_ENABLED
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_ENABLED
  - envName: SMTP_HOST
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SERVER
  - envName: SMTP_PORT
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PORT
  - envName: SMTP_USER
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USERNAME
  - envName: SMTP_PASSWORD
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_PASSWORD
  - envName: SMTP_FROM
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_FROM_ADDRESS
  - envName: SMTP_TLS
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USE_TLS
  - envName: SMTP_SSL
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_USE_SSL
  - envName: SMTP_SECURITY_PROTOCOLS
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_SECURITY_PROTOCOLS
entrances:
- name: karakeep
  port: 3000
  host: karakeep
  title: Karakeep
  icon: https://app.cdn.olares.com/appstore/karakeep/icon.png
  openMethod: window
