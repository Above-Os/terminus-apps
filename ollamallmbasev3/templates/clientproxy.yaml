apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  app_backend.conf: |
    server {
      listen 8080;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log  /opt/bitnami/openresty/nginx/logs/error.log;
      proxy_connect_timeout                          60s;
      proxy_send_timeout                             60s;
      proxy_read_timeout                             1800s;
      location /ping {
        default_type text/plain;
        return 200 'pong';
      }
      # /livez forwards to llm-init's /livez (process up, independent of
      # Ollama pull progress). kubelet readinessProbe targets this path
      # so Olares can open the app and show the download dashboard while
      # phase=download.
      location = /livez {
        proxy_pass http://download-svc:8090/livez;
        proxy_http_version 1.1;
        proxy_connect_timeout 2s;
        proxy_send_timeout    2s;
        proxy_read_timeout    3s;
        proxy_set_header Host $host;
      }
      location / {
        proxy_pass http://download-svc:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Access-Control-Allow-Origin *;
        if ($request_method = 'OPTIONS') { return 204; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollamaclient
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: ollamaclient
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ollamaclient
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: ollamaclient
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 420
            items:
              - key: app_backend.conf
                path: app_backend.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 10m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 5
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/app_backend.conf
              subPath: app_backend.conf
---
apiVersion: v1
kind: Service
metadata:
  name: ollamaclient
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: ollamaclient
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
