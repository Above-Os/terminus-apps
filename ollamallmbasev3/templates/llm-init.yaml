{{- $ollamaclientDomainENV := split "," .Values.domain.ollamaclient -}}
{{- $ollamaclientDomain := index $ollamaclientDomainENV "_0" -}}
{{- /* Model identity + source are clone-configurable via olaresEnv. This
       base currently supports the ollama:// source shape only
       (MODEL_SOURCE=ollama://<library-tag>); hf:// GGUF support was
       intentionally removed for now. */ -}}
{{- $oe := .Values.olaresEnv | default dict -}}
{{- $modelSource := $oe.MODEL_SOURCE | default "" -}}
{{- $modelName := $oe.MODEL_NAME | default "" -}}
{{- $modelMode := $oe.MODEL_MODE | default "" -}}
{{- $modelSupports := $oe.MODEL_SUPPORTS | default "" -}}
{{- $logLevel := $oe.LOG_LEVEL | default "" -}}
{{- /* ENGINE_ARGS is mirrored onto llm-init so /api/config + diagnostics
       reflect the same OLLAMA_* tuning the ollama.sh wrapper exports.
       KEEP_ALIVE=true appends OLLAMA_KEEP_ALIVE=-1 unless already present. */ -}}
{{- $engineArgs := $oe.ENGINE_ARGS | default "" -}}
{{- if and $oe.KEEP_ALIVE (eq (lower (toString $oe.KEEP_ALIVE)) "true") -}}
{{- if not (contains "OLLAMA_KEEP_ALIVE" $engineArgs) -}}
{{- $engineArgs = trim (printf "%s OLLAMA_KEEP_ALIVE=-1" $engineArgs) -}}
{{- end -}}
{{- end -}}
---
# llm-init Pod (no GPU). Talks to the ollama daemon via the "ollama"
# Service on :11434 (defined in templates/ollama.yaml). llm-init v1.1.0
# derives that URL from ENGINE_KIND, so the Service name must be "ollama".
# Exposes the OpenAI-compatible /v1/*
# surface and the unified /api/progress + /healthz endpoints on :8090.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-init
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llm-init
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: llm-init
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: llm-init
    spec:
      restartPolicy: Always
      containers:
        - name: llm-init
          image: docker.io/beclab/llm-init:v1.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ENGINE_KIND
              value: ollama
            - name: ENGINE_ARGS
              value: "{{ $engineArgs }}"
            - name: MODEL_NAME
              value: "{{ $modelName }}"
            - name: MODEL_SOURCE
              value: "{{ $modelSource }}"
            - name: MODEL_MODE
              value: "{{ $modelMode }}"
{{- if $modelSupports }}
            - name: MODEL_SUPPORTS
              value: "{{ $modelSupports }}"
{{- end }}
            - name: PORT
              value: "8090"
            - name: LOG_LEVEL
              value: "{{ $logLevel }}"
            - name: LOG_FORMAT
              value: json
            - name: APP_URL
              value: "https://{{ $ollamaclientDomain }}"
          ports:
            - name: http
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /livez
              port: 8090
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /livez
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: download-svc
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llm-init
spec:
  selector:
    io.kompose.service: llm-init
  ports:
    - name: http
      port: 8090
      targetPort: 8090
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: sharedentrances-api
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: llm-init
spec:
  selector:
    io.kompose.service: llm-init
  ports:
    - name: http
      port: 80
      targetPort: 8090
  type: ClusterIP
