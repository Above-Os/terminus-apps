olaresManifest.version: "0.12.0"
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: ollamallmbasev3
  icon: https://app.cdn.olares.com/appstore/ollama/icon.png
  description: "Generic Ollama + llm-init base. Pick any model at install via env."
  appid: ollamallmbasev3
  title: Ollama LLM Base (llm-init)
  version: '1.2.5'
  categories:
    - AI
sharedEntrances:
  - name: ollamallmbasev3
    host: sharedentrances-api
    port: 0
    title: Ollama LLM API
    invisible: true
    authLevel: internal
    icon: https://app.cdn.olares.com/appstore/ollama/icon.png
entrances:
  # Routes straight to the llm-init download/UI Service (download-svc:8090).
  # The entrance NAME stays "ollamaclient" so .Values.domain.ollamaclient
  # (used for APP_URL in llm-init.yaml) keeps resolving after the nginx
  # clientproxy was removed. llm-init serves its own same-origin dashboard
  # (polls /api/progress; no websocket/SSE) so no proxy/CORS layer is needed.
  - name: ollamaclient
    port: 8090
    host: download-svc
    title: Ollama LLM
    icon: https://app.cdn.olares.com/appstore/ollama/icon.png
    openMethod: window
    authLevel: internal
# Declares every workload's replica count (v3 documented schema):
#   workloadReplicas.deployments.<name>  — Deployment metadata.name
#   workloadReplicas.statefulSets.<name> — StatefulSet metadata.name (omit if none)
# Keys MUST match rendered workload names and values.yaml workloads.<name>:
#   ollamallmbasev3 — engine Deployment (== appid / Release.Name)
#   llminit          — llm-init / entrance Deployment
workloadReplicas:
  ollamallmbasev3: 1
  llminit: 1
spec:
  versionName: '0.30.10'
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app and a generic *base*: it is NOT tied to any specific
    model. The model to serve is chosen entirely at install time through
    environment variables, so the same Helm chart can serve any Ollama model.

    **HOW IT WORKS**
    An Ollama daemon owns the model bytes; the llm-init sidecar drives
    `/api/pull` on first boot and exposes an OpenAI-compatible `/v1/*`
    surface plus a unified `/api/progress` + `/healthz` dashboard.

    **Stack**
    - **Ollama daemon** (`ollama/ollama`, port 11434): pulls + serves the model.
    - **llm-init** (`beclab/llm-init`, port 8090): OpenAI `/v1/*`, progress UI.
    - Inter-pod traffic via ClusterIP Service `ollama:11434` (the name is
      required because llm-init v1.1.0 derives the engine URL from ENGINE_KIND).

    **Model storage (App Common)**
    Pulled models go to the **shared, cross-app** App Common store
    `appCommon/ollama` (SSD on single-node, JuiceFS on multi-node). All
    ollama-based apps share this one dir, so blobs dedup by digest and you get a
    single unified view of downloaded models. The CUDA JIT compile cache lives
    alongside them under `appCommon/ollama/.nv`.

    **Install-time parameters (set per model)**
    - `MODEL_SOURCE` — `ollama://<library-tag>`, e.g. `ollama://qwen3.5:0.8b`.
    - `MODEL_NAME` — OpenAI client alias, e.g. `qwen3.5-0.8b`.
    - `MODEL_MODE` — `chat` or `embedding`.
    - `MODEL_SUPPORTS` — multi-select capability groups (Vision / Tools / Thinking /
      Embedding); each expands to the `supports_*` CSV seed. The field is required;
      pick Embedding when the model advertises no extra capabilities.
    - `ENGINE_ARGS` — daemon tuning, e.g. `OLLAMA_NUM_CTX=8192` or
      `OLLAMA_KEEP_ALIVE=-1` to pin the model in VRAM (empty for defaults).
    - `LOG_LEVEL` — `debug | info | warn | error` (default `debug`).
    - `OLLAMA_CPU_REQUEST` / `OLLAMA_MEMORY_REQUEST` / `OLLAMA_CPU_LIMIT` /
      `OLLAMA_MEMORY_LIMIT` — ollama pod CPU/RAM (fixed per clone template;
      not editable after install).
    - `OLLAMA_REQUIRED_GPU_MEMORY` — model memory quota (required at install;
      fixed after install). Accepts `8Gi` / `8192` / `8192Mi`. NVIDIA: rendered
      as a bare-MiB `nvidia.com/gpumem` integer; Spark: pod `memory`.

    **NOTE ON RESOURCES**
    - Manifest `accelerator` CPU/RAM/GPU use `-1` (auto): Olares derives them
      from the rendered chart. `requiredDisk` / `limitedDisk` stay fixed in the
      manifest (disk is not auto-summed from workloads). Tune ollama CPU/RAM
      and VRAM per model via the `OLLAMA_*` env vars above.

  upgradeDescription: |
    Generic Ollama + llm-init base (llm-init v1.2.3, ollama/ollama:0.30.6).
    Supports ollama:// Library pulls. Model identity and tuning are env.
    v1.2.3: fix Helm render — the v1.2.2 gpumem comment used a Go-template comment
    whose trim markers ({{- ... -}}) collapsed resources:/requests: onto one line;
    switched to a plain YAML (#) comment. No resource-value change.
    v1.2.2: set nvidia.com/gpumem on BOTH requests and limits (non-overcommittable
    extended resource; the gpu-inject webhook / auto-gpumem template apps read it
    from limits). gb10 unaffected (unified memory uses pod memory).
    v1.2.1: fix nvidia.com/gpumem to a bare MiB integer (HAMi base unit MiB; a
    Mi/Gi suffix was misread, e.g. 6144Mi -> 6442450944); accept 8Gi/8192/8192Mi.
    v1.2.0: version bump (no functional change).
    v1.1.18: engine Deployment name {{ .Release.Name }} for allowMultipleInstall.
    v1.1.17: raise shared engine MEMORY_LIMIT default to 35Gi.
    v1.1.16: unify engine CPU/RAM defaults to 200m/2Gi/6/35Gi across llm bases.
    v1.1.15: OLLAMA_REQUIRED_GPU_MEMORY no manifest default (install dialog).
    v1.1.14: gpumem as Mi (Gi×1024); resource OLLAMA_* envs non-editable.
    v1.1.13: drop strix-halo accelerator; Spark (nvidia-gb10) unified memory only.
    v1.1.11: repackage chart; accelerator auto-resource strings quoted as "-1".
    v1.0.5: accelerator resources auto (-1); ollama CPU/RAM/VRAM via OLLAMA_*
    env with defaults; LOG_LEVEL defaults to debug.
    v1.0.4: bump llm-init to v1.2.3, Ollama 0.30.6, raise llm-init memory limit to 1Gi.
    v1.0.0: models now live in the shared cross-app App Common store
    appCommon/ollama instead of Home/Ollama — re-pull on upgrade; old
    Home/Ollama copies can be deleted manually.

  developer: beclab
  website: https://github.com/beclab/llm-init
  sourceCode: https://github.com/beclab/llm-init
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  license:
    - text: MIT
      url: https://github.com/beclab/llm-init

  accelerator:
    # Modes (must match node gpu.bytetrade.io/type / install-time GPU selection):
    #   nvidia       — discrete GPU; OLLAMA_REQUIRED_GPU_MEMORY -> gpumem
    #   nvidia-gb10  — DGX Spark unified memory; same env -> pod memory
    # -1 = auto (CPU/RAM/GPU only): Olares sums rendered workload resources.
    # Disk is NOT auto-summed — keep requiredDisk/limitedDisk explicit.
    - mode: nvidia
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
      requiredGPUMemory: "-1"
      limitedGPUMemory: "-1"
    - mode: nvidia-gb10
      limitedCpu: "-1"
      requiredCpu: "-1"
      requiredDisk: 50Mi
      limitedDisk: 500Gi
      limitedMemory: "-1"
      requiredMemory: "-1"
  supportArch:
    - amd64
    - arm64
permission:
  appData: true
  # Models AND the CUDA JIT compile cache live in the shared cross-app App
  # Common store (appCommon/ollama). No Home/* userData mount is needed.
  appCommon: true   # access the shared Common directory
options:
  apiTimeout: 0
  LLMGatewaySupported: true
  allowMultipleInstall: true
  shared: true
  # This is a generic base with no bundled model: there is no installable body,
  # you create an instance (clone) and install that. Matches the base concept.
  templateOnly: true
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
envs:
  # Clone-configurable surface. Every entry is required with NO default, so
  # each install must explicitly set every value (the base ships no model).
  # The `example` comments are an illustrative qwen3.5:0.8b config.
  #
  # This base currently supports the ollama:// source shape only
  # (MODEL_SOURCE=ollama://<library-tag>). hf:// GGUF support is not wired.
  #
  # --- Model identity ---
  - envName: MODEL_SOURCE        # example: ollama://qwen3.5:0.8b
    required: true
    type: string
    editable: true
    applyOnChange: true
  - envName: MODEL_NAME          # example: qwen3.5-0.8b
    required: true
    type: string
    editable: true
    applyOnChange: true
  - envName: MODEL_MODE          # single-select: chat | embedding
    required: true
    type: string
    editable: true
    applyOnChange: true
    options:
      - title: Chat
        value: chat
      - title: Embedding
        value: embedding
  - envName: MODEL_SUPPORTS      # multi-select capability groups; expanded to supports_* CSV in chart
    required: true              # required:true so it shows in the install dialog;
    default: ""                 # default:"" lets the user leave it empty (= no caps)
    type: string
    editable: true
    applyOnChange: true
    multiSelect: true           # user ticks capability groups; values joined by splitter
    splitter: ","               # llm-init.yaml expands each group token into supports_* keys
    options:                    # coarse capability groups -> expanded one-to-many in chart
      - title: Vision
        value: vision
      - title: Tools
        value: tools
      - title: Thinking
        value: thinking
      - title: Embedding        # required-field fallback; expands to no supports_* keys
        value: embedding
  # --- Tuning ---
  - envName: ENGINE_ARGS         # example: OLLAMA_NUM_CTX=8192 OLLAMA_NUM_PARALLEL=2  ("" for daemon defaults)
    required: true              # required:true so it shows in the install dialog;
    default: ""                 # default:"" lets the user leave it empty (= daemon defaults)
    type: string
    editable: true
    applyOnChange: true
  - envName: LOG_LEVEL           # single-select: debug | info | warn | error
    required: false
    type: string
    editable: true
    applyOnChange: true
    default: "debug"
    options:
      - title: Debug
        value: debug
      - title: Info
        value: info
      - title: Warn
        value: warn
      - title: Error
        value: error
  # --- Ollama pod resources (fixed per clone template; rendered into ollama.yaml) ---
  - envName: OLLAMA_CPU_REQUEST    # default: 200m
    required: true
    default: "200m"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_REQUEST # default: 2Gi
    required: true
    default: "2Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_CPU_LIMIT      # default: 6
    required: true
    default: "6"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_MEMORY_LIMIT   # default: 35Gi
    required: true
    default: "35Gi"
    type: string
    editable: false
    applyOnChange: false
  - envName: OLLAMA_REQUIRED_GPU_MEMORY  # 8Gi/8192/8192Mi -> bare-MiB gpumem; gb10: pod memory
    required: true
    type: string
    editable: false
    applyOnChange: false
