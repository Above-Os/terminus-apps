olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: "v3"

workloadReplicas:
  llmgatewayv3: 1
metadata:
  name: llmgatewayv3
  appid: llmgatewayv3
  description: "LLM Gateway V3 for test"
  icon: https://app.cdn.olares.com/appstore/mtranserver/icon.png
  version: "1.0.6"
  title: LLM Gateway V3 for test
  categories:
    - Productivity_v112

permission:
  appData: true
  appCache: true
spec:
  onlyAdmin: true
  versionName: "2.0.3"
  featuredImage: https://app.cdn.olares.com/appstore/mtranserver/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/mtranserver/1.webp
  fullDescription: |
    LLM Gateway
  developer: olares
  website: https://github.com/beclab/llm-gateway
  sourceCode: https://github.com/beclab/llm-gateway
  submitter: Olares
  doc: https://github.com/beclab/llm-gateway
  license:
    - text: Apache-2.0
      url: https://github.com/xxnuo/MTranServer?tab=Apache-2.0-1-ov-file
  locale:
    - en-US
    - zh-CN
  requiredMemory: 2000Mi
  limitedMemory: 4Gi
  requiredDisk: 1Gi
  limitedDisk: 10Gi
  requiredCpu: 800m
  limitedCpu: 4
  supportArch:
    - amd64
    - arm64
options:
  shared: true
  conflicts:
    - name: llmgateway
      type: application
  dependencies:
    - name: olares
      version: ">=1.12.6-0"
      type: system
  appScope:
    clusterScoped: false
entrances:
  - name: llmgatewayv3-frontend
    host: llmgateway-svc
    port: 80
    title: LLM Gateway V3
    icon: https://app.cdn.olares.com/appstore/mtranserver/icon.png
    openMethod: window
    authLevel: internal
middleware:
  postgres:
    username: llmgatewayv3
    password: llmgatewayv3
    databases:
      - name: llmgatewayv3
        distributed: false
