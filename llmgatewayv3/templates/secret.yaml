{{- $secretName := printf "%s-secrets" .Release.Name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $key := randAlphaNum 32 | b64enc -}}
{{- if and $existing $existing.data (index $existing.data "LLM_GATEWAY_CRYPTO_ENCRYPTION_KEY") -}}
{{- $key = index $existing.data "LLM_GATEWAY_CRYPTO_ENCRYPTION_KEY" | b64dec -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: llmgatewayv3
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  LLM_GATEWAY_CRYPTO_ENCRYPTION_KEY: {{ $key | quote }}
