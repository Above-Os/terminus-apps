{{- $oe := .Values.olaresEnv | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: astrbot
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  ASTRBOT_DASHBOARD_INITIAL_PASSWORD: {{ $oe.ASTRBOT_DASHBOARD_INITIAL_PASSWORD | quote }}
