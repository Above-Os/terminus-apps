metadata:
  title: DeerFlow 2.0
  description: 一个开源的超级智能体深度研究框架
spec:
  fullDescription: |
    DeerFlow 2.0（Deep Exploration and Efficient Research Flow）是一个开源的超级智能体框架，能够协调子智能体、记忆和沙盒来处理复杂的 AI 任务。基于 LangGraph 和 LangChain 构建，是对原始 DeerFlow 框架的全面重写。
    
    **特性**
    **核心能力**
    - 超级智能体框架
      - 协调子智能体进行并行任务执行
      - 基于沙盒的代码执行（Docker 或本地）
      - 跨对话的持久化长期记忆
      - 可扩展的技能系统（基于 Markdown 的工作流）
    - LLM 集成
      - 通过 litellm 和 LangChain 支持集成大多数模型
      - 支持开源模型如 Qwen、DeepSeek 等
      - 兼容 OpenAI 的 API 接口
      - 多模型支持，具备思考/视觉能力
    
    **工具和 MCP 集成**
    - 搜索和检索
      - 通过 Tavily、Brave Search 等进行网络搜索
      - 使用 Jina 进行爬取
      - 高级内容提取
    - MCP 无缝集成
      - 扩展私有域访问、知识图谱、网页浏览等能力
      - 促进多样化研究工具和方法的集成
    
    **人机协作**
    - 人在环中
      - 支持使用自然语言交互式修改研究计划
      - 支持自动接受研究计划
    - 报告后期编辑
      - 支持类 Notion 的块编辑
      - 允许 AI 优化，包括 AI 辅助润色、句子缩短和扩展
      - 由 tiptap 提供支持
    
    **内容创作**
    - 基于技能的工作流
      - 研究报告、幻灯片、网页和图像生成
      - 自定义技能用于专业工作流
      - 播客脚本生成和音频合成

  upgradeDescription: |
    新增 PostgreSQL 数据库后端（由 Olares `middleware.postgres` 自动创建）以及内置账户与认证系统。升级后打开 app 会跳到 `/setup` 页面，请按提示创建首个 admin 账号。

    新增一组 subagent 调度上限的环境变量到 `deerflowv2-env-config`，无需重新打包镜像就能在线调整、解决 `Recursion limit reached` 报错。每个 subagent 有两个旋钮：`*_MAX_TURNS` 控制 LLM ↔ 工具最大往返轮数（超出时 LangGraph 抛 `GraphRecursionError`），`*_TIMEOUT_SECONDS` 控制墙钟上限（建议 ≥ `MAX_TURNS × 单轮耗时`）。`GENERAL_PURPOSE_*` 给深度研究子 agent 用（默认 `500` / `7200`），`BASH_*` 给 shell 子 agent 用（`300` / `1800`），`DEFAULT_*`（`200` / `1800`）只对你在 `config.yaml` 的 `subagents.custom_agents` 里自定义的子 agent 生效。常见症状对应：报 `Recursion limit reached` → 调高 `*_MAX_TURNS`；报"timed out" → 调高 `*_TIMEOUT_SECONDS`；本地小模型 / 量化重的模型通常需要更大的上限。修改 ConfigMap 后重启后端 deployment 即可生效。
