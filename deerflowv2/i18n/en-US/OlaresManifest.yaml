metadata:
  title: DeerFlow 2.0
  description: An open-source super agent harness for deep research.
spec:
  fullDescription: |
    DeerFlow 2.0 (Deep Exploration and Efficient Research Flow) is an open-source super agent harness that coordinates sub-agents, memory, and sandboxes for complex AI tasks. Built on LangGraph and LangChain, it is a ground-up rewrite of the original DeerFlow framework.
    
    **Key Features**
    **Core Capabilities**
    - Super Agent Harness
      - Coordinates sub-agents for parallel task execution
      - Sandbox-based code execution (Docker or local)
      - Persistent long-term memory across conversations
      - Extensible skills system (Markdown-based workflows)
    - LLM Integration
      - Supports integration of most models through litellm and LangChain
      - Support for open source models like Qwen, DeepSeek, etc.
      - OpenAI-compatible API interface
      - Multi-model support with thinking/vision capabilities
    
    **Tools and MCP Integrations**
    - Search and Retrieval
      - Web search via Tavily, Brave Search and more
      - Crawling with Jina
      - Advanced content extraction
    - MCP Seamless Integration
      - Expand capabilities for private domain access, knowledge graph, web browsing and more
      - Facilitates integration of diverse research tools and methodologies
    
    **Human Collaboration**
    - Human-in-the-loop
      - Supports interactive modification of research plans using natural language
      - Supports auto-acceptance of research plans
    - Report Post-Editing
      - Supports Notion-like block editing
      - Allows AI refinements, including AI-assisted polishing, sentence shortening, and expansion
      - Powered by tiptap
    
    **Content Creation**
    - Skills-based Workflows
      - Research reports, slide decks, web pages, and image generation
      - Custom skills for specialized workflows
      - Podcast script generation and audio synthesis

  upgradeDescription: |
    **1.0.11 corrects 1.0.10**: chart `1.0.10` appended libpq TCP keepalive query params to `DATABASE_URL`. That broke gateway startup: SQLAlchemy uses **asyncpg**, which forwards unknown URL kwargs to `asyncpg.connect()` → `TypeError: connect() got an unexpected keyword argument 'keepalives'`.

    - **Fix**: `DATABASE_URL` is plain postgres again (asyncpg-safe). New env **`CHECKPOINTER_DATABASE_URL`** carries the same DSN plus `?keepalives=1&keepalives_idle=30&keepalives_interval=10&keepalives_count=5` for LangGraph's psycopg pool only. Bundled `config.yaml` adds `database.checkpointer_postgres_url: $CHECKPOINTER_DATABASE_URL`. Harness change in deer-flow (`langgraph_postgres_url` property) — **backend image must be `v2.0.4-amd-pg` or newer**. Init-container migration injects `checkpointer_postgres_url` into existing on-disk configs that only had `postgres_url`.
    - **Idle `psycopg.OperationalError: the connection is closed`** (original motivation): addressed via keepalives on the checkpointer URL only; ORM already uses SQLAlchemy `pool_pre_ping=True` on postgres.

    Switches DeerFlow's persistence layer from a chart-managed SQLite file on hostPath to the Olares-managed PostgreSQL middleware. The unified deer-flow `database:` config (which drives the LangGraph checkpointer, user/auth store, threads metadata, and the run-event traces added in 1.0.8) now points at a per-app PostgreSQL database that the Olares `middleware.postgres` provisioner spins up automatically — same pattern as docmost / affine / flowise / hasura / lobechat.

    - **Backend image rebuilt**: use `v2.0.4-amd-pg` (includes split URL support); built with `UV_EXTRAS=postgres` so `asyncpg`, `psycopg[binary]`, `psycopg-pool`, and `langgraph-checkpoint-postgres` are baked in. Without these the `database.backend: postgres` config would fail at startup with `RuntimeError: postgres backend selected but asyncpg not installed`.
    - **`middleware.postgres` block** added to `OlaresManifest.yaml`. Olares auto-creates a database named `deerflow` owned by user `deerflow`, generates a random password, and exposes the connection details as `.Values.postgres.{username,password,host,port,databases.deerflow}` to the Helm template.
    - **`DATABASE_URL` + `CHECKPOINTER_DATABASE_URL`** injected into both gateway and langgraph containers. Bundled `config.yaml`: `database.postgres_url: $DATABASE_URL`, `database.checkpointer_postgres_url: $CHECKPOINTER_DATABASE_URL`.
    - **One-time data loss**: if you upgraded to 1.0.4 or later (sqlite-on-hostPath), your accounts, conversation history, and uploaded files registered against the local sqlite database **will not be carried over**. The init-container surgically rewrites the `database:` block in `appData/config/config.yaml` from sqlite to postgres while preserving every other field (your custom `models:`, etc.). The old `appData/deer-flow/db/deerflow.db` is left untouched on disk so you can still grab it manually if needed; deer-flow simply stops reading from it.
    - **First boot after this upgrade**: the gateway's first `lifespan` startup runs `Base.metadata.create_all(engine)` against the empty postgres database, creating all required tables in one shot. After that, opening the app redirects to `/setup` to create a fresh admin account — same flow as a clean install.
    - **`requiredDisk` lowered** from 2Gi to 512Mi: persistent state now lives in the shared Olares postgres data volume, not in the chart's hostPath. The hostPath mounts for `<appData>/config`, `<appData>/skills`, and `<appData>/deer-flow` (memory.json, per-thread uploads/outputs) are kept since those are not in the database.

    Audits the bundled `config.yaml` against upstream `config.example.yaml` (deer-flow main, May 2026) and pulls in every config knob that's safe and useful for an Olares single-tenant deployment. No backend image rebuild required. Existing installs are migrated in place by the init-container — the on-disk `appData/config/config.yaml` is patched section-by-section, idempotently, so any models or tweaks you've already added are preserved.

    - **UTF-8 locale**: `LANG`, `LC_ALL`, `PYTHONIOENCODING` set on both gateway and langgraph containers. Upstream commit `82e7936d` baked this into the Dockerfile, but our `v2.0.1` backend image was built before that — without these env vars Chinese filenames or emoji in tool output triggered `UnicodeEncodeError` inside `python:3.12-slim`.
    - **Run-event persistence**: `run_events.backend: db` (was `memory`). Conversation traces, tool-call timings, and per-run token counts now land in the same sqlite file as the user store, so restart no longer wipes the workspace UI's token-usage chart or the audit log of "what did the agent actually do last night".
    - **Token usage tracking**: `token_usage.enabled: true`. The provider-reported input/output/total token counts now show up in the workspace UI per turn, making it easy to spot a runaway Ultra session before it eats Tavily quota or burns local GPU.
    - **Upload limits**: bumped via three new env vars in `deerflowv2-env-config` — `UPLOADS_MAX_FILES=20`, `UPLOADS_MAX_FILE_SIZE=104857600` (100 MiB, was 50), `UPLOADS_MAX_TOTAL_SIZE=524288000` (500 MiB, was 100). Tune these instead of editing `config.yaml` directly. The defaults now accommodate 4K screenshots, multi-page scanned PDFs, and short screen recordings without rejecting them at the file picker.
    - **Skill preservation across summarization**: explicit `summarization.preserve_recent_skill_count: 5` etc. so a future deer-flow default change cannot silently summarize away the `image-ocr` SKILL.md mid-task.
    - **Circuit breaker**: `circuit_breaker.failure_threshold: 5` / `recovery_timeout_sec: 60` pinned. After 5 consecutive Ollama / vLLM / OpenAI failures the next 60s of LLM calls fast-fail instead of letting LangGraph retry-loops hammer a dying provider.
    - **Global subagent max_turns**: new `SUBAGENT_DEFAULT_MAX_TURNS=200` env var feeds `subagents.max_turns`, which only applies to user-defined `custom_agents` (the existing `general-purpose` / `bash` per-agent values still win for the built-ins). Lets you add a `custom_agents.analysis` block in `config.yaml` without having to also remember to set `max_turns` on it.
    - **New provider keys placeholders**: `SERPER_API_KEY`, `FIRECRAWL_API_KEY`, `EXA_API_KEY`, `GEMINI_API_KEY`, `VLLM_API_KEY` added to the env ConfigMap (empty by default). Switching `web_search` to Serper (upstream PR #2630) or Firecrawl now needs only an API key, no chart edit.
    - **Config version bump**: `config_version: 8` (was 2). Silences the `Your config.yaml ... is outdated` warning that gateway logged on every startup.

    Ships an `image-ocr` Skill that pins the canonical OCR workflow for uploaded images, fixing two regressions seen in 1.0.6: the model either hallucinated image contents (because deer-flow's `<uploaded_files>` middleware nudges every upload toward `read_file` / `grep` / `glob` regardless of file type) or reached for paddleocr / easyocr (~600 MB downloads that exceed `LocalSandbox.execute_command`'s 600s `subprocess.run` timeout). Also re-includes everything from 1.0.6.

    - New `image-ocr` Skill, dropped at `<appData>/skills/custom/image-ocr/SKILL.md` by the init-container on every pod start (so chart bumps push updated content). Custom-category skills are auto-enabled by deer-flow, which means the lead agent receives the skill's name and trigger description in its system prompt with no further configuration. The skill's decision tree is: try `view_image` first when the selected model has it (sub-second, exact characters), otherwise fall back to `pytesseract` plus the `tesseract-ocr` apt packages with Chinese + English language packs (~30s first install, <2s thereafter), and explicitly forbid paddleocr / easyocr / mmocr / rapidocr.
    - Operators who want a different OCR policy can edit the SKILL.md and rename its frontmatter `name:` to opt out of chart overwrites, or disable the skill from the Olares extensions UI.
    - Heads-up on file locations (no chart change, just upstream behavior since the auth migration): per-thread uploads and outputs now live under `<appData>/deerflowv2/deer-flow/users/<deerflow_user_id>/threads/<thread_id>/user-data/`. The legacy top-level `deer-flow/threads/` folder only holds pre-isolation history. To grab files from the Olares Files app, look under the `users/` subtree, or just ask the agent to `present_files` so the frontend renders a preview/download card.

    Restores the OCR / "ask the model to install and run a tool" workflow that broke after upstream landed PR #1547 (Security: Address critical host-shell escape in LocalSandboxProvider).

    - Sets `sandbox.allow_host_bash: true` in the bundled `config.yaml`. Upstream now hides the `bash` tool from the LLM whenever LocalSandboxProvider is the active sandbox — without this flag the model cannot `pip install pytesseract` / `apt-get install tesseract-ocr` (or any other runtime helper), which silently broke OCR on uploaded images and any other "let the model install what it needs" workflow that worked in 1.0.3 and earlier. In a single-tenant Olares deployment the gateway pod is already the trust boundary, so re-enabling this restores prior behavior without widening exposure. Operators who plan to expose the instance to untrusted users should switch to AioSandboxProvider (per-thread container) and flip the flag back to false.

    Adopts the new built-in authentication shipped in upstream DeerFlow and fixes the "CSRF token missing" 403 errors seen after the 1.0.3 backend upgrade.

    - Frontend image bumped to v2.0.3 to ship the login UI, CSRF-aware fetcher, and account settings page that pair with the new backend auth middleware.
    - First boot does NOT auto-create the admin account. After upgrade, opening the app redirects to `/setup` where you choose the admin email and password — gateway logs print `First boot detected — no admin account exists. Visit /setup to complete admin account creation.` If you ever lose the password, run `kubectl -n <ns> exec deploy/deerflowv2-backend -c gateway -- python -m app.gateway.auth.reset_admin --email <admin@email>`; that command writes the new password to `/data/deer-flow/admin_initial_credentials.txt` (mode 0600).
    - JWT signing key is generated as a randAlphaNum 64 on first install and stored in the `deerflowv2-auth-secret` Secret with `helm.sh/resource-policy: keep`. `helm upgrade` no longer rotates the key, so existing sessions stay valid across chart bumps.
    - User store moved to /data/deer-flow/db/deerflow.db (persistent hostPath). Earlier in-image relative path landed under /app/backend, so any users registered against that path will need to be re-created after this upgrade. The init-container now (a) idempotently appends the `database:` block to a pre-existing `appData/config/config.yaml` so upgrades from 1.0.3 pick up the new path without losing user-edited `models:` config, and (b) chown's the persistent hostPaths to uid 1000 so the runtime user can write `deerflow.db`, `admin_initial_credentials.txt`, and `.langgraph_api/`.
    - Clientproxy now sets `X-Forwarded-Proto: https` explicitly. The Olares entrance terminates TLS upstream of this proxy, so the previous `$scheme` value resolved to `http` and made the backend reject login/register POSTs with "Cross-site auth request denied".
    - Frontend container now sets `DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://deerflowv2-backend-svc:8001` and `DEER_FLOW_TRUSTED_ORIGINS=https://<entrance domain>`. The default points SSR at 127.0.0.1:8001, which only works in `make dev` co-located mode and otherwise surfaced as "Service temporarily unavailable" with `ECONNREFUSED 127.0.0.1:8001` in the frontend pod logs.
    - Clientproxy now routes `/api/langgraph/*` to the **gateway** (rewriting it to `/api/*`), aligning with the official `docker/nginx/nginx.conf` in upstream deer-flow. The previous direct `proxy_pass` to the langgraph container caused every browser-issued LangGraph request to land in `langgraph dev`'s auth handler — which, in a split-container deployment, has no access to the persistence engine (gateway lifespan is never executed in that process) and 500ed with `RuntimeError: get_local_provider() called before init_engine_from_config()`. With the new routing, all LangGraph protocol traffic is served by gateway's compat routers (threads/runs/thread_runs/assistants_compat) which talk to the langgraph container internally via langgraph_sdk.
