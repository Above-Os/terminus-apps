metadata:
  title: RSS Subscribe
  description: 为 Wise 提供 RSS 订阅服务。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序（例如 wise）调用它。

    ## 应用概览 ##
    为 Wise 及 Olares 上的其他应用提供 RSS 订阅服务。

  upgradeDescription: |
    将 RSS Subscribe 迁移到 v3 共享应用 schema。

    **更新内容**

    - **Schema**：OlaresManifest 升级至 `apiVersion: v3`。
    - **结构**：将原 `rsserver` + `rssubscribe` 双子 chart 合并为单 chart。
    - **共享**：将 `appScope.clusterScoped` + `appRef` 替换为 `options.shared: true`；调用方通过 `sharedentrances-rssubscribe` 访问 API。
    - **扩缩容**：通过 `workloadReplicas` 声明 `rssubscribe` 副本数。
