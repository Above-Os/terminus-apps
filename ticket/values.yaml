images:
  web:
    repository: beclab/olares-ticket-web-assisthub
    tag: v0.0.3
    pullPolicy: IfNotPresent
  bff:
    repository: beclab/olares-ticket-bff
    tag: v0.0.3
    pullPolicy: IfNotPresent

olaresEnv:
  SERVER_API_URL: https://ticket-api.olares.com
  OLARESD_BASE_URL: http://host.docker.internal:4100

bff:
  logRoot: /var/olares-pod-logs
  requireAuth: 'true'
  requestTimeoutMs: '30000'
  uploadTimeoutMs: '300000'

# Olares injects userspace.* at install time. These defaults only make
# `helm template` usable outside Olares.
userspace:
  userData: /tmp/olares-userdata
workloads:
  ticket:
    replicaCount: 1
  ticket-bff:
    replicaCount: 1
