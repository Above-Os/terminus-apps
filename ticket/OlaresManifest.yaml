olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  ticket-bff: 1
  ticket: 1
metadata:
  name: ticket
  description: Ticket system - user-facing assist hub
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: ticket
  version: '0.1.13'
  title: Ticket
  categories:
    - Productivity_v112

permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: '0.5.0'
  featuredImage: https://app.cdn.olares.com/appstore/ticket/1.webp
  fullDescription: |
    Ticket is a ticket management system that allows users to submit,
    track and manage support tickets directly from their Olares device.

    **Key Features**
    - Submit support tickets with device diagnostics
    - Track ticket status in real-time
    - Communicate with support staff
    - View ticket history
  developer: Olares
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 512Mi
  limitedMemory: 1Gi
  requiredDisk: 128Mi
  limitedDisk: 2Gi
  requiredCpu: 0.5
  limitedCpu: 2
  supportArch:
    - amd64
    - arm64
options:
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
entrances:
  - name: ticket
    port: 8080
    host: ticket-web-svc
    title: Ticket
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    openMethod: window
