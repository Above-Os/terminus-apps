olaresManifest.version: '0.11.0'
olaresManifest.type: app
metadata:
  name: ticket
  description: Ticket system - user-facing assist hub
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  appid: ticket
  version: '0.1.7'
  title: Ticket
  categories:
    - Utilities
permission:
  appData: true
  appCache: true
  userData:
    - Home
spec:
  versionName: '0.5.0'
  featuredImage: https://app.cdn.olares.com/appstore/ticket/1.webp
  fullDescription: |
    AssistHub is a ticket management system that allows users to submit,
    track and manage support tickets directly from their Olares device.

    **Key Features**
    - Submit support tickets with device diagnostics
    - Track ticket status in real-time
    - Communicate with support staff
    - View ticket history
  developer: Olares
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 512Mi
  limitedMemory: 1Gi
  requiredDisk: 128Mi
  limitedDisk: 2Gi
  requiredCpu: 0.5
  limitedCpu: 2
  supportArch:
    - amd64
    - arm64
options:
  dependencies:
    - name: olares
      version: '>=1.12.6-0'
      type: system
entrances:
  - name: ticket
    port: 8080
    host: ticket-web-svc
    title: Ticket
    icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
    openMethod: window
#    authLevel: private
envs:
  - envName: SERVER_API_URL
    type: string
    required: true
    editable: true
    default: 'https://ticket-api.olares.com'
    description: 'Central ticket API URL'
    regex: '^https?://[^/]+/?$'
  - envName: OLARESD_BASE_URL
    type: string
    required: true
    editable: true
    default: 'http://host.docker.internal:4100'
    description: 'Local olaresd URL'