{{- $pgPort := .Values.postgres.port | toString -}}
{{- $pgUrl := printf "postgresql://%s:%s@%s:%s/%s?sslmode=disable" (.Values.postgres.username | toString) (.Values.postgres.password | urlquery | toString) (.Values.postgres.host | toString) $pgPort (.Values.postgres.databases.coder | toString) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: coder
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  CODER_PG_CONNECTION_URL: {{ $pgUrl | quote }}
  {{- if and .Values.olaresEnv .Values.olaresEnv.ANTHROPIC_API_KEY }}
  ANTHROPIC_API_KEY: {{ .Values.olaresEnv.ANTHROPIC_API_KEY | quote }}
  {{- end }}
