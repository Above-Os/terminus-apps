olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'

workloadReplicas:
  readarr: 1
metadata:
  name: readarr
  description: An ebook and audiobook collection manager for Usenet and BitTorrent users
  icon: https://app.cdn.olares.com/appstore/readarr/icon.png
  appid: readarr
  version: '1.0.11'
  title: Readarr
  categories:
  - Fun

spec:
  versionName: '0.4.19'
  promoteImage:
  - https://app.cdn.olares.com/appstore/readarr/1.webp
  - https://app.cdn.olares.com/appstore/readarr/2.webp
  - https://app.cdn.olares.com/appstore/readarr/3.webp
  fullDescription: |
    Readarr can monitor multiple RSS feeds for new books from your favorite authors and will grab, sort, and rename them. Note that only one type of a given book is supported. If you want both an audiobook and ebook of a given book you will need multiple instances.

    **Major Features Include**
    - Can watch for better quality of the ebooks and audiobooks you have and do an automatic upgrade. e.g. from PDF to AZW3
    - Support for major platforms: Windows, Linux, macOS, Raspberry Pi, etc.
    - Automatically detects new books
    - Can scan your existing library and download any missing books
    - Automatic failed download handling will try another release if one fails
    - Manual search so you can pick any release or to see why a release was not downloaded automatically
    - Advanced customization for profiles, such that Readarr will always download the copy you want
    - Fully configurable book renaming
    - SABnzbd, NZBGet, QBittorrent, Deluge, rTorrent, Transmission, uTorrent, and other download clients are supported and integrated
    - Full integration with Calibre (add to library, conversion) (Requires Calibre Content Server)
    - And a beautiful UI

  upgradeDescription: |
    Upgrade Readarr to version 0.4.19-nightly
    Config changes: change olares directory mount path & entrance authlevel.
    - Change default Olares Home Directory mount path to /olares/userdata/home
    - Add persistent appData volume mount at /config
    - Switch container image to linuxserver/readarr
    - Entrance auth level changed to internal

    Note: linuxserver/readarr currently only publishes nightly builds on Docker Hub; no stable semver tag is available.

    Upgrade Highlights:
    - [Fixes] Task progress messages in the UI; author names in task list; disabled select input handling
    - [New Features] Link to author from book details; improved naming token wrapping

    Docker image: linuxserver/readarr:0.4.19-nightly

  developer: Readarr
  website: https://readarr.com/
  sourceCode: https://github.com/Readarr/Readarr
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://wiki.servarr.com/en/readarr
  legal:
  - text: Security policy
    url: https://github.com/Readarr/Readarr/security/policy
  license:
  - text: GPL-3.0,
    url: https://github.com/Readarr/Readarr/blob/develop/LICENSE.md
  requiredMemory: 128Mi
  limitedMemory: 256Mi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 0.1
  limitedCpu: 0.5
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.6-0'
entrances:
- name: readarr-svc
  port: 8787
  host: readarr-svc
  title: Readarr
  icon: https://app.cdn.olares.com/appstore/readarr/icon.png
  openMethod: window
  authLevel: internal
permission:
  appData: true
  appCache: true
  userData:
  - Home