olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: context7
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  description: Up-to-date code documentation for LLMs and AI code editors
  appid: context7
  title: Context7
  version: '1.0.0'
  categories:
  - Developer Tools
  - Productivity_v112
permission:
  appData: true
  appCache: true
spec:
  versionName: '2.1.4'
  fullDescription: |
    Context7 is an MCP (Model Context Protocol) server that provides up-to-date, version-specific
    documentation and code examples for LLMs and AI code editors.

    Key Features
    - Pulls up-to-date, version-specific documentation straight from the source.
    - No hallucinated APIs — code examples always match the library version you use.
    - Supports resolve-library-id and get-library-docs MCP tools.
    - Works with any MCP-compatible client (Cursor, Claude Desktop, OpenCode, etc.).
    - Runs as a Streamable HTTP MCP server for remote access.
    - Built-in Terminal for CLI operations (ctx7 commands).

    Usage
    - Use the Context7 MCP entrance to access the MCP HTTP endpoint.
    - Use the Context7 Terminal entrance to access the CLI in your browser.
    - Configure your MCP client to connect to the MCP endpoint URL (Streamable HTTP transport).
    - Optionally set a CONTEXT7_API_KEY for higher rate limits (get one free at context7.com/dashboard).
  developer: Upstash
  website: https://context7.com/
  sourceCode: https://github.com/upstash/context7
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  doc: https://context7.com/docs
  license:
  - text: MIT
    url: https://github.com/upstash/context7/blob/master/LICENSE
  requiredMemory: 320Mi
  limitedMemory: 1280Mi
  requiredDisk: 512Mi
  limitedDisk: 1Gi
  requiredCpu: 0.1
  limitedCpu: 1
  supportArch:
  - amd64
  - arm64
options:
  apiTimeout: 0
  allowedOutboundPorts:
  - 80
  - 443
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.3-0'
entrances:
- name: context7
  port: 8080
  host: context7ingress
  title: Context7 Terminal
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  openMethod: window
  authLevel: internal
- name: mcpapi
  port: 8081
  host: context7ingress
  title: Context7 MCP
  icon: https://app.cdn.olares.com/appstore/default/defaulticon.webp
  openMethod: window
  authLevel: internal
