---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: context7
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: context7
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: context7
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: context7
        bytetrade.io/terminal: context7
    spec:
      containers:
        - name: context7
          image: "docker.io/beclab/upstash-context7-mcp:2.1.4"
          securityContext:
            runAsUser: 0
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: PORT
              value: "8080"
            - name: CONTEXT7_API_KEY
              value: ""
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
          ports:
            - containerPort: 8080
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: context7
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: context7
spec:
  ports:
    - name: mcp
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: context7
status:
  loadBalancer: {}

