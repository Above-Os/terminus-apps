metadata:
  title: Context7
  description: 为 LLM 和 AI 代码编辑器提供最新代码文档的 MCP 服务器
spec:
  fullDescription: |
    Context7 是一个 MCP（Model Context Protocol）服务器，为 LLM 和 AI 代码编辑器提供最新的、
    特定版本的文档和代码示例。

    主要特性
    - 直接从源头拉取最新的、特定版本的文档。
    - 不会产生幻觉 API — 代码示例始终匹配您使用的库版本。
    - 支持 resolve-library-id 和 get-library-docs MCP 工具。
    - 兼容任何 MCP 客户端（Cursor、Claude Desktop、OpenCode 等）。
    - 以 Streamable HTTP MCP 服务器模式运行，支持远程访问。
    - 内置终端，可在浏览器中执行 CLI 操作（ctx7 命令）。

    使用方法
    - 通过 Context7 MCP 入口访问 MCP HTTP 端点。
    - 通过 Context7 Terminal 入口在浏览器中访问 CLI 终端。
    - 配置您的 MCP 客户端连接到 MCP 端点 URL（Streamable HTTP 传输方式）。
    - 可选：设置 CONTEXT7_API_KEY 以获得更高的速率限制（在 context7.com/dashboard 免费获取）。
