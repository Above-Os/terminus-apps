{{- $paperclipDomainENV := split  ","  .Values.domain.paperclip -}}
{{- $paperclipDomain := index $paperclipDomainENV "_0" -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperclip-nginx
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    server {
        listen 3100;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;
        proxy_set_header x-real-ip $remote_addr;
        proxy_set_header x-forwarded-for $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";
        proxy_buffering off;

        location / {
            proxy_pass http://127.0.0.1:3101;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: paperclip
  name: paperclip
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: paperclip
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: paperclip
        bytetrade.io/terminal: paperclip
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: init-permissions
        image: "docker.io/beclab/aboveos-busybox:1.37.0"
        imagePullPolicy: IfNotPresent
        command:
          - sh
          - '-c'
          - |
            set -e
            mkdir -p /paperclip/.local/bin /paperclip/.npm-global/bin \
              /paperclip/.config /paperclip/.local/share /paperclip/.cache
            chown -R 1000:1000 /paperclip || true
            chmod -R u+rwX,g+rwX /paperclip || true
            PATH_MARKER="# paperclip: brew-path"
            for rc in /paperclip/.bashrc /paperclip/.profile; do
              if ! grep -qF "$PATH_MARKER" "$rc" 2>/dev/null; then
                {
                  echo ""
                  echo "$PATH_MARKER"
                  echo 'export HOMEBREW_PREFIX="${HOMEBREW_PREFIX:-/home/linuxbrew/.linuxbrew}"'
                  echo 'export HOMEBREW_NO_AUTO_UPDATE="${HOMEBREW_NO_AUTO_UPDATE:-1}"'
                  echo 'export NPM_CONFIG_PREFIX="${NPM_CONFIG_PREFIX:-/paperclip/.npm-global}"'
                  echo 'export PATH="/opt/venvs/hermes/bin:/paperclip/.local/bin:/paperclip/.npm-global/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"'
                } >> "$rc"
              fi
            done
            chown 1000:1000 /paperclip/.bashrc /paperclip/.profile 2>/dev/null || true
            echo "[init-permissions] /paperclip ready (owner=1000:1000)"
        volumeMounts:
          - name: data
            mountPath: /paperclip
        securityContext:
          runAsUser: 0
      - name: init-install-dev
        image: "beclab/harveyff-openclaw-brew-base:2026.5.29-cli"
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command:
          - /bin/bash
          - -c
          - |
            set -euo pipefail
            if [ ! -d /brew-staging/.linuxbrew ]; then
              echo "[init-install-dev] FATAL: /brew-staging/.linuxbrew missing"
              exit 1
            fi
            mkdir -p /home/linuxbrew/.linuxbrew
            if cmp -s /brew-staging/.linuxbrew/.brew-base-build /home/linuxbrew/.linuxbrew/.brew-base-build 2>/dev/null; then
              echo "[init-install-dev] brew base up to date, skip copy"
            else
              echo "[init-install-dev] materializing brew base to appData..."
              cp -a /brew-staging/.linuxbrew/. /home/linuxbrew/.linuxbrew/
            fi
            chown -R 1000:1000 /home/linuxbrew || true
            echo "[init-install-dev] done"
        volumeMounts:
          - name: brew-volume
            mountPath: /home/linuxbrew
      - name: wait-for-postgres
        image: "docker.io/beclab/wait-for:0.1.0"
        args:
          - '-it'
          - >-
            {{ .Values.postgres.host }}:{{ .Values.postgres.port }}
        imagePullPolicy: IfNotPresent
      containers:
        - name: paperclip
          image: beclab/paperclipai-paperclip:sha-c297ba2
          imagePullPolicy: IfNotPresent
          command:
            - node
            - --import
            - ./server/node_modules/tsx/dist/loader.mjs
            - server/dist/index.js
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.paperclip }}"
            - name: PORT
              value: "3101"
            - name: HOST
              value: "127.0.0.1"
            - name: PAPERCLIP_BIND
              value: "loopback"
            - name: SERVE_UI
              value: "true"
            - name: PAPERCLIP_HOME
              value: "/paperclip"
            - name: HOME
              value: "/paperclip"
            - name: XDG_CONFIG_HOME
              value: "/paperclip/.config"
            - name: XDG_DATA_HOME
              value: "/paperclip/.local/share"
            - name: XDG_CACHE_HOME
              value: "/paperclip/.cache"
            - name: HOMEBREW_PREFIX
              value: "/home/linuxbrew/.linuxbrew"
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: NPM_CONFIG_PREFIX
              value: "/paperclip/.npm-global"
            - name: PATH
              value: "/opt/venvs/hermes/bin:/paperclip/.local/bin:/paperclip/.npm-global/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: "local_trusted"
            - name: PAPERCLIP_PUBLIC_URL
              value: "https://{{ $paperclipDomain }}"
            - name: BETTER_AUTH_BASE_URL
              value: "https://{{ $paperclipDomain }}"
            - name: PAPERCLIP_ALLOWED_HOSTNAMES
              value: "{{ .Values.domain.paperclip }}"
            - name: PAPERCLIP_API_URL
              value: "http://127.0.0.1:3101"
            - name: OPENAI_API_KEY
              value: '{{ .Values.olaresEnv.OPENAI_API_KEY }}'
            - name: ANTHROPIC_API_KEY
              value: '{{ .Values.olaresEnv.ANTHROPIC_API_KEY }}'
            - name: GEMINI_API_KEY
              value: '{{ .Values.olaresEnv.GEMINI_API_KEY }}'
            - name: CURSOR_API_KEY
              value: '{{ .Values.olaresEnv.CURSOR_API_KEY }}'
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 3000m
              memory: 6Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: /paperclip
              name: data
            - mountPath: /home/linuxbrew
              name: brew-volume
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf
        - name: paperclip-cli
          image: ghcr.io/paperclipai/paperclip:sha-0a2230b
          imagePullPolicy: IfNotPresent
          command:
            - sleep
            - infinity
          startupProbe:
            exec:
              command:
                - /home/linuxbrew/.linuxbrew/bin/python3
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 60
          env:
            - name: TERM
              value: xterm-256color
            - name: PAPERCLIP_HOME
              value: "/paperclip"
            - name: HOME
              value: "/paperclip"
            - name: XDG_CONFIG_HOME
              value: "/paperclip/.config"
            - name: XDG_DATA_HOME
              value: "/paperclip/.local/share"
            - name: XDG_CACHE_HOME
              value: "/paperclip/.cache"
            - name: HOMEBREW_PREFIX
              value: "/home/linuxbrew/.linuxbrew"
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: NPM_CONFIG_PREFIX
              value: "/paperclip/.npm-global"
            - name: PATH
              value: "/opt/venvs/hermes/bin:/paperclip/.local/bin:/paperclip/.npm-global/bin:/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: PAPERCLIP_PUBLIC_URL
              value: "https://{{ $paperclipDomain }}"
            - name: PAPERCLIP_ALLOWED_HOSTNAMES
              value: "{{ .Values.domain.paperclip }}"
            - name: PAPERCLIP_API_URL
              value: "http://127.0.0.1:3101"
            - name: PAPERCLIP_INTERNAL_URL
              value: "http://127.0.0.1:3101"
            - name: OPENAI_API_KEY
              value: '{{ .Values.olaresEnv.OPENAI_API_KEY }}'
            - name: ANTHROPIC_API_KEY
              value: '{{ .Values.olaresEnv.ANTHROPIC_API_KEY }}'
            - name: GEMINI_API_KEY
              value: '{{ .Values.olaresEnv.GEMINI_API_KEY }}'
            - name: CURSOR_API_KEY
              value: '{{ .Values.olaresEnv.CURSOR_API_KEY }}'
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - mountPath: /paperclip
              name: data
            - mountPath: /home/linuxbrew
              name: brew-volume
      volumes:
        - name: data
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appData }}/paperclip'
        - name: brew-volume
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appData }}/brew'
        - name: nginx-config
          configMap:
            name: paperclip-nginx
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: paperclip
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: paperclip
spec:
  ports:
    - name: http
      port: 3100
      targetPort: 3100
  selector:
    io.kompose.service: paperclip
