{{- $paperclipDomainENV := split  ","  .Values.domain.paperclip -}}
{{- $paperclipDomain := index $paperclipDomainENV "_0" -}}
{{- $existingApiKeys := lookup "v1" "ConfigMap" .Release.Namespace "paperclip-api-keys" }}
{{- $openaiKey := "" }}
{{- $anthropicKey := "" }}
{{- $geminiKey := "" }}
{{- $cursorKey := "" }}
{{- if and .Values.env .Values.env.OPENAI_API_KEY }}
{{- $openaiKey = .Values.env.OPENAI_API_KEY }}
{{- else if $existingApiKeys }}
{{- $openaiKey = index $existingApiKeys.data "OPENAI_API_KEY" | default "" }}
{{- end }}
{{- if and .Values.env .Values.env.ANTHROPIC_API_KEY }}
{{- $anthropicKey = .Values.env.ANTHROPIC_API_KEY }}
{{- else if $existingApiKeys }}
{{- $anthropicKey = index $existingApiKeys.data "ANTHROPIC_API_KEY" | default "" }}
{{- end }}
{{- if and .Values.env .Values.env.GEMINI_API_KEY }}
{{- $geminiKey = .Values.env.GEMINI_API_KEY }}
{{- else if $existingApiKeys }}
{{- $geminiKey = index $existingApiKeys.data "GEMINI_API_KEY" | default "" }}
{{- end }}
{{- if and .Values.env .Values.env.CURSOR_API_KEY }}
{{- $cursorKey = .Values.env.CURSOR_API_KEY }}
{{- else if $existingApiKeys }}
{{- $cursorKey = index $existingApiKeys.data "CURSOR_API_KEY" | default "" }}
{{- end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperclip-api-keys
  namespace: {{ .Release.Namespace }}
data:
  ANTHROPIC_API_KEY: {{ $anthropicKey | quote }}
  OPENAI_API_KEY: {{ $openaiKey | quote }}
  GEMINI_API_KEY: {{ $geminiKey | quote }}
  CURSOR_API_KEY: {{ $cursorKey | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: paperclip
  name: paperclip
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: paperclip
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: paperclip
    spec:
      initContainers:
      - name: init-permissions
        image: "docker.io/beclab/aboveos-busybox:1.37.0"
        imagePullPolicy: IfNotPresent
        command:
          - sh
          - '-c'
          - |
            mkdir -p /paperclip/instances/default/logs
            mkdir -p /paperclip/instances/default/data/storage
            mkdir -p /paperclip/instances/default/secrets
            chown -R 1000:1000 /paperclip
        resources: {}
        volumeMounts:
          - name: data
            mountPath: /paperclip
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        securityContext:
          runAsUser: 0
      - name: wait-for-postgres
        image: "docker.io/beclab/wait-for:0.1.0"
        args:
          - '-it'
          - >-
            {{ .Values.postgres.host }}:{{ .Values.postgres.port }}
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        imagePullPolicy: IfNotPresent
      containers:
        - name: paperclip
          image: beclab/paperclipai-paperclip:sha-2e09570
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
          command:
            - /bin/sh
            - '-c'
            - |
              set -e

              export HOME="/paperclip"
              export NPM_CONFIG_PREFIX="/paperclip/.npm-global"
              export PATH="/paperclip/.local/bin:/paperclip/.npm-global/bin:/usr/local/bin:/usr/bin:/bin:${PATH}"
              mkdir -p "/paperclip/.local/bin" "/paperclip/.npm-global/bin" \
                "/paperclip/.config" "/paperclip/.local/share" "/paperclip/.cache"

              echo "Ensuring local adapter CLIs are available..."

              if ! command -v agent >/dev/null 2>&1; then
                echo "Installing Cursor Agent CLI..."
                if command -v bash >/dev/null 2>&1; then
                  curl -fsSL https://cursor.com/install | bash || true
                else
                  curl -fsSL https://cursor.com/install | sh || true
                fi
              fi

              if ! command -v agent >/dev/null 2>&1; then
                echo "WARNING: Cursor Agent CLI (agent) is still not available after install attempt."
              fi

              if ! command -v gemini >/dev/null 2>&1; then
                echo "Installing Gemini CLI..."
                npm install -g @google/gemini-cli || true
              fi

              if ! command -v pi >/dev/null 2>&1; then
                echo "Installing Pi CLI..."
                npm install -g @mariozechner/pi-coding-agent || true
              fi

              if ! command -v hermes >/dev/null 2>&1; then
                echo "Installing Hermes CLI..."
                # Prefer official Hermes installer (pip package name is not guaranteed on PyPI).
                if command -v bash >/dev/null 2>&1; then
                  curl -fSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash || true
                else
                  curl -fSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | sh || true
                fi
              fi

              if ! command -v hermes >/dev/null 2>&1; then
                echo "WARNING: Hermes CLI (hermes) is still not available after install attempt."
              fi

              echo "CLI availability:"
              command -v agent || true
              command -v gemini || true
              command -v pi || true
              command -v hermes || true
              command -v opencode || true
              command -v codex || true
              command -v claude || true

              node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js &
              SERVER_PID=$!

              echo "Waiting for server to be ready..."
              for i in $(seq 1 60); do
                if curl -sf http://127.0.0.1:3100 > /dev/null 2>&1; then
                  echo "Server is ready."
                  break
                fi
                sleep 2
              done

              echo "Checking if bootstrap is needed..."
              BOOTSTRAP_OUTPUT=$(pnpm paperclipai auth bootstrap-ceo \
                --base-url "https://{{ $paperclipDomain }}" 2>&1) || true
              echo "$BOOTSTRAP_OUTPUT"

              if echo "$BOOTSTRAP_OUTPUT" | grep -qi "already has an admin"; then
                echo "Instance admin already exists."
              else
                INVITE_TOKEN=$(echo "$BOOTSTRAP_OUTPUT" | grep -oE 'pcp_bootstrap_[a-f0-9]+' | head -1)
                if [ -z "$INVITE_TOKEN" ]; then
                  echo "WARNING: Could not extract invite token."
                else
                  echo "=== Auto-bootstrapping instance admin ==="

                  echo "Step 1: Registering admin user..."
                  SIGNUP_RESP=$(curl -s -X POST http://127.0.0.1:3100/api/auth/sign-up/email \
                    -H "Content-Type: application/json" \
                    -d '{"name":"Admin","email":"admin@paperclip.local","password":"changeme123!"}' 2>&1) || true
                  echo "Signup response: $SIGNUP_RESP"

                  USER_ID=$(echo "$SIGNUP_RESP" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).user.id)}catch{}})" 2>/dev/null)
                  echo "User ID: $USER_ID"

                  if [ -n "$USER_ID" ]; then
                    echo "Step 2: Promoting user to instance admin via DB..."
                    export INVITE_TOKEN USER_ID

                    # Node resolves bare imports from the script's directory; /tmp has no node_modules.
                    # Writable /paperclip/.bootstrap + symlink lets @paperclipai/db resolve like /app/cli.
                    mkdir -p /paperclip/.bootstrap
                    rm -f /paperclip/.bootstrap/node_modules
                    ln -sfn /app/cli/node_modules /paperclip/.bootstrap/node_modules
                    cat > /paperclip/.bootstrap/_bootstrap_admin.mjs << 'JSEOF'
              import { createDb, instanceUserRoles, invites } from '@paperclipai/db';
              import { eq } from 'drizzle-orm';
              import { createHash } from 'node:crypto';
              import { writeFileSync } from 'node:fs';

              const db = createDb(process.env.DATABASE_URL);
              const userId = process.env.USER_ID;
              const token = process.env.INVITE_TOKEN;

              try {
                await db.insert(instanceUserRoles).values({
                  userId: userId,
                  role: 'instance_admin',
                });
                console.log('Inserted instance_admin role for user', userId);

                const tokenHash = createHash('sha256').update(token).digest('hex');
                const now = new Date();
                await db.update(invites)
                  .set({ acceptedAt: now, updatedAt: now })
                  .where(eq(invites.tokenHash, tokenHash));
                console.log('Marked invite as accepted');

                writeFileSync('/paperclip/.admin_bootstrapped', 'done');
                console.log('=== Instance admin created successfully ===');
                console.log('Login: admin@paperclip.local / changeme123!');
              } catch (err) {
                console.error('DB bootstrap error:', err.message);
              } finally {
                process.exit(0);
              }
              JSEOF
                    node --import /app/cli/node_modules/tsx/dist/loader.mjs /paperclip/.bootstrap/_bootstrap_admin.mjs 2>&1 || true
                    rm -rf /paperclip/.bootstrap
                  else
                    echo "WARNING: Could not extract user ID from signup response."
                  fi
                fi
              fi

              wait $SERVER_PID
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3100"
            - name: SERVE_UI
              value: "true"
            - name: PAPERCLIP_HOME
              value: "/paperclip"
            - name: HOME
              value: "/paperclip"
            - name: XDG_CONFIG_HOME
              value: "/paperclip/.config"
            - name: XDG_DATA_HOME
              value: "/paperclip/.local/share"
            - name: XDG_CACHE_HOME
              value: "/paperclip/.cache"
            - name: PAPERCLIP_DEPLOYMENT_MODE
              value: "authenticated"
            - name: PAPERCLIP_DEPLOYMENT_EXPOSURE
              value: "private"
            - name: PAPERCLIP_PUBLIC_URL
              value: "https://{{ $paperclipDomain }}"
            - name: BETTER_AUTH_SECRET
              value: "{{ .Release.Name }}-{{ .Release.Namespace }}-paperclip-secret"
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:{{ .Values.postgres.port }}/{{ .Values.postgres.databases.paperclip }}"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: paperclip-api-keys
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: paperclip-api-keys
                  key: OPENAI_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: paperclip-api-keys
                  key: GEMINI_API_KEY
            - name: CURSOR_API_KEY
              valueFrom:
                configMapKeyRef:
                  name: paperclip-api-keys
                  key: CURSOR_API_KEY
            - name: PAPERCLIP_API_URL
              value: "http://localhost:3100"
            - name: PAPERCLIP_INTERNAL_URL
              value: "http://localhost:3100"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: /paperclip
              name: data
          readinessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 3100
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      volumes:
        - name: data
          hostPath:
            type: DirectoryOrCreate
            {{- if .Values.sysVersion }}
              {{- if semverCompare ">=1.12.3-0" (toString .Values.sysVersion) }}
            path: '{{ .Values.userspace.appData }}'
              {{- else }}
            path: '{{ .Values.userspace.appData }}/{{ .Release.Name }}'
              {{- end }}
            {{- else }}
            path: '{{ .Values.userspace.appData }}/{{ .Release.Name }}'
            {{- end }}
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: paperclip
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: paperclip
spec:
  ports:
    - name: http
      port: 3100
      targetPort: 3100
  selector:
    io.kompose.service: paperclip
