{{- $secretName := printf "%s-secrets" .Release.Name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $auth := printf "%s-%s-paperclip-secret" .Release.Name .Release.Namespace -}}
{{- if and $existing $existing.data (index $existing.data "BETTER_AUTH_SECRET") -}}
{{- $auth = index $existing.data "BETTER_AUTH_SECRET" | b64dec -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: paperclip
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ $auth | quote }}
