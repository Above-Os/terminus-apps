{{- $oe := .Values.olaresEnv | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: directus
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  SECRET: {{ $oe.SECRET | quote }}
  ADMIN_PASSWORD: {{ $oe.ADMIN_PASSWORD | quote }}
  DB_PASSWORD: {{ .Values.postgres.password | quote }}
