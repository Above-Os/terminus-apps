# openclaw.json lifecycle:
  # 1) First deploy: init-chmod-data creates .openclaw dir, copies openclaw.json from ConfigMap when missing, sets ownership.
  # 2) Runtime: app reads/writes openclaw.json on app-data-config; changes persist across restarts.
  # 3) Helm upgrade: init only copies default when file is missing; never overwrites.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: clawdbot
  name: "{{ .Release.Name }}"
  namespace: "{{ .Release.Namespace }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: clawdbot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: clawdbot
        bytetrade.io/terminal: clawdbot
    spec:
      # Recommended: make mounted volumes writable/readable for UID/GID 1000 more reliably
      securityContext:
        fsGroup: 1000

      initContainers:
        - name: init-install-brew
          image: "beclab/debian:bookworm-slim"
          securityContext:
            runAsUser: 0
          env:
            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              BREW="${HOMEBREW_PREFIX}/bin/brew"

              if [ -x "$BREW" ]; then
                echo "[init-brew] brew already installed, skip"
                chown -R 1000:1000 /home/linuxbrew
                exit 0
              fi

              echo "[init-brew] installing build dependencies..."
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                ca-certificates curl file git build-essential procps

              echo "[init-brew] bootstrapping brew via git clone..."
              mkdir -p "${HOMEBREW_PREFIX}/Homebrew"
              BREW_GITHUB="https://github.com/Homebrew/brew"
              BREW_MIRROR="https://mirrors.ustc.edu.cn/brew.git"
              git clone --depth=1 "$BREW_GITHUB" "${HOMEBREW_PREFIX}/Homebrew" \
                || git clone --depth=1 "$BREW_MIRROR" "${HOMEBREW_PREFIX}/Homebrew"
              mkdir -p "${HOMEBREW_PREFIX}/bin"
              ln -sf ../Homebrew/bin/brew "${HOMEBREW_PREFIX}/bin/brew"
              mkdir -p "${HOMEBREW_PREFIX}/etc" \
                       "${HOMEBREW_PREFIX}/include" \
                       "${HOMEBREW_PREFIX}/lib" \
                       "${HOMEBREW_PREFIX}/opt" \
                       "${HOMEBREW_PREFIX}/sbin" \
                       "${HOMEBREW_PREFIX}/share" \
                       "${HOMEBREW_PREFIX}/var/homebrew/linked" \
                       "${HOMEBREW_PREFIX}/Cellar"

              id -u 1000 &>/dev/null || useradd -m -u 1000 -s /bin/bash brewuser
              chown -R 1000:1000 /home/linuxbrew

              chown -R 1000:1000 /home/linuxbrew

              runuser -u "$(id -nu 1000)" -- bash -c "
                export PATH=\"${HOMEBREW_PREFIX}/bin:${HOMEBREW_PREFIX}/sbin:\${PATH}\"
                export HOMEBREW_NO_AUTO_UPDATE=1
                brew --version
              "

              echo "[init-brew] done — skills can 'brew install' deps on demand"
          resources: {}
          volumeMounts:
            - mountPath: /home/linuxbrew
              name: deps-pvc
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent

        - name: init-chmod-data
          image: "beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              OPENCLAW_UID=1000
              OPENCLAW_GID=1000
              if [ ! -d /home/node/.openclaw ]; then
                mkdir -p /home/node/.openclaw
                echo "Created directory: /home/node/.openclaw"
              else
                echo "Directory already exists: /home/node/.openclaw"
              fi
              if [ ! -d /home/node/.npm-global ]; then
                mkdir -p /home/node/.npm-global/bin
                echo "Created directory: /home/node/.npm-global"
              else
                echo "Directory already exists: /home/node/.npm-global"
              fi
              if [ ! -f /home/node/.openclaw/openclaw.json ]; then
                cp /default-openclaw/openclaw.json /home/node/.openclaw/openclaw.json
                echo "Created openclaw.json from default config"
              else
                echo "openclaw.json already exists, skipping (upgrade-safe)"
              fi
              chown -R ${OPENCLAW_UID}:${OPENCLAW_GID} /home/node/.openclaw || true
              chown -R ${OPENCLAW_UID}:${OPENCLAW_GID} /home/node || true
              chmod -R 700 /home/node/.openclaw || true
              chmod -R 700 /home/node || true
              echo "Directory permissions set for UID ${OPENCLAW_UID} (upgrade-safe from root)"
          resources: {}
          volumeMounts:
            - mountPath: /home/node/.openclaw
              name: app-data-config
            - mountPath: /home/node
              name: app-data-node
            - mountPath: /default-openclaw
              name: default-openclaw
              readOnly: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0

      containers:
        - image: "beclab/openclaw-openclaw:2026.3.1"
          name: clawdbot
          command:
            [
              "node",
              "dist/index.js",
              "gateway",
              "--bind",
              "lan",
              "--port",
              "18789",
              "--allow-unconfigured",
            ]
          ports:
            - containerPort: 18789
          env:
            - name: HOME
              value: /home/node
            - name: TERM
              value: xterm-256color
            - name: NPM_CONFIG_PREFIX
              value: /home/node/.npm-global

            - name: HOMEBREW_PREFIX
              value: /home/linuxbrew/.linuxbrew
            - name: HOMEBREW_NO_AUTO_UPDATE
              value: "1"
            - name: PATH
              value: "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/home/node/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

          resources:
            limits:
              cpu: "4"
              memory: 8Gi
            requests:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - mountPath: /home/node/.openclaw
              name: app-data-config
            - mountPath: /home/node/
              name: app-data-node
            - mountPath: /usr/local/bin/openclaw
              name: openclaw-bin
              subPath: openclaw
              readOnly: true

            - mountPath: /home/linuxbrew
              name: deps-pvc

            {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/home/
              name: olares-home-dir
            {{ end }}
            {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
            - mountPath: /home/userdata/external/
              name: olares-external-dir
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

      restartPolicy: Always
      volumes:
        - hostPath:
            path: "{{ .Values.userspace.appData }}/config"
            type: DirectoryOrCreate
          name: app-data-config
        - hostPath:
            path: "{{ .Values.userspace.appData }}/node"
            type: DirectoryOrCreate
          name: app-data-node

        # Change #3 only: store deps under appData via hostPath (no PVC reference)
        - name: deps-pvc
          hostPath:
            path: "{{ .Values.userspace.appData }}/deps"
            type: DirectoryOrCreate

        - name: default-openclaw
          configMap:
            name: clawdbot-default-openclaw
            items:
              - key: openclaw.json
                path: openclaw.json
        - name: openclaw-bin
          configMap:
            name: clawdbot-openclaw-bin
            defaultMode: 0755

        {{- if eq (toString .Values.olaresEnv.ALLOW_HOME_DIR_ACCESS) "true" }}
        - name: olares-home-dir
          hostPath:
            path: "{{ .Values.userspace.userData }}"
            type: DirectoryOrCreate
        {{- end }}
        {{- if eq (toString .Values.olaresEnv.ALLOW_EXTERNAL_DIR_ACCESS) "true" }}
        - name: olares-external-dir
          hostPath:
            path: "{{ .Values.sharedlib }}"
            type: DirectoryOrCreate
        {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: clawdbot
  name: clawdbot
  namespace: "{{ .Release.Namespace }}"
spec:
  ports:
    - name: "18789"
      port: 18789
      targetPort: 18789
  selector:
    io.kompose.service: clawdbot