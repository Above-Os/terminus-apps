metadata:
  title: AFFiNE
  description: Open-source alternative for Notion, Miro and Airtable.
spec:
  fullDescription: |
    AFFiNE is an open-source, all-in-one workspace and an operating system for all the building blocks that assemble your knowledge base and much more -- wiki, knowledge management, presentation and digital assets.
    It's a better alternative to Notion and Miro.
    
    **Features**
    A true canvas for blocks in any form. Docs and whiteboard are now fully merged.
    - Many editor apps claim to be a canvas for productivity, but AFFiNE is one of the very few which allows you to put any building block on an edgeless canvas -- rich text, sticky notes, any embedded web pages, multi-view databases, linked pages, shapes and even slides. We have it all.

    Multimodal AI partner ready to kick in any work
    - Write up professional work report? Turn an outline into expressive and presentable slides? Summary an article into a well-structured mindmap? Sorting your job plan and backlog for tasks? Or... draw and code prototype apps and web pages directly all with one prompt? With you, AFFiNE AI pushes your creativity to the edge of your imagination.

    Local-first & Real-time collaborative
    - We love the idea of local-first that you always own your data on your disk, in spite of the cloud. Furthermore, AFFiNE supports real-time sync and collaborations on web and cross-platform clients.
    - Note: multi user collaborations is not supported yet on self-hosteded AFFiNE.
  upgradeDescription: |
    Upgrade AFFiNE to v0.27.2; move `DATABASE_URL` into Kubernetes Secret (`secretKeyRef`).

    **Chart / deploy notes:**
    - Image: `beclab/toeverything-affine:0.25.7` → `0.27.2`
    - Startup command unchanged (`self-host-predeploy.js` migration Job + server on port 3010)
    - Runtime env kept compatible with official self-host compose: `DATABASE_URL`, `REDIS_SERVER_HOST`, `AFFINE_INDEXER_ENABLED`, plus `AFFINE_SERVER_HOST` / `AFFINE_SERVER_HTTPS` for the Olares entrance domain
    - `DATABASE_URL` uses `sslmode=disable` for Olares system Postgres (0.27 BackendRuntime TLS rejects middleware peer certs otherwise)
    - From server 0.27, env is no longer the preferred config source for some settings; prefer Admin Panel or `config.json` under the config volume for advanced options (see https://docs.affine.pro/self-host-affine/install/configuration)
    - Client/server compatibility: server 0.27+ requires clients >= 0.26; clients 0.27+ require server >= 0.27

    **Upstream v0.27.2 highlights:**
    - Native client: fix login status may be lost
    - Backend: fix MCP requests potentially being accidentally intercepted

    Full release notes: https://github.com/toeverything/AFFiNE/releases/tag/v0.27.2
