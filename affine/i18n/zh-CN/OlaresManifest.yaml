metadata:
  description: 开源的 Notion、Miro 和 Airtable 替代品。
  title: AFFiNE
spec:
  fullDescription: |
    AFFiNE 是开源的一站式工作空间和操作系统，覆盖了组建知识库所需的各种模块——如维基、知识管理、演示文稿和数字资产。
    比 Notion 和 Miro 更好的选择。

    **功能特定**
    能处理任何形式的内容块。文档和白板功能已完全整合。
    - 许多编辑器应用称能为生产力提供服务，但 AFFiNE 允许用户在无边界的画布上自由放置各种元素——如富文本、便签、网页、多视图数据库、链接页面、图形甚至是幻灯片。应有尽有。

    随时准备启动的多模态 AI 伙伴
    - 需要撰写专业的工作报告？想把大纲变成生动的演示幻灯片？需要将文章总结为清晰的思维导图？整理你的工作计划和任务列表？或者... 直接在一个平台上绘制和编码应用及网页原型？AFFiNE AI 帮助你将创意进行到底。

    本地优先&实时协作
    - 我们倾向于本地优先，确保你的数据始终在自己的硬盘上，省去云依赖。此外，AFFiNE 还支持网页和跨平台客户端的实时同步和协作。
    - 注意：自托管的 AFFiNE 目前还不支持多用户协作。

  upgradeDescription: |
    升级 AFFiNE 至 v0.27.2；将 `DATABASE_URL` 迁入 Kubernetes Secret（`secretKeyRef`）。

    **Chart / 部署说明：**
    - 镜像：`beclab/toeverything-affine:0.25.7` → `0.27.2`
    - 启动命令未变（`self-host-predeploy.js` 迁移 Job + 服务端口 3010）
    - 运行时环境变量与官方 self-host compose 保持兼容：`DATABASE_URL`、`REDIS_SERVER_HOST`、`AFFINE_INDEXER_ENABLED`，以及用于 Olares 入口域名的 `AFFINE_SERVER_HOST` / `AFFINE_SERVER_HTTPS`
    - `DATABASE_URL` 使用 `sslmode=disable` 连接 Olares 系统 Postgres（否则 0.27 BackendRuntime TLS 会因中间件证书版本报错）
    - 自 server 0.27 起，部分配置不再优先从环境变量读取；高级配置请使用管理后台或 config 卷下的 `config.json`（见 https://docs.affine.pro/self-host-affine/install/configuration）
    - 客户端兼容：server 0.27+ 需要客户端 >= 0.26；客户端 0.27+ 需要 server >= 0.27

    **上游 v0.27.2 要点：**
    - 原生客户端：修复登录状态可能丢失
    - 后端：修复 MCP 请求可能被误拦截

    完整发布说明：https://github.com/toeverything/AFFiNE/releases/tag/v0.27.2
