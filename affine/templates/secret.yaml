{{- $pgPort := .Values.postgres.port | toString -}}
{{- $pgUrl := printf "postgresql://%s:%s@%s:%s/%s?sslmode=disable" (.Values.postgres.username | toString) (.Values.postgres.password | toString) (.Values.postgres.host | toString) $pgPort (.Values.postgres.databases.affine | toString) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: affine
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ $pgUrl | quote }}
