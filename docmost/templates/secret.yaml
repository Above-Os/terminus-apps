{{- $app_secret := (lookup "v1" "Secret" .Release.Namespace "docmost") -}}
{{- $secret_value := "" -}}
{{- if $app_secret -}}
{{- $secret_value = (index $app_secret "data" "app-password") -}}
{{- else -}}
{{- $secret_value = randAlphaNum 32 | b64enc -}}
{{- end -}}
{{- $pgPort := .Values.postgres.port | toString -}}
{{- $pgUrl := printf "postgresql://%s:%s@%s:%s/%s?schema=public" (.Values.postgres.username | toString) (.Values.postgres.password | toString) (.Values.postgres.host | toString) $pgPort (.Values.postgres.databases.docmost | toString) -}}
apiVersion: v1
kind: Secret
metadata:
  name: docmost
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: app
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: app
    app.kubernetes.io/version: 1.0.0
    helm.sh/chart: app-1.0.0
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  app-password: {{ $secret_value }}
stringData:
  DATABASE_URL: {{ $pgUrl | quote }}
  {{- if and .Values.olaresEnv .Values.olaresEnv.SMTP_PASSWORD }}
  SMTP_PASSWORD: {{ .Values.olaresEnv.SMTP_PASSWORD | quote }}
  {{- end }}
