olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: docmost
  description: Open-source collaborative wiki and documentation software.
  icon: https://app.cdn.olares.com/appstore/docmost/icon.png
  appid: docmost
  version: '1.0.11'
  title: Docmost
  categories:
  - Productivity_v112  
  - Productivity  
  - Utilities  
permission:
  appData: true
  appCache: true
  userData:
  - Home
spec:
  versionName: '0.21.0'
  featuredImage: https://app.cdn.olares.com/appstore/docmost/1.jpg
  promoteImage:
  - https://app.cdn.olares.com/appstore/docmost/1.jpg
  - https://app.cdn.olares.com/appstore/docmost/2.jpg
  - https://app.cdn.olares.com/appstore/docmost/3.jpg
  - https://app.cdn.olares.com/appstore/docmost/4.jpg    
  fullDescription: |
    Docmost is an open-source collaborative wiki and documentation software.
    It is an open-source alternative to Confluence and Notion.

    **Features**
    - Real-time collaboration
    - Diagrams (Draw.io, Excalidraw and Mermaid)
    - Spaces
    - Permissions management
    - Groups
    - Comments
    - Page history
    - Search
    - File attachment
  upgradeDescription: |
    Upgrade to v0.21.0

    Highlight
    Zip imports (import MD/HTML + attachments)
    Notion import
    Generic iframe embed
    Read and edit mode preference

    What's Changed
    Fix typo in enforce-sso.tsx by @edo0 in #1145
    [Issue-1091] fix alignment in shared page by @fuscodev in #1123
    fix: title update by @fuscodev in #1154
    feat: realtime comments by @fuscodev in #1144
    fix: Copy/move pages between spaces does not show spaces list by @fuscodev in #1174
    fix(table-hover): adjust height to prevent unexpected scrollbar by @PolarWS in #1124
    feat: create new page from mention by @fuscodev in #1153
    feat: comment editor emoji picker and ctrl+enter action by @fuscodev in #1121
    cloud: add second plan by @Philipinho in #1187
    hide shared page branding in EE by @Philipinho in #1193
    #1186/chore: add support language abap syntax highlight by @sanua356 in #1188
    fix: sidebar list when changing workspace by @fuscodev in #1150
    feat: bulk page imports by @Philipinho in #1219
    feat: toggle table header row and column by @Philipinho in #1203
    feat: generic iframe embed by @Philipinho in #1234
    feat: enhance excalidraw by @Philipinho in #1240
    fix: make link popup work on safari by @chaitanyya in #1243
    chore: upgrade packages by @Philipinho in #1242
    New Crowdin updates by @Philipinho in #1063
    feat: ukrainian language support by @Philipinho in #1250
    fix: revert tiptap version by @Philipinho in #1255
    fix: enforce SSO in invitation signups by @Philipinho in #1258
    remove workspace field in signup (cloud) by @Philipinho in #1265
    feat: edit mode preference by @fuscodev in #666

    View full release note at: https://github.com/docmost/docmost/releases/tag/v0.21.0

  developer: Docmost
  website: https://docmost.com/
  submitter: Olares
  doc: https://docmost.com/docs  
  sourceCode: https://github.com/docmost/docmost
  license:
  - text: AGPL-3.0
    url: https://github.com/docmost/docmost?tab=readme-ov-file#AGPL-3.0-1-ov-file
  locale:
  - en-US
  - zh-CN
  requiredMemory: 512Mi
  limitedMemory: 4Gi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 0.5
  limitedCpu: 4
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.2-0'
  policies:
    - uriRegex: ^/(share/)
      level: public
      oneTime: false
      validDuration: 3600s
      entranceName: docmost
entrances:
- name: docmost
  port: 3000
  host: docmost
  title: Docmost
  icon: https://app.cdn.olares.com/appstore/docmost/icon.png
  authLevel: internal
middleware:
  postgres:
    username: docmost
    databases:
    - name: docmost
envs:
  - envName: SMTP_HOST
    required: false
    applyOnChange: true    
    valueFrom:
      envName: OLARES_USER_SMTP_SERVER
  - envName: SMTP_PORT
    required: false
    applyOnChange: true    
    valueFrom:
      envName: OLARES_USER_SMTP_PORT
  - envName: SMTP_USERNAME
    required: false
    applyOnChange: true    
    valueFrom:
      envName: OLARES_USER_SMTP_USERNAME      
  - envName: SMTP_PASSWORD
    required: false
    applyOnChange: true    
    valueFrom:
      envName: OLARES_USER_SMTP_PASSWORD
  - envName: SMTP_SECURE
    required: false
    applyOnChange: true    
    valueFrom:
      envName: OLARES_USER_SMTP_SECURE
  - envName: SMTP_FROM_ADDRESS
    required: false
    applyOnChange: true
    valueFrom:
      envName: OLARES_USER_SMTP_FROM_ADDRESS    
  - envName: SMTP_FROM_NAME
    required: false
    type: string
    editable: true
    applyOnChange: true