apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradingagents
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: tradingagents
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: tradingagents
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: tradingagents
    spec:
      initContainers:
        - name: init-chmod-data
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - "-c"
            - |
              mkdir -p /data
              chown -R 1000:1000 /data
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
      containers:
        - name: tradingagents
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: Etc/UTC
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 256m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
          startupProbe:
            httpGet:
              path: /
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          hostPath:
            path: '{{ .Values.userspace.appData | default "" }}/{{ .Release.Name }}/tradingagents'
            type: DirectoryOrCreate
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: tradingagents
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: tradingagents
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: tradingagents
