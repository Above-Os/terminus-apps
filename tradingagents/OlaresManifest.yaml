---
olaresManifest.version: "0.10.0"
olaresManifest.type: app
apiVersion: "v2"
metadata:
  name: tradingagents
  icon: https://raw.githubusercontent.com/simple-icons/simple-icons/develop/icons/gnometerminal.svg
  description: Multi-Agents LLM Financial Trading Framework (CLI + info entrance).
  appid: tradingagents
  title: TradingAgents
  version: "1.0.0"
  categories:
    - Utilities

entrances:
  - name: tradingagents
    port: 8080
    host: tradingagents
    title: TradingAgents
    icon: https://raw.githubusercontent.com/simple-icons/simple-icons/develop/icons/gnometerminal.svg
    authLevel: private
    openMethod: window

spec:
  versionName: "0.2.1"
  fullDescription: |
    TradingAgents is a multi-agent LLM financial trading framework. The web entrance
    shows usage; run analysis via CLI inside the container (python -m cli.main).
    Configure API keys (OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.) via environment or app data.
  upgradeDescription: |
    Initial Olares package.
  developer: TauricResearch
  sourceCode: https://github.com/TauricResearch/TradingAgents
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  requiredMemory: 512Mi
  limitedMemory: 2Gi
  requiredDisk: 256Mi
  limitedDisk: 2Gi
  requiredCpu: 500m
  limitedCpu: "2"
  supportArch:
    - amd64
    - arm64

permission:
  appData: true

options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: ">=1.12.2-0"
