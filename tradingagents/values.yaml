# Image is built and pushed from fork github.com/leolianger/TradingAgents (see README-Docker.md there).
image:
  repository: docker.io/goai007/tradingagents
  tag: "0.2.3"
  pullPolicy: IfNotPresent

# hostPath is exactly this (nofx-style). Olares scopes per app — single Data/... segment, no Release.Name suffix.
userspace:
  appData: ""

# Injected into the app container when set (Olares app settings / olaresEnv).
olaresEnv: {}
