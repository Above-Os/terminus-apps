metadata:
  title: TradingAgents
  description: 多智能体大语言模型金融交易框架（CLI + 信息页入口）。
spec:
  fullDescription: |
    TradingAgents 是一个多智能体的大语言模型金融交易框架。

    - 默认入口：**Web 终端**（端口 8081）——交互式 Shell；执行
      `cd /home/appuser/app && python -m cli.main` 即可进入 CLI
      （通过挂载的 **`.env`** 由 **`load_dotenv()`** 加载密钥）。
    - 端口 8080：静态信息页（在启动器中隐藏），仅用于 HTTP 健康检查。
    - 运行报告保存在 **`/home/appuser/app/reports`**，并持久化到应用数据目录
      **`/app/data/reports`**（可在 Olares 文件管理器的 `Data/tradingagents/reports` 中查看）。

    请在应用的 **设置 / 环境变量** 中配置 API Key。使用 **DeepSeek** 时请设置
    **DEEPSEEK_API_KEY**（不是 OPENAI_API_KEY）。可选 **ALPHA_VANTAGE_API_KEY** 用于行情数据。
  upgradeDescription: |
    报告已持久化：/home/appuser/app/reports 现在映射到 /app/data/reports。
