apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    upstream app_backend {
      zone app_backend 64k;
      server sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7860 max_fails=1 fail_timeout=2s;
      server download-svc.sdwebuiforgeneov2server-shared:8090 backup;
    }

    server {
        listen 8080;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 1800s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location /progress {
            proxy_pass http://download-svc.sdwebuiforgeneov2server-shared:8090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            add_header Access-Control-Allow-Origin *;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_502 http_503 http_504 http_403;
            proxy_next_upstream_tries 3;
            proxy_pass http://app_backend;
            add_header Access-Control-Allow-Origin *;
            if ($request_method = 'OPTIONS') { return 204; }
        }

        location @download {
            proxy_pass http://download-svc.sdwebuiforgeneov2server-shared:8090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            add_header Access-Control-Allow-Origin *;
        }
    }

    server {
        listen 8081;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_502 http_503 http_504 http_403;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7861;
        }
    }

    server {
        listen 8082;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_502 http_503 http_504 http_403;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7862;
        }
    }

    server {
        listen 8083;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_502 http_503 http_504 http_403;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7863;
        }
    }

    server {
        listen 8084;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_502 http_503 http_504 http_403;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7864;
        }
    }

    server {
        listen 8085;
        access_log /opt/bitnami/openresty/nginx/logs/access.log;
        error_log /opt/bitnami/openresty/nginx/logs/error.log;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        proxy_set_header host $host;
        proxy_set_header x-forwarded-host $http_host;

        proxy_http_version 1.1;
        proxy_set_header upgrade $http_upgrade;
        proxy_set_header connection "upgrade";

        location / {
            resolver coredns.kube-system.svc.cluster.local valid=10s;
            add_header X-Frame-Options "";
            proxy_next_upstream error timeout http_502 http_503 http_504 http_403;
            proxy_next_upstream_tries 3;
            proxy_pass http://sdwebuiforgeneov2.sdwebuiforgeneov2server-shared:7865;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: sdwebuiforgeentrance
  name: {{ .Release.Name }}
  namespace: '{{ .Release.Namespace }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: sdwebuiforgeentrance
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: sdwebuiforgeentrance
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
            - containerPort: 8081
            - containerPort: 8082
            - containerPort: 8083
            - containerPort: 8084
            - containerPort: 8085
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
                  [ $http_code -ge 200 ] && [ $http_code -lt 500 ]
            initialDelaySeconds: 2
            timeoutSeconds: 3
            periodSeconds: 3
            successThreshold: 1
            failureThreshold: 60
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: sdwebuiforgeentrance
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: sdwebuiforgeentrance
  ports:
    - name: '8080'
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: '8081'
      protocol: TCP
      port: 8081
      targetPort: 8081
    - name: '8082'
      protocol: TCP
      port: 8082
      targetPort: 8082
    - name: '8083'
      protocol: TCP
      port: 8083
      targetPort: 8083
    - name: '8084'
      protocol: TCP
      port: 8084
      targetPort: 8084
    - name: '8085'
      protocol: TCP
      port: 8085
      targetPort: 8085
