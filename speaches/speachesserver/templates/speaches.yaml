{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
{{- $env := .Values.olaresEnv | default dict -}}
{{- $speachesGpu := ne (index $env "SPEACHES_GPU" | default "true") "false" }}
{{- $speachesDomainENV := split "," .Values.domain.speaches -}}
{{- $speachesDomain := index $speachesDomainENV "_0" -}}
{{- $topDomain := regexReplaceAll ".*?([^.]+\\.[^.]+)$" $speachesDomain "$1" -}}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speaches
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: speaches
  {{- if $speachesGpu }}
  annotations:
    applications.app.bytetrade.io/gpu-inject: "true"
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: speaches
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: speaches
        bytetrade.io/terminal: speaches
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-chmod-speaches
          image: "docker.io/beclab/aboveos-busybox:1.37.0"
          command:
            - sh
            - '-c'
            - |
              mkdir -p /hf-cache
              chown -R 1000:1000 /hf-cache || true
              chmod -R 777 /hf-cache || true
          resources: {}
          volumeMounts:
            - name: speaches-hf-cache
              mountPath: /hf-cache
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
        - name: download-models
          image: "docker.io/beclab/speaches-ai-speaches:0.8.2-cpu"
          env:
            - name: HF_HUB_CACHE
              value: "/home/ubuntu/.cache/huggingface/hub"
          command:
            - sh
            - '-c'
            - |
              if [ ! -d "$HF_HUB_CACHE/models--Systran--faster-whisper-small/refs" ]; then
                echo "Downloading STT model (faster-whisper-small)..."
                uv tool run --from huggingface_hub huggingface-cli download Systran/faster-whisper-small
              else
                echo "STT model already exists, skipping."
              fi
              if [ ! -d "$HF_HUB_CACHE/models--speaches-ai--Kokoro-82M-v1.0-ONNX/refs" ]; then
                echo "Downloading TTS model (Kokoro-82M)..."
                uv tool run --from huggingface_hub huggingface-cli download speaches-ai/Kokoro-82M-v1.0-ONNX
              else
                echo "TTS model already exists, skipping."
              fi
          resources:
            limits:
              cpu: "2"
              memory: 2048Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: speaches-hf-cache
              mountPath: /home/ubuntu/.cache/huggingface/hub
      containers:
        - name: speaches
          {{- if $speachesGpu }}
          image: "docker.io/beclab/speaches-ai-speaches:0.8.2-cuda-12.4.1"
          {{- else }}
          image: "docker.io/beclab/speaches-ai-speaches:0.8.2-cpu"
          {{- end }}
          env:
            - name: HF_HUB_CACHE
              value: "/home/ubuntu/.cache/huggingface/hub"
            - name: LOOPBACK_HOST_URL
              value: "http://localhost:8000"
            - name: CHAT_COMPLETION_BASE_URL
              value: "http://d54536a50.shared.{{ $topDomain }}/v1"
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            {{- if $speachesGpu }}
            limits:
              cpu: "8"
              memory: 8Gi
              nvidia.com/gpu: 1
            requests:
              cpu: 500m
              memory: 2Gi
              nvidia.com/gpu: 1
            {{- else }}
            limits:
              cpu: "2"
              memory: 2048Mi
            requests:
              cpu: 50m
              memory: 128Mi
            {{- end }}
          volumeMounts:
            - name: speaches-hf-cache
              mountPath: /home/ubuntu/.cache/huggingface/hub
          startupProbe:
            tcpSocket:
              port: 8000
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: speaches-hf-cache
          hostPath:
            path: '{{ .Values.userspace.appData }}'
            type: DirectoryOrCreate
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: speaches
  name: speaches
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    io.kompose.service: speaches
status:
  loadBalancer: {}

---
apiVersion: v1
kind: Service
metadata:
  labels:
    io.kompose.service: speaches
  name: sharedentrances-speaches
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    io.kompose.service: speaches
status:
  loadBalancer: {}
{{- end }}
