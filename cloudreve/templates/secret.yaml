{{- $secretName := printf "%s-secrets" .Release.Name -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $rpcSecret := randAlphaNum 16 | b64enc -}}
{{- if and $existing $existing.data (index $existing.data "RPC_SECRET") -}}
{{- $rpcSecret = index $existing.data "RPC_SECRET" | b64dec -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cloudreve
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  RPC_SECRET: {{ $rpcSecret | quote }}
