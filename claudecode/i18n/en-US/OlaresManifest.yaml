metadata:
  title: Claude Code
  description: Anthropic's official agentic coding CLI that lives in your terminal
spec:
  fullDescription: |
    # Overview
    Claude Code is Anthropic's official agentic coding tool that lives in
    your terminal. It understands your codebase, executes routine tasks
    through natural language, and helps you ship faster while staying in
    flow.

    # Key Features
    Terminal-native TUI
    - Streaming tool output, slash commands, interrupt-and-redirect,
      multiline editing, and rich diff review.

    Real Coding Loop
    - File edits, shell execution, git workflows, and test runs driven
      by natural language instructions.

    Skills, Subagents and MCP
    - Spawn isolated subagents, bundle reusable skills, and call any
      MCP-compatible tool server.

    Flexible Auth
    - Works with a Claude Pro/Max subscription (OAuth) or a Console API
      key; also supports Amazon Bedrock and Google Vertex AI.

    Persistent Workspace
    - Configuration, session history, skills and plugins persist across
      Pod restarts via the Olares app data volume.
  upgradeDescription: |
    Initial release of Claude Code on Olares (upstream v2.1.117).
