metadata:
  title: Claude Code
  description: Anthropic 官方原版的终端 AI 编码助手
spec:
  fullDescription: |
    # 简介
    Claude Code 是 Anthropic 官方出品、直接运行在终端里的 AI 编码助手。
    它能理解整个代码库，用自然语言驱动日常编码任务，
    让你在专注状态下更快完成工作。

    # 核心功能
    原生终端 TUI
    - 流式工具输出、斜杠命令、中断改向、多行编辑、富文本 diff 审阅。

    真实编码闭环
    - 用自然语言指令完成文件修改、命令执行、git 工作流、跑测试。

    Skills / 子 Agent / MCP
    - 派生隔离子 Agent、沉淀可复用 Skills、调用任意 MCP 协议的工具服务。

    灵活鉴权
    - 支持 Claude Pro/Max 订阅 OAuth 登录，也支持 Console API Key；
      兼容 Amazon Bedrock 与 Google Vertex AI。

    持久化工作区
    - 配置、会话历史、Skills 与插件通过 Olares 应用数据卷持久化，
      Pod 重启不会丢失登录态和上下文。
  upgradeDescription: |
    Claude Code 在 Olares 上的首个版本（上游 v2.1.117）。
