{{- $oe := .Values.olaresEnv | default dict -}}
{{- $apiKey := index $oe "ANTHROPIC_API_KEY" | default "" -}}
{{- $authToken := index $oe "ANTHROPIC_AUTH_TOKEN" | default "" -}}
{{- if or $apiKey $authToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: claudecode
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{- if $apiKey }}
  ANTHROPIC_API_KEY: {{ $apiKey | quote }}
  {{- end }}
  {{- if $authToken }}
  ANTHROPIC_AUTH_TOKEN: {{ $authToken | quote }}
  {{- end }}
{{- end }}
