{{- /*
  NATS access for the knowledge backend.
  - Persist a per-release password in a Secret (re-used across upgrades
    via lookup).
  - Provision a NATS user + subjects through a MiddlewareRequest.
  Subjects mirror the legacy wise/knowledge sub-chart.
*/ -}}
{{- $secret := (lookup "v1" "Secret" .Release.Namespace "knowledge-secrets") -}}
{{- $natsPassword := "" -}}
{{- if $secret -}}
{{- $natsPassword = (index $secret "data" "nats_password") -}}
{{- else -}}
{{- $natsPassword = randAlphaNum 16 | b64enc -}}
{{- end -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: knowledge-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  nats_password: {{ $natsPassword }}

---
apiVersion: apr.bytetrade.io/v1alpha1
kind: MiddlewareRequest
metadata:
  name: knowledge-nats
  namespace: {{ .Release.Namespace }}
spec:
  app: knowledge
  appNamespace: os
  middleware: nats
  nats:
    password:
      valueFrom:
        secretKeyRef:
          key: nats_password
          name: knowledge-secrets
    user: "{{ .Release.Namespace }}-knowledge"
    subjects:
      - name: rssubscribe_status
        permission:
          pub: allow
          sub: allow
      - name: download_status
        permission:
          pub: allow
          sub: allow
      - name: "knowledge.*"
        permission:
          pub: allow
          sub: allow
