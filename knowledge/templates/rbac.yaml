{{- /*
  Cluster-wide permissions required by the knowledge backend at runtime.

  Why a ClusterRole (not a namespace Role):
  The knowledge container mints short-lived ServiceAccount tokens for
  per-user `user-backend` SAs that live in `user-system-<username>` namespaces:

      POST /api/v1/namespaces/user-system-<u>/serviceaccounts/user-backend/token
      => verb=create on resources=serviceaccounts/token (apiGroup="") in <foreign ns>

  A namespace-scoped Role can only grant access in its own namespace; minting
  tokens in *every* user-system namespace requires cluster scope.

  The other resources (statefulsets/daemonsets/namespaces) match the v2
  wise/knowledge sub-chart so existing read-paths in the knowledge code keep
  working. Trim later if/when we audit which APIs are actually used.

  knowledge is a v3 shared app (installed once cluster-wide), so static
  cluster-unique names are safe.
*/ -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: knowledge-cluster-view
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: knowledge-cluster-view
rules:
  - apiGroups: ['*']
    resources:
      - statefulsets
      - daemonsets
      - namespaces
      - serviceaccounts/token
    verbs: ['*']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: knowledge-cluster-view
subjects:
  - kind: ServiceAccount
    name: knowledge-cluster-view
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: knowledge-cluster-view
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backend:{{ .Release.Namespace }}:integration-provider-svc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backend:integration-provider-svc-cookie
subjects:
- kind: ServiceAccount
  name: knowledge-cluster-view
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backend:{{ .Release.Namespace }}:download-provider-svc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backend:download-provider
subjects:
- kind: ServiceAccount
  name: knowledge-cluster-view
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backend:{{ .Release.Namespace }}:search3-provider-svc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backend:search3-provider
subjects:
- kind: ServiceAccount
  name: knowledge-cluster-view
  namespace: {{ .Release.Namespace }}