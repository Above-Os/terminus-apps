metadata:
  title: Ollama V3 for test
  description: Get up and running with large language models.

spec:
  upgradeDescription: |
    Upgrade Ollama from v0.24.0 to v0.30.6

    **What's Changed**

    - **Runtime**: Ollama engine updated to v0.30.6 (`ollama/ollama:0.30.6`).
    - **Model storage**: models use the shared App Common store `appCommon/ollama`.
    - **CUDA cache**: NVIDIA ComputeCache at `appCommon/ollama/.nv`.
    - **Scaling**: `workloadReplicas` for `ollamav3` and `terminal` workloads.

    For detailed release notes, visit:
    https://github.com/ollama/ollama/releases
