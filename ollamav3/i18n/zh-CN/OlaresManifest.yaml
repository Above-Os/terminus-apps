metadata:
  title: Ollama V3 for test
  description: 开始使用并运行大型语言模型吧。

spec:
  fullDescription: |
    ## 使用须知 ##
    该应用为共享应用，Olares 管理员安装后，集群中的所有用户都可以通过授权应用程序来调用它。

    ## 应用概览 ##
    Ollama 是一个用于在本地运行大型语言模型（LLMs）的用户友好界面。  
    对研究人员、开发者以及任何想要尝试大语言模型的人来说，Ollama 是一个非常有价值的工具。  
    使用 Ollama，您可以轻松下载和运行 LLMs，自定义并创建您自己的模型，并使用您设备上的文件与 LLMs 进行对话。

    Ollama 支持广泛的模型，包括：
    - Llama 3 8B
    - Llama 3 70B
    - Phi 3 Mini 3.8B
    - Phi 3 Medium 14B
    - Gemma 2 9B
    - Gemma 2 27B
    - Mistral 7B
    - Moondream 2 1.4B
    - Neural Chat 7B
    - Starling 7B
    - Code Llama 7B
    - Llama 2 Uncensored 7B
    - LLaVA 7B
    - Solar 10.7B

    **模型存储（App Common）**
    拉取的模型存放在共享 App Common 目录 `appCommon/ollama`（单节点 SSD，多节点 JuiceFS）。
    所有 Ollama 应用挂载同一路径，blob 按 digest 去重。CUDA JIT 编译缓存位于
    `appCommon/ollama/.nv`。

  upgradeDescription: |
    将 Ollama 从 v0.24.0 升级至 v0.30.6

    **更新内容**

    - **运行时**：Ollama 引擎升级至 v0.30.6（`ollama/ollama:0.30.6`）。
    - **模型存储**：模型改用共享 App Common 目录 `appCommon/ollama`（替代原 `sharedlib/ai/ollama`）。
    - **CUDA 缓存**：NVIDIA ComputeCache 持久化在 `appCommon/ollama/.nv`。
    - **扩缩容**：通过 `workloadReplicas` 声明 `ollamav3` 与 `terminal` 副本数。

    详细发布说明请访问：
    https://github.com/ollama/ollama/releases