{{- $oe := .Values.olaresEnv | default dict -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: trek
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  ADMIN_PASSWORD: {{ $oe.ADMIN_PASSWORD | quote }}
  SMTP_PASS: {{ $oe.SMTP_PASS | default "" | quote }}
