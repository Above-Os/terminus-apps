# Patches sandbox ~/.openclaw/openclaw.json: gateway.trustedProxies (TLS / reverse-proxy 403)
# and optional gateway.controlUi.allowedOrigins (CHAT_UI_URL).
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemoclaw-patch-origins
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: nemoclaw
data:
  patch_origins.py: |
    import json, os, glob

    def merge_trusted():
        out = ["127.0.0.1", "::1"]
        extra = os.environ.get("OPENCLAW_TRUSTED_PROXIES", "").strip()
        if extra:
            out.extend([x.strip() for x in extra.split(",") if x.strip()])
        seen, uniq = set(), []
        for x in out:
            if x not in seen:
                seen.add(x)
                uniq.append(x)
        return uniq

    trusted_list = merge_trusted()
    csv = os.environ.get("ORIGIN_CSV", "").strip()
    origins = [x.strip() for x in csv.split(",") if x.strip()]

    paths = []
    paths.extend(glob.glob("/home/*/.openclaw/openclaw.json"))
    for p in ("/root/.openclaw/openclaw.json", "/home/node/.openclaw/openclaw.json"):
        if os.path.isfile(p) and p not in paths:
            paths.append(p)

    for path in paths:
        try:
            with open(path, "r", encoding="utf-8") as f:
                d = json.load(f)
            g = d.setdefault("gateway", {})
            changed = False

            tp = g.get("trustedProxies")
            if not isinstance(tp, list):
                tp = []
                g["trustedProxies"] = tp
            for ip in trusted_list:
                if ip not in tp:
                    tp.append(ip)
                    changed = True

            if origins:
                c = g.setdefault("controlUi", {})
                a = c.setdefault("allowedOrigins", [])
                for o in origins:
                    if o not in a:
                        a.append(o)
                        changed = True

            if changed:
                with open(path, "w", encoding="utf-8") as f:
                    json.dump(d, f, indent=2)
                print("patched", path)
        except Exception as e:
            print("skip", path, e)
