    #!/usr/bin/env python3
    """Idempotently clamp OpenClaw runtime config values that we have to keep sane.

    Why this exists at all:
      * Some local LLM bottle-runs ship pathological defaults (e.g. timeoutSeconds=10)
        that surface to the user as generic "network connection error". We raise low
        values to >=120s and cap absurdly high values.
      * Stale provider configs sometimes have models[].maxTokens missing or huge,
        which trips the inference backend. We clamp to <=1024.
      * Operators may pin a specific provider api flavor via env without editing
        openclaw.json by hand.
      * Ensures env.vars.XDG_CONFIG_HOME=/sandbox/.config when unset so gogcli finds
        OAuth tokens for `openclaw agent` tool runs (same path as `gog auth add`).
      * Copies https_proxy / NO_PROXY (etc.) from /etc/environment into env.vars when
        unset so tool subprocesses can reach Google APIs (avoids connection refused).
      * If still unset, also pulls from process env (grpc_proxy, NEMOCLAW_PROXY_HOST/PORT).
      * Expands no_proxy / NO_PROXY with CHAT_DIRECT_HOSTS + SKILL_DIRECT_HOSTS
        + GOG_DIRECT_HOSTS so openclaw gateway's undici ProxyAgent + the
        `gog-shim` wrapped gogcli subprocesses bypass the OpenShell egress
        proxy for Discord / Telegram / Slack REST APIs, common skill hosts
        (wttr, open-meteo, duckduckgo, openai, anthropic, etc.), AND Google
        OAuth / Gmail / Sheets / Drive API endpoints. Required because
        OpenShell literal-path binary matching against /sandbox/.local/bin/
        binaries is unreliable for sandbox-uid processes (OPA symlink
        resolution via /proc/<tracer-pid>/root/ fails without
        CAP_SYS_PTRACE), causing CONNECT tunnel 403 even when the host+binary
        pair is enumerated in a named policy block -- verified against both
        `/sandbox/.linuxbrew/Homebrew/opt/gogcli/bin/gog` AND /usr/bin/curl
        from sandbox uid. Direct egress exists and the pod's network policy
        permits it, so routing these hosts around the MITM proxy is the
        pragmatic unblocker while the proxy still enforces everything else
        (npm/pypi tarballs, arbitrary skill CONNECTs, etc.). Updates
        /etc/environment so login shells + bridge-restarted gateways + the
        gog-shim fallback loader pick up the merged list, AND updates
        openclaw.json env.vars so openclaw's own ProxyAgent config sees it.

    All operations are best-effort: malformed JSON, missing keys, non-writable files
    just exit 0 silently so the bridge loop never wedges.
    """
