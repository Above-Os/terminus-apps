        return default

    def _etc_environment():
        """Parse KEY=value lines from /etc/environment (Debian PAM style)."""
        out = {}
        try:
            with open("/etc/environment", "r", encoding="utf-8") as fh:
                for raw in fh:
                    line = raw.strip()
                    if not line or line.startswith("#"):
                        continue
                    if "=" not in line:
                        continue
                    k, v = line.split("=", 1)
                    k = k.strip()
                    v = v.strip().strip('"').strip("'")
                    if k and k not in out:
                        out[k] = v
        except OSError:
            pass
        return out


    def _merge_no_proxy(existing, *extra_iterables):
        """Merge comma-separated no_proxy strings and extra iterables.

        Preserves first-seen ordering, drops blanks, case-insensitive dedup
        (no_proxy semantics are case-insensitive in undici + curl)."""
        tokens = []
        seen = set()

        def _push(raw):
            if raw is None:
                return
            for chunk in str(raw).split(","):
                t = chunk.strip()
                if not t:
                    continue
                key = t.lower()
                if key in seen:
                    continue
                seen.add(key)
                tokens.append(t)

        _push(existing)
        for it in extra_iterables:
            for t in it:
                _push(t)
        return ",".join(tokens)


    def _write_etc_environment_kv(updates):
        """Idempotently upsert KEY="value" lines in /etc/environment.

        `updates` is a dict of the keys we want to overwrite. Other lines are
        preserved. Silently no-ops on read-only FS (the early boot path in the
        bridge is the canonical writer; this is defense-in-depth)."""
        if not updates:
            return
        path = "/etc/environment"
        try:
            try:
                with open(path, "r", encoding="utf-8") as fh:
                    lines = fh.readlines()
            except FileNotFoundError:
                lines = []

            remaining = dict(updates)
            out_lines = []
            for raw in lines:
                stripped = raw.strip()
                if not stripped or stripped.startswith("#") or "=" not in stripped:
                    out_lines.append(raw if raw.endswith("\n") else raw + "\n")
                    continue
                k = stripped.split("=", 1)[0].strip()
                if k in remaining:
                    new_v = remaining.pop(k)
                    out_lines.append('%s="%s"\n' % (k, new_v))
                else:
                    out_lines.append(raw if raw.endswith("\n") else raw + "\n")
            for k, v in remaining.items():
                out_lines.append('%s="%s"\n' % (k, v))

            with open(path, "w", encoding="utf-8") as fh:
                fh.writelines(out_lines)
        except OSError:
            return


    def main():
        if len(sys.argv) < 2:
            return 0
        path = sys.argv[1]
        try:
            with open(path, "r", encoding="utf-8") as fh:
                cfg = json.load(fh)
        except (OSError, ValueError):
            return 0
        if not isinstance(cfg, dict):
            return 0

        # Provider override (optional).
        models_root = cfg.setdefault("models", {})
        providers = models_root.setdefault("providers", {})
        inference = providers.setdefault("inference", {})

        api_override = (os.environ.get("NEMOCLAW_OPENCLAW_INFERENCE_API") or "").strip()
        if api_override:
            inference["api"] = api_override

        # Clamp per-model maxTokens.
        for model in inference.get("models") or []:
            if not isinstance(model, dict):
                continue
            mt = _as_int(model.get("maxTokens"), 0)
            if mt <= 0 or mt > 1024:
                model["maxTokens"] = 1024

        # Clamp agent timeout.
        agents = cfg.setdefault("agents", {}).setdefault("defaults", {})
        max_env = (os.environ.get("NEMOCLAW_OPENCLAW_MAX_AGENT_TIMEOUT") or "").strip()
        if max_env.isdigit():
            requested = int(max_env)
            upper = requested if 60 <= requested <= 3600 else 300
        else:
            upper = 300

        ts_now = _as_int(agents.get("timeoutSeconds"), 0)
        if ts_now < 120:
            agents["timeoutSeconds"] = 120
            ts_now = 120
        if ts_now > upper:
            agents["timeoutSeconds"] = upper

        # NemoClaw: gogcli stores OAuth under $XDG_CONFIG_HOME/gogcli. OpenClaw may spawn
        # tool subprocesses with HOME=/tmp without sourcing shell rc. Official config
        # `env.vars` supplies defaults when the process env lacks a key (see OpenClaw docs).
        env_root = cfg.get("env")
        if not isinstance(env_root, dict):
            env_root = {}
            cfg["env"] = env_root
        vars_root = env_root.get("vars")
        if not isinstance(vars_root, dict):
            vars_root = {}
            env_root["vars"] = vars_root
        if not str(vars_root.get("XDG_CONFIG_HOME", "")).strip():
            vars_root["XDG_CONFIG_HOME"] = "/sandbox/.config"

        _etc = _etc_environment()

        # First pass: ensure /etc/environment carries CHAT_DIRECT_HOSTS +
        # SKILL_DIRECT_HOSTS in both no_proxy AND NO_PROXY. Do this BEFORE the
        # copy-to-env.vars block below so the merged value flows through.
        # We only touch the file when a proxy is in play (proxy env present or
        # a no_proxy line already exists); without any proxy config, no_proxy
        # is a no-op anyway and we avoid creating unnecessary drift.
        _proxy_in_play = any(
            str(_etc.get(_k, "")).strip()
            for _k in ("https_proxy", "HTTPS_PROXY", "http_proxy", "HTTP_PROXY")
        ) or any(
            (os.environ.get(_k) or "").strip()
            for _k in ("https_proxy", "HTTPS_PROXY", "http_proxy", "HTTP_PROXY", "grpc_proxy", "GRPC_PROXY")
        ) or bool((os.environ.get("NEMOCLAW_PROXY_HOST") or "").strip())

        if _proxy_in_play:
            _etc_np_updates = {}
            for _np_key in ("no_proxy", "NO_PROXY"):
                merged = _merge_no_proxy(
                    _etc.get(_np_key, ""),
                    LOOPBACK_NO_PROXY,
                    CHAT_DIRECT_HOSTS,
                    SKILL_DIRECT_HOSTS,
                    GOG_DIRECT_HOSTS,
                )
                if merged and merged != (_etc.get(_np_key) or "").strip():
                    _etc_np_updates[_np_key] = merged
            if _etc_np_updates:
                _write_etc_environment_kv(_etc_np_updates)
                # Reflect the writeback so the copy pass below uses the merged values.
                for _k, _v in _etc_np_updates.items():
                    _etc[_k] = _v

        for _k in (
            "HTTPS_PROXY",
            "https_proxy",
            "HTTP_PROXY",
            "http_proxy",
            "NO_PROXY",
            "no_proxy",
            "ALL_PROXY",
            "all_proxy",
        ):
            if str(vars_root.get(_k, "")).strip():
                continue
            _v = (_etc.get(_k) or "").strip()
            if not _v:
                continue
            vars_root[_k] = _v

        # Final pass: whether env.vars.no_proxy was freshly copied from
        # /etc/environment or was already set by the operator/webui upload,
        # force-merge CHAT_DIRECT_HOSTS + SKILL_DIRECT_HOSTS in. This is the
        # single source of truth for openclaw gateway's undici ProxyAgent (see
        # OpenClaw's env.vars -> process.env propagation) so the final merged
        # list always contains the hosts we need direct egress to.
        if _proxy_in_play:
            for _np_key in ("no_proxy", "NO_PROXY"):
                merged = _merge_no_proxy(
                    vars_root.get(_np_key, ""),
                    LOOPBACK_NO_PROXY,
                    CHAT_DIRECT_HOSTS,
                    SKILL_DIRECT_HOSTS,
                    GOG_DIRECT_HOSTS,
                )
                if merged:
                    vars_root[_np_key] = merged

        def _proxy_url_fallback():
            for k in ("https_proxy", "HTTPS_PROXY", "http_proxy", "HTTP_PROXY"):
                v = (os.environ.get(k) or "").strip().strip('"').strip("'")
                if v:
                    return v
            for k in ("grpc_proxy", "GRPC_PROXY"):
                v = (os.environ.get(k) or "").strip().strip('"').strip("'")
                if v.startswith("http"):
                    return v
            h = (os.environ.get("NEMOCLAW_PROXY_HOST") or "").strip()
            p = (os.environ.get("NEMOCLAW_PROXY_PORT") or "").strip()
            if h and p:
                return "http://%s:%s" % (h, p)
            return ""

        _fb = _proxy_url_fallback()
        if _fb:
            _np = "localhost,127.0.0.1,::1"
            try:
                hp = _fb.split("://", 1)[1].split("/")[0]
                host = hp.split(":")[0]
                if host:
                    _np = _np + "," + host
            except (IndexError, ValueError):
                pass
            for _k in ("https_proxy", "HTTPS_PROXY", "http_proxy", "HTTP_PROXY"):
                if str(vars_root.get(_k, "")).strip():
                    continue
                if not (_etc.get(_k) or "").strip():
                    vars_root[_k] = _fb
            for _k in ("no_proxy", "NO_PROXY"):
                if str(vars_root.get(_k, "")).strip():
                    continue
                if not (_etc.get(_k) or "").strip():
                    vars_root[_k] = _np

        try:
            with open(path, "w", encoding="utf-8") as fh:
                json.dump(cfg, fh, ensure_ascii=False, indent=2)
                fh.write("\n")
        except OSError:
            return 0
        return 0


    if __name__ == "__main__":
        sys.exit(main())
