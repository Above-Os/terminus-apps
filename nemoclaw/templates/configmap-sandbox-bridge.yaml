    def _union_bins(existing, wanted):
        """Merge {path: p} entries without duplicates, preserving prior order."""
        have = {e.get("path") for e in existing if isinstance(e, dict)}
        added = False
        for p in wanted:
            if p in have:
                continue
            existing.append({"path": p})
            have.add(p)
            added = True
        return added

    def _union_endpoints(existing, wanted_hosts):
        """Merge host endpoints without duplicates, preserving prior order."""
        have = {e.get("host") for e in existing if isinstance(e, dict)}
        added = False
        for h in wanted_hosts:
            if h in have:
                continue
            existing.append(ep(h))
            have.add(h)
            added = True
        return added

