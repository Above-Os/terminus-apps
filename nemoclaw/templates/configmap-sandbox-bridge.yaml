# Helper scripts used by the chat-ui-bridge container in the nemoclaw Deployment.
# OpenShell >= 0.0.36 runs the sandbox as a k3s pod inside the
# `openshell-cluster-nemoclaw` Docker container, so reaching the sandbox from the
# chat-ui-bridge requires `docker exec <cluster> kubectl -n openshell exec <sbx>`.
#
# Chart v1.7.0+: the chat WebUI/TUI data path no longer uses these scripts —
# `openshell forward 0.0.0.0:18789 my-assistant` (a single long-lived SSH
# multiplexed connection started in chat-ui-bridge) handles all WS traffic.
# These scripts remain in use for: (a) sandbox-ensure-gateway.sh recovery on
# real gateway death, (b) sandbox-tunnel.sh for the OAuth callback (pod :18788
# -> sandbox :8080), (c) skill-env / brew / gog-shim provisioning.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemoclaw-sandbox-bridge
  namespace: "{{ .Release.Namespace }}"
  labels:
    io.kompose.service: nemoclaw
data:
  # Idempotently ensures `openclaw gateway` is running inside the sandbox pod.
  # HOME=/sandbox is essential: without it, openclaw reads /root/.openclaw
  # (empty) instead of the NemoClaw-provisioned /sandbox/.openclaw state,
  # which causes the gateway to fall back to the built-in anthropic default
  # model instead of the configured `inference/*` provider.
  sandbox-ensure-gateway.sh: |
    #!/bin/sh
    set -u
    CLUSTER_CTR="${CLUSTER_CTR:-openshell-cluster-nemoclaw}"
    NS="${NS:-openshell}"
    SBX="${SBX:-my-assistant}"
    # Interactive sessions (`nemoclaw my-assistant connect`) land as the non-root
    # `sandbox` user, but `kubectl exec` defaults to the image's USER (root).
    # If the gateway is started as root, every file under /sandbox/.openclaw and
    # /sandbox/.openclaw-data ends up root-owned, and subsequent interactive
    # `openclaw config ...` runs fail with EACCES on the tmp write. Run everything
    # as the sandbox user and pre-chown any previously root-created state.
    SBX_USER="${SBX_USER:-sandbox}"

    health_ok() {
      docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
        env HOME=/sandbox XDG_CONFIG_HOME=/sandbox/.config openclaw gateway health >/dev/null 2>&1
    }

    # Do NOT exit early when health_ok: nemoclaw onboard starts the gateway before chat-ui-bridge
    # runs this script, and we would skip the .bashrc / PATH hooks forever (brew: command not found).

    echo "[sandbox-gw] shell rc + gateway check inside ${SBX} (user ${SBX_USER})..."
    # Forward GOG_KEYRING_* from the nemoclaw pod (bound via Secret in deployment.yaml)
    # into the inner shell. Openclaw subprocess skill runners (the TUI agent, any
    # "gog auth" / "gog ... read" call) run with a sanitized HOME=/tmp and do NOT
    # source ~/.bash_profile, so the only reliable way to feed the keyring
    # passphrase is to bake it into the openclaw gateway process environment
    # (inherited by every subprocess openclaw spawns). Without this, gog prompts
    # "Enter passphrase to unlock /tmp/.config/gogcli/keyring" even though the env
    # is correctly set in interactive shells.
    GKP="${GOG_KEYRING_PASSWORD:-}"
    # gateway.controlUi.allowedOrigins: forward CHAT_UI_URL + extras into the sandbox
    # so patch_origins.py (same logic as workspace /opt/nemoclaw/patch_origins.py) can merge.
    _ORIG_CSV="${CHAT_UI_URL:-}"
    if [ -n "${OPENCLAW_EXTRA_ALLOWED_ORIGINS:-}" ]; then
      if [ -n "$_ORIG_CSV" ]; then
        _ORIG_CSV="${_ORIG_CSV},${OPENCLAW_EXTRA_ALLOWED_ORIGINS}"
      else
        _ORIG_CSV="${OPENCLAW_EXTRA_ALLOWED_ORIGINS}"
      fi
    fi
    _TPCSV="${OPENCLAW_TRUSTED_PROXIES:-}"
    # models.providers.inference.baseUrl self-heal uses NEMOCLAW_ENDPOINT_URL
    # (the same value the operator typed in OlaresManifest, already validated
    # as reachable in deployment.yaml preflight [4/5]). Must be forwarded into
    # the inner docker-exec env otherwise patch_inference_baseurl.py exits 0
    # silently and the unresolvable https://inference.local/v1 stays on disk.
    _NEM_EP="${NEMOCLAW_ENDPOINT_URL:-}"
    # Single-quoted remote body: avoids the host re-parsing a double-quoted string (where backticks
    # in comments became command substitution and destroyed runuser / LAUNCH).
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      env "SBX_USER=${SBX_USER:-sandbox}" "GOG_KEYRING_PASSWORD=${GKP}" "GOG_KEYRING_BACKEND=file" \
      "ORIGIN_CSV=${_ORIG_CSV}" "OPENCLAW_TRUSTED_PROXIES=${_TPCSV}" \
      "NEMOCLAW_ENDPOINT_URL=${_NEM_EP}" sh -c '
      set -u
      cd /sandbox || exit 1
      mkdir -p /sandbox /sandbox/.openclaw /sandbox/.openclaw-data /sandbox/.nemoclaw /sandbox/.config /sandbox/inbox /sandbox/.local/bin /sandbox/.openclaw/tasks 2>/dev/null || true
      touch /sandbox/.openclaw-data/gateway.out 2>/dev/null || true
      chown -R "$SBX_USER:$SBX_USER" /sandbox/.openclaw /sandbox/.openclaw-data /sandbox/.nemoclaw /sandbox/.config /sandbox/inbox /sandbox/.local/bin /sandbox/.openclaw/tasks 2>/dev/null || true
      # Self-heal stuck session locks (common cause of "agent卡住/不返回").
      find /sandbox/.openclaw-data/agents -type f -name "*.jsonl.lock" -delete 2>/dev/null || true
      # Optional: tune OpenClaw inference provider API + token limits.
      # NOTE: clamp body lives in clamp-openclaw-config.py to avoid single-quote pitfalls in sh -c.
      # Mirror openclaw.json snapshots into /tmp so we can tell whether
      # clamp / patch_origins actually mutated the file. The gateway reads
      # its config ONCE at startup (no SIGHUP / no file watcher), so a
      # silent mutation to allowedOrigins / trustedProxies / providers
      # produced no observable change in the running gateway -- in
      # particular, new browser Origins never entered the in-memory
      # controlUi.allowedOrigins set, which looked to end users like
      # "WebUI chat has no response / request never reaches GPU" (CORS
      # drop before the inference call). We now compare SHA256 before vs
      # after the python patchers and force _cfg_changed=1 on delta, so
      # the gateway is killed + respawned and picks up the new config.
      _cfg_changed=0
      if [ -f /sandbox/.openclaw/openclaw.json ]; then
        mkdir -p /sandbox/.nemoclaw 2>/dev/null || true
        _pre=""
        if command -v sha256sum >/dev/null 2>&1; then
          _pre=$(sha256sum /sandbox/.openclaw/openclaw.json 2>/dev/null | awk "{print \$1}")
        fi
        # clamp lives on the workspace pod at /opt/nemoclaw -- NOT mounted inside the sandbox.
        # chat-ui-bridge + skill-env stage a copy under /sandbox/.nemoclaw/ so this succeeds.
        if [ -f /sandbox/.nemoclaw/clamp-openclaw-config.py ]; then
          python3 /sandbox/.nemoclaw/clamp-openclaw-config.py /sandbox/.openclaw/openclaw.json >/dev/null 2>&1 || true
        fi
        if [ -f /sandbox/.nemoclaw/patch_origins.py ]; then
          # Keep stdout so we see "patched <path>" in bridge logs; also
          # check after the run whether allowedOrigins actually picked up
          # something matching ORIGIN_CSV (helpful when CHAT_UI_URL is
          # the wrong host for this users browser, eg multi-tenant Olares).
          python3 /sandbox/.nemoclaw/patch_origins.py 2>/dev/null || true
        fi
        # Self-heal models.providers.inference.baseUrl.
        # Background: nemoclaw [3/8] onboard persists baseUrl=https://inference.local/v1
        # into openclaw.json. On Olares node layouts where inference.local
        # does NOT resolve (getent hosts inference.local -> NXDOMAIN),
        # every WebUI turn goes through inference/<model> and fails as
        # "LLM request failed: network connection error" while TUI might
        # still work via a non-inference provider. We rewrite baseUrl back
        # to the operator-supplied NEMOCLAW_ENDPOINT_URL (already probed
        # reachable in preflight /models 200) so WebUI works from turn #1.
        # Any mutation here flips _cfg_changed=1 below and forces a gateway
        # restart so the in-memory provider table is reloaded.
        if [ -f /sandbox/.nemoclaw/patch_inference_baseurl.py ] && [ -n "${NEMOCLAW_ENDPOINT_URL:-}" ]; then
          python3 /sandbox/.nemoclaw/patch_inference_baseurl.py 2>/dev/null || true
        fi
        if [ -n "$_pre" ] && command -v sha256sum >/dev/null 2>&1; then
          _post=$(sha256sum /sandbox/.openclaw/openclaw.json 2>/dev/null | awk "{print \$1}")
          if [ -n "$_post" ] && [ "$_pre" != "$_post" ]; then
            _cfg_changed=1
            echo "[sandbox-gw] openclaw.json mutated by clamp/patch_origins/patch_inference_baseurl; gateway restart required for new allowedOrigins / trustedProxies / inference.baseUrl to take effect"
          fi
        fi
        # Visible sanity line -- so we can see what the gateway WILL pick
        # up once restarted, and compare with the browser Origin header.
        # Single-line form so YAML block-scalar indentation stays intact.
        if command -v python3 >/dev/null 2>&1; then
          python3 -c "import json,sys; d=json.load(open(sys.argv[1])); g=d.get(\"gateway\",{}) or {}; c=g.get(\"controlUi\",{}) or {}; ao=c.get(\"allowedOrigins\") or []; tp=g.get(\"trustedProxies\") or []; print(\"[sandbox-gw] openclaw.json controlUi.allowedOrigins=\"+json.dumps(ao)+\" trustedProxies=\"+json.dumps(tp))" \
            /sandbox/.openclaw/openclaw.json 2>/dev/null || true
        fi
        chown "$SBX_USER:$SBX_USER" /sandbox/.openclaw/openclaw.json 2>/dev/null || true
      fi
      # Always sync PATH hooks first (idempotent). Runs even when gateway is already healthy.
      # /sandbox/.local/bin wins over Homebrew/bin/gog so the nemoclaw gog shim is used
      # (brew link would otherwise keep recreating its own symlink under Homebrew/bin).
      for _bf in /sandbox/.bashrc /sandbox/.profile /sandbox/.bash_profile; do
        touch "$_bf" 2>/dev/null || true
        chown "$SBX_USER:$SBX_USER" "$_bf" 2>/dev/null || true
        grep -q nemoclaw-linuxbrew-path-v3 "$_bf" 2>/dev/null || printf "%s\n" \
          "# nemoclaw-linuxbrew-path-v3" \
          "export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin:\$PATH" >> "$_bf"
        grep -q nemoclaw-xdg-gogcli "$_bf" 2>/dev/null || printf "%s\n" \
          "# nemoclaw-xdg-gogcli" \
          "export XDG_CONFIG_HOME=/sandbox/.config" >> "$_bf"
        if [ -f /etc/profile.d/nemoclaw-linuxbrew.sh ]; then
          grep -q nemoclaw-linuxbrew-rc "$_bf" 2>/dev/null || printf "%s\n" \
            "# nemoclaw-linuxbrew-rc" \
            "[ -f /etc/profile.d/nemoclaw-linuxbrew.sh ] && . /etc/profile.d/nemoclaw-linuxbrew.sh" >> "$_bf"
        fi
      done
      # NOTE: every line in this block -- including these comments -- runs
      # inside the outer docker-exec sh -c wrapper whose body is delimited
      # by SINGLE QUOTES. POSIX sh does not allow nested single quotes in a
      # single-quoted string, so a stray apostrophe anywhere below would
      # close the wrapper prematurely and surface as e.g.
      #   sandbox-ensure-gateway.sh: 119: Syntax error: ( unexpected
      # (the ( was whatever character followed the misclosed quote). So:
      #   - keep comments apostrophe-free (no isn, no word that ends in -s)
      #   - NEVER write sample sh invocations here (no sh -c ...),
      #   - use double quotes for every printf argument and escape dollar
      #     as backslash-dollar and embedded quote as backslash-quote.
      # The /sandbox/.local/bin/brew file below used to be a plain symlink
      # to /sandbox/.linuxbrew/Homebrew/bin/brew, but Homebrew derives
      # HOMEBREW_PREFIX from the unresolved argv[0] path when HOMEBREW_PREFIX
      # is missing from env. Openclaw skill runners sanitize env before
      # spawning brew, so the symlink made brew pick /sandbox/.local as
      # prefix and EACCES on its vendor-install-ruby flock. The wrapper
      # below pins HOMEBREW_PREFIX so locks always land under
      # /sandbox/.linuxbrew/var/homebrew/locks.
      if [ -x /sandbox/.linuxbrew/Homebrew/bin/brew ]; then
        mkdir -p /sandbox/.local/bin \
                 /sandbox/.local/var/homebrew/locks \
                 /sandbox/.linuxbrew/var/homebrew/locks \
                 /sandbox/.linuxbrew/Homebrew/var/homebrew/locks
        rm -f /sandbox/.local/bin/brew 2>/dev/null || true
        {
          printf "%s\n" "#!/bin/sh"
          printf "%s\n" "# Managed by nemoclaw-sandbox-bridge. Do not edit."
          printf "%s\n" "# Pins HOMEBREW_PREFIX so openclaw skill runners cannot trick brew"
          printf "%s\n" "# into using /sandbox/.local as its prefix via the wrapper path."
          printf "%s\n" "export HOMEBREW_PREFIX=/sandbox/.linuxbrew"
          printf "%s\n" "export HOMEBREW_REPOSITORY=/sandbox/.linuxbrew/Homebrew"
          printf "%s\n" "export HOMEBREW_CELLAR=/sandbox/.linuxbrew/Cellar"
          printf "%s\n" "export HOMEBREW_NO_AUTO_UPDATE=1"
          printf "%s\n" "export HOMEBREW_NO_ENV_HINTS=1"
          printf "%s\n" "export HOMEBREW_NO_ANALYTICS=1"
          printf "%s\n" "export HOMEBREW_NO_ENV_FILTERING=1"
          printf "%s\n" ": \"\${HOMEBREW_TEMP:=/tmp/homebrew-tmp}\";   export HOMEBREW_TEMP"
          printf "%s\n" ": \"\${HOMEBREW_CACHE:=/tmp/homebrew-cache}\"; export HOMEBREW_CACHE"
          printf "%s\n" ": \"\${HOMEBREW_LOGS:=/tmp/homebrew-logs}\";   export HOMEBREW_LOGS"
          printf "%s\n" ": \"\${TMPDIR:=/tmp/homebrew-tmp}\";            export TMPDIR"
          printf "%s\n" "mkdir -p \"\$HOMEBREW_TEMP\" \"\$HOMEBREW_CACHE\" \"\$HOMEBREW_LOGS\" 2>/dev/null || true"
          printf "%s\n" "exec /sandbox/.linuxbrew/Homebrew/bin/brew \"\$@\""
        } > /sandbox/.local/bin/brew
        chmod 0755 /sandbox/.local/bin/brew
        chown "$SBX_USER:$SBX_USER" /sandbox/.local/bin/brew 2>/dev/null || true
        chown -R "$SBX_USER:$SBX_USER" /sandbox/.local 2>/dev/null || true
      fi
      # Self-heal Homebrew permissions. `brew vendor-install ruby` (triggered
      # by e.g. `brew install gog`) mkdirs var/homebrew/locks inside the repo;
      # if even a single ancestor is still root-owned from an earlier sync,
      # the install bails with "cannot create directory". Cheap to re-run on
      # every health loop because chown -R bails out quickly when everything
      # is already owned by SBX_USER.
      if id "$SBX_USER" >/dev/null 2>&1 && [ -d /sandbox/.linuxbrew ]; then
        mkdir -p /sandbox/.linuxbrew/var/homebrew/locks \
                 /sandbox/.linuxbrew/Homebrew/var/homebrew/locks \
                 /sandbox/.linuxbrew/Homebrew/Library/Caches/Homebrew \
                 /sandbox/.linuxbrew/Homebrew/Library/Homebrew/vendor/portable-ruby \
                 /sandbox/.local/var/homebrew/locks 2>/dev/null || true
        # Recreate portable-ruby/current symlink if missing (see skill-env for why).
        VDIR=/sandbox/.linuxbrew/Homebrew/Library/Homebrew/vendor/portable-ruby
        if [ -d "$VDIR" ] && [ ! -e "$VDIR/current" ]; then
          RV=$(ls -1 "$VDIR" 2>/dev/null | awk "/^[0-9]+\\.[0-9]+\\.[0-9]+$/{print; exit}")
          if [ -n "$RV" ] && [ -x "$VDIR/$RV/bin/ruby" ]; then
            (cd "$VDIR" && ln -sfn "$RV" current) 2>/dev/null || true
          fi
        fi
        chown -R "$SBX_USER:$SBX_USER" /sandbox/.linuxbrew /sandbox/.local 2>/dev/null || true
        chmod -R u+rwX /sandbox/.linuxbrew 2>/dev/null || true
        chmod -R u+rwX /sandbox/.local 2>/dev/null || true
        [ -L "$VDIR/current" ] && chown -h "$SBX_USER:$SBX_USER" "$VDIR/current" 2>/dev/null || true
        # Flush stale lockfiles left root-owned. Homebrew acquires flock on
        # files like var/homebrew/locks/vendor-install-ruby when running
        # brew vendor-install ruby. If a previous install ran as root before
        # the brew wrapper below pinned HOMEBREW_PREFIX, the file can survive
        # root-owned mode 0644, which makes a later exec 200 redirection
        # return EACCES from the sandbox user and lock.sh mis-report
        # "Another brew vendor-install ruby process is already running".
        # We only delete files NOT owned by SBX_USER; an actively-running
        # brew would own its own lockfiles, so this cannot race.
        # NOTE: no single quotes allowed inside the outer sh -c wrapper --
        # sed script uses double quotes (no $ expansion needed here).
        for _ld in /sandbox/.linuxbrew/var/homebrew/locks \
                   /sandbox/.linuxbrew/Homebrew/var/homebrew/locks \
                   /sandbox/.local/var/homebrew/locks; do
          [ -d "$_ld" ] || continue
          find "$_ld" -maxdepth 1 -type f ! -user "$SBX_USER" \
            -print -delete 2>/dev/null | sed "s#^#[sandbox-brew-lock] stale: #" || true
        done
      fi
      # /var/tmp self-heal (see skill-env). Cheap idempotent re-check so an image
      # rebuild or a brew install gone sideways cannot leave root-owned litter
      # and block subsequent installs.
      mkdir -p /var/tmp 2>/dev/null || true
      chmod 1777 /var/tmp 2>/dev/null || true
      if id "$SBX_USER" >/dev/null 2>&1; then
        find /var/tmp -mindepth 1 -maxdepth 1 ! -user "$SBX_USER" -print \
          -exec rm -rf {} + 2>/dev/null || true
      fi
      # Staleness: if /proc/<gateway>/environ lacks XDG_CONFIG_HOME=/sandbox, only force
      # restart when health also fails with explicit HOME+XDG (matches LAUNCH). Truncated
      # /proc environ must not wedge a healthy gateway.
      _gw_pid=""
      _gw_pid=$(pgrep -f "openclaw[- ]gateway" 2>/dev/null | head -1) || true
      if [ -z "$_gw_pid" ]; then
        _gw_pid=$(ps -eo pid,comm 2>/dev/null \
                  | awk '"'"'$2 ~ /^openclaw[- ]gateway$/ || $2 == "openclaw-gateway" {print $1; exit}'"'"')
      fi
      _gw_stale=0
      if [ -n "$_gw_pid" ] && [ -r "/proc/$_gw_pid/environ" ]; then
        if ! tr "\0" "\n" < "/proc/$_gw_pid/environ" 2>/dev/null \
             | grep -qiE "^XDG_CONFIG_HOME=/sandbox"; then
          # /proc/<pid>/environ can be truncated on long env; do not restart a gateway
          # that still answers health with the same env as LAUNCH (HOME+XDG under /sandbox).
          if ! env HOME=/sandbox XDG_CONFIG_HOME=/sandbox/.config openclaw gateway health >/dev/null 2>&1; then
            _gw_stale=1
            echo "[sandbox-gw] running gateway pid=$_gw_pid lacks XDG in /proc environ and health fails with explicit XDG; forcing restart"
          else
            echo "[sandbox-gw] note: pid=$_gw_pid /proc environ missing XDG_CONFIG_HOME=/sandbox but health OK with explicit env; skip stale restart"
          fi
        fi
      fi
      # Config mutation staleness: openclaw gateway does NOT re-read
      # openclaw.json on file change, so a healthy gateway still runs
      # with a stale allowedOrigins / trustedProxies copy after
      # patch_origins.py appended new entries. That manifests as WebUI
      # chat silently dropped at the CORS gate (TUI path bypasses it
      # because it connects locally without an Origin header).
      if [ "${_cfg_changed:-0}" = "1" ]; then
        _gw_stale=1
        echo "[sandbox-gw] openclaw.json changed; forcing gateway restart to pick up allowedOrigins / trustedProxies"
        # Brief pause so in-flight TUI / tunnel TCP sessions can finish before we signal the gateway.
        sleep 2
      fi
      if [ "$_gw_stale" = "0" ]; then
        if env HOME=/sandbox XDG_CONFIG_HOME=/sandbox/.config openclaw gateway health >/dev/null 2>&1; then
          echo "[sandbox-gw] gateway already healthy; rc hooks applied"
          exit 0
        fi
        if command -v curl >/dev/null 2>&1 \
          && curl -sS -o /dev/null --connect-timeout 2 --max-time 8 http://127.0.0.1:18789/ 2>/dev/null; then
          echo "[sandbox-gw] gateway health CLI blip but HTTP :18789 OK; rc hooks applied no restart"
          exit 0
        fi
        if command -v wget >/dev/null 2>&1 \
          && wget -q -T 8 -O /dev/null http://127.0.0.1:18789/ 2>/dev/null; then
          echo "[sandbox-gw] gateway health CLI blip but HTTP :18789 OK wget; rc hooks no restart"
          exit 0
        fi
      fi
      [ "$_gw_stale" = "1" ] || echo "[sandbox-gw] gateway not responding; restarting..."
      openclaw gateway stop 2>/dev/null || true
      # Build a space-separated pid list without tr newline-to-space: this block is inside
      # sh -c single-quoted script; a literal apostrophe would terminate that string early.
      _gw_kill_list=$(ps -eo pid,command 2>/dev/null | awk '"'"'/openclaw[- ]gateway/ && !/awk/ {p=(p ? p " " : "") $1} END{print p}'"'"')
      for _pid in $_gw_kill_list; do
        [ -n "$_pid" ] || continue
        kill -TERM "$_pid" 2>/dev/null || true
      done
      sleep 2
      for _pid in $_gw_kill_list; do
        [ -n "$_pid" ] || continue
        kill -9 "$_pid" 2>/dev/null || true
      done
      sleep 3
      # GOG_KEYRING_BACKEND + GOG_KEYRING_PASSWORD MUST be in openclaw gateway process
      # env so its skill subprocesses (sanitized HOME) inherit them; otherwise gog
      # prompts for the passphrase interactively, which fails in non-TTY agent context.
      GOG_ENV=""
      if [ -n "${GOG_KEYRING_PASSWORD:-}" ]; then
        GOG_ENV="GOG_KEYRING_BACKEND=file GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD}"
      fi
      LAUNCH="HOME=/sandbox XDG_CONFIG_HOME=/sandbox/.config ${GOG_ENV} PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin nohup openclaw gateway run --port 18789 --bind loopback --auth none --allow-unconfigured >>/sandbox/.openclaw-data/gateway.out 2>&1 </dev/null"
      if command -v runuser >/dev/null 2>&1; then
        runuser -u "$SBX_USER" -- sh -c "$LAUNCH & sleep 5; exit 0"
      else
        su - "$SBX_USER" -s /bin/sh -c "cd /sandbox; $LAUNCH & sleep 5; exit 0"
      fi
      exit 0
    ' 2>&1 | sed 's/^/[sandbox-gw] /'

    for i in $(seq 1 60); do
      if health_ok; then
        echo "[sandbox-gw] up after ${i}s"
        exit 0
      fi
      sleep 1
    done

    echo "[sandbox-gw] gateway still not responding after 60s; last log tail:"
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      tail -40 /sandbox/.openclaw-data/gateway.out 2>&1 | sed 's/^/[sandbox-gw] /'
    exit 1

  # restart-gateway.sh removed in chart v1.7.0. With chat traffic now going through
  # `openshell forward` (single SSH multiplexed connection — see deployment.yaml's
  # `ensure_forward_chat`), user-triggered gateway hot-restarts became counter-productive
  # because they tear down the user's own WebUI/TUI sessions instead of fixing them.
  # When the gateway truly dies, chat-ui-bridge runs `sandbox-ensure-gateway.sh` (above)
  # automatically; users do not need to intervene from inside the sandbox.

  # Per-connection stdio<->TCP bridge used as socat EXEC target.
  # socat pipes the accepted TCP socket to this script's stdin/stdout; node inside
  # the sandbox opens 127.0.0.1:<PORT> and pipes both directions. Target port is
  # the first argument (defaults to 18789 for the chat gateway). Used by:
  #   - chat:   EXEC:"/opt/nemoclaw/sandbox-tunnel.sh 18789"
  #   - oauth:  EXEC:"/opt/nemoclaw/sandbox-tunnel.sh 8080"
  # Per-connection cost is one `docker exec` + `kubectl exec` + `node` startup
  # (~300-800ms), fine for long-lived WebSocket sessions and one-shot OAuth callbacks.
  #
  # OpenShell >= 0.0.36 places processes started via `nemoclaw my-assistant connect`
  # (e.g. `gog auth add`) in a SEPARATE network namespace from processes started via
  # `kubectl exec -c agent` (where openclaw gateway runs). So a naive TCP connect on
  # the port inside the agent netns fails with ECONNREFUSED even though `ss` in the
  # sandbox shows the port LISTEN. The script therefore:
  #   1. Try 127.0.0.1:<PORT> in the agent netns (chat case -- gateway is here).
  #   2. Prefer a known-name process (gog/openclaw) and nsenter into its netns
  #      (oauth case -- gog runs in the user/sandbox netns).
  #   3. Otherwise walk /proc with a strict column-aligned grep of
  #      /proc/<pid>/net/tcp[6] so we do not false-positive on :1F90 appearing in
  #      tx_queue or inode columns (seen in production -- path 1 hits PID 1 whose
  #      agent-netns view has that substring elsewhere and the connect then fails
  #      silently -> socat curls "Empty reply from server").
  # NOTE: all comments below intentionally avoid apostrophes to keep the outer
  # `sh -c '...'` single-quoted body from closing early under dash.
  sandbox-tunnel.sh: |
    #!/bin/sh
    CLUSTER_CTR="${CLUSTER_CTR:-openshell-cluster-nemoclaw}"
    NS="${NS:-openshell}"
    SBX="${SBX:-my-assistant}"
    PORT="${1:-18789}"
    # Rules learned the hard way (all tested):
    #   1. Do not rely on s.on("close") to exit: under HTTP/1.1 keep-alive gog never closes,
    #      and `curl -m 5` tears down the peer before node ever sees close. Exit on
    #      s.on("end") (server-side FIN after the response) instead, or on stdin EOF as
    #      a fallback for keep-alive requests.
    #   2. Pipe with {end:false} both ways so stdin EOF does not auto-close the write side
    #      and mid-flight response bytes are not lost.
    #   3. Explicitly s.end() on stdin EOF (half-close write side) so gog sees the
    #      request terminator for Content-Length-less GETs.
    #   4. Wait for process.stdout.end() callback before exit to flush queued bytes
    #      (kubectl exec remote stdout pipe is NOT a TTY; premature exit truncates).
    #   5. Retry TCP connect ~5s (gateway process up but not yet accept()ing is common);
    #      without this socat logs waitpid status 1 and WebUI stays 503 while TUI works.
    NODE_EXPR='const PORT=Number(process.env.TUNNEL_PORT||18789);const net=require("net");let done=false;function bye(c){if(done)return;done=true;try{process.stdout.end(()=>process.exit(c));}catch(_){process.exit(c);}}let s,n=0,L=32;function wire(){s.on("error",()=>bye(1));s.on("end",()=>bye(0));s.on("close",()=>bye(0));process.stdin.on("end",()=>{try{s.end();}catch(_){}setTimeout(()=>bye(0),15000);});process.stdin.on("error",()=>{});process.stdin.pipe(s,{end:false});s.pipe(process.stdout,{end:false});}function go(){try{if(s)s.destroy();}catch(e){}function pre(){if(n++<L)setTimeout(go,200);else bye(1);}s=net.createConnection({port:PORT,host:"127.0.0.1"},()=>{s.removeListener("error",pre);s.on("error",()=>bye(1));wire();});s.on("error",pre);}go();'
    exec docker exec -i "$CLUSTER_CTR" \
      kubectl -n "$NS" exec -i "$SBX" -c agent -- \
      env TUNNEL_PORT="$PORT" NODE_EXPR="$NODE_EXPR" sh -c '
        HEX_PORT=$(printf "%04X" "$TUNNEL_PORT")
        # LISTEN is st=0A. Local is 127.0.0.1 (0100007F) or 0.0.0.0 (00000000) in /proc/net/tcp.
        # rem_address is ONE token like 00000000:0000 (contains a colon) -- do NOT split it into
        # two [0-9A-F:]+ groups or grep never matches and the tunnel exits 1 before node runs.
        _listen4() { grep -qE "^ *[0-9]+: (0100007F|00000000):${HEX_PORT} [^[:space:]]+[[:space:]]+0A " "$1" 2>/dev/null; }
        # tcp6: local addr is one token ending with :HEX_PORT; rem one token; then st 0A.
        _listen6() { grep -qE "^ *[0-9]+: [0-9A-F:]+:${HEX_PORT} [^[:space:]]+[[:space:]]+0A " "$1" 2>/dev/null; }
        _listen46() { _listen4 "$1" || { [ -r "$2" ] && _listen6 "$2"; }; }
        # 1) Same netns path: fast path for chat (openclaw gateway listens here).
        if _listen46 /proc/net/tcp /proc/net/tcp6; then
          exec node -e "$NODE_EXPR"
        fi
        # 2) Well-known-name fast path: gog auth / openclaw listen on oauth/gateway ports.
        for name_pat in "gog auth" "openclaw-gatewa" "openclaw gateway"; do
          TPID=$(ps -eo pid,args 2>/dev/null | awk -v p="$name_pat" "index(\$0,p)&&!/awk/{print \$1;exit}")
          if [ -n "$TPID" ] && [ -r "/proc/$TPID/ns/net" ] \
             && _listen46 "/proc/$TPID/net/tcp" "/proc/$TPID/net/tcp6"; then
            exec nsenter --net=/proc/$TPID/ns/net -- node -e "$NODE_EXPR"
          fi
        done
        # 3) Fallback: walk /proc with strict column-aligned grep so we do not
        #    false-positive on HEX appearing in tx_queue / inode columns.
        SEEN=""
        for link in /proc/[0-9]*/ns/net; do
          [ -r "$link" ] || continue
          INO=$(readlink "$link" 2>/dev/null)
          case " $SEEN " in *" $INO "*) continue ;; esac
          SEEN="$SEEN $INO"
          PID=$(echo "$link" | awk -F/ "{print \$3}")
          if _listen46 "/proc/$PID/net/tcp" "/proc/$PID/net/tcp6"; then
            exec nsenter --net=/proc/"$PID"/ns/net -- node -e "$NODE_EXPR"
          fi
        done
        echo "[tunnel] no netns listens on port $TUNNEL_PORT" >&2
        exit 1
      '

  # Template for the sandbox's ~/.bash_profile. `__GOG_KEYRING_PASSWORD__` is the
  # only placeholder — cold-reset substitutes it at render time with the Olares-
  # provided password (persisted in the `nemoclaw-gog-keyring` Secret). Everything
  # else that used to live here (HOMEBREW_*, HOMEBREW_CC/CXX detection) is now
  # written to /etc/environment + /etc/profile.d/nemoclaw-*.sh by skill-env, so
  # both login + non-login shells get it without duplicating the logic.
  sandbox-bash-profile.tpl: |
    # nemoclaw-skill-env (managed; do not edit)
    # HOMEBREW_* knobs + HOMEBREW_CC/HOMEBREW_CXX/CC/CXX are written to /etc/environment
    # and /etc/profile.d/nemoclaw-*.sh by sandbox-install-skill-env.sh, so this file
    # only needs to carry the per-user PATH prepend + gog keyring bits.
    export PATH="/sandbox/.local/bin:/sandbox/.local/go/bin:/sandbox/go/bin:$HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin:$PATH"
    export GOG_KEYRING_BACKEND=file
    export GOG_KEYRING_PASSWORD='__GOG_KEYRING_PASSWORD__'
    # end-nemoclaw-skill-env
    # Optional: after `nemoclaw my-assistant connect`, run `nemoclaw_wait_openclaw_gateway && openclaw tui`
    # if the TUI races a gateway restart (OpenShell connect netns vs agent netns is sensitive to blips).
    nemoclaw_wait_openclaw_gateway() {
      _wx=0
      while [ "$_wx" -lt 45 ]; do
        if env HOME=/sandbox XDG_CONFIG_HOME=/sandbox/.config openclaw gateway health >/dev/null 2>&1; then
          return 0
        fi
        sleep 1
        _wx=$((_wx + 1))
      done
      echo "[nemoclaw] WARN: openclaw gateway health not OK after 45s; try openclaw tui anyway" >&2
      return 1
    }

  # Gog shim (Olares hydration has no Helm .Files — edit files/gog-shim-reconcile.sh then re-embed here).
  gog-shim-reconcile.sh: |
    #!/bin/sh
    # Canonical copy: also embedded under key gog-shim-reconcile.sh in
    # templates/configmap-sandbox-bridge.yaml (Olares chart renderer has no Helm .Files.Get).
    # After edits: from repo root run  python3 scripts/embed-gog-shim.py
