      mkdir -p /sandbox/.config/gogcli/keyring 2>/dev/null || true
      if [ -f /tmp/.config/gogcli/credentials.json ] && [ ! -f /sandbox/.config/gogcli/credentials.json ]; then
        cp -a /tmp/.config/gogcli/credentials.json /sandbox/.config/gogcli/ 2>/dev/null && \
          echo "[gog-shim] migrated credentials.json from /tmp/.config/gogcli" >&2
      fi
      if [ -d /tmp/.config/gogcli/keyring ]; then
        for _kf in /tmp/.config/gogcli/keyring/*; do
          [ -f "$_kf" ] || continue
          _kb=$(basename "$_kf")
          [ -e "/sandbox/.config/gogcli/keyring/$_kb" ] && continue
          cp -an "$_kf" /sandbox/.config/gogcli/keyring/ 2>/dev/null && \
            echo "[gog-shim] migrated keyring/$_kb from /tmp/.config/gogcli" >&2
        done
      fi
      chown -R sandbox:sandbox /sandbox/.config/gogcli 2>/dev/null || true
    fi
    echo "[gog-shim] done. In bash run: hash -r   # if gog was cached before" >&2
  # Helper for cold-reset: takes GOG_KEYRING_PASSWORD from env, reads the
  # template + static wrapper scripts from /opt/nemoclaw/, and ships them
  # into the sandbox over kubectl exec -i. Factored out so deployment.yaml
  # only has to invoke one thing instead of embedding three heredocs.
  sandbox-install-skill-env.sh: |
    #!/bin/sh
    set -u
    CLUSTER_CTR="${CLUSTER_CTR:-openshell-cluster-nemoclaw}"
    NS="${NS:-openshell}"
    SBX="${SBX:-my-assistant}"
    SBX_USER="${SBX_USER:-sandbox}"
    SCRIPT_DIR="${SCRIPT_DIR:-/opt/nemoclaw}"
    : "${GOG_KEYRING_PASSWORD:?GOG_KEYRING_PASSWORD must be set}"

    # ------------------------------------------------------------------
    # Mutex: serialise cold-reset vs chat-ui-bridge (both invoke this script).
    # Without it they race the sandbox dpkg/apt lock. flock -n + exit 0 lets
    # the loser no-op cleanly; callers only write the skill-env sentinel on
    # exit 0, and the bridge re-ticks shortly afterwards.
    _SKILLENV_LOCK=/workspace/.nemoclaw-skillenv-install.lock
    mkdir -p /workspace 2>/dev/null || true
    if command -v flock >/dev/null 2>&1; then
      exec 9>"$_SKILLENV_LOCK"
      if ! flock -n 9; then
        echo "[skill-env] another skill-env install is in progress (lock=$_SKILLENV_LOCK); skipping this tick"
        exit 0
      fi
    fi

    # Copy a file from the workspace pod into the sandbox pod via stdin.
    # $1 = src path on this pod; $2 = dst path in sandbox; $3 = optional mode.
    copy_to_sandbox() {
      src="$1"; dst="$2"; mode="${3:-}"
      docker exec -i "$CLUSTER_CTR" kubectl -n "$NS" exec -i "$SBX" -c agent -- \
        sh -c 'mkdir -p "$(dirname "$1")" && cat > "$1"' _ "$dst" < "$src"
      if [ -n "$mode" ]; then
        docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- chmod "$mode" "$dst"
      fi
    }

    # Stage the ~/.bash_profile with GOG_KEYRING_PASSWORD substituted in, then
    # purge any stale nemoclaw-skill-env block before appending the new one.
    rendered_bp=$(mktemp)
    sed "s|__GOG_KEYRING_PASSWORD__|${GOG_KEYRING_PASSWORD}|g" \
      "$SCRIPT_DIR/sandbox-bash-profile.tpl" > "$rendered_bp"

    # Determine sandbox $HOME (falls back to /sandbox for stock images).
    SBX_HOME=$(docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      sh -c 'getent passwd "'"$SBX_USER"'" 2>/dev/null | cut -d: -f6' 2>/dev/null)
    [ -n "$SBX_HOME" ] || SBX_HOME=/sandbox

    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- sh -c '
      SBX_HOME="'"$SBX_HOME"'"
      mkdir -p "$SBX_HOME/.local/bin" /tmp/homebrew-tmp /tmp/homebrew-cache /tmp/homebrew-logs
      # kubectl exec runs as root, so the three /tmp/homebrew-* dirs above are root-owned 0755.
      # We push TMPDIR=/tmp/homebrew-tmp into /etc/environment further down, which means every
      # non-login process (including openclaw, which does `mkdir $TMPDIR/openclaw-<uid>` at
      # startup) sees this path. Without sticky world-writable perms (1777 like /tmp itself),
      # openclaw as the sandbox user bombs with
      #   Error: Unable to create fallback OpenClaw temp dir: /tmp/homebrew-tmp/openclaw-998
      # the moment anyone tries `openclaw config --section skills`.
      chmod 1777 /tmp/homebrew-tmp /tmp/homebrew-cache /tmp/homebrew-logs 2>/dev/null || true
      BP="$SBX_HOME/.bash_profile"
      [ -f "$BP" ] || touch "$BP"
      if grep -q "nemoclaw-skill-env" "$BP" 2>/dev/null; then
        awk "/^# nemoclaw-skill-env \(managed; do not edit\)/{s=1;next} /^# end-nemoclaw-skill-env/{s=0;next} !s{print}" \
          "$BP" > "$BP.new" && mv "$BP.new" "$BP"
      fi
    '

    # Static binaries from the init-prefetch image land in /workspace/.nemoclaw-prefetch/.
    # Installed before bash_profile so PATH ($SBX_HOME/.local/bin) picks them up.
    # OpenClaw skill UI may still run brew install (e.g. gogcli); that path needs gcc — distro
    # build-essential in skill-env covers it.
    PREF_DIR="${NEMOCLAW_PREFETCH_DIR:-/workspace/.nemoclaw-prefetch}"

    # gog (gogcli) is intentionally NOT prefetched. Users install it in-sandbox via
    # `openclaw config --section skills` -> brew install steipete/tap/gog so version,
    # auth flow, and OAuth callback host stay under their control. The brew install
    # produces /sandbox/.linuxbrew/Homebrew/Cellar/gogcli/<ver>/bin/gog; the shim
    # reconcile below replaces the sibling Homebrew/bin/gog symlink with our
    # env-injecting wrapper.

    # --- editors: busybox (static) provides `vi`; micro is a modern TUI ---
    # Both are single static files with no runtime dependencies — safe to drop into
    # ~/.local/bin/ and rely on PATH.
    if [ -f "$PREF_DIR/busybox" ]; then
      echo "[skill-env] installing prefetched busybox -> $SBX_HOME/.local/bin/busybox (provides vi)"
      copy_to_sandbox "$PREF_DIR/busybox" "$SBX_HOME/.local/bin/busybox" 755
      # Expose as `vi` via a wrapper (kubectl cp can't create symlinks; a 2-line wrapper is
      # portable and behaves identically for interactive editing).
      _vi_wrapper=$(mktemp)
      printf '%s\n' '#!/bin/sh' 'exec "$(dirname "$0")/busybox" vi "$@"' > "$_vi_wrapper"
      copy_to_sandbox "$_vi_wrapper" "$SBX_HOME/.local/bin/vi" 755
      rm -f "$_vi_wrapper"
    fi
    if [ -f "$PREF_DIR/micro" ]; then
      echo "[skill-env] installing prefetched micro -> $SBX_HOME/.local/bin/micro"
      copy_to_sandbox "$PREF_DIR/micro" "$SBX_HOME/.local/bin/micro" 755
    fi

    # --- search tools: ripgrep (rg) and fd (both musl-static single binaries) ---
    if [ -f "$PREF_DIR/rg" ]; then
      echo "[skill-env] installing prefetched rg -> $SBX_HOME/.local/bin/rg"
      copy_to_sandbox "$PREF_DIR/rg" "$SBX_HOME/.local/bin/rg" 755
    fi
    if [ -f "$PREF_DIR/fd" ]; then
      echo "[skill-env] installing prefetched fd -> $SBX_HOME/.local/bin/fd"
      copy_to_sandbox "$PREF_DIR/fd" "$SBX_HOME/.local/bin/fd" 755
    fi

    # Prefetched Olares CLI (single-binary ELF). Installed as root into
    # /usr/local/bin/olares-cli so every user/uid in the sandbox can exec
    # it directly without PATH juggling. Idempotent: sha256-compared with
    # the sandbox copy, skipped when already current. copy_to_sandbox
    # runs via `kubectl exec` (which executes as root inside the agent
    # container), so writing to /usr/local/bin is allowed even though
    # the rest of skill-env runs in the non-root sandbox user's scope.
    if [ -f "$PREF_DIR/olares-cli" ]; then
      _pref_cli_ver=""
      [ -f "$PREF_DIR/olares-cli.version" ] && _pref_cli_ver=$(tr -d "\r\n" < "$PREF_DIR/olares-cli.version" 2>/dev/null || true)
      _pref_cli_sha=$(sha256sum "$PREF_DIR/olares-cli" 2>/dev/null | awk "{print \$1}" | tr -d "\r\n")
      _sbx_cli_sha=$(docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
        sh -c 'test -x /usr/local/bin/olares-cli && sha256sum /usr/local/bin/olares-cli 2>/dev/null | awk "{print \$1}" || echo ""' 2>/dev/null | tr -d "\r\n")
      if [ -n "$_sbx_cli_sha" ] && [ -n "$_pref_cli_sha" ] && [ "$_sbx_cli_sha" = "$_pref_cli_sha" ]; then
        echo "[skill-env] prefetched olares-cli${_pref_cli_ver:+ $_pref_cli_ver} already present at /usr/local/bin/olares-cli (sha256 match; skipping)"
      else
        echo "[skill-env] installing prefetched olares-cli${_pref_cli_ver:+ $_pref_cli_ver} -> /usr/local/bin/olares-cli (streaming via kubectl exec)"
        if copy_to_sandbox "$PREF_DIR/olares-cli" /usr/local/bin/olares-cli 0755; then
          docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
            sh -c 'chown root:root /usr/local/bin/olares-cli 2>/dev/null || true' \
            >/dev/null 2>&1 || true
          echo "[skill-env] prefetched olares-cli installed OK"
        else
          echo "[skill-env] WARN: copy of prefetched olares-cli into sandbox failed; \`olares-cli\` will not be available" >&2
        fi
      fi
      unset _pref_cli_ver _pref_cli_sha _sbx_cli_sha
    fi

    # Prefetched Go toolchain. The image ships /prefetch/go.tar.gz containing a
    # top-level `go/` dir (bin/, src/, pkg/, ...) = the standard go.dev layout.
    # Stream it directly into /sandbox/.local via one kubectl-exec + tar pipe so
    # we avoid staging ~150MB on disk twice. Skipped if the sandbox already has
    # a matching (or newer) /sandbox/.local/go/bin/go.
    if [ -f "$PREF_DIR/go.tar.gz" ]; then
      _pref_go_ver=""
      [ -f "$PREF_DIR/go.version" ] && _pref_go_ver=$(tr -d "\r\n" < "$PREF_DIR/go.version" 2>/dev/null || true)
      _sbx_go_ver=$(docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
        sh -c 'test -x /sandbox/.local/go/bin/go && /sandbox/.local/go/bin/go version 2>/dev/null | awk "{print \$3}" | sed "s/^go//" || echo ""' 2>/dev/null | tr -d "\r\n")
      if [ -n "$_sbx_go_ver" ] && [ -n "$_pref_go_ver" ] && [ "$_sbx_go_ver" = "$_pref_go_ver" ]; then
        echo "[skill-env] prefetched go ${_pref_go_ver} already present at /sandbox/.local/go (skipping reinstall)"
      else
        echo "[skill-env] installing prefetched go${_pref_go_ver:+ $_pref_go_ver} -> /sandbox/.local/go (streaming tarball via kubectl exec)"
        # mkdir-and-extract in one remote sh so partial prior installs get
        # cleared before the new tree lands. Extraction lives under
        # /sandbox/.local so the sandbox user (not root) owns the tree.
        if docker exec -i "$CLUSTER_CTR" kubectl -n "$NS" exec -i "$SBX" -c agent -- \
             sh -c 'mkdir -p /sandbox/.local && rm -rf /sandbox/.local/go && tar -xzf - -C /sandbox/.local && test -x /sandbox/.local/go/bin/go' \
             < "$PREF_DIR/go.tar.gz"; then
          docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
            sh -c 'chown -R "'"$SBX_USER"'":"'"$SBX_USER"'" /sandbox/.local/go 2>/dev/null || true; mkdir -p /sandbox/go/bin /sandbox/go/src /sandbox/go/pkg 2>/dev/null; chown -R "'"$SBX_USER"'":"'"$SBX_USER"'" /sandbox/go 2>/dev/null || true' \
            >/dev/null 2>&1 || true
          echo "[skill-env] prefetched go installed OK"
        else
          echo "[skill-env] WARN: tar-extract of prefetched go.tar.gz into sandbox failed; `go` will not be available" >&2
        fi
      fi
      unset _pref_go_ver _sbx_go_ver
    fi

    # Append the rendered bash_profile block (preserves any previous user edits
    # outside the managed markers, since we purged only the managed block above).
    docker exec -i "$CLUSTER_CTR" kubectl -n "$NS" exec -i "$SBX" -c agent -- \
      sh -c 'printf "\n" >> "$1"; cat >> "$1"' _ "$SBX_HOME/.bash_profile" < "$rendered_bp"

    # Derive the OAuth redirect host from CHAT_UI_URL (strip scheme/port/path).
    # Pre-exported in the sandbox shell rc as NEMOCLAW_GOG_OAUTH_REDIRECT_HOST so
    # users can do `gog auth add ... --redirect-host "$NEMOCLAW_GOG_OAUTH_REDIRECT_HOST"`
    # without copy/pasting the per-user Olares hostname.
    GOAUTH_REDIRECT_HOST="${NEMOCLAW_GOG_OAUTH_REDIRECT_HOST:-}"
    if [ -z "$GOAUTH_REDIRECT_HOST" ] && [ -n "${CHAT_UI_URL:-}" ]; then
      GOAUTH_REDIRECT_HOST=$(printf "%s" "$CHAT_UI_URL" \
        | sed -e 's#^[a-zA-Z][a-zA-Z0-9+.-]*://##' \
              -e 's#/.*$##' \
              -e 's#:.*$##')
    fi

    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- sh -c '
      SBX_HOME="'"$SBX_HOME"'"
      SBX_USER="'"$SBX_USER"'"
      GKP="'"$GOG_KEYRING_PASSWORD"'"
      GOAUTH_REDIRECT_HOST="'"$GOAUTH_REDIRECT_HOST"'"
      HB_BOTTLE_DOMAIN="'"${NEMOCLAW_HOMEBREW_BOTTLE_DOMAIN:-}"'"
      GOPROXY_VAL="'"${NEMOCLAW_GOPROXY:-https://goproxy.cn,direct}"'"
      # kubectl exec runs as root here. Prefer runuser over su for brew/gcc: su can
      # prompt for a password when PAM is strict, which fails non-interactively and
      # leaves gcc uninstalled while the rest of skill-env appears to succeed.
      _nemoclaw_run_sbx() {
        if command -v runuser >/dev/null 2>&1; then
          runuser -u "$SBX_USER" -- sh -lc "$1"
        else
          su - "$SBX_USER" -c "$1"
        fi
      }
      for f in "$SBX_HOME/.bashrc" "$SBX_HOME/.profile" "$SBX_HOME/.bash_profile" \
               "$SBX_HOME/.local" "$SBX_HOME/.local/bin"; do
        [ -e "$f" ] && chown -R "$SBX_USER":"$SBX_USER" "$f" 2>/dev/null || true
      done

      # Linuxbrew permissions self-heal.
      if ! id "$SBX_USER" >/dev/null 2>&1; then
        echo "[skill-env] WARN: user $SBX_USER missing; skipping brew chown"
      elif [ -d /sandbox/.linuxbrew ]; then
        BREW_REPO=/sandbox/.linuxbrew/Homebrew
        # Pre-create directories brew expects; mkdir -p is a no-op if they exist.
        mkdir -p "$BREW_REPO/var/homebrew/locks" \
                 "$BREW_REPO/Library/Caches/Homebrew" \
                 "$BREW_REPO/Library/Homebrew/vendor/portable-ruby" 2>/dev/null || true
        # Brew vendor-install looks for a `current` symlink to decide whether
        # portable-ruby is already installed. Recreate it pointing at the
        # single version directory present so brew does not re-fetch.
        VDIR="$BREW_REPO/Library/Homebrew/vendor/portable-ruby"
        if [ -d "$VDIR" ] && [ ! -e "$VDIR/current" ]; then
          RUBY_VER=$(ls -1 "$VDIR" 2>/dev/null \
            | awk "/^[0-9]+\\.[0-9]+\\.[0-9]+$/{print; exit}")
          if [ -n "$RUBY_VER" ] && [ -x "$VDIR/$RUBY_VER/bin/ruby" ]; then
            (cd "$VDIR" && ln -sfn "$RUBY_VER" current) 2>/dev/null || true
            echo "[skill-env] portable-ruby current -> $RUBY_VER"
          fi
        fi
        if chown -R "$SBX_USER":"$SBX_USER" /sandbox/.linuxbrew 2>/tmp/brew-chown.err; then
          chmod -R u+rwX /sandbox/.linuxbrew 2>/dev/null || true
          # chown -h to keep the symlink itself owned correctly (not follow).
          [ -L "$VDIR/current" ] && chown -h "$SBX_USER":"$SBX_USER" "$VDIR/current" 2>/dev/null || true
          echo "[skill-env] linuxbrew owned by $SBX_USER"
        else
          echo "[skill-env] WARN: chown /sandbox/.linuxbrew failed:"
          cat /tmp/brew-chown.err 2>/dev/null | head -5
        fi
      fi

      # /var/tmp MUST exist with world-writable sticky perms (1777). Some brew
      # internal Ruby helpers (github_api fetch, unpack bottle tarballs) write
      # there with File#open and `dir_s_mkdir`; if the path is missing, root-
      # owned, or 0755 the installs fail with `Permission denied @ rb_sysopen
      # - /var/tmp/...` even though HOMEBREW_TEMP is set elsewhere. Clean any
      # stale root-owned litter from previous failed installs at the same time.
      mkdir -p /var/tmp 2>/dev/null || true
      chmod 1777 /var/tmp 2>/dev/null || true
      if id "$SBX_USER" >/dev/null 2>&1; then
        find /var/tmp -mindepth 1 -maxdepth 1 ! -user "$SBX_USER" -print \
          -exec rm -rf {} + 2>/dev/null || true
      fi

      # Non-login shells (openclaw agent subprocesses) do NOT source
      # ~/.bash_profile, so HOMEBREW_TEMP/TMPDIR defined there never reach
      # `brew install` spawned by the openclaw skill runner. /etc/environment
      # IS read by PAM for every session including those, plus Debian reads
      # /etc/profile.d for interactive shells. Drop both so the env is
      # enforced regardless of how brew is invoked.
      ETCENV=/etc/environment
      MARK_ENV="# nemoclaw-skill-env (managed; do not edit)"
      if [ -w /etc ] || [ -w "$ETCENV" ] 2>/dev/null; then
        [ -f "$ETCENV" ] || touch "$ETCENV" 2>/dev/null || true
        if [ -w "$ETCENV" ]; then
          sed -i "/nemoclaw-skill-env/,/end-nemoclaw-skill-env/d" "$ETCENV" 2>/dev/null || true
          {
            echo "$MARK_ENV"
            echo "HOMEBREW_PREFIX=/sandbox/.linuxbrew"
            echo "HOMEBREW_REPOSITORY=/sandbox/.linuxbrew/Homebrew"
            echo "HOMEBREW_CELLAR=/sandbox/.linuxbrew/Cellar"
            echo "HOMEBREW_TEMP=/tmp/homebrew-tmp"
            echo "HOMEBREW_CACHE=/tmp/homebrew-cache"
            echo "HOMEBREW_LOGS=/tmp/homebrew-logs"
            echo "TMPDIR=/tmp/homebrew-tmp"
            echo "HOMEBREW_NO_AUTO_UPDATE=1"
            echo "HOMEBREW_NO_ENV_HINTS=1"
            echo "HOMEBREW_NO_ANALYTICS=1"
            echo "HOMEBREW_NO_ENV_FILTERING=1"
            # CA bundle for HTTPS: curl/git read CURL_CA_BUNDLE / GIT_SSL_CAINFO;
            # Go crypto/tls reads SSL_CERT_FILE / SSL_CERT_DIR (NOT CURL_CA_BUNDLE),
            # which is why tools like olares-cli hit x509 unknown authority while
            # curl still works when only CURL_CA_BUNDLE was set.
            #
            # Prefer the openshell image bundle (includes Olares / MITM roots),
            # else Debian ca-certificates.crt after Stage CA below.
            if [ -r /etc/openshell-tls/ca-bundle.pem ]; then
              echo "SSL_CERT_FILE=/etc/openshell-tls/ca-bundle.pem"
              echo "SSL_CERT_DIR=/etc/ssl/certs"
              echo "GIT_SSL_CAINFO=/etc/openshell-tls/ca-bundle.pem"
              echo "CURL_CA_BUNDLE=/etc/openshell-tls/ca-bundle.pem"
              echo "REQUESTS_CA_BUNDLE=/etc/openshell-tls/ca-bundle.pem"
              echo "NODE_EXTRA_CA_CERTS=/etc/openshell-tls/ca-bundle.pem"
            elif [ -r /etc/ssl/certs/ca-certificates.crt ]; then
              echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt"
              echo "SSL_CERT_DIR=/etc/ssl/certs"
              echo "GIT_SSL_CAINFO=/etc/ssl/certs/ca-certificates.crt"
              echo "CURL_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt"
              echo "REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt"
              echo "NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt"
            fi
            # Bottle / portable-ruby mirror override. Only emit when set --
            # empty domain triggers brew to use its builtin ghcr.io default.
            if [ -n "$HB_BOTTLE_DOMAIN" ]; then
              echo "HOMEBREW_BOTTLE_DOMAIN=$HB_BOTTLE_DOMAIN"
              echo "HOMEBREW_ARTIFACT_DOMAIN=$HB_BOTTLE_DOMAIN"
              echo "HOMEBREW_API_DOMAIN=$HB_BOTTLE_DOMAIN"
            fi
            # Go toolchain: only emit when the prefetched tree actually landed
            # in the sandbox (skill-env streams /prefetch/go.tar.gz into
            # /sandbox/.local/go). GOSUMDB=off is intentional -- sum.golang.org
            # is frequently blocked / MITM-intercepted on corporate networks and
            # a stale sumdb would wedge every `go build` indefinitely.
            if [ -x /sandbox/.local/go/bin/go ]; then
              echo "GOROOT=/sandbox/.local/go"
              echo "GOPATH=/sandbox/go"
              echo "GOBIN=/sandbox/go/bin"
              echo "GO111MODULE=on"
              echo "GOPROXY=$GOPROXY_VAL"
              echo "GOSUMDB=off"
            fi
            echo "GOG_KEYRING_BACKEND=file"
            if [ -n "$GKP" ]; then
              echo "GOG_KEYRING_PASSWORD=$GKP"
            fi
            echo "XDG_CONFIG_HOME=/sandbox/.config"
            echo "# end-nemoclaw-skill-env"
          } >> "$ETCENV"
          echo "[skill-env] /etc/environment updated"
          if [ -r /etc/openshell-tls/ca-bundle.pem ]; then
            echo "[skill-env] CA bundle for SSL_CERT_FILE: /etc/openshell-tls/ca-bundle.pem (Go x509 + curl + node)"
          elif [ -r /etc/ssl/certs/ca-certificates.crt ]; then
            echo "[skill-env] CA bundle for SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt"
          fi
        fi
      fi
      mkdir -p /etc/profile.d 2>/dev/null || true
      if [ -w /etc/profile.d ]; then
        PROFD=/etc/profile.d/nemoclaw-brew-temp.sh
        {
          echo "# nemoclaw: keep brew temp files inside /tmp so /var/tmp perms are irrelevant"
          echo "export HOMEBREW_NO_ENV_FILTERING=1"
          echo "export HOMEBREW_PREFIX=/sandbox/.linuxbrew"
          echo "export HOMEBREW_REPOSITORY=/sandbox/.linuxbrew/Homebrew"
          echo "export HOMEBREW_CELLAR=/sandbox/.linuxbrew/Cellar"
          echo "# Put distro gcc/clang ahead of brew shims for non-login brew (openclaw skills / gogcli)."
          echo "export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/sandbox/.local/bin:/sandbox/.linuxbrew/Homebrew/bin:/sandbox/.linuxbrew/bin:\$PATH"
          echo "export HOMEBREW_TEMP=/tmp/homebrew-tmp"
          echo "export HOMEBREW_CACHE=/tmp/homebrew-cache"
          echo "export HOMEBREW_LOGS=/tmp/homebrew-logs"
          echo "export TMPDIR=/tmp/homebrew-tmp"
          echo "mkdir -p \"\$HOMEBREW_TEMP\" \"\$HOMEBREW_CACHE\" \"\$HOMEBREW_LOGS\" 2>/dev/null || true"
          # chmod 1777 so non-root users (openclaw: uid 998) can mkdir their own
          # subdirs like openclaw-998 inside TMPDIR. No-op once perms are already correct.
          echo "chmod 1777 \"\$HOMEBREW_TEMP\" \"\$HOMEBREW_CACHE\" \"\$HOMEBREW_LOGS\" 2>/dev/null || true"
          # CA bundle path (brew tap / brew update / gogcli self-update all
          # use git+https). Emit only if the bundle exists so login shells
          # do not inherit a bogus path.  NOTE: no apostrophes allowed in
          # this block -- the whole sandbox-install-skill-env.sh body is
          # wrapped in a kubectl-exec sh -c single-quoted string, and a
          # stray `do not` -> `don\047t` would silently terminate that
          # wrapper mid-script. Dash then reinterprets subsequent `echo
          # "if [ -r ... ]; then"` text as real commands and finally
          # explodes at the closing `}` with "Syntax error: } unexpected".
          echo "if [ -r /etc/openshell-tls/ca-bundle.pem ]; then"
          echo "  export SSL_CERT_FILE=/etc/openshell-tls/ca-bundle.pem"
          echo "  export SSL_CERT_DIR=/etc/ssl/certs"
          echo "  export GIT_SSL_CAINFO=/etc/openshell-tls/ca-bundle.pem"
          echo "  export CURL_CA_BUNDLE=/etc/openshell-tls/ca-bundle.pem"
          echo "  export REQUESTS_CA_BUNDLE=/etc/openshell-tls/ca-bundle.pem"
          echo "  export NODE_EXTRA_CA_CERTS=/etc/openshell-tls/ca-bundle.pem"
          echo "elif [ -r /etc/ssl/certs/ca-certificates.crt ]; then"
          echo "  export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt"
          echo "  export SSL_CERT_DIR=/etc/ssl/certs"
          echo "  export GIT_SSL_CAINFO=/etc/ssl/certs/ca-certificates.crt"
          echo "  export CURL_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt"
          echo "  export REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt"
          echo "  export NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt"
          echo "fi"
          if [ -n "$HB_BOTTLE_DOMAIN" ]; then
            echo "export HOMEBREW_BOTTLE_DOMAIN=$HB_BOTTLE_DOMAIN"
            echo "export HOMEBREW_ARTIFACT_DOMAIN=$HB_BOTTLE_DOMAIN"
            echo "export HOMEBREW_API_DOMAIN=$HB_BOTTLE_DOMAIN"
          fi
        } > "$PROFD" 2>/dev/null || true
        chmod 0644 "$PROFD" 2>/dev/null || true

        # Go toolchain env: login shells pick up GOROOT/GOPATH + a PATH prefix
        # that exposes `go` and `$GOPATH/bin`. Only emit if the prefetched Go
        # tree actually landed in the sandbox; otherwise a non-existent GOROOT
        # would surface as `go: cannot find GOROOT directory` on every shell
        # login. No apostrophes in this block -- see the comment above the
        # SSL_CERT_FILE block for why stray ones wreck the outer sh -c wrapper.
        if [ -x /sandbox/.local/go/bin/go ]; then
          PROFD_GO=/etc/profile.d/nemoclaw-golang.sh
          {
            echo "# nemoclaw: prefetched Go toolchain (see docker/prefetch/Dockerfile)"
            echo "export GOROOT=/sandbox/.local/go"
            echo "export GOPATH=/sandbox/go"
            echo "export GOBIN=/sandbox/go/bin"
            echo "export GO111MODULE=on"
            echo "export GOPROXY=$GOPROXY_VAL"
            echo "export GOSUMDB=off"
            echo "export PATH=/sandbox/.local/go/bin:/sandbox/go/bin:\$PATH"
          } > "$PROFD_GO" 2>/dev/null || true
          chmod 0644 "$PROFD_GO" 2>/dev/null || true
        fi

        # gog keyring env: required by every gog invocation whose HOME gets
        # sanitized to /tmp by openclaw (skill subprocess) and therefore
        # does NOT read ~/.bash_profile. /etc/profile.d is sourced by all
        # login shells; /etc/bash.bashrc hook below catches non-login bash.
        PROFD_GOG=/etc/profile.d/nemoclaw-gog-env.sh
        {
          echo "# nemoclaw: gog file keyring passphrase (see steipete/gogcli)"
          echo "export GOG_KEYRING_BACKEND=file"
          echo "export XDG_CONFIG_HOME=/sandbox/.config"
          if [ -n "$GKP" ]; then
            # randAlphaNum 8 password contains no shell-special chars.
            echo "export GOG_KEYRING_PASSWORD=$GKP"
          fi
          # OAuth callback host for `gog auth add ... --redirect-host`.
          # ingress-weui.yaml routes /oauth2/callback on this host to the
          # sandbox tunnel on :8080 (start_relay_oauth in deployment.yaml).
          # Pre-exporting saves users from copy/pasting the dynamic per-user
          # Olares hostname every time they re-auth a Google account.
          if [ -n "$GOAUTH_REDIRECT_HOST" ]; then
            echo "export NEMOCLAW_GOG_OAUTH_REDIRECT_HOST=$GOAUTH_REDIRECT_HOST"
          fi
        } > "$PROFD_GOG" 2>/dev/null || true
        chmod 0644 "$PROFD_GOG" 2>/dev/null || true
      fi
      # Make sure non-login interactive bash picks up profile.d env too. On
      # Debian/Ubuntu /etc/bash.bashrc is the non-login interactive rc. By
      # default it does NOT source /etc/profile.d — add a small shim.
      BB=/etc/bash.bashrc
      if [ -f "$BB" ] && [ -w "$BB" ] && ! grep -q nemoclaw-profile-d "$BB" 2>/dev/null; then
        {
          printf "\n# nemoclaw-profile-d (managed; do not edit)\n"
          printf "for __np in /etc/profile.d/nemoclaw-*.sh; do\n"
          printf "  [ -r \"\$__np\" ] && . \"\$__np\"\n"
          printf "done\n"
          printf "unset __np\n"
          printf "# end-nemoclaw-profile-d\n"
        } >> "$BB" 2>/dev/null || true
      fi

      # gogcli has no Linux Homebrew bottle — brew falls back to source builds, which
      # need a C compiler Homebrew can discover. DevelopmentTools.installed (Homebrew)
      # on Linux looks for FIXED paths (/usr/bin/gcc, /usr/bin/clang) — not PATH — see
      # Homebrew/brew#13902. We therefore must guarantee at least one of those symlinks
      # points at a real compiler before `brew install gogcli` runs.
      #
      # Strategy (robust, any-one sufficient — stages tried in order, first win stops):
      #   0) apt-get install gcc g++ (smallest footprint — highest success rate)
      #   1) apt-get install build-essential + clang (if stage 0 left gaps)
      #   2) Fallback symlinks from versioned/arch-triplet names (Debian sid/Ubuntu:
      #      x86_64-linux-gnu-gcc, gcc-12, etc.) — covers images where apt installed
      #      a compiler under a versioned name but never wired /usr/bin/gcc.
      #   3) Last resort: `brew install gcc` as sandbox user + shim to /usr/bin/gcc
      #   4) Emergency: pin specific versions (gcc-12 g++-12) in case the default
      #      metapackage was unavailable on this mirror.
      # Every stage logs to /var/log/nemoclaw-skill-env*.log so a failed bootstrap
      # can be diagnosed via `kubectl exec <sbx> -- cat /var/log/nemoclaw-skill-env.log`
      # even when the sentinel was never written.
      if [ "'"${NEMOCLAW_SKILL_INSTALL_GCC:-1}"'" = "1" ] \
           && [ -x /sandbox/.linuxbrew/Homebrew/bin/brew ]; then
        _LOG=/var/log/nemoclaw-skill-env.log
        _APT_LOG=/var/log/nemoclaw-skill-env-apt.log
        mkdir -p /var/log 2>/dev/null || true
        : > "$_LOG" 2>/dev/null || _LOG=/tmp/nemoclaw-skill-env.log
        : > "$_APT_LOG" 2>/dev/null || _APT_LOG=/tmp/nemoclaw-skill-env-apt.log
        _log()  { printf "%s\n" "[skill-env] $*"; printf "%s\n" "$*" >>"$_LOG" 2>/dev/null || true; }
        _warn() { printf "%s\n" "[skill-env] WARN: $*" >&2; printf "WARN: %s\n" "$*" >>"$_LOG" 2>/dev/null || true; }

        # Wait for any concurrent dpkg/apt holder (e.g. openclaw skills installer
        # triggered by the UI) to release before we touch apt. Poll up to 60s.
        _apt_wait_lock() {
          _timeout=60
          _elapsed=0
          while [ "$_elapsed" -lt "$_timeout" ]; do
            if [ ! -e /var/lib/dpkg/lock-frontend ] && [ ! -e /var/lib/apt/lists/lock ]; then
              return 0
            fi
            # Either lock file is present — try fuser to see if anyone is holding
            # it. `fuser` exit code 1 = no process holds the file.
            _busy=0
            for _lk in /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock; do
              [ -e "$_lk" ] || continue
              if fuser "$_lk" >/dev/null 2>&1; then
                _busy=1
                break
              fi
            done
            [ "$_busy" = "0" ] && return 0
            [ "$_elapsed" = "0" ] && _log "apt lock busy ($_lk held); waiting up to ${_timeout}s"
            sleep 2
            _elapsed=$((_elapsed + 2))
          done
          _warn "apt lock still busy after ${_timeout}s; proceeding anyway (apt-get will error out cleanly)"
          return 1
        }

        if command -v apt-get >/dev/null 2>&1; then
          _apt_wait_lock
          DEBIAN_FRONTEND=noninteractive apt-get clean >>"$_APT_LOG" 2>&1 || true
          if DEBIAN_FRONTEND=noninteractive apt-get update -o Acquire::Retries=3 -qq >>"$_APT_LOG" 2>&1; then
            _log "apt update OK (Stage 0 precondition)"
          else
            _warn "apt update failed (see $_APT_LOG); Stage 0/1 will fail, fallbacks continue"
          fi
        else
          _warn "apt-get not available; skipping Stages 0 + 1, going straight to symlink + brew"
        fi

        # --- Stage -1: ca-certificates. brew tap runs `git clone https://...` for
        # steipete/tap; if the sandbox base image has no CA bundle (common on
        # slim Debian images) git prints:
        #   fatal: unable to access URL: server certificate verification
        #   failed. CAfile: none CRLfile: none
        # and brew install gog fails with exit 128. We install ca-certificates
        # + run update-ca-certificates unconditionally (cheap when already
        # present) and also export GIT_SSL_CAINFO / SSL_CERT_FILE via
        # /etc/environment so every non-login subprocess (openclaw skill
        # runner, brew, git) sees a concrete bundle path.
        if command -v apt-get >/dev/null 2>&1; then
          _apt_wait_lock
          _log "Stage CA: apt-get install -y ca-certificates"
          if DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --fix-missing --no-install-recommends \
               ca-certificates >>"$_APT_LOG" 2>&1; then
            if command -v update-ca-certificates >/dev/null 2>&1; then
              update-ca-certificates >>"$_APT_LOG" 2>&1 || \
                _warn "update-ca-certificates exited non-zero (see $_APT_LOG)"
            fi
            if [ -r /etc/ssl/certs/ca-certificates.crt ]; then
              _log "Stage CA OK: /etc/ssl/certs/ca-certificates.crt present ($(wc -l </etc/ssl/certs/ca-certificates.crt 2>/dev/null) lines)"
            else
              _warn "ca-certificates installed but /etc/ssl/certs/ca-certificates.crt missing; git HTTPS will still fail"
            fi
          else
            _warn "Stage CA failed (see $_APT_LOG); brew tap git clone over HTTPS will fail with CAfile: none"
          fi
        fi

        # --- Stage INSECURE_TLS: disable TLS verification for git / curl / wget / npm / pip ---
        # Rationale: in environments with a split-target TLS MITM proxy (a common
        # corporate setup) curl/git may work for some HTTPS hosts (the ones the
        # proxy does not touch, e.g. baidu.com) and fail for others
        # (github.com / ghcr.io) with:
        #   curl: (60) SSL certificate problem: self-signed certificate in certificate chain
        #   git fatal: unable to access ...: server certificate verification failed. CAfile: none
        # Because we cannot install the (unknown, per-site) interceptor root CA,
        # the only reliable way to let `brew install gog` (and subsequent
        # `brew tap steipete/tap` git clones) succeed is to skip verification
        # inside the sandbox.
        #
        # Writes these *user* dotfiles (unconditionally trusted by each tool --
        # CANNOT be stripped by Homebrew superenv):
        #   /sandbox/.gitconfig  -> [http] sslVerify = false
        #   /sandbox/.curlrc     -> insecure
        #   /sandbox/.wgetrc     -> check_certificate = off
        # And a /etc/profile.d drop-in exporting env-level equivalents:
        #   GIT_SSL_NO_VERIFY=1   NODE_TLS_REJECT_UNAUTHORIZED=0
        #   PYTHONHTTPSVERIFY=0   PIP_TRUSTED_HOST="pypi.org files.pythonhosted.org pypi.python.org"
        #
        # Gate: NEMOCLAW_SKILL_INSECURE_TLS ("1"/"true"/"yes" -> on, "0"/"false"/"no" -> off).
        # Default is ON because the install flow has no way to succeed otherwise
        # on MITM networks and we have no user-provided CA bundle to install.
        # Power-users on clean networks can set it to "0" in the Olares app env.
        _ITLS_ON=1
        case "${NEMOCLAW_SKILL_INSECURE_TLS:-1}" in
          0|false|False|FALSE|no|No|NO|off|Off|OFF|"") _ITLS_ON=0 ;;
          *) _ITLS_ON=1 ;;
        esac
        if [ "$_ITLS_ON" = "1" ]; then
          _log "Stage INSECURE_TLS: disabling TLS verification for git/curl/wget/npm/pip inside sandbox"
          # Dotfiles. All writes overwrite any prior managed copy so chart
          # upgrades that change content always win.
          {
            echo "# nemoclaw-skill-env (managed; do not edit)"
            echo "[http]"
            echo "        sslVerify = false"
            echo "[http \"https://github.com/\"]"
            echo "        sslVerify = false"
            echo "[http \"https://ghcr.io/\"]"
            echo "        sslVerify = false"
          } > /sandbox/.gitconfig 2>/dev/null || true
          chown "$SBX_USER:$SBX_USER" /sandbox/.gitconfig 2>/dev/null || true
          chmod 0644 /sandbox/.gitconfig 2>/dev/null || true

          {
            echo "# nemoclaw-skill-env (managed; do not edit)"
            echo "insecure"
          } > /sandbox/.curlrc 2>/dev/null || true
          chown "$SBX_USER:$SBX_USER" /sandbox/.curlrc 2>/dev/null || true
          chmod 0644 /sandbox/.curlrc 2>/dev/null || true

          {
            echo "# nemoclaw-skill-env (managed; do not edit)"
            echo "check_certificate = off"
          } > /sandbox/.wgetrc 2>/dev/null || true
          chown "$SBX_USER:$SBX_USER" /sandbox/.wgetrc 2>/dev/null || true
          chmod 0644 /sandbox/.wgetrc 2>/dev/null || true

          # Also point root (/root) at the same files; brew may re-exec itself
          # across users when HOMEBREW_PREFIX is root-owned briefly on first run.
          for _root_home in /root; do
            [ -d "$_root_home" ] || continue
            cp -f /sandbox/.gitconfig "$_root_home/.gitconfig" 2>/dev/null || true
            cp -f /sandbox/.curlrc    "$_root_home/.curlrc"    2>/dev/null || true
            cp -f /sandbox/.wgetrc    "$_root_home/.wgetrc"    2>/dev/null || true
          done

          # profile.d drop-in for env-level toggles (login shells + PAM).
          mkdir -p /etc/profile.d 2>/dev/null || true
          if [ -w /etc/profile.d ]; then
            PROFD_ITLS=/etc/profile.d/nemoclaw-insecure-tls.sh
            {
              echo "# nemoclaw-skill-env (managed; do not edit)"
              echo "# Disables TLS verification for tools that do not read ~/.gitconfig"
              echo "# or ~/.curlrc (npm / node / pip / python requests). See the"
              echo "# Stage INSECURE_TLS block in configmap-sandbox-bridge.yaml."
              echo "export GIT_SSL_NO_VERIFY=1"
              echo "export NODE_TLS_REJECT_UNAUTHORIZED=0"
              echo "export PYTHONHTTPSVERIFY=0"
              echo "export PIP_TRUSTED_HOST=\"pypi.org files.pythonhosted.org pypi.python.org\""
              echo "export HOMEBREW_CURLRC=1"
            } > "$PROFD_ITLS" 2>/dev/null || true
            chmod 0644 "$PROFD_ITLS" 2>/dev/null || true
          fi

          # Append to /etc/environment so non-login sessions (openclaw skill
          # runner, PAM-less kubectl exec) also see these.
          if [ -w "${ETCENV:-/etc/environment}" ] || [ -w /etc ] 2>/dev/null; then
            ETCENV_I=${ETCENV:-/etc/environment}
            [ -f "$ETCENV_I" ] || touch "$ETCENV_I" 2>/dev/null || true
            if [ -w "$ETCENV_I" ]; then
              sed -i "/nemoclaw-insecure-tls/,/end-nemoclaw-insecure-tls/d" "$ETCENV_I" 2>/dev/null || true
              {
                echo "# nemoclaw-insecure-tls (managed; do not edit)"
                echo "GIT_SSL_NO_VERIFY=1"
                echo "NODE_TLS_REJECT_UNAUTHORIZED=0"
                echo "PYTHONHTTPSVERIFY=0"
                echo "PIP_TRUSTED_HOST=pypi.org files.pythonhosted.org pypi.python.org"
                echo "HOMEBREW_CURLRC=1"
                echo "# end-nemoclaw-insecure-tls"
              } >> "$ETCENV_I"
            fi
          fi
          _log "Stage INSECURE_TLS OK: dotfiles + profile.d + /etc/environment updated"
        else
          _log "Stage INSECURE_TLS skipped (NEMOCLAW_SKILL_INSECURE_TLS=${NEMOCLAW_SKILL_INSECURE_TLS:-}); assuming trusted CA chain"
        fi

        # --- Stage 0: minimal gcc + g++ (fastest, least likely to hit broken Recommends) ---
        if [ ! -x /usr/bin/gcc ] && command -v apt-get >/dev/null 2>&1; then
          _apt_wait_lock
          _log "Stage 0: apt-get install -y gcc g++ (minimal, ~80MB)"
          if DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --fix-missing --no-install-recommends \
               gcc g++ >>"$_APT_LOG" 2>&1; then
            _log "Stage 0 OK: gcc + g++ installed"
          else
            _warn "Stage 0 failed (see $_APT_LOG); trying Stage 1 (build-essential + clang)"
          fi
        fi

        # --- Stage 1: build-essential + clang (larger but covers make/libc-dev/etc.) ---
        if [ ! -x /usr/bin/gcc ] && command -v apt-get >/dev/null 2>&1; then
          _apt_wait_lock
          _log "Stage 1: apt-get install -y build-essential clang (full toolchain, ~400MB)"
          if DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --fix-missing --no-install-recommends \
               build-essential clang >>"$_APT_LOG" 2>&1; then
            _log "Stage 1 OK: build-essential + clang installed"
          else
            _warn "Stage 1 failed (see $_APT_LOG); trying Stage 2 symlinks"
          fi
        fi

        # --- Stage 2: symlink fixed paths for Homebrew DevelopmentTools probe ---
        for _bin in gcc clang; do
          if [ ! -x "/usr/bin/$_bin" ]; then
            _cand=""
            for _c in "/usr/bin/x86_64-linux-gnu-$_bin" "/usr/bin/aarch64-linux-gnu-$_bin"; do
              [ -x "$_c" ] && _cand="$_c" && break
            done
            if [ -z "$_cand" ]; then
              _cand=$(ls -1 /usr/bin/$_bin-[0-9]* 2>/dev/null | sort -V | tail -1)
            fi
            if [ -n "$_cand" ] && [ -x "$_cand" ]; then
              if ln -sfn "$_cand" "/usr/bin/$_bin" 2>/dev/null; then
                _log "linked /usr/bin/$_bin -> $_cand"
              else
                _warn "failed to create symlink /usr/bin/$_bin -> $_cand"
              fi
            fi
          fi
        done
        # Shim g++/cpp from versioned names too so brew superenv has companions.
        for _bin in g++ cpp; do
          if [ ! -x "/usr/bin/$_bin" ]; then
            _cand=$(ls -1 /usr/bin/$_bin-[0-9]* 2>/dev/null | sort -V | tail -1)
            [ -n "$_cand" ] && [ -x "$_cand" ] && ln -sfn "$_cand" "/usr/bin/$_bin" 2>/dev/null \
              && _log "linked /usr/bin/$_bin -> $_cand" || true
          fi
        done
        unset _c _cand _bin

        # --- Stage 3: brew install gcc fallback (only if /usr/bin/gcc still missing) ---
        if [ ! -x /usr/bin/gcc ]; then
          _log "Stage 3: brew install gcc (~160MB, several minutes — apt fallbacks exhausted)"
          if _nemoclaw_run_sbx "brew install gcc" >>"$_LOG" 2>&1; then
            _log "Stage 3 OK: brew install gcc succeeded"
          else
            _warn "Stage 3 failed (see $_LOG); trying Stage 4 (pinned versions)"
          fi
          _nemoclaw_run_sbx "brew unlink gcc 2>/dev/null; brew link --overwrite gcc 2>/dev/null" \
            >>"$_LOG" 2>&1 || true
          _brew_gcc=$(ls -1 /sandbox/.linuxbrew/Homebrew/bin/gcc-[0-9]* 2>/dev/null | sort -V | tail -1)
          if [ -n "$_brew_gcc" ] && [ -x "$_brew_gcc" ]; then
            ln -sfn "$_brew_gcc" /usr/bin/gcc 2>/dev/null \
              && _log "linked /usr/bin/gcc -> $_brew_gcc (brew fallback)"
            for _bin in g++ cpp; do
              _src=$(ls -1 /sandbox/.linuxbrew/Homebrew/bin/${_bin}-[0-9]* 2>/dev/null | sort -V | tail -1)
              [ -n "$_src" ] && [ -x "$_src" ] && ln -sfn "$_src" "/usr/bin/$_bin" 2>/dev/null \
                && _log "linked /usr/bin/$_bin -> $_src (brew fallback)" || true
            done
          fi
          unset _brew_gcc _src
        fi

        # --- Stage 4: pinned-version apt retry (for images where `gcc` metapkg is broken) ---
        # Some Debian spins (trixie/sid snapshots) leave the unversioned `gcc` package
        # temporarily unsatisfiable while `gcc-12`/`gcc-13` are still installable. Try
        # those explicitly, then symlink. This is also our last chance if brew died on
        # HTTPS egress (e.g. ghcr.io rate limits or steipete/tap resolution glitches).
        if [ ! -x /usr/bin/gcc ] && command -v apt-get >/dev/null 2>&1; then
          _apt_wait_lock
          _log "Stage 4: pinned-version fallback — apt-get install -y gcc-12 g++-12"
          if DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --fix-missing --no-install-recommends \
               gcc-12 g++-12 >>"$_APT_LOG" 2>&1; then
            _log "Stage 4 OK: gcc-12 + g++-12 installed"
            [ -x /usr/bin/gcc-12 ] && ln -sfn /usr/bin/gcc-12 /usr/bin/gcc 2>/dev/null \
              && _log "linked /usr/bin/gcc -> /usr/bin/gcc-12 (Stage 4)"
            [ -x /usr/bin/g++-12 ] && ln -sfn /usr/bin/g++-12 /usr/bin/g++ 2>/dev/null \
              && _log "linked /usr/bin/g++ -> /usr/bin/g++-12 (Stage 4)"
          else
            _apt_wait_lock
            _log "Stage 4 (gcc-12) failed; trying gcc-13"
            if DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --fix-missing --no-install-recommends \
                 gcc-13 g++-13 >>"$_APT_LOG" 2>&1; then
              _log "Stage 4 OK (alt): gcc-13 + g++-13 installed"
              [ -x /usr/bin/gcc-13 ] && ln -sfn /usr/bin/gcc-13 /usr/bin/gcc 2>/dev/null \
                && _log "linked /usr/bin/gcc -> /usr/bin/gcc-13 (Stage 4 alt)"
              [ -x /usr/bin/g++-13 ] && ln -sfn /usr/bin/g++-13 /usr/bin/g++ 2>/dev/null \
                && _log "linked /usr/bin/g++ -> /usr/bin/g++-13 (Stage 4 alt)"
            else
              _warn "Stage 4 exhausted (gcc-12/13 both failed); see $_APT_LOG"
            fi
          fi
        fi

        # --- /usr/bin/cc + /usr/bin/c++: some configure scripts hard-code these names ---
        # Homebrew superenv does not need them (it drives HOMEBREW_CC directly), but a
        # missing /usr/bin/cc is a common source of silent "not a C compiler" errors in
        # autotools-based formula tests. Cheap to wire up defensively.
        if [ ! -x /usr/bin/cc ] && [ -x /usr/bin/gcc ]; then
          ln -sfn /usr/bin/gcc /usr/bin/cc 2>/dev/null && _log "linked /usr/bin/cc -> /usr/bin/gcc"
        fi
        if [ ! -x /usr/bin/c++ ] && [ -x /usr/bin/g++ ]; then
          ln -sfn /usr/bin/g++ /usr/bin/c++ 2>/dev/null && _log "linked /usr/bin/c++ -> /usr/bin/g++"
        fi

        # --- Final sanity: must have /usr/bin/gcc, log brew perspective for debugging ---
        if [ -x /usr/bin/gcc ]; then
          _log "final: /usr/bin/gcc -> $(readlink -f /usr/bin/gcc 2>/dev/null || echo /usr/bin/gcc) [$(/usr/bin/gcc --version 2>/dev/null | head -1)]"
          _log "final: /usr/bin/gcc perms: $(ls -la /usr/bin/gcc 2>&1 | head -1)"
          # Verify from sandbox user perspective — root seeing it is not enough if
          # some parent dir denies sandbox-user traversal.
          _sbx_can_exec=$(_nemoclaw_run_sbx "test -x /usr/bin/gcc && echo YES || echo NO" 2>/dev/null | tr -d '\r\n')
          _log "final: sandbox user can exec /usr/bin/gcc: ${_sbx_can_exec:-UNKNOWN}"
          unset _sbx_can_exec
        else
          _warn "final: /usr/bin/gcc STILL MISSING — gogcli source builds will fail"
        fi
        if [ -x /usr/bin/clang ]; then
          _log "final: /usr/bin/clang -> $(readlink -f /usr/bin/clang 2>/dev/null || echo /usr/bin/clang)"
        fi
        # Surface what Homebrew actually sees — quick win when triaging failures.
        # NOTE: the entire outer docker exec sh -c is single-quoted (line ~520),
        # so raw inner single quotes would break the wrap. Use \" inside this
        # block; the sandbox shell unescapes them after the outer single-quoted
        # argument is passed through.
        _nemoclaw_run_sbx "/sandbox/.linuxbrew/Homebrew/bin/brew config 2>/dev/null | \
          grep -E \"^(Clang|HOMEBREW_PREFIX|/usr/bin/gcc|gcc@)\" || true" 2>/dev/null \
          | while read -r _ln; do _log "brew config: $_ln"; done
        unset _ln
        # Even with shims, openclaw can spawn brew without a PATH superenv likes.
        # Pin compilers for superenv (brew man: HOMEBREW_CC / HOMEBREW_CXX). Note brew
        # validates HOMEBREW_CC as a compiler *name* (e.g. "gcc", "gcc-11"). A full path
        # fails with "Invalid value for HOMEBREW_CC: /usr/bin/gcc". CC / CXX can be paths.
        GCC_BIN=""; GCC_NAME=""
        GCC_VER_BIN=$(ls -1 /sandbox/.linuxbrew/Homebrew/bin/gcc-[0-9]* 2>/dev/null | sort -V | tail -1)
        if [ -n "$GCC_VER_BIN" ] && [ -x "$GCC_VER_BIN" ]; then
          GCC_BIN=$GCC_VER_BIN
          GCC_NAME=$(basename "$GCC_VER_BIN")
        else
          for cand in /sandbox/.linuxbrew/Homebrew/bin/gcc /usr/local/bin/gcc /usr/bin/gcc; do
            if [ -x "$cand" ]; then
              GCC_BIN=$cand
              GCC_NAME=gcc
              break
            fi
          done
        fi
        GXX_BIN=""; GXX_NAME=""
        GXX_VER_BIN=$(ls -1 /sandbox/.linuxbrew/Homebrew/bin/g++-[0-9]* 2>/dev/null | sort -V | tail -1)
        if [ -n "$GXX_VER_BIN" ] && [ -x "$GXX_VER_BIN" ]; then
          GXX_BIN=$GXX_VER_BIN
          GXX_NAME=$(basename "$GXX_VER_BIN")
        else
          for cand in /sandbox/.linuxbrew/Homebrew/bin/g++ /usr/local/bin/g++ /usr/bin/g++; do
            if [ -x "$cand" ]; then
              GXX_BIN=$cand
              GXX_NAME=g++
              break
            fi
          done
        fi
        if [ -n "$GCC_BIN" ] && [ -x "$GCC_BIN" ]; then
          if [ -w "$ETCENV" ] 2>/dev/null; then
            sed -i "/^HOMEBREW_CC=/d;/^HOMEBREW_CXX=/d;/^CC=/d;/^CXX=/d" "$ETCENV" 2>/dev/null || true
            echo "HOMEBREW_CC=$GCC_NAME" >> "$ETCENV"
            echo "CC=$GCC_BIN" >> "$ETCENV"
            if [ -n "$GXX_BIN" ] && [ -x "$GXX_BIN" ]; then
              echo "HOMEBREW_CXX=$GXX_NAME" >> "$ETCENV"
              echo "CXX=$GXX_BIN" >> "$ETCENV"
            fi
            echo "[skill-env] HOMEBREW_CC=$GCC_NAME / HOMEBREW_CXX=$GXX_NAME / CC=$GCC_BIN / CXX=$GXX_BIN appended to $ETCENV"
          fi
          if [ -w /etc/profile.d ] 2>/dev/null; then
            PROFD_CC=/etc/profile.d/nemoclaw-homebrew-cc.sh
            {
              echo "# nemoclaw: pin Homebrew compilers for source builds (gogcli)"
              echo "export HOMEBREW_NO_ENV_FILTERING=1"
              echo "export HOMEBREW_CC=$GCC_NAME"
              echo "export CC=$GCC_BIN"
              if [ -n "$GXX_BIN" ] && [ -x "$GXX_BIN" ]; then
                echo "export HOMEBREW_CXX=$GXX_NAME"
                echo "export CXX=$GXX_BIN"
              fi
            } > "$PROFD_CC" 2>/dev/null || true
            chmod 0644 "$PROFD_CC" 2>/dev/null || true
            echo "[skill-env] wrote $PROFD_CC"
          fi
        fi
      fi

      echo "sandbox rc + wrappers installed under $SBX_HOME"
    '

    # ------------------------------------------------------------------
    # gog shim is now managed by chat-ui-bridge's ensure_gog_shim_in_sandbox
    # (deployment.yaml), which runs every loop iteration so the shim's lifecycle
    # tracks the gogcli Cellar binary's lifecycle: shim appears when the user
    # installs gog via `openclaw config --section skills`, and disappears when
    # they uninstall it. Doing it in the bridge (instead of skill-env, which is
    # sentinel-gated to one run per pod) is what makes that lifecycle work —
    # otherwise installing gog AFTER first skill-env run would never trigger
    # shim install. Below we still materialize the keyring password file so it's
    # ready for the bridge's shim install whenever the user does install gog.
    # ------------------------------------------------------------------
    if [ -n "${GOG_KEYRING_PASSWORD:-}" ]; then
      _gog_pw_b64=$(printf "%s" "$GOG_KEYRING_PASSWORD" | base64 | tr -d "\n")
    else
      _gog_pw_b64=""
    fi
    # NOTE on indentation: this heredoc is inside a YAML literal-block
    # ("sandbox-install-skill-env.sh: |") whose indent is 4 spaces. EVERY line
    # (including blank lines and the GOGPW terminator) MUST start with at least
    # 4 spaces, otherwise YAML treats a column-0 line as the end of the block.
    # Both `docker exec -i` AND `kubectl exec -i` are required so the heredoc
    # body actually reaches the inner /bin/sh; dropping either causes silent
    # EOF and a no-op write — see git history for the regression analysis.
    docker exec -i "$CLUSTER_CTR" kubectl -n "$NS" exec -i "$SBX" -c agent -- \
      env "GOG_PW_B64=${_gog_pw_b64}" SBX_USER="${SBX_USER:-sandbox}" /bin/sh <<'GOGPW'
    set -u
    SBX_USER="${SBX_USER:-sandbox}"
    PW_FILE="/sandbox/.gog-keyring-password"
    if [ -n "${GOG_PW_B64:-}" ]; then
      _new_pw=$(printf "%s" "$GOG_PW_B64" | base64 -d 2>/dev/null || true)
      if [ -n "$_new_pw" ]; then
        _cur_pw=""
        [ -r "$PW_FILE" ] && _cur_pw=$(cat "$PW_FILE")
        if [ "$_cur_pw" != "$_new_pw" ]; then
          printf "%s" "$_new_pw" > "$PW_FILE"
          chown "$SBX_USER:$SBX_USER" "$PW_FILE" 2>/dev/null || true
          chmod 600 "$PW_FILE" 2>/dev/null || true
          echo "[skill-env] $PW_FILE updated (len=${#_new_pw})"
        fi
        unset _cur_pw _new_pw
      fi
    else
      echo "[skill-env] GOG_KEYRING_PASSWORD not set; skipping pw-file write"
    fi
    GOGPW
    unset _gog_pw_b64

    # Fail the whole script if we promised gcc for gogcli but the sandbox still
    # has no /usr/bin/gcc — Homebrew's DevelopmentTools probe on Linux checks that
    # exact path (not PATH), and gogcli source builds hit "Install Clang or run
    # `brew install gcc`" until it exists. Failing here is loud: callers do NOT
    # write the skill-env sentinel and chat-ui-bridge retries on the next tick.
    # The diagnostics dump below lands in bridge logs via sed "s/^/[chat-ui-bridge:
    # skill-env] /", so ops can triage without kubectl-exec-ing into the sandbox.
    if [ "${NEMOCLAW_SKILL_INSTALL_GCC:-1}" = "1" ]; then
      if ! docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
           test -x /usr/bin/gcc; then
        {
          echo ""
          echo "================================================================"
          echo "[skill-env] FATAL: /usr/bin/gcc missing after Stages 0-4 + symlink + brew."
          echo "[skill-env] gogcli + any other source-build formula will keep failing with:"
          echo "[skill-env]   Error: Install Clang or run \`brew install gcc\`."
          echo "[skill-env] Diagnostic snapshot from inside the sandbox (captured now):"
          echo "----------------------------------------------------------------"
          docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
            /bin/sh -c '
              echo "-- /usr/bin compilers:";
              ls -la /usr/bin/gcc* /usr/bin/g++* /usr/bin/clang* /usr/bin/cc /usr/bin/c++ 2>&1 | head -40;
              echo "-- /sandbox/.linuxbrew compilers:";
              ls -la /sandbox/.linuxbrew/Homebrew/bin/gcc* /sandbox/.linuxbrew/Homebrew/bin/g++* 2>&1 | head -20;
              echo "-- PATH for root:";
              echo "$PATH";
              echo "-- /var/log/nemoclaw-skill-env.log (last 40 lines):";
              tail -40 /var/log/nemoclaw-skill-env.log 2>&1 | head -40;
              echo "-- /var/log/nemoclaw-skill-env-apt.log (last 30 lines):";
              tail -30 /var/log/nemoclaw-skill-env-apt.log 2>&1 | head -30;
            ' 2>&1 || echo "[skill-env] could not exec diagnostic probe"
          echo "----------------------------------------------------------------"
          echo "[skill-env] Typical root causes:"
          echo "[skill-env]   - apt egress blocked (check mirror / cluster DNS)"
          echo "[skill-env]   - ghcr.io/objects.githubusercontent.com unreachable (brew fallback)"
          echo "[skill-env]   - /var/lib/dpkg/lock held by another process (rare)"
          echo "[skill-env] Bridge will retry every loop iteration until gcc appears."
          echo "================================================================"
          echo ""
        } >&2
        exit 1
      fi
    fi

    # Push gog shim reconcile script + run once so /sandbox/.local/bin/gog is never
    # a stale ELF when gogcli exists (bridge may lag; interactive shells need this).
    copy_to_sandbox "$SCRIPT_DIR/gog-shim-reconcile.sh" /sandbox/.nemoclaw-reconcile-gog-shim.sh 755
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      /sandbox/.nemoclaw-reconcile-gog-shim.sh >>/var/log/nemoclaw-skill-env.log 2>&1 || true

    # OpenClaw WebUI tool runs need env.vars (XDG_CONFIG_HOME etc.) merged by clamp;
    # sandbox-ensure-gateway calls it from /sandbox/.nemoclaw (agent has no /opt/nemoclaw).
    copy_to_sandbox "$SCRIPT_DIR/clamp-openclaw-config.py" /sandbox/.nemoclaw/clamp-openclaw-config.py 644
    copy_to_sandbox "$SCRIPT_DIR/patch_origins.py" /sandbox/.nemoclaw/patch_origins.py 644
    # patch_inference_baseurl.py rewrites models.providers.inference.baseUrl
    # to NEMOCLAW_ENDPOINT_URL when the sandbox still holds the unresolvable
    # https://inference.local/v1 alias (WebUI path breaks otherwise). See
    # configmap-patch-origins.yaml header for full rationale.
    copy_to_sandbox "$SCRIPT_DIR/patch_inference_baseurl.py" /sandbox/.nemoclaw/patch_inference_baseurl.py 644
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      sh -c 'mkdir -p /sandbox/.nemoclaw && [ -f /sandbox/.openclaw/openclaw.json ] && python3 /sandbox/.nemoclaw/clamp-openclaw-config.py /sandbox/.openclaw/openclaw.json' \
      >>/var/log/nemoclaw-skill-env.log 2>&1 || true
    _SE_ORIG="${CHAT_UI_URL:-}"
    if [ -n "${OPENCLAW_EXTRA_ALLOWED_ORIGINS:-}" ]; then
      if [ -n "$_SE_ORIG" ]; then _SE_ORIG="${_SE_ORIG},${OPENCLAW_EXTRA_ALLOWED_ORIGINS}"; else _SE_ORIG="${OPENCLAW_EXTRA_ALLOWED_ORIGINS}"; fi
    fi
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      env "ORIGIN_CSV=${_SE_ORIG}" "OPENCLAW_TRUSTED_PROXIES=${OPENCLAW_TRUSTED_PROXIES:-}" \
      sh -c 'mkdir -p /sandbox/.nemoclaw && [ -f /sandbox/.openclaw/openclaw.json ] && [ -f /sandbox/.nemoclaw/patch_origins.py ] && python3 /sandbox/.nemoclaw/patch_origins.py' \
      >>/var/log/nemoclaw-skill-env.log 2>&1 || true

    # Also force-correct baseUrl at skill-env stage so the very first chat
    # after install already hits the reachable endpoint (not inference.local).
    if [ -n "${NEMOCLAW_ENDPOINT_URL:-}" ]; then
      docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
        env "NEMOCLAW_ENDPOINT_URL=${NEMOCLAW_ENDPOINT_URL}" \
        sh -c '[ -f /sandbox/.openclaw/openclaw.json ] && [ -f /sandbox/.nemoclaw/patch_inference_baseurl.py ] && python3 /sandbox/.nemoclaw/patch_inference_baseurl.py' \
        >>/var/log/nemoclaw-skill-env.log 2>&1 || true
    fi

    # Version stamp: force re-run of skill-env on chart upgrades that bump this.
    # Bump NEMOCLAW_SKILLENV_VERSION whenever the sandbox-install-skill-env logic
    # changes in a way existing sandboxes should pick up. ensure_skill_env_installed
    # in chat-ui-bridge compares this against /workspace/.nemoclaw-skillenv-version
    # and invalidates the sentinel on mismatch.
    docker exec "$CLUSTER_CTR" kubectl -n "$NS" exec "$SBX" -c agent -- \
      /bin/sh -c "mkdir -p /workspace 2>/dev/null; printf %s 2026-05-01-openshell-ssl-cert-file-v1 > /workspace/.nemoclaw-skillenv-version" \
      >/dev/null 2>&1 || true

    rm -f "$rendered_bp"

  # Clamp OpenClaw runtime config (agents.defaults.timeoutSeconds, provider models maxTokens,
  # optional inference api override). Lives in a separate file because the inline
  # python3 -c form would inject apostrophes into a single-quoted sh -c body and
  # silently corrupt sandbox-ensure-gateway.sh -- see comments there.
  #
  # Reads two optional env vars (forwarded into the inner sandbox shell from the
  # nemoclaw pod env): NEMOCLAW_OPENCLAW_INFERENCE_API and NEMOCLAW_OPENCLAW_MAX_AGENT_TIMEOUT.
  # Both default to no-op if unset/empty. argv[1] is the openclaw.json path.
  clamp-openclaw-config.py: |
    #!/usr/bin/env python3
    """Idempotently clamp OpenClaw runtime config values that we have to keep sane.

    Why this exists at all:
      * Some local LLM bottle-runs ship pathological defaults (e.g. timeoutSeconds=10)
        that surface to the user as generic "network connection error". We raise low
        values to >=120s and cap absurdly high values.
      * Stale provider configs sometimes have models[].maxTokens missing or huge,
        which trips the inference backend. We clamp to <=1024.
      * Operators may pin a specific provider api flavor via env without editing
        openclaw.json by hand.
      * Ensures env.vars.XDG_CONFIG_HOME=/sandbox/.config when unset so gogcli finds
        OAuth tokens for `openclaw agent` tool runs (same path as `gog auth add`).
    * Forces gateway.auth.mode to none so file state matches sandbox-ensure-gateway.sh,
        which always runs `openclaw gateway run ... --auth none`. If onboard left
        mode=token, the Control UI shows unauthorized: gateway token missing (WS 1008)
        whenever the gateway process restarts until the browser reloads a tokenized URL;
        TUI can look idle at the same time.

    All operations are best-effort: malformed JSON, missing keys, non-writable files
    just exit 0 silently so the bridge loop never wedges.
    """
    import json
    import os
    import sys


    def _as_int(value, default=0):
        if isinstance(value, int):
            return value
        if isinstance(value, str) and value.strip().lstrip("-").isdigit():
            try:
                return int(value.strip())
            except ValueError:
                return default
        return default


    def main():
        if len(sys.argv) < 2:
            return 0
        path = sys.argv[1]
        try:
            with open(path, "r", encoding="utf-8") as fh:
                cfg = json.load(fh)
        except (OSError, ValueError):
            return 0
        if not isinstance(cfg, dict):
            return 0

        dirty = False

        # Provider override (optional).
        models_root = cfg.setdefault("models", {})
        providers = models_root.setdefault("providers", {})
        inference = providers.setdefault("inference", {})

        api_override = (os.environ.get("NEMOCLAW_OPENCLAW_INFERENCE_API") or "").strip()
        if api_override and inference.get("api") != api_override:
            inference["api"] = api_override
            dirty = True

        # Clamp per-model maxTokens.
        for model in inference.get("models") or []:
            if not isinstance(model, dict):
                continue
            mt = _as_int(model.get("maxTokens"), 0)
            if mt <= 0 or mt > 1024:
                if model.get("maxTokens") != 1024:
                    model["maxTokens"] = 1024
                    dirty = True

        # Clamp agent timeout.
        agents = cfg.setdefault("agents", {}).setdefault("defaults", {})
        max_env = (os.environ.get("NEMOCLAW_OPENCLAW_MAX_AGENT_TIMEOUT") or "").strip()
        if max_env.isdigit():
            requested = int(max_env)
            upper = requested if 60 <= requested <= 3600 else 300
        else:
            upper = 300

        ts_now = _as_int(agents.get("timeoutSeconds"), 0)
        new_ts = ts_now
        if new_ts < 120:
            new_ts = 120
        if new_ts > upper:
            new_ts = upper
        if new_ts != ts_now:
            agents["timeoutSeconds"] = new_ts
            dirty = True

        # NemoClaw: gogcli stores OAuth under $XDG_CONFIG_HOME/gogcli. OpenClaw may spawn
        # tool subprocesses with HOME=/tmp without sourcing shell rc. Official config
        # `env.vars` supplies defaults when the process env lacks a key (see OpenClaw docs).
        env_root = cfg.get("env")
        if not isinstance(env_root, dict):
            env_root = {}
            cfg["env"] = env_root
            dirty = True
        vars_root = env_root.get("vars")
        if not isinstance(vars_root, dict):
            vars_root = {}
            env_root["vars"] = vars_root
            dirty = True
        if not str(vars_root.get("XDG_CONFIG_HOME", "")).strip():
            vars_root["XDG_CONFIG_HOME"] = "/sandbox/.config"
            dirty = True

        # Match LAUNCH in sandbox-ensure-gateway.sh (always --auth none).
        gw = cfg.get("gateway")
        if not isinstance(gw, dict):
            gw = {}
            cfg["gateway"] = gw
            dirty = True
        auth = gw.get("auth")
        if not isinstance(auth, dict):
            auth = {}
            gw["auth"] = auth
            dirty = True
        cur_mode = str(auth.get("mode", "")).strip().lower()
        if cur_mode != "none":
            auth["mode"] = "none"
            dirty = True

        # Never rewrite openclaw.json when nothing changed: identical bytes keep SHA256
        # stable so sandbox-ensure-gateway does not set _cfg_changed=1 and restart the
        # gateway on every bridge health blip (that was killing TUI WS while WebUI retried).
        if not dirty:
            return 0

        try:
            with open(path, "w", encoding="utf-8") as fh:
                json.dump(cfg, fh, ensure_ascii=False, indent=2)
                fh.write("\n")
        except OSError:
            return 0
        return 0


    if __name__ == "__main__":
        sys.exit(main())
