# Reverse proxy for NemoClaw / OpenClaw browser chat UI (default sandbox port 18789).
# See https://docs.nvidia.com/nemoclaw/latest/deployment/deploy-to-remote-gpu.html#remote-dashboard-access
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nemoclaw-weui-nginx-config
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
    }

    server {
      listen 8080;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log;

      # Short name "nemoclaw": non-variable proxy_pass resolves at worker start via libc + Pod resolv.conf
      # search (nemoclaw.<namespace>.svc.cluster.local). Target is the Service ClusterIP — stable across Pod restarts.
      # Variable proxy_pass (http://$host:port) needs resolver and breaks short names without FQDN.
      client_max_body_size 100m;

      location / {
          proxy_pass http://nemoclaw:18789;
          proxy_http_version 1.1;

          proxy_set_header Host              $host;
          proxy_set_header X-Forwarded-Host  $http_host;
          proxy_set_header X-Real-IP         $remote_addr;
          # OpenClaw rejects untrusted X-Forwarded-* chains; set client to immediate peer only.
          proxy_set_header X-Forwarded-For   $remote_addr;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        $connection_upgrade;

          proxy_connect_timeout 600s;
          proxy_send_timeout    600s;
          proxy_read_timeout    3600s;

          proxy_buffering off;
          proxy_cache off;

          proxy_next_upstream error timeout http_502 http_503 http_504;
          client_max_body_size 100m;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: nemoclawweuiingress
  name: nemoclawweuiingress
  namespace: '{{ .Release.Namespace }}'
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nemoclawweuiingress
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: nemoclawweuiingress
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nemoclaw-weui-nginx-config
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: nemoclawweuiingress
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: nemoclawweuiingress
  ports:
    - name: nemoclawweuiingress
      protocol: TCP
      port: 8080
      targetPort: 8080
