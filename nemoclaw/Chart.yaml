apiVersion: v2
appVersion: '0.0.36'
description: NVIDIA NemoClaw AI Coding Agent with Docker-in-Docker Sandbox
name: nemoclaw
type: application
version: 1.7.18
# 1.7.18 — fix messaging channels (Discord/Slack/Telegram/Feishu/Outlook) hanging
# in `[discord] [default] auto-restart attempt N/10` with `gateway websocket closed:
# 1006` + `internalConnectMultiple` + `fetch failed` even after chart v1.7.16
# applied the openshell `discord/slack/...` policy presets and v1.7.15 added the
# corresponding hosts to NO_PROXY. Root cause: chart v1.7.10 launches the openclaw
# gateway via `nsenter --net` into the user/sandbox netns so TUI + WebUI can share
# a single gateway. That user netns is a closed network whose only default route
# is the openshell-sandbox HTTP egress proxy at 10.200.0.1:3128 -- HTTP REST works
# via HTTP_PROXY (LLM calls fine, even Discord REST returns 200 in <1s when the
# `discord` policy preset is applied), but Node's `ws` library does NOT honor
# HTTP_PROXY for the WebSocket upgrade, so the gateway's channel sidecars cannot
# ever reach gateway.discord.gg:443 / wss-primary.slack.com:443 / api.telegram.org
# /etc. Verified by user-netns diagnostics (chart v1.7.17 + open tier + suggested
# mode applied):
#   U1 (raw TCP gateway.discord.gg:443 from user netns)        = TCP_USER_FAIL
#   U2 (curl direct https://discord.com/api/v10/gateway)       = Couldn't connect
#                                                                after 58 ms
#   U3 (same via --proxy http://10.200.0.1:3128)               = http=200
#   U4 (openssl s_client gateway.discord.gg:443 direct)        = (empty)
#   U5 (DNS resolve gateway.discord.gg)                        = OK (3 A-records)
# i.e. the user netns has no public route at all; everything must traverse the
# proxy, and the channel WSS upgrade has no proxy support. The agent netns DOES
# have direct cluster + public routes (verified by A/B/C: TLS handshake to
# gateway.discord.gg returns real Google cert, no MITM). Fix: NEW olaresEnv knob
# `NEMOCLAW_GATEWAY_NETNS` (default `auto`) decides where to launch the gateway:
#   - auto    : agent netns IFF /sandbox/.openclaw/openclaw.json has any
#               channels.<name>.enabled=true (excluding the synthetic
#               channels.defaults entry); user netns otherwise. Operators who
#               only use WebUI chat see no behavioral change vs v1.7.10-1.7.17.
#   - agent   : force agent netns. WebUI keeps working via sandbox-tunnel.sh
#               /proc walk; channels reach public WSS; TUI in user netns shows
#               "gateway disconnected: closed | idle" by design.
#   - user    : force user netns (chart v1.7.10 default). TUI + WebUI both work
#               but messaging channels cannot connect to public WSS endpoints.
# Implementation:
#   - sandbox-ensure-gateway.sh: forwards NEMOCLAW_GATEWAY_NETNS through the
#     `kubectl exec -- env "K=V" sh -c '...'` boundary; new
#     `_decide_gateway_netns` function reads the env + scans openclaw.json for
#     enabled channels via python3 one-liner; sets GW_NETNS_MODE to agent|user;
#     existing USER_NETNS_PID picker is gated on GW_NETNS_MODE=user so the
#     agent-netns branch is taken without a "WARN: no user-netns process" log
#     when the choice is intentional.
#   - deployment.yaml: new env var with extensive comment explaining the
#     trade-off; defaults to auto so first-deploy installs that have no
#     channels yet keep TUI concurrency, then automatically switch to agent
#     netns on the next bridge loop tick (~10s) once the user adds a channel.
# Operators upgrading from 1.7.17 with a working chat (no channels) get no
# functional change. Operators upgrading with channels already enabled in
# openclaw.json see one extra gateway restart on the next bridge tick as the
# launch path moves to agent netns; subsequent ticks no-op.
# 1.7.17 — fix skill-env version gate drift: chat-ui-bridge SKILLENV_EXPECTED_VERSION
# must match the stamp written by sandbox-install-skill-env.sh (2026-05-01-openshell-
# ssl-cert-file-v1). When they mismatch, every bridge loop iteration re-runs the full
# skill-env installer and looks like a random "restart" / flapping logs.
# 1.7.16 — policy tier reconcile + openshell PATH hygiene:
#   * Background loop after [5/5]: when NEMOCLAW_POLICY_MODE != skip, run
#     `nemoclaw <sandbox> policy-add <preset> --yes` for every preset in
#     NEMOCLAW_POLICY_TIER (open/balanced/restricted) once the k3s sandbox pod
#     exists. Fixes Discord/messaging channels hanging after onboard [8/8] was
#     skipped because `.nemoclaw-installed` was already present — iptables
#     never had the discord preset even though NO_PROXY listed gateway.discord.gg.
#   * Remove broken /home/node/.local/bin/openshell (version 0.0.0) and prepend
#     `/usr/local/bin` to PATH so operators hit the image-pinned openshell 0.0.36.
#   * Optional olaresEnv.NEMOCLAW_POLICY_RECONCILE_WAIT_ITER (default 180 polls).
#   * OlaresManifest: Web UI doc — gateway token via `nemoclaw … gateway-token`.
# 1.7.15 — broaden the chart's default NO_PROXY allow-list so additional
# public ecosystems beyond npm/pypi/github also bypass the openshell
# sandbox HTTP proxy MITM. Hosts added (curated by ecosystem):
#   * npm/yarn cn mirrors + CDNs: registry.npm.taobao.org, npm.aliyun.com,
#     unpkg.com, cdn.jsdelivr.net, cdnjs.cloudflare.com, esm.sh
#   * python mirrors: mirrors.aliyun.com, pypi.tuna.tsinghua.edu.cn,
#     pypi.douban.com
#   * github extras: api.github.com, github-releases.githubusercontent.com
#   * AI/ML provider APIs (used by openclaw skills + plugin SDKs):
#     api.openai.com, api.anthropic.com, openrouter.ai, api.together.xyz,
#     generativelanguage.googleapis.com, huggingface.co,
#     cdn-lfs.huggingface.co, hf.co
#   * container registries: docker.io, registry-1.docker.io, ghcr.io,
#     quay.io, gcr.io, mcr.microsoft.com, k8s.gcr.io, registry.k8s.io
#   * cloud storage / CDN: storage.googleapis.com, fonts.googleapis.com,
#     fonts.gstatic.com, blob.core.windows.net, s3.amazonaws.com,
#     .cloudfront.net
#   * other lang ecosystems: crates.io, static.crates.io, proxy.golang.org,
#     sum.golang.org, repo1.maven.org, repo.maven.apache.org, rubygems.org
#   * NVIDIA: developer.nvidia.com, download.nvidia.com,
#     catalog.ngc.nvidia.com
# All entries are PUBLIC IPs reachable directly from the user netns; only
# RFC1918 / cluster-internal traffic still flows through the sandbox proxy.
# Operators can still append site-specific hosts via olaresEnv.
# NEMOCLAW_SANDBOX_NO_PROXY_EXTRA. Local validation script
# `_validate_proxy_env.py` at repo root renders + executes _build_proxy_env
# without deploying so changes can be sanity-checked offline.
# 1.7.14 — fix `openclaw extensions add <channel>` (Feishu/Slack/Telegram
# etc.) failing with "npm install failed" after 1.7.13 enabled the sandbox
# HTTP egress proxy. Root cause: the openshell-sandbox HTTP proxy MITMs
# HTTPS using its own CA so JS extensions can be policy-checked, but on
# openshell 0.0.36 the MITM mangles %-encoded URLs for scoped npm packages
# (e.g. "https://registry.npmjs.org/@clack%2fprompts" -> "Empty reply
# from server"). Verified by I-3/I-5 diagnostics on chart v1.7.13:
# direct curl to a scoped pkg URL works (49 packages added in 7s) while
# the same call via http_proxy=http://10.200.0.1:3128 returns curl (52)
# Empty reply or hangs to 60s+ timeout. Fix: extend the NO_PROXY list to
# include public package registries that the user netns can reach
# DIRECTLY without the proxy (npm/yarn/pypi/github tarball hosts).
# Cluster-internal Service IPs (Olares shared inference, etc.) still go
# through the proxy because the user netns has no route to them. Knob
# olaresEnv.NEMOCLAW_SANDBOX_NO_PROXY_EXTRA exposed for ops to append
# more public registries (e.g. aliyun npm mirror, huggingface, docker.io)
# without editing the chart.
# 1.7.13 — fix LLM connectivity for gateway running in user netns. Chart
# v1.7.10+ launches `openclaw gateway run` via nsenter into the user/sandbox
# netns so TUI works concurrently with WebUI; that netns has ONLY a single
# veth `veth-s-*` (typically 10.200.0.2/24) with default route to its
# user-netns gateway IP -- which is also where the openshell-sandbox HTTP
# egress proxy listens (:3128 by default). Direct connect from the user
# netns to in-cluster Service IPs (e.g. Olares shared inference) fails
# with "Could not connect to server" after 0ms; same call via
# http_proxy=<user-ns gateway>:3128 returns HTTP 200 in ~7ms (verified by
# H-4 diagnostic). Without this fix the gateway can serve TUI/WebUI but
# every LLM call surfaces as "LLM request failed: network connection
# error" / "Connection error".
# Implementation:
#   - sandbox-ensure-gateway.sh runs `_detect_sandbox_proxy <user_netns_pid>`
#     which reads `ip -4 route show default` inside the picked user netns
#     and TCP-probes the gateway IP on 3128/8080/1080 (in that order).
#     First port that accepts a connection within 2s wins.
#   - LAUNCH gets http_proxy/https_proxy/HTTP_PROXY/HTTPS_PROXY (both case
#     variants because node ecosystem libs are inconsistent) plus
#     no_proxy/NO_PROXY listing loopback + the proxy host itself so the
#     gateway internal control-UI + canvas + browser-control sidecar
#     (127.0.0.1:18789 / 18791) bypass the proxy and a request from the
#     proxy back through itself does not loop.
#   - NOTHING is hardcoded: subnet/port can change across openshell
#     versions and the chart will rediscover them on every reconcile.
#   - Manual override knob: olaresEnv.NEMOCLAW_SANDBOX_HTTP_PROXY (e.g.
#     "http://10.200.0.1:3128") for non-default sandbox proxy layouts;
#     when set, auto-detection is skipped.
#   - When detection AND override are both empty, gateway starts without
#     proxy + emits a WARN -- TUI/WebUI still work, LLM calls fail until
#     ops investigates. We do NOT fail the whole bring-up.
# 1.7.12 — replace `openclaw gateway health` with a pure TCP probe and stop
# trusting env-staleness / cfg-changed signals when the gateway is reachable.
# Symptoms before 1.7.12: pod stays 1/2 NotReady ("还没启动好，是卡住了吗")
# even though gateway.out shows "[gateway] ready" and TCP probe succeeds in
# the user netns. Two interlocking bugs from 1.7.10/1.7.11:
#   (1) `openclaw gateway health` reads /sandbox/.openclaw/openclaw.json,
#       picks up auth.token + auth.mode=token, and tries to authenticate the
#       WS handshake. Gateway is launched with `--auth none --allow-unconfigured`
#       so the auth handshake never gets a response and the CLI times out at
#       its 10s default. From E-1 diagnostic: nsenter into user netns + TCP
#       probe :18789 returns OK in <100ms; same nsenter + `openclaw gateway
#       health` returns "Error: gateway timeout after 10000ms".
#   (2) After our nsenter LAUNCH, BOTH the onboard-spawned gateway (low PID,
#       XDG_CONFIG_HOME missing, lives in a separate user namespace) AND the
#       chart-spawned one (correct env) are alive in user netns. pgrep | head
#       -1 returns the older PID forever, env-staleness check fires, kill -9
#       gets EPERM across user namespaces, restart loop never converges. From
#       D-1 diagnostic: two openclaw-gateway PIDs alive in user netns, only
#       one was LISTENing.
# Fix: _health_via_netns / health_ok / gateway_listening all use a 3s TCP
# probe via /dev/tcp/127.0.0.1/18789 (nsenter into user netns first, agent
# netns fallback). And the early-exit gate in sandbox-ensure-gateway.sh now
# trusts a TCP-OK as definitive readiness, so a healthy gateway no longer
# gets killed every loop iteration just because pgrep found an older sibling
# with stale env. Trade-off: gog keyring-dependent skills may need a manual
# `openclaw gateway stop && openclaw gateway run ...` inside the sandbox
# shell to inherit XDG_CONFIG_HOME=/sandbox/.config; preferable to the
# previous behavior where the WHOLE pod stayed NotReady forever.
# 1.7.11 — fix "still initializing" infinite cycle introduced by 1.7.10. The
# netns picker correctly launches the gateway via nsenter into the user netns,
# but the post-launch health checks (sandbox-ensure-gateway.sh's wait loop AND
# chat-ui-bridge's gateway_listening) were still calling `openclaw gateway
# health` directly via `kubectl exec -c agent --`, i.e. in the AGENT netns.
# Agent netns sees nothing on :18789 -> health_ok always false -> bridge never
# writes /workspace/.nemoclaw-cli-ready (readiness probe stays failing) AND
# sandbox-ensure-gateway.sh decides "gateway not responding; restarting...",
# which kills the user-netns gateway it just launched. Loop forever, user sees
# "still initializing" for ~30min. Fix: every `openclaw gateway health` call
# now nsenters into the picked user netns first (with agent-netns fallback for
# pre-onboard cold starts where no user netns exists yet). Three call sites
# patched: outer health_ok in sandbox-ensure-gateway.sh, inline early-exit
# probe inside the kubectl-exec body, and gateway_listening in deployment.yaml.
# 1.7.10 — fix TUI/WebUI mutual-exclusion (TUI shows "gateway disconnected:
# closed | idle" while WebUI works) by launching the openclaw gateway in the
# user/sandbox netns instead of the agent netns. Background: openshell >= 0.0.36
# isolates "nemoclaw my-assistant connect" sessions in a separate net namespace
# from "kubectl exec -c agent --". Chart was launching gateway via the latter
# (agent netns); TUI launched via the former (user netns) sees a different
# 127.0.0.1 and gets "gateway disconnected" instantly. Manually starting the
# gateway from inside a "nemoclaw connect" shell makes both work concurrently
# (user-confirmed). sandbox-ensure-gateway.sh now picks any pid whose ns/net
# inode != /proc/self/ns/net (= an openshell-spawned process in user netns,
# typically the auto-port-forward nemoclaw onboard creates) and uses
# `nsenter --net=...` before runuser+LAUNCH. WebUI path (sandbox-tunnel.sh)
# already walks /proc and nsenters, so it keeps working with gateway in either
# netns; this change just makes TUI work TOO. Fallback to agent-netns launch
# preserved with explicit WARN when no user-netns process visible yet.
# 1.7.9 — make NEMOCLAW_OPENCLAW_VERSION pin actually take effect when the
# in-sandbox npm install lands in /sandbox/.local (sandbox user has no write
# access to /usr/local/lib in most agent containers, so the install would
# silently win at /sandbox/.local/bin/openclaw but lose at runtime because
# sandbox-ensure-gateway.sh's LAUNCH PATH puts /usr/local/bin first). The pin
# helper now writes /sandbox/.openclaw-pinned-marker, and LAUNCH detects that
# marker to invoke /sandbox/.local/bin/openclaw by full path + PATH-prepends
# /sandbox/.local/bin. Helper also tears the marker down when env is cleared
# so reverting NEMOCLAW_OPENCLAW_VERSION="" gracefully falls back to the
# pre-baked binary on the next gateway restart. Pin helper is now noisier
# (logs live vs. want comparison every ~3min, plus on first 2 ticks).
# 1.7.8 — synthesize Origin header in nemoclawweuiingress when the browser does
# not send one (top-level same-origin GET / + favicon.ico). OpenClaw 2026.4.x
# gateway TCP-closes on empty Origin; without this fill, every WebUI hit shows
# "upstream prematurely closed connection while reading response header" / 502
# even though TUI works (TUI talks to 127.0.0.1:18789 inside sandbox and
# bypasses controlUi origin checks entirely). Map prefers CHAT_UI_URL (so the
# fill matches what patch_origins.py writes into gateway.controlUi.allowedOrigins
# verbatim) and falls back to `$scheme://$http_host` only when CHAT_UI_URL is
# unset.
# 1.7.7 — expose NEMOCLAW_OPENCLAW_VERSION so users can pin a newer OpenClaw npm
# release into the sandbox (workaround for NemoClaw issue #3145 / blueprint
# min_openclaw_version still at 2026.4.24 in NemoClaw v0.0.37). Idempotent +
# sticky via /workspace/.nemoclaw-openclaw-pin; falls back gracefully when npm
# install permissions/network are unavailable. No-op when env empty (default).