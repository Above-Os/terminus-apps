apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: "postgres://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Values.postgres.host }}:5432/{{ .Values.postgres.databases.litellm }}"
  UI_PASSWORD: {{ .Values.olaresEnv.UI_PASSWORD | quote }}
  SMTP_PASSWORD: {{ .Values.olaresEnv.SMTP_PASSWORD | default "" | quote }}
