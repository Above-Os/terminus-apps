replicas: 1

resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: 50m
    memory: 256Mi

# In-pod nginx: image pinned in templates/deployment.yaml (check-chart forbids .Values in image:).
web:
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 5m
      memory: 32Mi

# openresty / beclab/terminal images: pinned in templates/*.yaml (check-chart)
