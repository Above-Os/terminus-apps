---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config-debugcli
  namespace: {{ .Release.Namespace }}
data:
  nginx.conf: |
    # In-pod nginx (:80 in workload) → static index.html; Olares 默认从 8080 打开
    server {
      listen 8080;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log warn;
      client_max_body_size 10m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      location / {
        proxy_pass http://{{ .Release.Name }}-web:80;
        proxy_http_version 1.1;
      }
    }

    # Web terminal (8081) → beclab/terminal apiserver
    server {
      listen 8081;
      access_log /opt/bitnami/openresty/nginx/logs/access.log;
      error_log /opt/bitnami/openresty/nginx/logs/error.log warn;
      client_max_body_size 10m;
      proxy_connect_timeout 30s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      location / {
        proxy_pass http://terminal:80;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}ingress
  namespace: '{{ .Release.Namespace }}'
  labels:
    io.kompose.service: {{ .Release.Name }}ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: {{ .Release.Name }}ingress
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.network/chrome-default: "true"
        io.kompose.service: {{ .Release.Name }}ingress
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config-debugcli
            defaultMode: 438
            items:
              - key: nginx.conf
                path: nginx.conf
      containers:
        - name: nginx
          # check-chart: image must be a literal (no .Values in image)
          image: "docker.io/beclab/aboveos-bitnami-openresty:1.25.3-2"
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 8081
              protocol: TCP
          env:
            - name: OPENRESTY_CONF_FILE
              value: /etc/nginx/nginx.conf
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 100m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /opt/bitnami/openresty/nginx/conf/server_blocks/nginx.conf
              subPath: nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}ingress
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    io.kompose.service: {{ .Release.Name }}ingress
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: terminal
      protocol: TCP
      port: 8081
      targetPort: 8081
