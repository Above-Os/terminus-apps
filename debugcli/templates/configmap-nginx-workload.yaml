---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nginx-workload
  namespace: {{ .Release.Namespace }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Debug CLI</title>
      <style>
        body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; }
        h1 { font-size: 1.25rem; }
        p { line-height: 1.5; color: #333; }
        a { color: #0b57d0; }
      </style>
    </head>
    <body>
      <h1>Debug CLI</h1>
      <p>Static page served from the in-pod nginx sidecar. Use the <strong>Terminal</strong> entrance in Olares (port 8081) for a web shell into the Ubuntu CLI container.</p>
    </body>
    </html>
