---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    io.kompose.service: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      io.kompose.service: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: {{ .Release.Name }}
        io.kompose.network/chrome-default: "true"
        bytetrade.io/terminal: "{{ .Release.Name }}"
    spec:
      containers:
        - name: debugcli-shell
          image: "docker.io/beclab/debug-cli-ubuntu22.04:v0.0.7"
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          workingDir: /workspace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        - name: nginx
          # check-chart: image must be a literal (no .Values in image)
          image: "docker.io/library/nginx:1.27-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-workload-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-workload-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: workspace
          hostPath:
            path: "{{ .Values.userspace.appData }}"
            type: DirectoryOrCreate
        - name: nginx-workload-config
          configMap:
            name: {{ .Release.Name }}-nginx-workload
            defaultMode: 0444
      restartPolicy: Always
