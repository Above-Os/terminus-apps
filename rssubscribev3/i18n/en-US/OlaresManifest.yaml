metadata:
  title: RSS Subscribe V3 for test
  description: Provide RSS Subscribe service for Wise
spec:
  fullDescription: |
    **IMPORTANT NOTE**
    This is a shared app. Once installed by the Olares Admin, all users in the cluster can use it through reference apps (e.g. wise).

    Provide RSS Subscribe service for Wise and other apps on Olares.

  upgradeDescription: |
    Migrate RSS Subscribe to the v3 shared-app schema.

    **What's Changed**

    - **Schema**: OlaresManifest upgraded to `apiVersion: v3`.
    - **Layout**: merged the previous `rsserver` + `rssubscribe` subCharts into a single chart.
    - **Sharing**: replaced `appScope.clusterScoped` + `appRef` with `options.shared: true`.
    - **Scaling**: `workloadReplicas` declares replica counts for the `rssubscribev3` workload.
