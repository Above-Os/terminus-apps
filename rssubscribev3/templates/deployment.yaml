apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: rssubscribe
    applications.app.bytetrade.io/author: bytetrade.io
spec:
  replicas: {{ .Values.workloads.rssubscribev3.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rssubscribe
  template:
    metadata:
      labels:
        app: rssubscribe
        io.kompose.service: rssubscribe
    spec:
      serviceAccountName: rssubscribe-cluster-account
      serviceAccount: rssubscribe-cluster-account
      containers:
        - name: rss-server
          image: "docker.io/beclab/rsshub:v1.0.1"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3010
          startupProbe:
            tcpSocket:
              port: 3010
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 3010
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: 3010
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          volumeMounts:
            - name: rsshub-rules
              mountPath: /rsshub-rules
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
            limits:
              cpu: "400m"
              memory: 350Mi
        - name: rssubscribe
          image: "docker.io/beclab/rssubscribe:v1.0.2"
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN_ADDR
              value: 0.0.0.0:8082
            - name: PG_USERNAME
              value: "{{ .Values.postgres.username }}"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rssubscribe-secrets
                  key: PG_PASSWORD
            - name: PG_HOST
              value: "{{ .Values.postgres.host }}"
            - name: PG_PORT
              value: "{{ .Values.postgres.port }}"
            - name: PG_DATABASE
              value: "{{ .Values.postgres.databases.rssubscribe }}"
            - name: RSS_HUB_URL
              value: http://127.0.0.1:3010/rss
            - name: NATS_URL
              value: nats://nats.os-platform:4222
            - name: NATS_USERNAME
              value: {{ .Release.Namespace }}-rssubscribe
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: rssubscribe-secrets
            - name: NATS_SUBJECT
              value: os.rssubscribe_status
            - name: K8S_NAMESPACE
              value: rssubscribev3-shared
          ports:
            - containerPort: 8082
          startupProbe:
            tcpSocket:
              port: 8082
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          volumeMounts:
            - name: rsshub-rules
              mountPath: /rsshub-rules
            - name: rules
              mountPath: /rules
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
            limits:
              cpu: "400m"
              memory: 350Mi
      volumes:
        - name: rsshub-rules
          configMap:
            name: rsshub-rules
            items:
              - key: rsshubrules.conf
                path: rsshubrules.conf
        - name: rules
          configMap:
            name: rules
            items:
              - key: rules.conf
                path: rules.conf

---
apiVersion: v1
kind: Service
metadata:
  name: rssubscribe-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: rssubscribe
  ports:
    - name: server
      protocol: TCP
      port: 8082
      targetPort: 8082

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: rssubscribe
  name: sharedentrances-rssubscribe
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: "8082"
      port: 80
      targetPort: 8082
  selector:
    io.kompose.service: rssubscribe
status:
  loadBalancer: {}
