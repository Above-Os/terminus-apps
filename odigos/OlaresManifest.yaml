olaresManifest.version: '0.10.0'
olaresManifest.type: app
metadata:
  name: odigos
  description: Efficient Usenet downloader.
  icon: https://app.cdn.olares.com/appstore/odigos/icon.png
  appid: odigos
  version: '1.0.1'
  title: Odigos
  categories:
  - Utilities
permission:
  provider:
    - appName: olares-app
      providerName: dashboard
      podSelectors:
        - matchExpressions:
            - key: batch.kubernetes.io/job-name
              operator: NotIn
              values:
                - cleanup-job
                - cleanup-apiservice
  appData: true
  appCache: true
spec:
  versionName: '25.4'
  fullDescription: |
    Odigos is an open-source distributed tracing solution that simplifies and improves observability for Kubernetes environments and Virtual Machines. 
    It provides instant tracing capabilities without requiring any code changes to your applications.

  developer: odigos
  website: https://odigos.io/
  sourceCode: https://github.com/odigos-io/odigos
  submitter: Olares
  locale:
  - en-US
  - zh-CN
  requiredMemory: 500Mi
  limitedMemory: 3000Mi
  requiredDisk: 128Mi
  limitedDisk: 256Mi
  requiredCpu: 100m
  limitedCpu: 2500m
  doc: https://docs.odigos.io/overview
  license:
  - text: GPL-2.0
    url: https://github.com/odigos-io/odigos?tab=Apache-2.0-1-ov-file
  supportArch:
  - amd64
  - arm64
options:
  dependencies:
  - name: olares
    type: system
    version: '>=1.12.5-0'
entrances:
- name: ui
  port: 3000
  host: ui
  title: Odigos
  icon: https://app.cdn.olares.com/appstore/odigos/icon.png

