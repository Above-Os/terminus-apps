apiVersion: batch/v1
kind: Job
metadata:
  name: cleanup-job
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded
  labels:
    odigos.io/system-object: "true"
spec:
  ttlSecondsAfterFinished: 30
  activeDeadlineSeconds: 240
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: cleanup-sa
      containers:
      - name: cleanup
        image: beclab/odigos-cli:v1.16.7
        args: ["cleanup", "--yes", "--namespace", "{{ .Release.Namespace }}"]
      restartPolicy: Never
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cleanup-apiservice
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      name: cleanup-apiservice
    spec:
      serviceAccountName: cleanup-sa
      restartPolicy: Never
      containers:
        - name: cleanup
          image: beclab/bitnami-kubectl:1.0.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Deleting v1beta1.custom.metrics.k8s.io..."
              kubectl delete apiservice v1beta1.custom.metrics.k8s.io --ignore-not-found=true
              echo "Apiservice deleted successfully"