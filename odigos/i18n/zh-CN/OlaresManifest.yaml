metadata:
  description: 为任何应用程序生成分布式链路追踪，无需修改代码。
  title: Odigos
spec:
  fullDescription: |
    Odigos 是一个开源的分布式链路追踪解决方案，为 Kubernetes 环境和虚拟机简化并提升了可观测性。它能够为您的应用程序提供即时的链路追踪功能，无需修改任何代码。

    Odigos 使平台工程师、DevOps 专业人员和 SRE 能够快速高效地提升他们的可观测性策略。它是现代云原生环境的理想选择，兼具简单性、卓越性能与行业专业能力。

    主要特性
    - 无代码自动检测：几分钟内即可配置分布式链路追踪，无需手动修改代码。
    - 多语言支持：兼容 Java、Python、.NET、Node.js 和 Go 等应用。
    - eBPF 驱动：利用 eBPF 技术实现高性能的自动检测。
    - 兼容 OpenTelemetry：以 OpenTelemetry 格式生成链路追踪数据，便于多种工具集成。
    - 无厂商绑定：可与多种监控方案集成，避免厂商锁定。
    - 自动扩展：根据数据容量自动管理和扩展 OpenTelemetry 收集器。
    - 标准化默认设置：开箱即用的最佳实践和通用默认值，无需深入了解 OpenTelemetry。
