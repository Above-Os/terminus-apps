apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: ytdlp
    applications.app.bytetrade.io/author: bytetrade.io
spec:
  replicas: {{ .Values.workloads.ytdlp.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ytdlp
  template:
    metadata:
      labels:
        app: ytdlp
        io.kompose.service: ytdlp
    spec:
      securityContext:
        runAsUser: 0
        runAsNonRoot: false

      initContainers:
      - name: init-data
        image: "beclab/aboveos-busybox:1.37.0"
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - name: config-dir
          mountPath: /config
        - name: download-dir
          mountPath: /downloads
        command:
        - sh
        - -c
        - |
          chown -R 1000:1000 /config && \
          chown -R 1000:1000 /downloads

      containers:
        - name: yt-dlp
          image: "beclab/ytdlp-server:v1.0.2"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          ports:
            - containerPort: 3082
          startupProbe:
            tcpSocket:
              port: 3082
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 3082
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 60
            successThreshold: 1
            failureThreshold: 10
          readinessProbe:
            tcpSocket:
              port: 3082
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30
          env:
            - name: YTDLP_PG_HOST
              value: "{{ .Values.postgres.host }}"
            - name: YTDLP_PG_PORT
              value: "{{ .Values.postgres.port }}"
            - name: YTDLP_PG_USERNAME
              value: "{{ .Values.postgres.username }}"
            - name: YTDLP_PG_PASSWORD
              value: "{{ .Values.postgres.password }}"
            - name: YTDLP_PG_DATABASE
              value: "{{ .Values.postgres.databases.ytdlp }}"
            - name: DEBUG
              value: "false"
            - name: FAIL_THRESHOLD
              value: "2"
          volumeMounts:
            - name: config-dir
              mountPath: /app/config
            - name: download-dir
              mountPath: /app/ytdlp/downloads
          resources:
            requests:
              cpu: 20m
              memory: 50Mi
            limits:
              cpu: "1"
              memory: 300Mi
      volumes:
        # yt-dlp's private cookies/state. Final files are streamed to the
        # system download-provider via DOWNLOAD_SERVER_URL, so /app/downloads
        # is just a local spool. Both live under appCache (declared via
        # permission.appCache: true).
        - name: config-dir
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.userspace.appCache }}'
        - name: download-dir
          hostPath:
            type: DirectoryOrCreate
            path: '{{ .Values.rootPath }}/userdata/Cache/download'

---
apiVersion: v1
kind: Service
metadata:
  name: ytdlp-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: ytdlp
  ports:
    - name: ytdlp-server
      protocol: TCP
      port: 3082
      targetPort: 3082

---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: ytdlp
  name: sharedentrances-ytdlp
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: "3082"
      port: 80
      targetPort: 3082
  selector:
    io.kompose.service: ytdlp
status:
  loadBalancer: {}
