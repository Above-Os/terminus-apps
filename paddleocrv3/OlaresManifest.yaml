olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: paddleocrv3
  description: Text Recognition & Doc Parsing Toolkit
  icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
  appid: paddleocrv3
  version: '3.0.0'
  title: PaddleOCR
  categories:
    - Utilities_v112
    - AI
sharedEntrances:
  - name: paddleocr
    title: PaddleOCR API
    host: sharedentrances-paddleocr
    icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
    port: 0
    invisible: true
    authLevel: internal
entrances:
  - name: paddleocr-client
    port: 80
    host: paddleocrv3-svc
    title: PaddleOCR
    icon: https://app.cdn.olares.com/appstore/paddleocr/icon.png
    authLevel: private
    openMethod: window
#   paddleocrv3 — single Pod: paddlex engine (8080) + nginx frontend (80)
workloadReplicas:
  paddleocrv3: 1
spec:
  onlyAdmin: true
  versionName: '3.4'
  promoteImage:
    - https://app.cdn.olares.com/appstore/paddleocr/1.webp
    - https://app.cdn.olares.com/appstore/paddleocr/2.webp
    - https://app.cdn.olares.com/appstore/paddleocr/3.webp
  fullDescription: |
    PaddleOCR is an industry-leading, production-ready OCR and document AI engine, offering end-to-end solutions from text extraction to intelligent document understanding.

    **v3 layout (this app)**
    - Single Pod with **PaddleX engine** (`paddlex --serve`, port 8080) and **nginx frontend** (port 80) in the same Pod.
    - Models are **pre-baked in the offline GPU image** — no llm-init download step.
    - UI calls `/api/*`; nginx rewrites and proxies to `127.0.0.1:8080` inside the Pod.
    - Cross-app API uses the shared entrance (`sharedentrances-paddleocr`) which hits the engine directly on port 8080.

    **Accelerator**
    | Olares mode | Image | GPU arch |
    |-------------|-------|----------|
    | `nvidia` (non-RTX-50) | `bleachzou-paddleocr3.4-nividia-gpu-offline:0.0.1` | CUDA 12.6 / sm_86–89 |
    | `nvidia` (RTX 50 / Blackwell) | `bleachzou-paddleocr3.4-nividia-gpu-sm120-offline:0.0.1` | CUDA 12.9 / sm_120 |

    RTX 50 detection uses the same cluster GPU metadata rules as paddleocr v2 (`GPU.getGPUInfo`).

    **Model (offline image)**
    Pipeline `PaddleOCR-VL-1.5` with `PP-DocLayoutV3` + `PaddleOCR-VL-1.5-0.9B`.

  upgradeDescription: |
    Initial v3 release: single-pod nginx + PaddleX, NVIDIA-only accelerator, offline GPU images.
  developer: Baidu
  website: https://aistudio.baidu.com/paddleocr
  sourceCode: https://github.com/PaddlePaddle/PaddleOCR
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://aistudio.baidu.com/paddleocr
  license:
    - text: Apache-2.0
      url: https://github.com/PaddlePaddle/PaddleOCR/blob/main/LICENSE

  accelerator:
    - mode: nvidia
      # Pod 总配额（engine + nginx 加总校验）；engine 实测见 values.yaml
      requiredCpu: "630m"
      limitedCpu: "3"
      requiredMemory: 5Gi
      limitedMemory: 5Gi
      requiredDisk: 128Mi
      limitedDisk: 100Gi
      requiredGPUMemory: 8Gi
      limitedGPUMemory: 8Gi

  supportArch:
    - amd64

permission:
  appData: true
  appCache: true
  userData:
    - Home
options:
  apiTimeout: 0
  allowMultipleInstall: true
  shared: true
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
