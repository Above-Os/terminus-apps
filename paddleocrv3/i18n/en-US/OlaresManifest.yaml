metadata:
  title: PaddleOCR
  description: Text Recognition & Doc Parsing Toolkit
spec:
  fullDescription: |
    PaddleOCR is an industry-leading, production-ready OCR and document AI engine.

    **v3 (this app)**: one Pod runs PaddleX on port 8080 and nginx UI on port 80. Offline GPU images include all models; no llm-init. NVIDIA accelerator only (`amd64`). RTX 50 series uses the sm120 offline image.
  upgradeDescription: |
    Initial v3 release for Olares.
