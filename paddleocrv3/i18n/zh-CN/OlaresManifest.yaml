metadata:
  title: PaddleOCR
  description: 文本识别与文档解析工具包
spec:
  fullDescription: |
    PaddleOCR 是业界领先的 OCR 与文档智能引擎。

    **v3（本应用）**：单个 Pod 内运行 PaddleX（8080）与 nginx 前端（80）。离线 GPU 镜像已内置模型，无需 llm-init。仅支持 NVIDIA 加速器（`amd64` 架构）；RTX 50 系列使用 sm120 离线镜像。
  upgradeDescription: |
    Olares 平台 PaddleOCR v3 首次发布。
