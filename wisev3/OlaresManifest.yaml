olaresManifest.version: '0.12.0'
olaresManifest.type: app
apiVersion: 'v3'
metadata:
  name: wisev3
  appid: wisev3
  icon: https://app.cdn.olares.com/appstore/wise/icon.png
  description: Your Digital Secret Garden
  title: Wise V3 for test
  version: '1.1.8'
  categories:
    - Productivity_v112
    - Fun

# Per-user app — every user installs their own frontend that talks to the
# admin-installed shared backend (knowledge) over in-cluster DNS.
# The Wise frontend image (TermiPass docker/wise/wise.conf) hardcodes the
# FQDN `rss-svc.knowledge-shared:{3010,3100}`, so it resolves to the
# knowledge namespace directly without a local Service in this chart.
# No sharedEntrances: this app is not consumed by other v3 apps.
entrances:
  - name: wiseclient
    port: 80
    host: wise-svc
    title: Wise
    icon: https://app.cdn.olares.com/appstore/wise/icon.png
    authLevel: internal
    openMethod: window

# Declares every workload's replica count (v3 schema). Keys MUST match the
# rendered Deployment metadata.name and values.yaml workloads.<name>:
#   wisev3 — Wise frontend nginx Deployment (== appid / Release.Name)
workloadReplicas:
  wisev3: 1

permission:
  appData: true
  appCache: true
  userData:
    - Home

spec:
  versionName: '1.9.4'
  featuredImage: https://app.cdn.olares.com/appstore/wise/1.webp
  promoteImage:
    - https://app.cdn.olares.com/appstore/wise/1.webp
    - https://app.cdn.olares.com/appstore/wise/2.webp
    - https://app.cdn.olares.com/appstore/wise/3.webp
    - https://app.cdn.olares.com/appstore/wise/4.webp
  fullDescription: |
    Wise is a modern knowledge management tool built for control and insight. Wise empowers you to collect diverse content from across the web and your devices. Crucially, it leverages locally-run AI to unearth valuable insights, freeing you from the filter bubbles and privacy compromises of big-platform algorithms.

    *Why Choose Wise*
    - AI-Powered, Local-First Reader: Easily collect, read, and manage information from various platforms.
    - Tailored Recommendations: Break out of filter bubbles with tailored content powered by self-hosted recommendation algoritms.
    - Third-Party Integrations: Provide APIs for smooth integration with 3rd-party knowledge apps.

    Key Features
    *All-in-One Content Capture:*
    - Click Once, Save Anything: Instantly capture web pages to read later.
    - Own Your Media: Automatically save YouTube videos, podcasts, and other multimedia directly to your device.
    - Bring It All In: Directly upload local files (PDFs, EPUBs, videos, audio) to your Olares system.

    *Distraction-Free Reading*
    - Clean View: Extract pure content for a clean, focused reading experience.
    - Switch theme: Seamlessly switch between light and dark themes.
    - Keyboard-based: 90% of actions accessible via shortcuts
    - Pick up where you left off: Sync reading progress automatically across all your devices.

    *Curate Unbiased Insights:*
    - Go Straight to the Source: Subscribe directly via RSS feeds.
    - Smart, Local Suggestions: Discover relevant content based on your data using powerful local LLMs, bypassing mainstream bias.

    *Streamlined Content Management:*
    - Organize Effortlessly: Easily tag documents and add notes for simple yet powerful organization.
    - Filtered View: Customize your reading list
  upgradeDescription: |
    Migrated Wise to apiVersion v3. The shared backend has been split out
    into the standalone v3 shared app `knowledge` (admin-installed once).

    **What's Changed**
    - **Architecture**: the wise client (frontend nginx) is now a per-user
      v3 application; backend (knowledge + vectorcrawl + flaresolverr) is
      installed once by the Olares Admin as the shared v3 app `knowledge`
      and reached over in-cluster DNS.
    - **Schema**: apiVersion v3, declared `workloadReplicas: { wisev3: 1 }`;
      Deployment uses `{{ .Release.Name }}`.
    - **Probes**: startup / liveness / readiness probes added on port 80.

  developer: Olares
  website: https://www.olares.com/
  submitter: Olares
  locale:
    - en-US
    - zh-CN
  doc: https://docs.olares.com/manual/olares/wise/
  requiredCpu: 50m
  limitedCpu: 1
  requiredMemory: 50Mi
  limitedMemory: 300Mi
  requiredDisk: 50Mi
  limitedDisk: 500Gi
  supportArch:
    - amd64
    - arm64

options:
  apiTimeout: 0
  dependencies:
    - name: olares
      type: system
      version: '>=1.12.6-0'
    # wise frontend is useless without the shared knowledge backend.
    # Forces Olares to refuse install until the Admin has installed knowledgev3.
    - name: knowledgev3
      type: application
      version: '>=1.1.5'
