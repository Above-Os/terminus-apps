{{- if and .Values.admin .Values.bfl.username (eq .Values.admin .Values.bfl.username) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-env
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: env-config
  annotations:
    description: "Ollama env config. Only non-empty keys are listed — empty strings break 0.30 llama-server (e.g. LLAMA_ARG_FIT_TARGET). Add optional vars here with real values, then redeploy."
data:
  # Runtime (linuxserver-style; harmless if unused by official image)
  PGID: "1000"
  PUID: "1000"
  TZ: "Etc/UTC"
  # CORS: see note below — narrow to your Olares domain if you expose the raw API to browsers
  OLLAMA_ORIGINS: "*"
  # Performance (official default for flash-attn is off)
  OLLAMA_FLASH_ATTENTION: "1"
  # 0.30 llama.cpp VRAM auto-fit (default on); target = free VRAM margin per GPU in MiB (llama.cpp default: 1024)
  LLAMA_ARG_FIT: "on"
  LLAMA_ARG_FIT_TARGET: "1024"
{{- end }}
